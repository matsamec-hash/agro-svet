<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | agro-svět.cz</title>
  <script>
    // Manual init vynutí PKCE auth bez ohledu na to jak Decap v3.12+ parsuje config.yml.
    // Bez tohohle Decap ignoroval auth_type: pkce z config.yml a dělal redirect na
    // api.netlify.com/auth (legacy Netlify Identity) → Not Found.
    window.CMS_MANUAL_INIT = true;
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.4.1/dist/decap-cms.js"></script>
  <script>
    // Backend config v JS — collections se pořád načtou z /admin/config.yml.
    CMS.init({
      config: {
        load_config_file: true,
        backend: {
          name: 'github',
          repo: 'matsamec-hash/agro-svet',
          branch: 'master',
          auth_type: 'pkce',
          app_id: 'Ov23lib8uYlQwKryiO3b'
        }
      }
    });
  </script>
</body>
</html>
