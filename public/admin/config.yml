backend:
  name: github
  repo: matsamec-hash/agro-svet
  branch: master
  auth_type: pkce
  app_id: Ov23lib8uYlQwKryiO3b

media_folder: public/images
public_folder: /images

locale: cs

collections:
  - name: novinky
    label: Novinky
    folder: src/content/novinky
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Nadpis, name: title, widget: string }
      - { label: Popis (perex), name: description, widget: text }
      - { label: Datum publikace, name: publishDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD. MM. YYYY", time_format: false }
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Technika, value: technika }
          - { label: Dotace, value: dotace }
          - { label: Trh, value: trh }
          - { label: Legislativa, value: legislativa }
          - { label: Značky, value: znacky }
      - { label: Tagy, name: tags, widget: list, default: [] }
      - { label: Značka (volitelné), name: znacka, widget: string, required: false }
      - { label: Model (volitelné), name: model, widget: string, required: false }
      - { label: Úvodní obrázek (URL), name: heroImage, widget: string, required: false }
      - { label: Doporučený článek, name: featured, widget: boolean, default: false }
      - { label: Obsah, name: body, widget: markdown }

  - name: encyklopedie
    label: Encyklopedie strojů
    folder: src/content/encyklopedie
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Název stroje, name: name, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Značka, name: znacka, widget: string }
      - label: Kategorie
        name: kategorie
        widget: select
        options:
          - { label: Traktor, value: traktor }
          - { label: Kombajn, value: kombajn }
          - { label: Stroj, value: stroj }
          - { label: Půdní technika, value: puda-technika }
      - { label: Výkon, name: vykon, widget: string }
      - { label: Hmotnost, name: hmotnost, widget: string }
      - { label: Rok uvedení, name: rok_uvedeni, widget: number }
      - { label: Popis (krátký), name: popis, widget: text }
      - { label: Úvodní obrázek (URL), name: heroImage, widget: string, required: false }
      - { label: Klíčové vlastnosti, name: highlights, widget: list, default: [] }
      - { label: Série (název), name: seriesName, widget: string, required: false }
      - { label: Motor, name: engine, widget: string, required: false }
      - { label: Převodovka, name: transmission, widget: string, required: false }
      - { label: Výkon v koních (číslo), name: powerHp, widget: number, required: false, value_type: int }
      - { label: Výkon v kW (číslo), name: powerKw, widget: number, required: false, value_type: int }
      - { label: Hmotnost v kg (číslo), name: weightKg, widget: number, required: false, value_type: int }
      - { label: Rok ukončení výroby, name: yearTo, widget: number, required: false, value_type: int }
      - { label: Zdroj (URL výrobce), name: sourceUrl, widget: string, required: false }
      - { label: Naposledy ověřeno, name: lastVerified, widget: datetime, required: false, format: "YYYY-MM-DD", date_format: "DD. MM. YYYY", time_format: false }
      - { label: YouTube ID videa, name: youtubeId, widget: string, required: false, hint: "Jen ID videa, ne celá URL. Použij landscape video (16:9), NE vertikální Short." }
      - { label: Titulek videa, name: youtubeTitle, widget: string, required: false }
      - label: FAQ (časté dotazy)
        name: faq
        widget: list
        required: false
        label_singular: Dotaz
        summary: "{{fields.q}}"
        fields:
          - { label: Otázka, name: q, widget: string }
          - { label: Odpověď, name: a, widget: text }
      - label: Redakční recenze (volitelné)
        name: recenze
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: Hodnocení (1–5), name: hodnoceni, widget: number, value_type: float, min: 1, max: 5, step: 0.1 }
          - { label: Verdikt, name: verdikt, widget: text }
          - { label: Plusy, name: plusy, widget: list, required: false }
          - { label: Minusy, name: minusy, widget: list, required: false }
          - { label: Datum recenze, name: datum, widget: datetime, required: false, format: "YYYY-MM-DD", date_format: "DD. MM. YYYY", time_format: false }
      - { label: Obsah, name: body, widget: markdown }

  - name: znacky
    label: Značky
    folder: src/content/znacky
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Název, name: name, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Země původu, name: zeme, widget: string }
      - { label: Rok založení, name: zalozena, widget: number }
      - { label: Popis (krátký), name: popis, widget: text }
      - { label: Web výrobce (URL), name: website, widget: string, required: false }
      - { label: Kategorie strojů, name: kategorie, widget: list, default: [] }
      - { label: Obsah, name: body, widget: markdown }

  - name: puda
    label: Půda
    folder: src/content/puda
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Nadpis, name: title, widget: string }
      - { label: Popis (krátký), name: popis, widget: text }
      - { label: Obsah, name: body, widget: markdown }
