slug: ovce
name: Ovce
name_plural: Plemena ovcí
description: >
  Plemena ovcí chovaná v České republice — masná, vlnařská, mléčná a
  kombinovaná. Kromě komerčních plemen zahrnuje i české regionální a krajové
  rasy.

plemena:
  # ========== MASNÁ PLEMENA ==========
  - slug: suffolk
    name: Suffolk
    origin_country: Velká Británie
    year_registered: 1859
    uzitkovost: [ maso ]
    color: "černá hlava a nohy, bílé tělo"
    weight_male_kg: 140
    weight_female_kg: 85
    description: >
      Nejrozšířenější masné plemeno ovcí v Evropě. Rychlý růst, výborná jatečná
      výtěžnost, masivní svalnatá stavba. V ČR hlavní plemeno pro masnou
      produkci.
    wikipedia: https://en.wikipedia.org/wiki/Suffolk_sheep
    wikidata: https://www.wikidata.org/wiki/Q787795
    image_url: /images/plemena/ovce/suffolk.webp
    image_credit: J gareth p at English Wikipedia
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:7_month_old_Suffolk_Ram_Lamb.JPG

  - slug: texel
    name: Texel
    origin_country: Nizozemsko (ostrov Texel)
    year_registered: 1909
    uzitkovost: [ maso ]
    color: "čistě bílá"
    weight_male_kg: 130
    weight_female_kg: 75
    description: >
      Vynikající masné plemeno s extrémně svalnatou stavbou. Nízký obsah tuku,
      vysoký podíl libového masa. Vhodné i pro drsné pastviny.
    wikipedia: https://en.wikipedia.org/wiki/Texel_sheep
    wikidata: https://www.wikidata.org/wiki/Q494612
    image_url: /images/plemena/ovce/texel.webp
    image_credit: MD
    image_license: CC BY-SA 4.0
    image_source_url: https://commons.wikimedia.org/wiki/File:B%C3%A9lier_texel.jpg

  - slug: charollais
    name: Charollais
    origin_country: Francie
    year_registered: 1974
    uzitkovost: [ maso ]
    color: "bílá až krémová, růžový čumák"
    weight_male_kg: 130
    weight_female_kg: 80
    description: >
      Francouzské masné plemeno ze stejnojmenné oblasti. Rychlý růst jehňat,
      jemné maso s vynikající chutí.
    wikipedia: https://en.wikipedia.org/wiki/Charollais_sheep
    wikidata: https://www.wikidata.org/wiki/Q3326438
    image_url: /images/plemena/ovce/charollais.webp
    image_credit: Saruman
    image_license: Public domain
    image_source_url: https://commons.wikimedia.org/wiki/File:Mouton_Charollais.JPG

  - slug: hampshire
    name: Hampshire
    origin_country: Velká Británie
    year_registered: 1889
    uzitkovost: [ maso ]
    color: "hnědá až černá hlava a nohy"
    weight_male_kg: 130
    weight_female_kg: 80
    description: >
      Anglické masné plemeno, často používané v křížení pro zlepšení masné
      užitkovosti. Silná kostra, dobrá plodnost.
    wikipedia: https://en.wikipedia.org/wiki/Hampshire_Down
    wikidata: https://www.wikidata.org/wiki/Q3116188
    image_url: /images/plemena/ovce/hampshire.webp
    image_credit: Jamain
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:Hampshire_Down_sheep_J1.jpg

  - slug: beltex
    name: Beltex
    origin_country: Belgie
    uzitkovost: [ maso ]
    color: "bílá, svalnatá stavba"
    weight_male_kg: 110
    weight_female_kg: 70
    description: >
      Belgické masné plemeno vzniklé křížením Texelu. Extrémně svalnatá záď,
      ideální pro produkci jehněčího masa prémiové kvality.

    # ========== VLNAŘSKÁ ==========
    wikipedia: https://en.wikipedia.org/wiki/Beltex
    wikidata: https://www.wikidata.org/wiki/Q2895137
    image_url: /images/plemena/ovce/beltex.webp
    image_credit: Marc Dejardin
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:B%C3%A9lier_beltex.jpg
  - slug: merino
    name: Merino
    alternative_names: [ Merinoovce ]
    origin_country: Španělsko / Austrálie
    year_registered: 1788
    uzitkovost: [ vlna ]
    color: "bílá, jemná vlna"
    weight_male_kg: 90
    weight_female_kg: 55
    description: >
      Nejznámější vlnařské plemeno na světě. Velmi jemná vlna (18–24 mikronů)
      vysoké kvality. V ČR minoritní, v Austrálii základ vlnařského průmyslu.
    wikipedia: https://cs.wikipedia.org/wiki/Merino
    wikidata: https://www.wikidata.org/wiki/Q651765
    image_url: /images/plemena/ovce/merino.webp
    image_credit: "Original: User:Fir0002 Derivative work: Charles Esson at en.wikipedia"
    image_license: GFDL 1.2
    image_source_url: https://commons.wikimedia.org/wiki/File:Merino_sheep.png

  - slug: merinolandschaf
    name: Merinolandschaf
    alternative_names: [ Württemberská merina ]
    origin_country: Německo
    uzitkovost: [ vlna, maso ]
    color: "bílá"
    weight_male_kg: 120
    weight_female_kg: 75
    description: >
      Německá kombinovaná varianta merina. Dobrá plodnost (180 %), kvalitní vlna
      i maso. V ČR uznávané plemeno s rostoucím zastoupením.

    # ========== MLÉČNÁ ==========
    wikipedia: https://en.wikipedia.org/wiki/Merinolandschaf
    wikidata: https://www.wikidata.org/wiki/Q600555
    image_url: /images/plemena/ovce/merinolandschaf.webp
    image_credit: AI-generated (gpt-image-1)
    image_license: Synthetic — illustrative only
  - slug: vychodofrizska
    name: Východofríská
    alternative_names: [ East Friesian ]
    origin_country: Německo
    uzitkovost: [ mleko ]
    color: "bílá, bezvlnatý ocas"
    weight_male_kg: 110
    weight_female_kg: 70
    milk_yield_kg_year: 600
    description: >
      Nejvýkonnější mléčné plemeno ovcí. Průměrná užitkovost 500–700 litrů mléka
      za laktaci (210–300 dní). Základ specializovaných mléčných chovů pro
      výrobu ovčího sýra a brynzy.
    wikipedia: https://en.wikipedia.org/wiki/Fries_Melkschaap
    wikidata: https://www.wikidata.org/wiki/Q487397
    image_url: /images/plemena/ovce/vychodofrizska.webp
    image_credit: EwigLernender at German Wikipedia
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:Ostfriesische_milchschafe.jpg

  - slug: lacaune
    name: Lacaune
    origin_country: Francie
    uzitkovost: [ mleko ]
    color: "bílá, bezvlnné břicho"
    weight_female_kg: 70
    milk_yield_kg_year: 300
    description: >
      Francouzské mléčné plemeno — základ pro výrobu sýra Roquefort. Nižší
      užitkovost než východofríská ovce ale vyšší odolnost a adaptabilita.

    # ========== ČESKÁ A REGIONÁLNÍ ==========
    wikipedia: https://en.wikipedia.org/wiki/Lacaune_sheep
    wikidata: https://www.wikidata.org/wiki/Q3141458
    image_url: /images/plemena/ovce/lacaune.webp
    image_credit: Deviers.fabien
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:Brebis_lacaune.jpg
  - slug: sumavska
    name: Šumavská ovce
    origin_country: Česká republika
    uzitkovost: [ kombinovane, vlna ]
    color: "bílá"
    weight_male_kg: 80
    weight_female_kg: 50
    description: >
      České původní plemeno z šumavské oblasti. Chráněná genetická rezerva —
      menšinové plemeno. Nenáročné, odolné vůči drsnému počasí, vhodné pro
      extenzivní pastvu.
    wikipedia: https://cs.wikipedia.org/wiki/%C5%A0umavsk%C3%A1_ovce
    wikidata: https://www.wikidata.org/wiki/Q10500346
    image_url: /images/plemena/ovce/sumavska.webp
    image_credit: Hans Kjäer
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:Waldschafwidder.JPG

  - slug: valaska
    name: Valaška
    alternative_names: [ Carpathian Mountain Sheep ]
    origin_country: Česká republika / Slovensko
    uzitkovost: [ mleko, vlna, maso ]
    color: "bílá nebo černá"
    weight_male_kg: 60
    weight_female_kg: 40
    milk_yield_kg_year: 120
    description: >
      Tradiční horské plemeno Karpat. Nenáročné, odolné, trojstranně užitkové.
      Základ pro výrobu pravé ovčí brynzy a valaského salašnického ruchu.
    image_url: /images/plemena/ovce/valaska.webp
    image_credit: AI-generated (gpt-image-1)
    image_license: Synthetic — illustrative only

  # ========== OSTATNÍ ==========
  - slug: romanov
    name: Romanovská
    origin_country: Rusko
    uzitkovost: [ kombinovane ]
    color: "černé jehně, šedé dospělé"
    weight_male_kg: 75
    weight_female_kg: 50
    description: >
      Ruské plemeno s vysokou plodností (2–4 jehňata ve vrhu). Odolné vůči
      chladu, rychlý růst, 2 vrhy za rok. V ČR používáno pro zvýšení plodnosti
      při křížení.
    wikipedia: https://cs.wikipedia.org/wiki/Romanovsk%C3%A1_ovce
    wikidata: https://www.wikidata.org/wiki/Q2582366
    image_url: /images/plemena/ovce/romanov.webp
    image_credit: Gennady Grachev from Moscow, Russia
    image_license: CC BY 2.0
    image_source_url: https://commons.wikimedia.org/wiki/File:VDNH_715_(10656586435).jpg

  - slug: dorper
    name: Dorper
    origin_country: Jihoafrická republika
    uzitkovost: [ maso ]
    color: "bílá s černou hlavou, bezvlnná"
    weight_male_kg: 120
    weight_female_kg: 80
    description: >
      Africké masné plemeno s výjimečnou adaptabilitou. Neroste vlna — opadává
      přirozeně. Odolné vůči suchu a teplu. V ČR rostoucí zastoupení pro
      udržitelné pastvinářství.
    wikipedia: https://cs.wikipedia.org/wiki/Dorper
    wikidata: https://www.wikidata.org/wiki/Q1250393
    image_url: /images/plemena/ovce/dorper.webp
    image_credit: Attiewestraad
    image_license: CC BY-SA 4.0
    image_source_url: https://commons.wikimedia.org/wiki/File:Dorper_ram_in_the_Kalahari_-_South_Africa_.jpg

  - slug: ovce-kamerunske
    name: Kamerunská ovce
    origin_country: Kamerun
    uzitkovost: [ ostatni ]
    color: "hnědá s černými znaky"
    weight_male_kg: 60
    weight_female_kg: 40
    description: >
      Africké bezvlné plemeno. V ČR chováno jako okrasné nebo pro malé hobby
      chovy. Nenáročné, odolné proti parazitům.
    wikipedia: https://cs.wikipedia.org/wiki/Ovce_kamerunsk%C3%A1
    wikidata: https://www.wikidata.org/wiki/Q220213
    image_url: /images/plemena/ovce/ovce-kamerunske.webp
    image_credit: andy_king50
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:Kamerunschafe_Pussenheim_2016_(01).jpg

  - slug: ostatni
    name: Ostatní plemena
    origin_country: různé
    uzitkovost: [ ostatni ]
    description: >
      Menšinová, regionální nebo křížená plemena neuvedená výše.
