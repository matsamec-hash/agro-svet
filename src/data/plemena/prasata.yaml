    wikipedia: https://cs.wikipedia.org/wiki/P%C5%99e%C5%A1tick%C3%A9_%C4%8Dernostrakat%C3%A9_prase
    wikidata: https://www.wikidata.org/wiki/Q12048096
    image_url: /images/plemena/prasata/prestice-cernostrakate.webp
    image_credit: Roy147
    image_license: CC BY-SA 3.0
    image_source_url: https://commons.wikimedia.org/wiki/File:P%C5%99e%C5%A1tick%C3%A9_%C4%8Dernostrakat%C3%A9_prase,_ZOO_Plze%C5%88.JPG
    body: |
      <h2>Přeštické černostrakaté prase — jediné původní české plemeno</h2>
      <p><strong>Přeštické černostrakaté prase</strong> (chovatelská zkratka PC, lidově „přeštičky")
      je jediné původní české plemeno prasete a od roku 1992 vedené jako <strong>národní genetický
      zdroj ČR</strong>. Vzniklo na konci 19. století v okolí Přeštic na Plzeňsku křížením domácích
      sviní s plemeny <a href="/plemena/prasata/berkshire/">berkshire</a> a cornwall.</p>

      <h3>Vzhled a vlastnosti</h3>
      <p>Plemeno poznáte podle bílé srsti s nepravidelnými černými skvrnami a polopřevislých uší.
      Kanci dosahují kolem 300 kg, prasnice zhruba 220 kg. Oproti komerčním liniím roste pomaleji,
      zato dává <strong>maso výjimečné kvality</strong> — s mramorováním a tukovou pokrývkou, ceněné
      řezníky i gastronomií (proslulá <strong>přeštická šunka</strong>).</p>

      <h3>Chov a konzervační program</h3>
      <p>Přeštické černostrakaté prase se dnes chová v rámci konzervačního programu — populace čítá
      jen přibližně 200–300 prasnic. Chovatelé tak chrání genetickou rozmanitost a udržují tradiční
      české plemeno. Srovnejte si ho s dalšími
      <a href="/plemena/prasata/">plemeny prasat v katalogu</a> nebo
      <a href="/bazar/?category=zvirata&amp;q=p%C5%99e%C5%A1tick%C3%A9%20%C4%8Dernostrakat%C3%A9%20prase">hledejte chovná zvířata v bazaru</a>.</p>
    faq:
      - q: Proč je přeštické černostrakaté prase tak vzácné?
        a: >
          Roste pomaleji než komerční hybridní linie, a proto bylo z velkochovů vytlačeno. Dochovalo
          se díky <strong>konzervačnímu programu</strong> jako národní genetický zdroj ČR — dnes ho
          chová jen kolem 200–300 prasnic.
      - q: Jaké má přeštické černostrakaté prase maso?
        a: >
          Maso je mramorované, s tukovou pokrývkou a výraznou chutí — vyhledávaná delikatesa.
          Nejznámějším výrobkem je <strong>přeštická šunka</strong>.
      - q: Kde se přeštické černostrakaté prase vyšlechtilo?
        a: >
          V okolí <strong>Přeštic na Plzeňsku</strong> na konci 19. století, křížením domácích sviní
          s plemeny berkshire a cornwall. Jako plemeno bylo uznáno v roce 1962.

