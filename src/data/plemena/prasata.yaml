  # ========== ČESKÉ PŮVODNÍ / GENETICKÝ ZDROJ ==========
  - slug: prestice-cernostrakate
    name: Přeštické černostrakaté prase
    alternative_names: [ PC, Přeštičky ]
    origin_country: Česká republika (Plzeňsko)
    year_registered: 1962
    uzitkovost: [ maso, kombinovane, ostatni ]
    color: "bílá s nepravidelnými černými skvrnami, polopřevislé uši"
    weight_male_kg: 300
    weight_female_kg: 220
    description: >
      Jediné původní české plemeno prasete a národní genetický zdroj ČR. Vznik
      křížením domácích sviní s berkshirem a cornwallem v okolí Přeštic na konci
      19. století. Dnes chováno v rámci konzervačního programu (přibližně
      200–300 prasnic). Pomalejší růst, ale vyšší kvalita masa s mramorováním a
      tukovou pokrývkou — vyhledávané řeznické a delikatesní plemeno (Přeštická
      šunka).
    wikipedia: https://cs.wikipedia.org/wiki/P%C5%99e%C5%A1tick%C3%A9_%C4%8Dernostrakat%C3%A9_prase
    wikidata: https://www.wikidata.org/wiki/Q12048096
