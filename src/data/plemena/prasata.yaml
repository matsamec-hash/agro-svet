    description: >
      Nejrozšířenější mateřské plemeno v ČR i ve světě — základ téměř všech
      komerčních hybridních linií. Šlechtěno od poloviny 19. století v
      Yorkshire. Vysoká plodnost (12–14 selat ve vrhu), výborné mateřské
      vlastnosti, dobrá růstovost a zmasilost. V hybridních programech tvoří
      prarodičovskou linii (často kříženo s landrasou).
    wikipedia: https://en.wikipedia.org/wiki/Large_White_pig
    wikidata: https://www.wikidata.org/wiki/Q1363458
    image_url: /images/plemena/prasata/bile-uslechtile.webp
    image_credit: AI-generated (gpt-image-1)
    image_license: Synthetic — illustrative only
    body: |
      <h2>České bílé ušlechtilé prase — nejrozšířenější mateřské plemeno</h2>
      <p><strong>České bílé ušlechtilé prase</strong> (zkratka ČBU, mezinárodně Large White nebo
      Yorkshire) je domácí šlechtěná populace celosvětově nejrozšířenějšího bílého plemene a tvoří
      základ téměř všech komerčních hybridních linií v ČR. Plemeno bylo vyšlechtěno od poloviny
      19. století v anglickém Yorkshiru a do českých chovů zařazeno jako <strong>mateřská linie</strong>.</p>

      <h3>Vlastnosti a využití</h3>
      <p>Charakteristická je bílá srst, růžová kůže a polostojaté uši; kanci dosahují kolem 350 kg,
      prasnice zhruba 270 kg. Plemeno vyniká <strong>vysokou plodností</strong> (12–14 selat ve vrhu),
      výbornými mateřskými vlastnostmi a dobrou růstovostí. V hybridních programech tvoří
      prarodičovskou linii, nejčastěji v kombinaci s
      <a href="/plemena/prasata/landrasa/">landrasou</a>.</p>

      <h3>Bílé ušlechtilé vs. bílé otcovské</h3>
      <p>České bílé ušlechtilé prase je <strong>mateřské</strong> plemeno (plodnost, mléčnost). Nezaměňujte
      ho s odvozeným <a href="/plemena/prasata/bile-otcovske/">bílým otcovským plemenem</a>, které je
      naopak otcovskou linií zaměřenou na zmasilost a denní přírůstek. Další plemena najdete v
      <a href="/plemena/prasata/">katalogu prasat</a>.</p>
    faq:
      - q: Co je české bílé ušlechtilé prase?
        a: >
          Je to domácí šlechtěná populace plemene Large White (Yorkshire) — nejrozšířenějšího bílého
          mateřského plemene na světě. V ČR tvoří základ komerčních hybridních linií díky vysoké
          plodnosti a dobrým mateřským vlastnostem.
      - q: Jaký je rozdíl mezi bílým ušlechtilým a bílým otcovským prasetem?
        a: >
          <strong>Bílé ušlechtilé</strong> je mateřské plemeno (plodnost, mléčnost), zatímco
          <a href="/plemena/prasata/bile-otcovske/">bílé otcovské</a> je z něj odvozená otcovská linie
          zaměřená na zmasilost a denní přírůstek.
      - q: Kolik selat má prasnice bílého ušlechtilého prasete?
        a: >
          Typicky 12–14 selat ve vrhu. Vysoká plodnost je hlavní důvod, proč plemeno tvoří
          mateřskou (prarodičovskou) linii hybridních chovů.

