slug: prasata
name: Prase domácí
name_plural: Plemena prasat
description: >
  Přehled plemen prasat chovaných v České republice a Evropě. Mateřská plemena
  (Bílé ušlechtilé, Česká landrasa) tvoří základ chovů, otcovské linie
  (Pietrain, Duroc, Hampshire) zajišťují svalnatost a kvalitu masa. Dataset
  zahrnuje původ, hmotnost, plodnost a hlavní chovné znaky včetně českého
  původního Přeštického černostrakatého.

plemena:
