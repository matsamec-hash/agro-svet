    description: >
      Nejrozšířenější mateřské plemeno v ČR i ve světě — základ téměř všech
      komerčních hybridních linií. Šlechtěno od poloviny 19. století v
      Yorkshire. Vysoká plodnost (12–14 selat ve vrhu), výborné mateřské
      vlastnosti, dobrá růstovost a zmasilost. V hybridních programech tvoří
      prarodičovskou linii (často kříženo s landrasou).
