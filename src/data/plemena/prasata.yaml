  # ========== DIVOKÉ A PŘECHODNÉ ==========
  - slug: divoke-prase
    name: Prase divoké
    alternative_names: [ Divočák, Sus scrofa ]
    origin_country: Eurasie (původní druh)
    uzitkovost: [ maso, ostatni ]
    color: "tmavě hnědá až černá, štětinatá srst, hřebenovitý hřbet"
    weight_male_kg: 200
    weight_female_kg: 130
    description: >
      Divoký předek všech domácích prasat. V ČR volně žijící jako lovná zvěř,
      ale také chovaný v oborách a na farmách pro produkci zvěřiny. Maso tmavé,
      libové, s výraznou chutí — ceněná surovina pro restaurace a myslivecké
      uzeniny. Křížení s domácím prasetem (tzv. "kanec divočák") někdy využíváno
      pro specializované produkty.

