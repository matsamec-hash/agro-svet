    body: |
      <h2>Bílé otcovské plemeno — česká otcovská linie</h2>
      <p><strong>Bílé otcovské plemeno</strong> (zkratka BO) je česká otcovská linie vyšlechtěná
      z <a href="/plemena/prasata/bile-uslechtile/">bílého ušlechtilého prasete</a> s důrazem na
      zmasilost a denní přírůstek. Je zařazené v plemenné knize SCHP ČR a slouží jako alternativa
      k <a href="/plemena/prasata/pietrain/">pietrainu</a> pro chovatele, kteří preferují bílé sele
      a vyhýbají se halotanové genetice.</p>

      <h3>Není to totéž co bílé ušlechtilé</h3>
      <p>Pozor na záměnu: hledáte-li mateřské <strong>české bílé ušlechtilé prase</strong> (Large White,
      plodnost a mléčnost), patří na samostatnou stránku
      <a href="/plemena/prasata/bile-uslechtile/">Bílé ušlechtilé prase</a>. Bílé otcovské plemeno je
      z něj naopak <strong>odvozená otcovská linie</strong> zaměřená na masnou užitkovost.</p>
    faq:
      - q: Z jakého plemene vzniklo bílé otcovské?
        a: >
          Bylo vyšlechtěno z <a href="/plemena/prasata/bile-uslechtile/">bílého ušlechtilého prasete</a>
          jako specializovaná otcovská linie s důrazem na zmasilost a denní přírůstek.
      - q: K čemu se bílé otcovské plemeno používá?
        a: >
          Jako otcovská (terminální) linie v hybridních chovech — dodává potomstvu zmasilost.
          Je to česká alternativa k pietrainu s výhodou bílého selete a bez halotanové genetiky.

  # ========== ČESKÉ PŮVODNÍ / GENETICKÝ ZDROJ ==========
