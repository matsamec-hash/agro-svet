    # ========== KATCH-ALL ==========
    wikipedia: https://cs.wikipedia.org/wiki/Prase_divok%C3%A9
    wikidata: https://www.wikidata.org/wiki/Q58697
    image_url: /images/plemena/prasata/divoke-prase.webp
    image_credit: Valentin Panzirsch
    image_license: CC BY-SA 3.0 at
    image_source_url: https://commons.wikimedia.org/wiki/File:Wildschwein,_N%C3%A4he_Pulverstampftor.jpg
    body: |
      <h2>Prase divoké (divočák) — původní předek domácích prasat</h2>
      <p><strong>Prase divoké</strong> (<em>Sus scrofa</em>), lidově <strong>divočák</strong> nebo
      „divoký prase", je volně žijící druh, ze kterého byla domestikací odvozena všechna
      <a href="/plemena/prasata/">domácí plemena prasat</a>. V myslivecké mluvě se označuje jako
      <strong>černá zvěř</strong>. V České republice patří mezi nejrozšířenější spárkatou zvěř a
      početně stále roste.</p>

      <h3>Jak poznat divoké prase</h3>
      <p>Divočák má tmavě hnědou až černou štětinatou srst, charakteristický hřebenovitý hřbet a
      protáhlý rypák. Kanci dorůstají kolem 200 kg, bachyně zhruba 130 kg. Od domácího prasete se liší
      mohutnější přední částí těla, kratšíma nohama a výraznými kly u dospělých kanců.</p>

      <h3>Chov a produkce zvěřiny</h3>
      <p>Kromě volně žijící populace se prase divoké chová v oborách a na farmách pro produkci
      <strong>zvěřiny</strong> — tmavého, libového masa s výraznou chutí, ceněného v gastronomii a
      mysliveckých uzeninách. Křížením s domácím prasetem (tzv. „kanec divočák") vznikají
      specializované produkty. Pokud hledáte chovná zvířata nebo zvěřinu,
      <a href="/bazar/?category=zvirata&amp;q=divok%C3%A9%20prase">prohlédněte si nabídku v Agro bazaru</a>.</p>
    faq:
      - q: Jak se odborně nazývá divoké prase?
        a: >
          Odborný (atlasový) název je <strong>prase divoké</strong>, latinsky <em>Sus scrofa</em>.
          V běžné řeči se používá tvar „divoký prase" i označení <strong>divočák</strong>, v myslivosti
          pak „černá zvěř". Jde o stejný druh — divokého předka domácích prasat.
      - q: Kolik váží divoké prase?
        a: >
          Dospělý kanec divočáka dorůstá zhruba 200 kg, bachyně přibližně 130 kg. Hmotnost kolísá
          podle stáří, lokality a dostupnosti potravy.
      - q: Dá se divoké prase chovat na farmě?
        a: >
          Ano. Prase divoké se chová v oborách a na farmách pro produkci zvěřiny. Chov podléhá
          mysliveckým a veterinárním předpisům; maso (zvěřina) je tmavé, libové a vyhledávané
          restauracemi i výrobci mysliveckých uzenin.
