slug: kone
name: Koně
name_plural: Plemena koní
description: >
  Plemena koní v České republice — teplokrevní sportovní, chladnokrevní tažní,
  pony, ušlechtilí a regionální rasy. Zahrnuje domácí i importovaná plemena.

