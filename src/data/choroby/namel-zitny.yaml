slug: namel-zitny
name: Námel žitný
latinsky: Claviceps purpurea
puvodce: Houba Claviceps purpurea
popis: >-
  Námel je houbová choroba obilnin a trav, nejnápadnější u žita, které je cizosprašné
  a má déle otevřené květy. Místo zrna se v klasu vytvoří tmavě fialové až černé
  rohlíčkovité sklerocium (námel), které přerůstá obilku. Sklerocia obsahují jedovaté
  námelové alkaloidy, jež jsou nebezpečné pro lidi i hospodářská zvířata, proto je
  obsah námele v potravinářském a krmném zrnu legislativně sledován a omezen.
ochrana: >-
  Pomáhá použití čištěného, námele prostého osiva, hluboká orba (sklerocia z povrchu
  ztrácejí klíčivost) a potlačování kvetoucích trav a výmrsku v okolí pozemků jako
  zdrojů nákazy. Vyrovnané a souvislé kvetení porostu zkracuje dobu náchylnosti.
  Sklerocia se odstraňují čištěním a tříděním sklizeného zrna.
aliases:
  - námel žitný (Claviceps purpurea) — toxický, sledovat obsah v zrnu
faq:
  - q: Proč je námel nebezpečný?
    a: >-
      Sklerocia námele obsahují námelové alkaloidy, které jsou toxické pro lidi i
      zvířata (historicky způsobovaly otravy zvané ergotismus). Proto je jeho obsah v
      potravinářském a krmném zrnu sledován a zákonem omezen.
  - q: Proč je námelem nejvíce ohroženo žito?
    a: >-
      Žito je cizosprašné a jeho květy zůstávají déle otevřené, takže jsou snáze
      přístupné infekci výtrusy námele v době kvetení. Samosprašné obilniny s rychlým
      uzavřením květů jsou napadány méně.
