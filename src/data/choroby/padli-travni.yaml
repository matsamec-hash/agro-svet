slug: padli-travni
name: Padlí travní
latinsky: Blumeria graminis
puvodce: Houba Blumeria graminis (dříve Erysiphe graminis)
popis: >-
  Padlí travní je nejrozšířenější houbová choroba obilnin. Na listech, listových
  pochvách a později i na klasech se tvoří charakteristický bílý až šedavý
  moučnatý povlak mycelia, který postupně hnědne a v něm dozrávají tmavá
  plodnička (kleistothecia). Napadené pletivo žloutne a předčasně odumírá, čímž
  klesá asimilační plocha, hmotnost zrna i výnos. Choroba se šíří zejména za
  teplého a vlhkého počasí v hustých, přehnojených porostech.
ochrana: >-
  Základem je volba odolných odrůd, vyvážené dusíkaté hnojení (přehnojení dusíkem
  riziko zvyšuje) a přiměřená hustota porostu. Při překročení prahu škodlivosti
  se aplikují fungicidy ze skupin azolů, morfolinů či SDHI, často v kombinaci na
  listy i ochranu klasu. Důležité je střídání účinných látek kvůli prevenci
  rezistence.
aliases:
  - padlí travní
faq:
  - q: Které plodiny padlí travní nejčastěji napadá?
    a: >-
      Padlí travní napadá většinu obilnin — pšenici, ječmen, oves, žito i
      tritikale. Patogen má sice specializované formy (formae speciales) vázané na
      konkrétní druh, ale jako choroba se vyskytuje napříč celým spektrem obilnin.
  - q: Jak poznat padlí na obilí?
    a: >-
      Typickým příznakem je bílý moučnatý povlak na listech a stéblech, který lze
      zpočátku setřít prstem. Postupně tmavne a v něm se objevují drobné černé
      plodničky. Napadené listy žloutnou a předčasně zasychají.
