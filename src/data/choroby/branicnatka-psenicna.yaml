slug: branicnatka-psenicna
name: Braničnatka pšeničná (septorióza)
latinsky: Zymoseptoria tritici
puvodce: Houba Zymoseptoria tritici (dříve Septoria tritici / Mycosphaerella graminicola)
popis: >-
  Braničnatka pšeničná, označovaná též jako septorióza listů, je v podmínkách ČR
  jednou z nejvýznamnějších listových chorob pšenice. Na listech se tvoří
  podlouhlé žlutavé až hnědé skvrny ohraničené žilnatinou, v nichž jsou patrné
  drobné černé plodničky (pyknidy). Choroba postupuje od spodních listů k horním
  a za vlhkého počasí může zničit i praporcový list, čímž výrazně snižuje výnos.
ochrana: >-
  Důležité je pěstování odolnějších odrůd, vyloučení pšenice po pšenici a
  zapravení posklizňových zbytků (zdroj nákazy). Fungicidní ochrana se cílí na
  ochranu horních listů a praporcového listu ve fázi sloupkování až metání;
  používají se azoly a SDHI, vhodné je střídání účinných látek kvůli rezistenci.
aliases:
  - braničnatka pšeničná (septorióza)
  - braničnatka (septorióza)
faq:
  - q: Proč je ochrana praporcového listu u braničnatky klíčová?
    a: >-
      Praporcový a podpraporcový list tvoří podstatnou část asimilační plochy,
      která plní zrno. Jejich poškození braničnatkou přímo snižuje hmotnost zrna a
      výnos, proto se fungicidní ošetření načasovává tak, aby tyto listy ochránilo.
  - q: Jak se braničnatka šíří?
    a: >-
      Primární nákaza pochází z posklizňových zbytků (askospory), v porostu se pak
      šíří výtrusy (konidie) splachem dešťových kapek na vyšší patra listů. Vlhké a
      mírné počasí šíření výrazně podporuje.
