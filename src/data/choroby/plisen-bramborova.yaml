slug: plisen-bramborova
name: Plíseň bramborová
latinsky: Phytophthora infestans
puvodce: Řasovka (oomyceta) Phytophthora infestans
popis: >-
  Plíseň bramborová je nejnebezpečnější chorobou brambor a napadá i rajčata. Na
  listech se tvoří hnědočerné zavadající skvrny, na rubu listů za vlhka bělavý
  povlak sporů; choroba rychle přechází na nať a později hlízy, kde způsobuje
  hnědou hnilobu. Za teplého a vlhkého počasí může během několika dní zničit celý
  porost. Jde o stejný patogen, který v 19. století způsobil irský hladomor.
ochrana: >-
  Rozhodující je preventivní fungicidní ochrana zahájená podle signalizace ještě
  před objevením příznaků a opakovaná v intervalech 7–14 dní podle tlaku choroby a
  počasí. Důležitá je zdravá, certifikovaná sadba, dostatečné odhrnování (ochrana
  hlíz před splachem spor) a desikace či mechanické odstranění nati před sklizní,
  aby se hlízy neinfikovaly při sklizni.
aliases:
  - plíseň bramborová (Phytophthora infestans) — nejnebezpečnější
faq:
  - q: Proč je plíseň bramborová tak obávaná?
    a: >-
      Phytophthora infestans se za teplého a vlhkého počasí šíří mimořádně rychle a
      dokáže zničit celý porost během několika dní. Napadá i hlízy, které pak v
      uskladnění hnijí. Je to stejný patogen, který způsobil irský hladomor.
  - q: Jak se proti plísni bramborové bránit?
    a: >-
      Klíčová je preventivní fungicidní ochrana zahájená podle signalizace ještě
      před výskytem příznaků a pravidelně opakovaná. Doplňuje ji zdravá sadba,
      dobré odhrnování chránící hlízy a včasné odstranění nati před sklizní.
