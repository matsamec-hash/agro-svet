slug: alternariova-skvrnitost
name: Alternariová skvrnitost
latinsky: Alternaria spp.
puvodce: Houby rodu Alternaria (např. A. brassicae, A. brassicicola)
popis: >-
  Alternariová skvrnitost (čerň) je houbová choroba zejména brukvovitých olejnin a
  slunečnice. Na listech, stoncích a šešulích se tvoří tmavé, často soustředně
  zónované skvrny s šedočerným povlakem sporulace. U řepky postihuje hlavně šešule,
  které předčasně pukají a osypávají se, čímž způsobuje sklizňové ztráty a zhoršuje
  kvalitu semene. Choroba se šíří za vlhkého, teplejšího počasí ke konci vegetace.
ochrana: >-
  Pomáhá dodržování osevního postupu s odstupem brukvovitých, zapravení
  posklizňových zbytků a moření osiva. Fungicidní ošetření v období dozrávání
  šešulí (často společně s ošetřením proti sklerotinii) omezuje napadení šešulí a
  osypávání. Včasná a nepřetahovaná sklizeň ztráty dále snižuje.
aliases:
  - alternariová skvrnitost
  - alternariová skvrnitost (Alternaria spp.)
faq:
  - q: Které části řepky alternárie nejvíce poškozuje?
    a: >-
      Z hlediska výnosu jsou nejcitlivější šešule. Napadené šešule předčasně
      dozrávají, pukají a osypávají se, takže ztráty vznikají těsně před sklizní i
      během ní. Skvrny na listech a stoncích bývají méně významné.
  - q: Liší se alternariová skvrnitost od černě řepkových pletiv?
    a: >-
      Jde o příbuzné choroby téhož rodu — čerň řepkových pletiv způsobuje zejména
      Alternaria brassicae. V praxi se projevy i ochrana překrývají a obě se řadí
      mezi alternariové skvrnitosti brukvovitých.
