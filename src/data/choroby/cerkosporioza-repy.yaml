slug: cerkosporioza-repy
name: Cerkosporióza řepy
latinsky: Cercospora beticola
puvodce: Houba Cercospora beticola
popis: >-
  Cerkosporióza je nejrozšířenější a nejvýznamnější listová choroba cukrovky. Na
  listech se tvoří drobné okrouhlé skvrny se světlým středem a tmavě hnědým až
  červenofialovým lemem; při silném napadení skvrny splývají a listy odumírají.
  Rostlina nahrazuje odumřelé listy novými na úkor ukládání cukru do bulvy, takže
  klesá výnos i cukernatost. Choroba se šíří za teplého a vlhkého počasí ve druhé
  polovině vegetace.
ochrana: >-
  Základem je pěstování tolerantních odrůd, dodržování osevního postupu s odstupem
  řepy a zapravení napadené chrásti. Fungicidní ochrana se zahajuje podle
  signalizace na začátku výskytu a podle tlaku choroby se opakuje; nutné je střídat
  účinné látky kvůli rozšířené rezistenci Cercospora beticola.
aliases:
  - cerkosporioza řepy (Cercospora beticola) — nejrozšířenější
faq:
  - q: Jak cerkosporióza snižuje výnos cukrovky?
    a: >-
      Napadené listy odumírají a rostlina je musí nahrazovat tvorbou nových, což
      spotřebovává energii a cukry, které by jinak uložila do bulvy. Výsledkem je
      nižší výnos bulev i pokles cukernatosti.
  - q: Kdy se proti cerkosporióze zasahuje?
    a: >-
      Ošetření se zahajuje podle signalizace hned na počátku výskytu prvních skvrn,
      obvykle ve druhé polovině léta, a podle průběhu počasí a tlaku choroby se
      případně opakuje při dodržení střídání účinných látek.
