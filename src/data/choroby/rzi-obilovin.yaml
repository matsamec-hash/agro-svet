slug: rzi-obilovin
name: Rzi obilovin
latinsky: Puccinia spp.
puvodce: Rzivé houby rodu Puccinia (rez pšeničná, rez plevová/žlutá, rez travní)
popis: >-
  Rzi jsou skupina houbových chorob obilnin způsobených rzivými houbami rodu
  Puccinia. Na listech, pochvách a stéblech se tvoří rezavě hnědé, žluté nebo
  tmavé prášivé kupky (uredospory), které se snadno otírají na ruku. Nejvážnější
  jsou rez plevová (žlutá), rez pšeničná (hnědá) a rez travní (černá). Silné
  napadení snižuje asimilační plochu, urychluje odumírání listů a může výrazně
  srazit výnos i kvalitu zrna, zejména za vlhkého a teplého počasí.
ochrana: >-
  Klíčová je volba odolných odrůd a sledování porostů od počátku jara. Při
  výskytu se používají fungicidy (azoly, strobiluriny, SDHI), nejlépe preventivně
  nebo na začátku epidemie. Odstraňování výmrsku obilnin a zaorávka posklizňových
  zbytků omezuje zdroje nákazy.
aliases:
  - rezi
  - rezi (pšeničná, žlutá)
  - rzi (korunková, stéblová)
  - rezi (žlutá, stéblová)
  - rzi
faq:
  - q: Jak rozeznat rez od jiných chorob obilí?
    a: >-
      Pro rzi jsou typické prášivé kupky spor, které se otírají na prsty a
      zanechávají rezavou nebo žlutou stopu. Tím se liší od padlí (bílý povlak)
      i od skvrnitostí typu braničnatky (ohraničené nekrózy bez prášivých spor).
  - q: Která rez je nejnebezpečnější?
    a: >-
      Velmi nebezpečná je rez plevová (žlutá), která se objevuje již brzy na jaře
      a tvoří charakteristické žluté pruhy spor podél žilnatiny. Za příznivých
      podmínek se šíří rychle a může způsobit velké ztráty na výnosu.
