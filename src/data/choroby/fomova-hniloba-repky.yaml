slug: fomova-hniloba-repky
name: Fomová hniloba stonku
latinsky: Leptosphaeria maculans
puvodce: Houba Leptosphaeria maculans (anamorfa Phoma lingam)
popis: >-
  Fomová hniloba (fomové černání stonku) je významná choroba řepky a dalších
  brukvovitých. Na podzim se na listech objevují světlé skvrny s drobnými černými
  plodničkami; houba pak prorůstá řapíkem do kořenového krčku a báze stonku, kde
  způsobuje zaškrcující suchou hnilobu. Napadené rostliny se lámou, předčasně
  dozrávají a poléhají, což vede k výrazným ztrátám na výnosu. Primární nákaza
  pochází z askospor uvolňovaných z posklizňových zbytků.
ochrana: >-
  Klíčový je dostatečný odstup řepky v osevním postupu (nejméně 3–4 roky) a
  zapravení posklizňových zbytků, které jsou hlavním zdrojem askospor. Pěstují se
  odolnější odrůdy a podle náletu spor a vývoje porostu se na podzim (případně i
  na jaře) aplikují fungicidy s azolovou účinnou látkou, které zároveň působí
  morforegulačně.
aliases:
  - fomová hniloba stonku (Leptosphaeria maculans)
faq:
  - q: Proč je fomová hniloba u řepky zvlášť nebezpečná?
    a: >-
      Houba prorůstá od listů až do kořenového krčku a báze stonku, který zaškrcuje
      a oslabuje. Rostliny se pak lámou a poléhají ještě před sklizní, takže ztráty
      vznikají i u porostů, které na podzim vypadaly zdravě.
  - q: Jak se fomové hnilobě nejlépe předcházet?
    a: >-
      Nejúčinnější prevencí je dostatečně dlouhý odstup řepky na pozemku (3–4 roky),
      zapravení posklizňových zbytků a volba odolných odrůd. Doplňuje je podzimní
      fungicidní ošetření podle signalizace náletu spor.
