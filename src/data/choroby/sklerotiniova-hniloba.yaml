slug: sklerotiniova-hniloba
name: Sklerotiniová hniloba
latinsky: Sclerotinia sclerotiorum
puvodce: Houba Sclerotinia sclerotiorum (u jetele S. trifoliorum)
popis: >-
  Sklerotiniová hniloba (bílá hniloba) je závažná houbová choroba olejnin a
  luskovin s velmi širokým okruhem hostitelů. Na stoncích a kořenovém krčku se
  tvoří vodnaté hnědnoucí léze s bílým vatovitým myceliem, uvnitř i na povrchu
  pletiv vznikají tvrdá černá sklerocia. Napadené rostliny předčasně vadnou,
  poléhají a zasychají; u řepky a slunečnice patří choroba k nejnebezpečnějším.
  Sklerocia přežívají v půdě řadu let a jsou zdrojem nákazy.
ochrana: >-
  Rozhodující je dostatečně dlouhý odstup náchylných plodin v osevním postupu
  (řepka, slunečnice, sója, jetel) a omezení příliš hustých, bujných porostů.
  Fungicidní ošetření se u řepky cílí do období kvetení, kdy infekce probíhá přes
  opadané okvětní lístky. Pomáhá i biologická ochrana (Coniothyrium minitans)
  rozkládající sklerocia v půdě.
aliases:
  - sklerotiniová hniloba (Sclerotinia sclerotiorum)
  - sklerotiniová hniloba (Sclerotinia sclerotiorum) — nejnebezpečnější
  - sklerotiniová hniloba (Sclerotinia trifoliorum) — přezimovací hniloba
faq:
  - q: Proč je sklerotiniová hniloba tak obtížně potlačitelná?
    a: >-
      Patogen má velmi široký okruh hostitelů a tvoří odolná sklerocia, která v
      půdě přežívají i řadu let. Krátké osevní postupy s řepkou, slunečnicí a
      luskovinami proto inokulum v půdě hromadí a jednorázové opatření nestačí.
  - q: Kdy se u řepky proti sklerotinii zasahuje?
    a: >-
      Klíčové je období kvetení řepky, kdy houba infikuje rostlinu přes opadané
      okvětní lístky zachycené v úžlabí listů. Fungicid se proto aplikuje na začátku
      až do plného kvetení podle průběhu počasí a tlaku choroby.
