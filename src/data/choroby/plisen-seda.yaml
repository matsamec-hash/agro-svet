slug: plisen-seda
name: Plíseň šedá
latinsky: Botrytis cinerea
puvodce: Houba Botrytis cinerea
popis: >-
  Plíseň šedá je všudypřítomná houbová choroba s velmi širokým okruhem hostitelů,
  od polních plodin po zeleninu a ovoce. Na odumírajících nebo poškozených
  pletivech se tvoří šedý prašný povlak hustého mycelia a spor. Houba se chová
  převážně jako oslabující (sekundární) patogen — proniká poraněními, odumřelými
  okvětními lístky nebo zeslabenými pletivy a způsobuje hniloby za vlhkého a
  chladnějšího počasí. U cukrovky a řepky napadá listy a další pletiva, zejména v
  zapojených, vlhkých porostech.
ochrana: >-
  Základem je omezení vlhkosti v porostu (vzdušné porosty, vyvážená výživa) a
  prevence poranění rostlin. Cílené fungicidní ošetření se zaměřuje na rizikové
  období a oslabené porosty; vzhledem ke sklonu Botrytis k rezistenci je nutné
  střídat účinné látky. Pomáhá i zapravení napadených zbytků.
aliases:
  - plíseň šedá (Botrytis cinerea)
faq:
  - q: Proč se plíseň šedá objevuje hlavně na oslabených rostlinách?
    a: >-
      Botrytis cinerea je převážně oslabující patogen — nejsnáze proniká
      poraněními, odumřelými okvětními lístky nebo pletivy zeslabenými stresem,
      mrazem či jinou chorobou. Zdravé a dobře vyživené porosty napadá obtížněji.
  - q: Jaké počasí plísni šedé svědčí?
    a: >-
      Plíseň šedá se nejvíce šíří za vlhkého, chladnějšího počasí a vysoké vzdušné
      vlhkosti v zapojených porostech. Dlouhé ovlhčení listů a špatné provětrávání
      riziko výrazně zvyšují.
