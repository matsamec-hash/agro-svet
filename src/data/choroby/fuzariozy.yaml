slug: fuzariozy
name: Fuzariózy
latinsky: Fusarium spp.
puvodce: Houby rodu Fusarium (např. F. graminearum, F. culmorum)
popis: >-
  Fuzariózy jsou skupinou chorob způsobených houbami rodu Fusarium, které napadají
  kořeny, stéblo, klas i palici řady plodin. U obilnin je nejzávažnější fuzarióza
  klasu, projevující se předčasně vybělenými klásky a růžovým povlakem na zrnu; u
  kukuřice, luskovin a olejnin převažují hniloby kořenů a stonku. Kromě ztrát na
  výnosu je rizikem tvorba mykotoxinů (zejména deoxynivalenolu, DON), které
  zhoršují zdravotní nezávadnost zrna a krmiv.
ochrana: >-
  Základem je vyvážený osevní postup (riziková je zejména pšenice po kukuřici),
  kvalitní zpracování a zapravení posklizňových zbytků a volba méně náchylných
  odrůd. U obilnin se proti fuzarióze klasu cílí fungicidní ošetření do období
  kvetení; účinné jsou azoly. Zásadní je i sklizeň za suchého počasí a rychlé
  dosušení zrna, které omezí tvorbu mykotoxinů.
aliases:
  - fuzariózy klasu a kořenů
  - fuzariózy klasu
  - fuzarióza kořenů a stonku (Fusarium spp.)
  - fuzarióza kořenů a stonku
  - fuzarióza stonku a kořenů (Fusarium spp.)
  - fuzarióza stonku a palic (Fusarium spp.)
faq:
  - q: Čím jsou fuzariózy nebezpečné kromě ztráty výnosu?
    a: >-
      Houby rodu Fusarium produkují mykotoxiny, především deoxynivalenol (DON) a
      zearalenon. Ty mohou kontaminovat potravinářské i krmné obilí a u zrna jsou
      legislativně sledovány limity, proto fuzariózy ohrožují i zdravotní
      nezávadnost produkce.
  - q: Která předplodina zvyšuje riziko fuzarióz?
    a: >-
      Nejrizikovější je pěstování obilniny (zejména pšenice) po kukuřici, jejíž
      posklizňové zbytky jsou významným zdrojem nákazy. Riziko zvyšuje i
      minimalizační zpracování půdy ponechávající zbytky na povrchu.
