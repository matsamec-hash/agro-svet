- slug: kranska
  name: Včela kraňská
  latinsky: Apis mellifera carnica
  alternative_names: [kraňka, carnica]
  puvod: Slovinsko a alpský region
  temperament: mírná
  medny_vynos: vysoký
  rojivost: vyšší
  zimuvzdornost: výborná
  vhodnost_cr: V ČR jednoznačně nejrozšířenější včela.
  barva: hnědošedá s šedým ochlupením
  description: >
    Kraňka je v Česku dominantní včelou. Vyniká mírností, výborným
    využitím jarní snůšky a nízkou spotřebou zimních zásob. Její slabinou
    je vyšší sklon k rojení, který se řeší včasným rozšiřováním úlu.
  image_url: /images/vcelarstvi/druhy/kranska.webp
  image_credit: "Richard Bartz, Munich · Makro Freak"
  image_source_url: https://commons.wikimedia.org/wiki/File:Apis_mellifera_carnica_worker_hive_entrance_3.jpg
  image_license: CC BY-SA 2.5
  wikipedia: https://cs.wikipedia.org/wiki/V%C4%8Dela_medonosn%C3%A1_kra%C5%88sk%C3%A1

- slug: tmava-vcela
  name: Včela tmavá
  latinsky: Apis mellifera mellifera
  alternative_names: [včela evropská tmavá, mellifera]
  puvod: severní a západní Evropa
  temperament: obranná
  medny_vynos: střední
  rojivost: střední
  zimuvzdornost: výborná — původní adaptace na drsné severoevropské klima
  vhodnost_cr: >
    Původní poddruh středoevropské krajiny; dnes vzácná, v ČR i okolních zemích
    existují ochranářské chovy zaměřené na zachování čistých populací.
  barva: tmavě hnědá až černá, minimální žluté zbarvení
  description: >
    Včela tmavá je původní evropský poddruh medonosné včely, který po staletí
    obýval lesy a louky střední a severní Evropy. Vyznačuje se tmavým zbarvením,
    robustní stavbou těla a vynikající přizpůsobivostí studené a vlhké zimě.
    Jarní rozvoj kolonie je oproti jihoevropským rasám pomalejší, avšak včela
    hospodaří úsporně s nízkou spotřebou zimních zásob. Dnes jsou čisté populace
    vzácné a chráněné; v řadě zemí probíhají záchranné chovy k uchování genetické
    rozmanitosti tohoto původního evropského poddruhu. Oprotí jiným rasám vykazuje
    vyšší sklon k rojení, což je třeba při chovu zohlednit.
  image_url: /images/vcelarstvi/druhy/tmava-vcela.webp
  image_credit: "Jürg Vollmer"
  image_source_url: https://commons.wikimedia.org/wiki/File:Apis_mellifera_mellifera,_04.jpg
  image_license: CC BY-SA 4.0
  faq:
    - q: Proč jsou čisté populace včely tmavé tak vzácné?
      a: >
        Tmavá včela se přirozeně kříží se zaváděnými liniemi — kraňkou, italkou
        nebo buckfastem. Introgrese cizích genů postupně mění morfologii i chování
        populace. Záchranné chovy proto volí izolované lokality, kde je přirozený
        příliv trubců z cizích linií minimální.
    - q: Je včela tmavá vhodná pro začínající včelaře?
      a: >
        Její výraznější obrannost vyžaduje zkušenější zacházení a důsledné
        používání ochranných pomůcek. Pro začátečníky bývá doporučována spíše
        kraňka nebo buckfast.

- slug: italka
  name: Včela vlašská
  latinsky: Apis mellifera ligustica
  alternative_names: [italka, ligustica]
  puvod: Itálie (Apeninský poloostrov)
  temperament: mírná
  medny_vynos: velmi vysoký
  rojivost: střední
  zimuvzdornost: >
    nižší — citlivá na dlouhé chladné zimy; vyšší spotřeba zimních zásob
    díky velké letní populaci
  vhodnost_cr: >
    V teplejších oblastech jižní Moravy a středních Čech dosahuje dobrých
    výsledků; v drsnějším klimatu podhorských oblastí je zazimování náročnější.
  barva: žlutá až zlatavá s výraznými žlutými prstenci zadečku
  description: >
    Včela vlašská patří celosvětově k nejrozšířenějším chovným rasám díky
    zlatavému zbarvení a výjimečné medné produkci. Matka je velmi plodná,
    kolonie dosahují velké letní síly a efektivně využívají hlavní snůšku.
    Vyšší počet zimujících včel ovšem zvyšuje spotřebu medových zásob; v dlouhé
    zimě bez dostatečného dozimování hrozí hladovění. Ve středoevropském klimatu
    je proto vhodná zejména pro zkušenější včelaře schopné zásoby průběžně
    kontrolovat a v případě potřeby doplňovat.
  image_url: /images/vcelarstvi/druhy/italka.webp
  image_credit: "Chop2x"
  image_source_url: https://commons.wikimedia.org/wiki/File:Ligustica_italian_bee_with_pollen.jpg
  image_license: CC BY-SA 3.0
  faq:
    - q: Proč italka spotřebuje více zásob než kraňka?
      a: >
        Matka italky udržuje silnou plodovou plochu i v pozdním létě a na podzim,
        takže kolonie vstupuje do zimy s větší populací. Více včel znamená vyšší
        spotřebu medu, a proto je správné odhadnutí zásob k zazimování klíčové.
    - q: Kříží se italka v ČR s kraňkou?
      a: >
        Ano — při volném páření se trubci z okolí dochází k přirozené hybridizaci.
        Výsledné kolonie mohou vykazovat zvýšenou obrannost typickou pro mezirasové
        hybridy. Čistou linii lze udržet pouze inseminací nebo v geografické izolaci.

- slug: buckfast
  name: Buckfast
  latinsky: Apis mellifera (šlechtěný hybrid)
  alternative_names: [buckfast včela, brátrova včela]
  puvod: Anglie, opatství Buckfast (bratr Adam, 20. století)
  temperament: mírná
  medny_vynos: velmi vysoký
  rojivost: nízká
  zimuvzdornost: >
    dobrá — linie jsou šlechtěny mimo jiné na hospodárné zimování;
    konkrétní výsledky se liší podle chovu šlechtitele
  vhodnost_cr: >
    Oblíbená u profesionálních včelařů i hobbyistů v celé ČR; vyžaduje
    pravidelný nákup ověřených matek od uznaných šlechtitelů, protože
    potomci vlastní produkce se geneticky rozpadají.
  barva: variabilní — závisí na složení linie; obvykle hnědavá se žlutými pásy
  description: >
    Buckfast je šlechtěný hybrid vzniklý soustavnou selekcí bratra Adama
    v opatství Buckfast v jihozápadní Anglii, kde pracoval od roku 1915
    až do 90. let 20. století. Linie kombinuje geny kraňky, italky a dalších
    poddruhů s cílem dosáhnout mírnosti, vysoké produkce a nízké rojivosti
    současně. Hospodářské vlastnosti jsou vyrovnané a předvídatelné — pokud
    včely pocházejí od prověřeného šlechtitele. Zásadní omezení spočívá
    v nemožnosti dochovávat vlastní matky: volně nakrytá matka z buckfast
    kolonie produkuje kříženky s proměnlivými vlastnostmi, a chovatel musí
    pravidelně nakupovat čisté buckfast matky.
  image_url: null
  faq:
    - q: Proč nelze z buckfast kolonie chovat vlastní matky?
      a: >
        Buckfast je F1 hybrid sestavený z geneticky odlišných linií. Trubci,
        kteří se spáří s novou matkou, zpravidla nepocházejí z buckfast chovu,
        a potomci (generace F2) přestávají mít konzistentní vlastnosti. Kolonie
        mohou být náhle obranné nebo rojivé. Chovatel by měl matky pravidelně
        obnovovat od certifikovaného šlechtitele.
    - q: Je buckfast vhodný pro začínající včelaře?
      a: >
        Mírnost buckfast včel je jednou z jejich hlavních šlechtěných vlastností,
        takže práce s úlem bývá klidnější. Nutnost pravidelného nákupu nových matek
        je však finanční i organizační náklad, který začátečníci berou v úvahu.

- slug: kavkazska
  name: Včela kavkazská
  latinsky: Apis mellifera caucasica
  alternative_names: [kavkazanka, šedá horská včela]
  puvod: Kavkaz (zejména centrální a východní oblasti)
  temperament: mírná
  medny_vynos: vysoký
  rojivost: nízká
  zimuvzdornost: >
    středně dobrá — v suchém kontinentálním klimatu zimuje dobře;
    ve vlhkém středoevropském prostředí může být náchylnější k nosematóze
  vhodnost_cr: >
    V ČR chována okrajově; zajímavá v oblastech s hojným jetelem díky
    dlouhému sosáku; hojné propolisování ztěžuje práci s úlem.
  barva: šedá až šedohnědá; celkově tmavší než kraňka
  description: >
    Kavkazská včela se vyznačuje nejdelším sosákem ze všech poddruhů medonosné
    včely, díky čemuž dosáhne na nektar jetele lučního, který je pro ostatní
    rasy obtížně dostupný. Kolonie jsou mírné a rojiví málo, takže práce
    s nimi je pohodlná. Hojná tvorba propolisu — typická kavkazská vlastnost —
    utěsňuje úl, ale při prohlídce svazuje rámky a komplikuje manipulaci.
    Ve vlhkém středoevropském klimatu může být kolonie náchylnější k nosematóze
    než v suššímu kavkazskému původnímu prostředí.
  image_url: /images/vcelarstvi/druhy/kavkazska.webp
  image_credit: "Zeynel Cebeci"
  image_source_url: https://commons.wikimedia.org/wiki/File:Honeybee_-_Balar%C4%B1s%C4%B1_01.jpg
  image_license: CC BY-SA 4.0
  faq:
    - q: Proč je kavkazská včela zajímavá pro chovatele v oblastech s jetelem?
      a: >
        Kavkazanka má výrazně delší sosák než ostatní středoevropské rasy, díky
        čemuž dosáhne na nektárium korunky jetele lučního. V oblastech s plochami
        jetelů tak může přinášet více nektaru než rasy s kratším sosákem.

- slug: krajinka-sklenar
  name: Kraňka linie Sklenar
  latinsky: Apis mellifera carnica
  alternative_names: [Sklenar, linie Sklenar]
  puvod: Rakousko (šlechtitelský chov Sklenar)
  temperament: mírná
  medny_vynos: vysoký
  rojivost: střední
  zimuvzdornost: výborná — vlastnost zděděná po základní kraňce, dále upevněná selekcí
  vhodnost_cr: >
    Uznávaná chovná linie dostupná přes schválené šlechtitele v ČR i Rakousku;
    vhodná pro chovatele hledající ověřenou kraňku s konzistentními vlastnostmi.
  barva: hnědošedá, typické kraňské zbarvení
  description: >
    Linie Sklenar je jednou z nejznámějších šlechtitelských linií druhu
    Apis mellifera carnica pocházejících z Rakouska. Byla vytvořena dlouhodobou
    selekcí na mírnost, nízkou rojivost a výkonnou mednou produkci při zachování
    výborné zimní odolnosti kraňky. Včelaři ji oceňují pro předvídatelné chování
    a snadnou práci s kolonií. Jako každá chovná linie vyžaduje pro zachování
    vlastností nákup matek od uznaného šlechtitele; vlastní odchov z volně
    pářených matek vlastnosti postupně nivelizuje.
  image_url: /images/vcelarstvi/druhy/krajinka-sklenar.webp
  image_credit: "Richard Bartz, Munich · Makro Freak"
  image_source_url: https://commons.wikimedia.org/wiki/File:Apis_mellifera_carnica_worker_honeycomb_2.jpg
  image_license: CC BY-SA 2.5
  faq:
    - q: Jaký je rozdíl mezi standardní kraňkou a linií Sklenar?
      a: >
        Označení „kraňka" zahrnuje celý poddruh Apis mellifera carnica bez záruky
        konkrétních vlastností — matky pocházejí z různých chovů s různou úrovní
        selekce. Linie Sklenar je dokumentovaná šlechtěná linie s průkazem původu,
        kde jsou vlastnosti jako mírnost a medný výnos systémově sledovány a
        potvrzovány přes generace.
    - q: Kde lze v ČR sehnat matky linie Sklenar?
      a: >
        Matky jsou dostupné u registrovaných šlechtitelů kraňky spolupracujících
        s rakouskými a dalšími zahraničními chovy. Informace o uznaných
        šlechtitelích poskytuje Český svaz včelařů a krajské šlechtitelské stanice.
