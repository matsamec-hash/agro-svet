- slug: akatovy
  name: Akátový med
  typ: kvetovy
  zdroj_snusky: akát (Robinia pseudoacacia)
  barva: světle žlutá až téměř čirá
  chut: jemná, sladká, bez výrazné kyselosti
  krystalizace: velmi pomalá
  popis_kratky: Světlý květový med s velmi pomalou krystalizací.
  description: >
    Akátový med patří k nejsvětlejším a nejjemnějším medům. Díky vysokému
    podílu fruktózy krystalizuje velmi pomalu a zůstává dlouho tekutý.
  image_url: /images/vcelarstvi/med/akatovy.webp
  image_credit: "Dr. Manavpreet Kaur"
  image_source_url: https://commons.wikimedia.org/wiki/File:Honey_1.jpg
  image_license: CC BY-SA 4.0

- slug: kvetovy
  name: Květový med
  typ: kvetovy
  zdroj_snusky: nektar různých kvetoucích rostlin
  barva: světle žlutá až zlatavá
  chut: jemná, harmonická, s lehce aromatickým podtónem
  krystalizace: střední
  popis_kratky: Nejběžnější jarní med světlé barvy s vyváženou, univerzální chutí.
  description: >
    Květový med vzniká z nektaru rozmanitých kvetoucích rostlin, přičemž jeho
    chuťový profil i barva se liší podle botanického složení snůšky v dané
    lokalitě a ročním období. Jde o nejrozšířenější typ medu sbíraného v České
    republice, obvykle světle žluté až zlatavé barvy s jemnou, vyváženou sladkostí.
    Krystalizuje ve středním tempu a v pevném stavu tvoří jemnozrnnou strukturu.
  image_url: /images/vcelarstvi/med/kvetovy.webp
  image_credit: "Kamalfencer"
  image_source_url: https://commons.wikimedia.org/wiki/File:Honey_3.jpg
  image_license: CC BY-SA 4.0

- slug: medovicovy
  name: Medovicový (lesní) med
  typ: medovicovy
  zdroj_snusky: medovice jehličnanů a listnáčů
  barva: tmavě hnědá až téměř černá
  chut: výrazná, jemně nahořklá, sladová, s minerálním nádechem
  krystalizace: pomalá
  popis_kratky: Tmavý lesní med s výraznou chutí a vysokým obsahem minerálních látek.
  description: >
    Medovicový med nepochází z nektaru rostlin, ale z medovice — sladkých
    výměšků hmyzu sajícího šťávu ze stromů, především mšic a svilušek na
    jehličnanech (smrk, jedle, borovice) a listnáčích (dub, buk, javor).
    Včely tuto medovici sbírají a zpracovávají stejným způsobem jako nektar.
    Ve srovnání s květovými medy obsahuje více minerálních látek, enzymů
    a oligosacharidů, což se odráží v tmavší barvě a výraznější chuti.
    Krystalizuje pomalu a snůška probíhá převážně v letních měsících.
  image_url: /images/vcelarstvi/med/medovicovy.webp
  image_credit: "Kottairajcs"
  image_source_url: https://commons.wikimedia.org/wiki/File:Honey_2.jpg
  image_license: CC BY-SA 4.0

- slug: lipovy
  name: Lipový med
  typ: kvetovy
  zdroj_snusky: květ lípy (Tilia sp.)
  barva: světle žlutá s nazelenalým nádechem
  chut: aromatická, svěží, lehce mentolová
  krystalizace: střední
  popis_kratky: Aromatický med nazelenalého odstínu tradičně spojovaný s podporou dýchacích cest.
  description: >
    Lipový med se získává ze snůšky na kvetoucích lípách, v České republice
    nejčastěji na lípě srdčité (Tilia cordata) a lípě velkolisté (Tilia platyphyllos).
    Charakterizuje ho světle žlutá barva s jemným nazelenalým nádechem a výrazné
    aromatické složky — linalool a farnesol — které mu propůjčují typický,
    lehce mentolový tón.
    V tuzemském lidovém léčitelství je tradičně používán při nachlazení a zánětech
    horních cest dýchacích, ačkoli vědecky podložená klinická data jsou omezená.
  image_url: /images/vcelarstvi/med/lipovy.webp
  image_credit: "mueritz (Thomas Kohler)"
  image_source_url: https://commons.wikimedia.org/wiki/File:Lindenhonig.jpg
  image_license: CC BY-SA 2.0

- slug: repkovy
  name: Řepkový med
  typ: kvetovy
  zdroj_snusky: květ řepky olejné (Brassica napus)
  barva: krémově bílá až světle žlutá
  chut: jemná, lehce nasládlá, bez výrazného aroma
  krystalizace: rychlá
  popis_kratky: Světlý med s velmi rychlou krystalizací, který je nutné včas vytočit.
  description: >
    Řepkový med krystalizuje ze všech běžných druhů medu nejrychleji — již během
    dvou až čtyř týdnů po vytočení přechází do pevné, jemnozrnné struktury.
    Včelaři proto musí med z řepkové snůšky vytočit bezprostředně po uzavření
    plástů, jinak hrozí ztuhnutí přímo v plástech a znemožnění točení.
    Po zkrystalizování se med pastuje (řízeným mícháním) do hladké, roztíratelné
    podoby; hotový pastovaný řepkový med je krémově bílý až světle žlutý.
  image_url: null

- slug: pohankovy
  name: Pohankový med
  typ: kvetovy
  zdroj_snusky: květ pohanky seté (Fagopyrum esculentum)
  barva: tmavě hnědá až červenohnědá
  chut: výrazná, kořenitá, sladová, s jemnou hořkostí
  krystalizace: střední
  popis_kratky: Tmavý med výrazné sladové chuti s vysokým obsahem antioxidantů.
  description: >
    Pohankový med patří k nejtmavším a nejchuťově výraznějším květovým medům.
    Pochází ze snůšky na pohankových polích, která v České republice probíhá
    převážně od července do srpna.
    Vyznačuje se vysokým obsahem flavonoidů a fenolických sloučenin, což
    koresponduje s jeho tmavou barvou a silnou antioxidační aktivitou prokazatelnou
    laboratorními metodami.
    Krystalizuje ve středním tempu a v pevném stavu tvoří hrubozrnnou strukturu.
  image_url: null

- slug: pastovany
  name: Pastovaný med
  typ: smiseny
  zdroj_snusky: různé (technologická úprava — viz popis)
  barva: krémově bílá až světle žlutá
  chut: jemná, hladká, sladká, bez výrazného aromatu
  krystalizace: střední
  popis_kratky: Pastovaný med není druh snůšky, ale způsob úpravy — řízenou krystalizací vzniká krémová, roztíratelná konzistence.
  description: >
    Pastovaný med není samostatným botanickým druhem medu, ale výsledkem
    technologického zpracování — řízeného míchání medu během počínající krystalizace.
    Do tekutého nebo jemně krystalického medu se přidá základ z již zkrystalizovaného
    medu s velmi jemnými krystaly (tzv. zárodečný med) a celá hmota se při kontrolované
    teplotě (obvykle 14–18 °C) pravidelně míchá, čímž vznikne homogenní, krémově
    hladká struktura bez hrubých krystalů.
    Výsledný produkt je snadno roztíratelný, nevytéká z nádoby a jeho chuťový profil
    závisí na výchozím druhu medu (nejčastěji řepkový nebo smíšený jarní).
  image_url: null
