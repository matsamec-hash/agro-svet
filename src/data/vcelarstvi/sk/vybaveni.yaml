- slug: rozperka
  name: Rozperka (páčidlo)
  kategorie: naradi
  popis_kratky: Nerezové páčidlo na oddeľovanie propolisom zlepených nadstavkov a rámikov, základné každodenné
    náradie včelára.
  description: 'Rozperka je tvarovaná nerezová tyč dĺžky približne 20–25 cm s mierne zahnutým klinovým
    koncom a rovným škrabákom na druhej strane. Slúži na oddeľovanie nadstavkov zlepených propolisom,
    na uvoľňovanie rámikov z úzkych medzier a na škrabanie usadeného propolisu alebo vosku zo stien nadstavku.
    Bez tohto nástroja nemožno bezpečne otvoriť úľ bez poškodenia diela alebo drvenia včiel — ide preto
    o prvý kus náradia, ktorý si každý začínajúci včelár zaobstará.

    '
  pro_zacatecniky: true
  orientacni_cena: 80–250 Kč
