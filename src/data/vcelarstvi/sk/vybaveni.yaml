- slug: vcelarsky-oblek
  name: Včelársky oblek a kukla
  kategorie: ochrana
  popis_kratky: Ochranný odev a sieťovaná kukla brániaca žihadlám pri práci s úľom, pre začiatočníkov
    odporúčaný celý oblek.
  description: 'Včelársky oblek tvorí kombinéza z husto tkaného svetlého materiálu (bavlna alebo polyester
    s bavlnou) s elastickými manžetami na zápästiach a členkoch, ktorá zabraňuje prieniku včiel pod odev.
    Kukla s kovovou alebo plastovou sieťou chráni tvár a krk; existujú samostatné kukly na použitie s
    vlastným odevom aj integrované kukly priamo zošité s kombinézou. Pre začiatočníkov odborné organizácie
    ako Český zväz včelárov odporúčajú celý oblek s integrovanou kuklou — skúsenejší chovatelia s miernym
    plemenom často pracujú iba v kuklách s rukavicami.

    '
  pro_zacatecniky: true
  orientacni_cena: 600–1 800 Kč (kukla), 1 500–4 000 Kč (celý oblek)
  image_url: /images/vcelarstvi/vybaveni/vcelarsky-oblek.webp
