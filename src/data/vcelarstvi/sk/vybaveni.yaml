- slug: krmitko
  name: Krmítko
  kategorie: krmeni
  popis_kratky: Nádoba umiestňovaná priamo do alebo nad úľ na podávanie cukrového roztoku pri zazimovaní
    alebo núdzovom kŕmení.
  description: 'Krmítko slúži na doplnenie energetických zásob včelstva v období, keď prirodzená znáška
    nestačí — typicky pri zazimovaní v septembri a októbri alebo v chudobnom medziobdobí počas leta. Stropné
    krmítko (ploché, pokrývajúce celý strop nadstavku) pojme 1–3 litre roztoku a včely k nemu pristupujú
    cez otvor zospodu; rámikové krmítko má tvar úzkeho rámika a vkladá sa priamo medzi plásty. Cukrový
    roztok sa pripravuje v pomere 1:1 (jar) alebo 2:1 (zásoby na zimu) a jeho dávkovanie sa riadi hmotnosťou
    zimnej zásoby odporúčanou Českým zväzom včelárov, spravidla 15–20 kg na zimujúcu rodinu.

    '
  pro_zacatecniky: true
  orientacni_cena: 100–400 Kč
  image_url: null
