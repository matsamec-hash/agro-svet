- slug: medomet
  name: Medomet
  kategorie: zpracovani
  popis_kratky: Odstredivka na vytáčanie medu z plástov pomocou odstredivých síl bez ich poškodenia.
  description: 'Medomet pracuje na princípe odstredivky — plásty (alebo celé rámiky) sa vkladajú do rotujúceho
    bubna a odstredivá sila vytlačí med z buniek do valcovej nádoby, odkiaľ steká výpustným kohútikom
    do nádoby. Ručné medomety s kapacitou 2–4 rámikov sú cenovo dostupné a postačujú pre menší chov do
    10 úľov; elektrické prístroje s kapacitou 6–9 rámikov a viac šetria čas pri rozsiahlejšej úrode. Kľúčový
    parameter je kompatibilita s rámikovou mierou (Optimal alebo Langstroth), pretože kazety v bubne nemožno
    vždy prispôsobiť obom mieram.

    '
  pro_zacatecniky: false
  orientacni_cena: 2 000–6 000 Kč (ručný), od 8 000 Kč (elektrický)
