- slug: ramek
  name: Rámik
  kategorie: naradi
  popis_kratky: Drevený alebo plastový rámik nesúci plást, ktorý sa vkladá do nadstavku a umožňuje vyberanie
    diela bez jeho poškodenia.
  description: 'Rámik tvorí základnú nosnú jednotku plástu — včely ho osídlia voskom, do medzistien zastavia
    bunky a matka v nich kladie vajíčka alebo robotnice skladujú med a peľ. Štandardné prevedenie je drevené
    s hornou lištou, bočnými latkami a spodnou lištou; medzi latkami sa napínajú oceľové alebo mosadzné
    drôty, na ktoré sa fixuje medzistena. Rozmery rámika určujú rámikovú mieru celého úľa — zámenu rámikov
    Optimal a Langstroth nie je možné bez úpravy nadstavku.

    '
  pro_zacatecniky: true
  orientacni_cena: 10–30 Kč za kus
