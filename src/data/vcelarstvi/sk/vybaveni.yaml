- slug: nastavkovy-ul
  name: Nadstavkový úľ
  kategorie: ul
  popis_kratky: Modulárny úľ zložený zo samostatných nadstavkov, dnešný štandard.
  description: 'Nadstavkový úľ sa skladá z oddeliteľných nadstavkov stavaných na seba. Umožňuje pracovať
    s celými nadstavkami, jednoduché rozširovanie aj odoberanie medníka. Na Slovensku sa najčastejšie
    stretávame s rámikovou mierou Optimal (39×24 cm) alebo Langstroth. Pre začiatočníka je vhodný ako
    prvý úľ vďaka dostupnosti príslušenstva a literatúry.

    '
  pro_zacatecniky: true
  orientacni_cena: 2 500–6 000 Kč za nadstavok
