- slug: langstroth
  name: Úľ Langstroth
  kategorie: ul
  popis_kratky: Najrozšírenejšia rámiková miera na svete s modulárnym príslušenstvom kompatibilným naprieč
    výrobcami.
  description: 'Úľ Langstroth navrhol v roku 1851 americký pastor Lorenzo Langstroth; dnes dominuje vo
    svetovom včelárstve najmä vďaka štandardizovaným rozmerom rámika (448×232 mm). Modulárnosť umožňuje
    vzájomnú zámenu nadstavcov a plástov od rôznych výrobcov, čo uľahčuje obstarávanie náhradných dielov
    aj zdieľanie vybavenia medzi chovateľmi. V Česku je menej rozšírený ako Optimal, ale s nástupom ekologického
    a profesionálneho chovu jeho podiel rastie.

    '
  pro_zacatecniky: true
  orientacni_cena: 2 500–5 500 Kč za nadstavec
  image_url: /images/vcelarstvi/vybaveni/langstroth.webp
  image_credit: Easy n
  image_source_url: https://commons.wikimedia.org/wiki/File:Beehive.jpg
  image_license: Public domain
