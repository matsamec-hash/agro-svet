- slug: mezistena
  name: Medzistena
  kategorie: naradi
  popis_kratky: Voskový základ s predlisovanými bunkami, ktorý včely vkladajú do rámika a rýchlo dostavujú
    do hotového plástu.
  description: 'Medzistena je tenká vosková doska s predlisovanými šesťuholníkovými základmi buniek, ktorá
    urýchľuje stavbu plástov a nasmeruje včely k stavbe buniek štandardnej veľkosti. Vkladá sa do pripraveného
    rámika s napnutými drôtmi, ktoré ju mechanicky spevňujú, a následne sa fixuje zatavením pomocou elektrického
    zdroja alebo vyhrievaného kolieska. Kvalitné medzisteny sú vyrobené z čistého včelieho vosku bez prímesí
    parafínu; ich biologická čistota priamo ovplyvňuje zdravie plodu v bunkách.

    '
  pro_zacatecniky: true
  orientacni_cena: od 20 Kč za kus (Optimal), 100–350 Kč za kg vosku
  image_url: /images/vcelarstvi/vybaveni/mezistena.webp
  image_credit: Plantsurfer
  image_source_url: https://commons.wikimedia.org/wiki/File:Beeswax_foundation.jpg
