- slug: optimal
  name: Úľ Optimal (39×24)
  kategorie: ul
  popis_kratky: Tradičná česká rámiková miera 39×24 cm, v domácich chovoch stále najrozšírenejšia.
  description: 'Rámiková miera Optimal (šírka 390 mm, výška 240 mm) sa v Česku presadila ako štandard
    po druhej svetovej vojne a dodnes ju používa väčšina domácich včelárov. Vysoká miera vybavenosti a
    dostupnosť rámikov, medzistien aj nadstavkov v domácej predajnej sieti robí z Optimalu logickú voľbu
    pre začínajúcich chovateľov. Príslušenstvo pre tento systém vyrába rad domácich aj slovenských dielní,
    ceny sú spravidla nižšie ako u importovaného Langstrothu.

    '
  pro_zacatecniky: true
  orientacni_cena: 2 000–5 000 Kč za nadstavok
