- slug: kurak
  name: Dymák (fajčiar)
  kategorie: ochrana
  popis_kratky: Nástroj produkujúci studený dym, ktorý upokojuje včely pri manipulácii s úľom a znižuje
    riziko žihadiel.
  description: 'Dymák sa skladá z nerezového alebo pocínovaného spaľovacieho košíka s mechovým dúchadlom;
    ako palivo slúži suchá tráva, drevené piliny, kôra alebo špeciálne pelety z prírodných materiálov.
    Dym spôsobuje, že včely reflexívne prijímajú med a pripravujú sa na únik pred požiarom — v tomto stave
    sú menej agresívne a ľahšie znášajú zásah chovateľa. Správne používanie dymáka patrí k základným zručnostiam
    každého včelára a výrazne znižuje počet žihadiel ako chovateľa, tak susedov pri práci na stanovišti.

    '
  pro_zacatecniky: true
  orientacni_cena: 300–800 Kč
  image_url: /images/vcelarstvi/vybaveni/kurak.webp
  image_credit: Orce Wiki
  image_source_url: https://commons.wikimedia.org/wiki/File:Bee_smoker_(pufka)_-_Macedonian_traditional_agriculture.jpg
