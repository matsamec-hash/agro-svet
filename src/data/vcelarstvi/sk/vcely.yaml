  wikipedia: https://cs.wikipedia.org/wiki/V%C4%8Dela_medonosn%C3%A1_kra%C5%88sk%C3%A1
- slug: tmava-vcela
  name: Včela tmavá
  latinsky: Apis mellifera mellifera
  alternative_names:
  - včela európska tmavá
  - mellifera
  puvod: severná a západná Európa
  temperament: obranná
  medny_vynos: střední
  rojivost: střední
  zimuvzdornost: výborná — pôvodná adaptácia na drsné severoeurópske podnebie
  vhodnost_cr: 'Pôvodný poddruh stredoeurópskej krajiny; dnes vzácna, v Česku aj okolitých krajinách existujú
    ochranárske chovy zamerané na zachovanie čistých populácií.

    '
  barva: tmavo hnedá až čierna, minimálne žlté sfarbenie
  description: 'Včela tmavá je pôvodný európsky poddruh medonosnej včely, ktorý po stáročia obýval lesy
    a lúky strednej a severnej Európy. Vyznačuje sa tmavým sfarbením, robustnou stavbou tela a vynikajúcou
    prispôsobivosťou studenej a vlhkej zime. Jarný rozvoj kolónie je oproti juhoeurópskym rasám pomalší,
    avšak včela hospodári úsporne s nízkou spotrebou zimných zásob. Dnes sú čisté populácie vzácne a chránené;
    v mnohých krajinách prebiehajú záchranné chovy na uchovanie genetickej rozmanitosti tohto pôvodného
    európskeho poddruhu. Oproti iným rasám vykazuje vyšší sklon k rojeniu, čo je potrebné pri chove zohľadniť.

    '
  image_url: /images/vcelarstvi/druhy/tmava-vcela.webp
  image_credit: Jürg Vollmer
  image_source_url: https://commons.wikimedia.org/wiki/File:Apis_mellifera_mellifera,_04.jpg
  image_license: CC BY-SA 4.0
  faq:
  - q: Prečo sú čisté populácie včely tmavej tak vzácne?
    a: 'Tmavá včela sa prirodzene kríži so zavedenými líniami — kraňkou, italkou alebo buckfastom. Introgresia
      cudzích génov postupne mení morfológiu aj správanie populácie. Záchranné chovy preto volia izolované
      lokality, kde je prirodzený príliv trúdov z cudzích línií minimálny.

      '
  - q: Je včela tmavá vhodná pre začínajúcich včelárov?
    a: 'Jej výraznejšia obrannosť vyžaduje skúsenejšie zaobchádzanie a dôsledné používanie ochranných
      pomôcok. Pre začiatočníkov býva odporúčaná skôr kraňka alebo buckfast.

      '
- slug: italka
  name: Včela vlašská
  latinsky: Apis mellifera ligustica
  alternative_names:
  - italka
  - ligustica
  puvod: Taliansko (Apeninský polostrov)
  temperament: mírná
  medny_vynos: velmi vysoký
  rojivost: střední
  zimuvzdornost: 'nižšia — citlivá na dlhé chladné zimy; vyššia spotreba zimných zásob vďaka veľkej letnej
    populácii

    '
  vhodnost_cr: 'V teplejších oblastiach južnej Moravy a stredných Čiech dosahuje dobré výsledky; v drsnejšom
    klíme podhorských oblastí je zazimovanie náročnejšie.

    '
  barva: žltá až zlatistá s výraznými žltými prstencami zadočka
  description: 'Včela vlašská patrí celosvetovo k najrozšírenejším chovným rasám vďaka zlatistému zafarbeniu
    a výnimočnej mednej produkcii. Matka je veľmi plodná, kolónie dosahujú veľkú letnú silu a efektívne
    využívajú hlavnú znášku. Vyšší počet zimujúcich včiel však zvyšuje spotrebu medových zásob; v dlhej
    zime bez dostatočného dozimovania hrozí hladovanie. V stredoeurópskom klíme je preto vhodná najmä
    pre skúsenejších včelárov schopných zásoby priebežne kontrolovať a v prípade potreby dopĺňať.

    '
  image_url: /images/vcelarstvi/druhy/italka.webp
  image_credit: Chop2x
  image_source_url: https://commons.wikimedia.org/wiki/File:Ligustica_italian_bee_with_pollen.jpg
  image_license: CC BY-SA 3.0
  faq:
  - q: Prečo italka spotrebuje viac zásob ako kraňka?
    a: 'Matka italky udržuje silnú plodovú plochu aj v neskorom lete a na jeseň, takže kolónia vstupuje
      do zimy s väčšou populáciou. Viac včiel znamená vyššiu spotrebu medu, a preto je správne odhadnutie
      zásob na zazimovanie kľúčové.

      '
  - q: Križuje sa italka v Česku s kraňkou?
    a: 'Áno — pri voľnom párení sa trúdy z okolia dochádza k prirodzenej hybridizácii. Výsledné kolónie
      môžu vykazovať zvýšenú obrannosť typickú pre medzirasové hybridy. Čistú líniu možno udržať iba insemináciou
      alebo v geografickej izolácii.

      '
- slug: buckfast
  name: Buckfast
  latinsky: Apis mellifera (šľachtený hybrid)
  alternative_names:
  - buckfast včela
  - bratova včela
  puvod: Anglicko, opátstvo Buckfast (brat Adam, 20. storočie)
  temperament: mírná
  medny_vynos: velmi vysoký
  rojivost: nízká
  zimuvzdornost: 'dobrá — línie sú šľachtené okrem iného na hospodárne zimovanie; konkrétne výsledky sa
    líšia podľa chovu šľachtiteľa

    '
  vhodnost_cr: 'Obľúbená u profesionálnych včelárov aj hobbyistov v celom Česku; vyžaduje pravidelný nákup
    overených matiek od uznaných šľachtiteľov, pretože potomkovia vlastnej produkcie sa geneticky rozpadajú.

    '
  barva: variabilná — závisí na zložení línie; obvykle hnedastá so žltými pásmi
  description: 'Buckfast je šľachtený hybrid vzniknutý sústavnou selekciou brata Adama v opátstve Buckfast
    v juhozápadnom Anglicku, kde pracoval od roku 1915 až do 90. rokov 20. storočia. Línia kombinuje gény
    kraňky, italky a ďalších poddruhov s cieľom dosiahnuť miernosť, vysokú produkciu a nízku rojivosť
    súčasne. Hospodárske vlastnosti sú vyrovnané a predvídateľné — ak včely pochádzajú od overeného šľachtiteľa.
    Zásadné obmedzenie spočíva v nemožnosti dochovávať vlastné matky: voľne nakrytá matka z buckfast kolónie
    produkuje krížence s premenlivými vlastnosťami, a chovateľ musí pravidelne nakupovať čisté buckfast
    matky.

    '
  image_url: null
  faq:
  - q: Prečo nemožno z buckfast kolónie chovať vlastné matky?
    a: 'Buckfast je F1 hybrid zostavený z geneticky odlišných línií. Trubce, ktorí sa spária s novou matkou,
      spravidla nepochádzajú z buckfast chovu, a potomkovia (generácia F2) prestávajú mať konzistentné
      vlastnosti. Kolónie môžu byť náhle obranné alebo rojivé. Chovateľ by mal matky pravidelne obnovovať
      od certifikovaného šľachtiteľa.

      '
  - q: Je buckfast vhodný pre začínajúcich včelárov?
    a: 'Miernosť buckfast včiel je jednou z ich hlavných šľachtených vlastností, takže práca s úľom býva
      pokojnejšia. Nutnosť pravidelného nákupu nových matiek je však finančný aj organizačný náklad, ktorý
      začiatočníci berú do úvahy.

      '
- slug: kavkazska
  name: Včela kaukazská
  latinsky: Apis mellifera caucasica
  alternative_names:
  - kaukazanka
  - sivá horská včela
  puvod: Kaukaz (najmä centrálne a východné oblasti)
  temperament: mírná
  medny_vynos: vysoký
  rojivost: nízká
  zimuvzdornost: 'stredne dobrá — v suchom kontinentálnom podnebí zimuje dobre; vo vlhkom stredoeurópskom
    prostredí môže byť náchylnejšia na nozematózu

    '
  vhodnost_cr: 'V Česku chovaná okrajovo; zaujímavá v oblastiach s hojným ďatelinou vďaka dlhému sosáku;
    hojné propolisovanie sťažuje prácu s úľom.

    '
  barva: sivá až sivohnedá; celkovo tmavšia než kraňka
  description: 'Kaukazská včela sa vyznačuje najdlhším sosákom zo všetkých poddruhov medonosnej včely,
    vďaka čomu dosiahne na nektár ďateliny lúčnej, ktorý je pre ostatné rasy ťažko dostupný. Kolónie sú
    mierne a rojenie málo, takže práca s nimi je pohodlná. Hojná tvorba propolisu — typická kaukazská
    vlastnosť — utesňuje úľ, ale pri prehliadke zväzuje rámiky a komplikuje manipuláciu. Vo vlhkom stredoeurópskom
    podnebí môže byť kolónia náchylnejšia na nozematózu než v suchšom kaukazskom pôvodnom prostredí.

    '
  image_url: /images/vcelarstvi/druhy/kavkazska.webp
  image_credit: Zeynel Cebeci
  image_source_url: https://commons.wikimedia.org/wiki/File:Honeybee_-_Balar%C4%B1s%C4%B1_01.jpg
  image_license: CC BY-SA 4.0
  faq:
  - q: Prečo je kaukazská včela zaujímavá pre chovateľov v oblastiach s ďatelinou?
    a: 'Kaukazanka má výrazne dlhší sosák než ostatné stredoeurópske rasy, vďaka čomu dosiahne na nektárium
      korunky ďateliny lúčnej. V oblastiach s plochami ďatelín tak môže prinášať viac nektáru než rasy
      s kratším sosákom.

      '
- slug: krajinka-sklenar
  name: Kraňka línia Sklenar
  latinsky: Apis mellifera carnica
  alternative_names:
  - Sklenar
  - línia Sklenar
  puvod: Rakúsko (šľachtiteľský chov Sklenar)
  temperament: mírná
  medny_vynos: vysoký
  rojivost: střední
  zimuvzdornost: výborná — vlastnosť zdedená po základnej kraňke, ďalej upevnená selekciou
  vhodnost_cr: 'Uznávaná chovná línia dostupná cez schválených šľachtiteľov v Česku i Rakúsku; vhodná
    pre chovateľov hľadajúcich overenú kraňku s konzistentnými vlastnosťami.

    '
  barva: hnedosivá, typické kraňské sfarbenie
  description: 'Línia Sklenar je jednou z najznámejších šľachtiteľských línií druhu Apis mellifera carnica
    pochádzajúcich z Rakúska. Bola vytvorená dlhodobou selekciou na miernosť, nízku rojivosť a výkonnú
    mednú produkciu pri zachovaní výbornej zimnej odolnosti kraňky. Včelári ju oceňujú pre predvídateľné
    správanie a ľahkú prácu s kolóniou. Ako každá chovná línia vyžaduje pre zachovanie vlastností nákup
    matiek od uznaného šľachtiteľa; vlastný odchov z voľne párených matiek vlastnosti postupne nivelizuje.

    '
  image_url: /images/vcelarstvi/druhy/krajinka-sklenar.webp
  image_credit: Richard Bartz, Munich · Makro Freak
  image_source_url: https://commons.wikimedia.org/wiki/File:Apis_mellifera_carnica_worker_honeycomb_2.jpg
  image_license: CC BY-SA 2.5
  faq:
  - q: Aký je rozdiel medzi štandardnou kraňkou a líniou Sklenar?
    a: 'Označenie „kraňka" zahŕňa celý poddruh Apis mellifera carnica bez záruky konkrétnych vlastností
      — matky pochádzajú z rôznych chovov s rôznou úrovňou selekcie. Línia Sklenar je dokumentovaná šľachtená
      línia s preukazom pôvodu, kde sú vlastnosti ako miernosť a medný výnos systémovo sledované a potvrdzované
      cez generácie.

      '
  - q: Kde možno v Česku zohnať matky línie Sklenar?
    a: 'Matky sú dostupné u registrovaných šľachtiteľov kraňky spolupracujúcich s rakúskymi a ďalšími
      zahraničnými chovmi. Informácie o uznaných šľachtiteľoch poskytuje Český zväz včelárov a krajské
      šľachtiteľské stanice.

      '
