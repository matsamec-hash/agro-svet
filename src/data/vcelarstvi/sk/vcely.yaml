- slug: kranska
  name: Včela kraňská
  latinsky: Apis mellifera carnica
  alternative_names:
  - kraňka
  - carnica
  puvod: Slovinsko a alpský región
  temperament: mírná
  medny_vynos: vysoký
  rojivost: vyšší
  zimuvzdornost: výborná
  vhodnost_cr: V Česku jednoznačne najrozšírenejšia včela.
  barva: hnedosivá so sivým ochlpením
  description: 'Kraňka je v Česku dominantnou včelou. Vyniká miernosťou, výborným využitím jarnej znášky
    a nízkou spotrebou zimných zásob. Jej slabinou je vyšší sklon k rojeniu, ktorý sa rieši včasným rozširovaním
    úľa.

    '
  image_url: /images/vcelarstvi/druhy/kranska.webp
  image_credit: Richard Bartz, Munich · Makro Freak
  image_source_url: https://commons.wikimedia.org/wiki/File:Apis_mellifera_carnica_worker_hive_entrance_3.jpg
