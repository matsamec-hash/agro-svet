- slug: kvetovy
  name: Kvetový med
  typ: kvetovy
  zdroj_snusky: nektár rôznych kvitnúcich rastlín
  barva: svetlo žltá až zlatistá
  chut: jemná, harmonická, s ľahko aromatickým podtónom
  krystalizace: střední
  popis_kratky: Najbežnejší jarný med svetlej farby s vyváženou, univerzálnou chuťou.
  description: 'Kvetový med vzniká z nektáru rozmanitých kvitnúcich rastlín, pričom jeho chuťový profil
    aj farba sa líšia podľa botanického zloženia znášky v danej lokalite a ročnom období. Ide o najrozšírenejší
    typ medu zbieraného v Česku, obvykle svetlo žltej až zlatistej farby s jemnou, vyváženou sladkosťou.
    Kryštalizuje v strednom tempe a v pevnom stave tvorí jemnozrnnú štruktúru.

    '
  image_url: /images/vcelarstvi/med/kvetovy.webp
  image_credit: Kamalfencer
  image_source_url: https://commons.wikimedia.org/wiki/File:Honey_3.jpg
  image_license: CC BY-SA 4.0
- slug: medovicovy
  name: Medovicový (lesný) med
  typ: medovicovy
  zdroj_snusky: medovica ihličnanov a listnáčov
  barva: tmavo hnedá až takmer čierna
  chut: výrazná, jemne horkastá, sladová, s minerálnym nádychom
  krystalizace: pomalá
  popis_kratky: Tmavý lesný med s výraznou chuťou a vysokým obsahom minerálnych látok.
  description: 'Medovicový med nepochádza z nektáru rastlín, ale z medovice — sladkých výlučkov hmyzu
    sajúceho šťavu zo stromov, predovšetkým vošiek a roztočov na ihličnanoch (smrek, jedľa, borovica)
    a listnáčoch (dub, buk, javor). Včely túto medovicu zbierajú a spracovávajú rovnakým spôsobom ako
    nektár. V porovnaní s kvetovými medmi obsahuje viac minerálnych látok, enzýmov a oligosacharidov,
    čo sa odráža v tmavšej farbe a výraznejšej chuti. Kryštalizuje pomaly a znáška prebieha prevažne v
    letných mesiacoch.

    '
  image_url: /images/vcelarstvi/med/medovicovy.webp
  image_credit: Kottairajcs
  image_source_url: https://commons.wikimedia.org/wiki/File:Honey_2.jpg
  image_license: CC BY-SA 4.0
- slug: lipovy
  name: Lipový med
  typ: kvetovy
  zdroj_snusky: kvet lipy (Tilia sp.)
  barva: svetlo žltá s nazelenalým nádychom
  chut: aromatická, svieža, ľahko mentolová
  krystalizace: střední
  popis_kratky: Aromatický med nazelenalého odtieňa tradične spájaný s podporou dýchacích ciest.
  description: 'Lipový med sa získava zo znášky na kvitnúcich lipách, na Slovensku najčastejšie na lipe
    malolistej (Tilia cordata) a lipe veľkolistej (Tilia platyphyllos). Charakterizuje ho svetlo žltá
    farba s jemným nazelenalým nádychom a výrazné aromatické zložky — linalool a farnesol — ktoré mu prepožičiavajú
    typický, ľahko mentolový tón. V domácom ľudovom liečiteľstve je tradične používaný pri nachladnutí
    a zápaloch horných ciest dýchacích, hoci vedecky podložené klinické údaje sú obmedzené.

    '
  image_url: /images/vcelarstvi/med/lipovy.webp
  image_credit: mueritz (Thomas Kohler)
  image_source_url: https://commons.wikimedia.org/wiki/File:Lindenhonig.jpg
  image_license: CC BY-SA 2.0
- slug: repkovy
  name: Repkový med
  typ: kvetovy
  zdroj_snusky: kvet repky olejnej (Brassica napus)
  barva: krémovo biela až svetlo žltá
  chut: jemná, ľahko nasladlá, bez výraznej arómy
  krystalizace: rychlá
  popis_kratky: Svetlý med s veľmi rýchlou kryštalizáciou, ktorý je potrebné včas vytočiť.
  description: 'Repkový med kryštalizuje zo všetkých bežných druhov medu najrýchlejšie — už počas dvoch
    až štyroch týždňov po vytočení prechádza do pevnej, jemnozrnnej štruktúry. Včelári preto musia med
    z repkovej znášky vytočiť bezprostredne po uzavretí plástov, inak hrozí stuhnutie priamo v plástoch
    a znemožnenie točenia. Po skryštalizovaní sa med pastuje (riadeným miešaním) do hladkej, roztierateľnej
    podoby; hotový pastovaný repkový med je krémovo biely až svetlo žltý.

    '
  image_url: null
- slug: pohankovy
  name: Pohánkový med
  typ: kvetovy
  zdroj_snusky: kvet pohánky siatej (Fagopyrum esculentum)
  barva: tmavo hnedá až červenohnedá
  chut: výrazná, korenistá, sladová, s jemnou horkosťou
  krystalizace: střední
  popis_kratky: Tmavý med výraznej sladovej chuti s vysokým obsahom antioxidantov.
  description: 'Pohánkový med patrí k najtmavším a najchuťovo výraznejším kvetovým medom. Pochádza zo
    znášky na pohánkových poliach, ktorá na Slovensku prebieha prevažne od júla do augusta. Vyznačuje
    sa vysokým obsahom flavonoidov a fenolických zlúčenín, čo korešponduje s jeho tmavou farbou a silnou
    antioxidačnou aktivitou preukázateľnou laboratórnymi metódami. Kryštalizuje v strednom tempe a v pevnom
    stave tvorí hrubozrnnú štruktúru.

    '
  image_url: null
- slug: pastovany
  name: Pastovaný med
  typ: smiseny
  zdroj_snusky: rôzne (technologická úprava — pozri popis)
  barva: krémovo biela až svetlo žltá
  chut: jemná, hladká, sladká, bez výrazného aromatu
  krystalizace: střední
  popis_kratky: Pastovaný med nie je druh znášky, ale spôsob úpravy — riadenou kryštalizáciou vzniká krémová,
    roztierateľná konzistencia.
  description: 'Pastovaný med nie je samostatným botanickým druhom medu, ale výsledkom technologického
    spracovania — riadeného miešania medu počas začínajúcej kryštalizácie. Do tekutého alebo jemne kryštalického
    medu sa pridá základ z už skryštalizovaného medu s veľmi jemnými kryštálmi (tzv. zárodočný med) a
    celá hmota sa pri kontrolovanej teplote (obvykle 14–18 °C) pravidelne mieša, čím vznikne homogénna,
    krémovo hladká štruktúra bez hrubých kryštálov. Výsledný produkt je ľahko roztierateľný, nevytieka
    z nádoby a jeho chuťový profil závisí od východiskového druhu medu (najčastejšie repkový alebo zmiešaný
    jarný).

    '
  image_url: null
