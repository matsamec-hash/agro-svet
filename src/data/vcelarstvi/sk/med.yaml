- slug: akatovy
  name: Agátový med
  typ: kvetovy
  zdroj_snusky: agát (Robinia pseudoacacia)
  barva: svetlo žltá až takmer číra
  chut: jemná, sladká, bez výraznej kyslosti
  krystalizace: velmi pomalá
  popis_kratky: Svetlý kvetový med s veľmi pomalou kryštalizáciou.
  description: 'Agátový med patrí k najsvetlejším a najjemnejším medom. Vďaka vysokému podielu fruktózy
    kryštalizuje veľmi pomaly a zostáva dlho tekutý.

    '
  image_url: /images/vcelarstvi/med/akatovy.webp
  image_credit: Dr. Manavpreet Kaur
  image_source_url: https://commons.wikimedia.org/wiki/File:Honey_1.jpg
