slug: fendt
name: Fendt
country: Německo
founded: 1937
website: https://www.fendt.com
description: |
  Prémiová německá značka traktorů známá CVT převodovkou Vario. Vlastněná koncernem AGCO od roku 1997. Vario technologie (bezstupňová převodovka) debutovala v roce 1995 a dnes pokrývá celou nabídku — od malých 200 Vario až po vlajkový 1000 Vario. Kombajny IDEAL patří mezi nejpokročilejší na světě.
