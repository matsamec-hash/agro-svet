slug: jcb
name: JCB
country: Spojené království
founded: 1945
website: https://www.jcb.com/
description: >
  Britský rodinný výrobce stavebních a zemědělských strojů založený Josephem Cyrilem Bamfordem. Pro zemědělství vyrábí ikonické teleskopické manipulátory Loadall (od kompaktních 525-60 po heavy-duty 560-80), kompaktní pivot-steer manipulátory TM Telemaster, kompaktní kolové nakladače řady 400 a unikátní vysokorychlostní traktory Fastrac s pruženým podvozkem a 70 km/h cestovní rychlostí.
