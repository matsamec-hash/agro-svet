slug: deutz-fahr
name: Deutz-Fahr
country: Německo / Itálie
founded: 1864
website: https://www.deutz-fahr.com
wikipedia: https://en.wikipedia.org/wiki/Deutz-Fahr
wikidata: https://www.wikidata.org/wiki/Q645697
description: >
  Německá značka s dlouhou tradicí od roku 1864 (Deutz), fúze s Fahr 1969. Součást SDF Group
  (Same Deutz-Fahr) s italskou součástí. Traktory vyráběné v Lauingenu (Německo) a Treviglio
  (Itálie). Výrazné zelené zbarvení. Silná pozice v řadě 5G a 6G v ČR, vlajkový je 9 Series.

