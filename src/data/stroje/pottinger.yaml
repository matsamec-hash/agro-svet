slug: pottinger
name: Pöttinger
country: Rakousko
founded: 1871
website: https://www.poettinger.at/cs_cz/
wikipedia: https://cs.wikipedia.org/wiki/P%C3%B6ttinger
wikidata: https://www.wikidata.org/wiki/Q2120863
description: >
  Rakouský rodinný výrobce s širokým portfoliem strojů pro zpracování půdy (Servo pluhy, Terradisc, Synkro, Lion), setí (Aerosem, Terrasem, Vitasem) a zejména sklizeň pícnin (Novacat žačky, Top shrnovače, Hit obraceče, Impress lisy, Jumbo a Faro samosběrací vozy). Sídlo Grieskirchen, výrobní závody v Rakousku, ČR (Vodňany), Německu a Polsku.
