slug: massey-ferguson
name: Massey Ferguson
country: Kanada / USA
founded: 1953
website: https://www.masseyferguson.com
wikipedia: https://en.wikipedia.org/wiki/Massey_Ferguson
wikidata: https://www.wikidata.org/wiki/Q579509
description: |
  Tradiční kanadsko-americká značka vzniklá 1953 fúzí Massey-Harris (Kanada, 1847) a Ferguson (UK, 1933). Od roku 1994 součást koncernu AGCO. Traktory vyráběné v Beauvais (Francie), kombajny v Breganze (Itálie) a Hesstonu (USA). Známá trojúhelníkovým logem a číslováním řad (3000, 4700, 5M, 5S, 6S, 7S, 8S, 9S). Klíčová inovace **Ferguson System** (3-bodový závěs, 1933) ovlivnila všechny moderní traktory.
