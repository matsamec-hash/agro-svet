description: >
  Tradiční kanadsko-americká značka, součást koncernu AGCO. Traktory vyráběné v Beauvais
  (Francie). Známá trojúhelníkovým logem a číslováním řad (3000, 4700, 5700, 6700, 7700,
  8700, 9000). Kombajny pod značkou MF historicky Activa/Beta/Delta, dnes součást Fendt IDEAL.

