slug: horsch
name: Horsch
country: Německo
founded: 1984
website: https://www.horsch.com/
wikipedia: https://en.wikipedia.org/wiki/Horsch
wikidata: https://www.wikidata.org/wiki/Q1628943
description: >
  Německý průkopník no-till a minimum-till technologií se sídlem v Schwandorfu (Bavorsko). Pneumatické secí stroje Pronto a Sprinter, přesné secí stroje Maestro, no-till disková sečka Avatar, hloubkové kypřiče Tiger, radličkové podmítače Terrano, diskové podmítače Joker a postřikovače Leeb (tažené i samojízdné PT/VL).
