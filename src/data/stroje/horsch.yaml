        family: avatar
        subcategory: seci-stroje-pneumaticke
        description: |
          Avatar — tažený pneumatický secí stroj pro přímé setí (no-till) do nezpracované půdy a meziplodin. Disková botka SingleDisc s přítlakem až 350 kg zvládne i pevné strniště. Provedení SD je řadové se dvěma nádržemi, SL je s velkokapacitní nádrží pro hnojivo (varianta solo nebo duo). Pracovní záběr 6, 8, 10 a 12 m.
