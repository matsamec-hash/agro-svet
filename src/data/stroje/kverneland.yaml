slug: kverneland
name: Kverneland
country: Norsko
founded: 1879
website: https://www.kverneland.com/
description: >
  Norský výrobce zemědělské techniky založený 1879 v Kvernelandu (Jæren), od roku 2012
  součást japonské skupiny Kubota Corporation. Tradičně označovaný jako "king of plows" —
  klasické pluhy 150 / 2300 / ED / EG, semi-mounted PB100 / 6300 a jejich slupice
  z patentované Kverneland oceli jsou globálním etalonem orby. Doplňkově diskové
  podmítače Qualidisc Pro/Farmer, radličkové Enduro / CTC / Turbo, rotační brány NG-S/H,
  válce Actiroll a precizní secí stroje Optima (přesné), e-drill / u-drill / Accord
  (pneumatické) a TS-Evo (mechanické). Pro hnojení rozmetadla Exacta CL / TL / HL
  s exkluzivní technologií GEOSPREAD pro section control až 1 m úsek po úseku.
  Ochrana rostlin: nesené iXter B/A, tažené iXtrack T3/T4/T6 a samojízdné iXdrive
  4180–5240. Kverneland Group sdružuje i sesterské značky Vicon, Roc a Kubota Implements.
