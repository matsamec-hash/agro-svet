slug: kverneland
name: Kverneland
country: Norsko
founded: 1879
website: https://www.kverneland.com/
description: >
  Norská skupina (od 2012 vlastněná Kubota Corporation) s portfoliem tradičních pluhů (řady 150, 2300, ED, EG, PB100), diskových podmítačů Qualidisc, radličkových podmítačů Enduro/CTC, přesných secích strojů Optima, secích strojů e-drill a u-drill, postřikovačů iXter / iXtrack / iXdrive a rozmetadel Exacta s technologií GEOSPREAD. Kverneland Group sdružuje i značky Vicon, Roc a Kubota Implements.
