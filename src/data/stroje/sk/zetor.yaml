# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Česká republika"
description: >-
  Tradičný český výrobca traktorov z Brna, vzniknutý roku 1946 zo Zbrojovky Brno (pôvodne letecké motory Aero/Avia). Názov **Z**brojovka + trak**TOR**. Definujúca rada **UR I** (1962+) sa stala chrbticou českého i východoeurópskeho poľnohospodárstva. Súčasné rady **Major, Proxima, Forterra, Crystal HD** pokrývajú 53–170 k. Od roku 2018 spolupráca s John Deere. Vlastník: HTC Investments. Export do viac ako 60 krajín.

categories:
  traktory: "Traktory"

series:
  z-25: >-
    Prvý traktor Zetoru, predstavený **1946** v Brne. Vznikol v priestoroch **Zbrojovky Brno** (predvojnové letecké motory Aero/Avia) a definoval **Zetorovský systém** — jednoduchá obsluha, dostupný servis, jeden palivový systém pre celú radu. Verzia **Z 25K** (1950, konštrukčne upravená) priniesla lepšiu kabínu, **Z 25A** (1952) dostal hydraulický trojbodový záves. Celkovo vyrobených viac ako **158 500 kusov** — určujúci traktor povojnového československého poľnohospodárstva.
  ur-i: >-
    Ikonická unifikovaná rada uvedená **1962** modelmi 4011/5511/6711 — chrbtica českého i východoeurópskeho poľnohospodárstva. Pôvodná generácia (1962–1979) mala otvorenú kabínu a motory Zetor 4001/5001 (4-valec); **modernizácia 1980** priniesla novú uzavretú kabínu, nové motory Zetor 5201/7201 (3-valec) a modely 5211/7211/7745 vyrábané až do **1998**. Prevodovka 10/2, jednoduchá konštrukcia, povestná nezničiteľnosť.
  ur-ii: >-
    Väčšia a výkonnejšia unifikovaná rada uvedená **1968** modelom **Crystal 8011** — prvý šesťvalcový Zetor. **Crystal 12011** (1972) pridal turbo a získal kultový status v podobe **lesníckej verzie** na odvoz dreva. Pre stredné a väčšie farmy. Motory Zetor 7401 (4-valec) a 8001/8101 (6-valec), prevodovka 10/2 alebo 16/8 s plazivým prevodom. Modernizácia 1986 priniesla novú kabínu (8111/9111/10111).
  super: >-
    Modernizácia UR II s novou kabínou a motorom Zetor Z 1505. Medzistupeň k rade Forterra.
  forterra: >-
    Vlajková rada — moderná kabína Horizon II, plne synchronizovaná prevodovka 24/18 s reverzérom a 4WD. Motor Zetor Z 1505/1605 s turbom a medzichladičom.
  forterra-hsx-hd-cl: >-
    Modernizácia Forterra s novou kapotou, displejom a motorom Zetor Stage IV / V. Varianty HSX (power shift), HD (prémium), CL (klasická).
  proxima-gen1: >-
    Nástupca rady Super. Cenovo dostupný traktor pre menšie farmy. Motor Z 1205, synchronizovaná prevodovka 10/10 alebo 20/20 s reverzérom.
  proxima-cl-gp-hs: >-
    Aktuálna generácia Proximy vo viacerých variantoch — CL (classic), GP (general purpose), HS (high spec), Power a Plus. Motor Zetor 1204 / 1605 Stage V.
  crystal: >-
    Návrat legendárneho mena Crystal (pôvodný Crystal 8011/12011 v 70.–80. rokoch). Najvýkonnejší súčasný Zetor — 150–170 koní, motor **Deutz TCD 6.1** (6-valec), prevodovka ZF 16/16 s PowerShift, odpružená predná náprava.
  major: >-
    Najmenšia rada Zetoru — úžitkový traktor pre komunálne účely, sady a drobné hospodárstvo. Motor **Iveco F5C** (4-valec, 3,2 l), prevodovka 12/12 synchronizovaná. Varianty **CL** (Comfort Line) a **HT** (High Tech) pridané 2018.
  utilix-compax: >-
    Kompaktné traktory 25–55 k pre komunálne a špecializované nasadenie. OEM rebranding (Utilix HT z TYM Kórea, Compax z TAFE India) predávaný pod značkou Zetor. Výroba ukončená 2020 — táto trieda zostáva v portfóliu nezastúpená (Major začína na 53 k).
