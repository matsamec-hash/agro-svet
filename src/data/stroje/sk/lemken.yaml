# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko"
description: >-
  Nemecký výrobca poľnohospodárskej techniky na spracovanie pôdy a sejbu. Klasické nesené pluhy Juwel a Diamant, podmietače Rubin, kyprič Karat, sejačky Solitair.

categories:
  hnojeni: "Hnojenie"
  seti: "Sejba a sadenie"
  zpracovani-pudy: "Spracovanie pôdy"
  ochrana-rostlin: "Postrekovače"

series:
  polaris: >-
    Polaris — nesené rozmetadlá minerálnych hnojív Lemken s dvojitým diskom pre maximálnu presnosť a efektivitu aplikácie.
  spica: >-
    Spica — jednoduché a praktické rozmetadlá minerálnych hnojív Lemken pre menšie a stredné farmy.
  tauri: >-
    Tauri — výkonné rozmetadlá minerálnych hnojív Lemken s veľkým pracovným záberom a vysokým dosahom.
  saphir: >-
    Saphir — mechanické sejačky Lemken na presné ukladanie osiva, vhodné na samostatnú sejbu aj v kombinácii s rotačnými bránami.
  solitair-mr: >-
    Solitair MR — nesené pevné pneumatické sejačky Lemken pre malé a stredné pracovné zábery v kombinácii s aktívnymi nástrojmi.
  solitair: >-
    Solitair — pneumatické univerzálne sejačky Lemken s veľkými pracovnými zábermi, vhodné na samostatnú sejbu aj kombinácie s aktívnym náradím.
  solitair-combinations: >-
    Solitair DT/PT — sejacie kombinácie Lemken spájajúce prípravu osivového lôžka a sejbu do jednej operácie pre maximálny výkon.
  solitair-12-sw: >-
    Solitair 12 SW — sejací voz Lemken s veľkým zásobníkom osiva určený pre veľké farmy a zmluvné služby.
  solitair-nt: >-
    Solitair NT — pneumatická sejačka Lemken na priamu sejbu (no-till) do nespracovanej pôdy.
  faya-mf: >-
    Faya MF — presná sejačka Lemken na sejbu kukurice, repky a ďalších širokoriadkových plodín.
  juwel: >-
    Juwel — nesené otočné pluhy Lemken strednej triedy so systémom TurnControl Pro pre efektívnu prácu v rôznych podmienkach.
  diamant: >-
    Diamant — polonesené otočné pluhy Lemken pre veľké traktory s vysokým pracovným výkonom a novým nastavovacím systémom.
  titan: >-
    Titan — polonesené otočné pluhy Lemken najvyššej triedy s vysokou pracovnou výkonnosťou pre najväčšie traktory.
  plough-equipment: >-
    Príslušenstvo k pluhom Lemken — kolesá, nastavovací systém OptiQuick, rezné kotúče, orbové telesá, predradličky a vybavenie na orbu onland.
  optistone: >-
    OptiStone — hydraulická kamenová poistka Lemken na bezproblémovú orbu v kamenitej pôde.
  rubin: >-
    Rubin — kompaktné diskové podmietače Lemken na intenzívne plytké spracovanie pôdy s vysokým pracovným výkonom a dôkladným premiešaním rastlinných zvyškov.
  heliodor-slurrykit: >-
    Heliodor SlurryKit — zostava Lemken na zapravenie hnojovice do pôdy diskovým podmietačom v jednej operácii.
  karat-koralin-kristall: >-
    Karat, Koralin a Kristall — radličkové podmietače a kyprače Lemken na plytké až stredne hlboké spracovanie pôdy s dôrazom na ochranu vlahy.
  onyx: >-
    Onyx — hlbinný kyprič Lemken na nakyprenie zhutnených vrstiev podorničia bez prevrátenia pôdneho profilu.
  gigant: >-
    Gigant — systémový nosič Lemken na flexibilné využitie rôznych pracovných modulov s vysokým výkonom a nízkou spotrebou.
  zirkon: >-
    Zirkon — rotačné brány Lemken na prípravu osivového lôžka, vhodné na samostatné použitie aj v kombinácii so sejačkami Solitair a Saphir.
  system-kompaktor-korund: >-
    System-Kompaktor a Korund — pasívne kompaktomaty Lemken na prípravu osivového lôžka s univerzálnym zložením pracovných prvkov.
  variopack-flexpack: >-
    VarioPack a FlexPack — utláčače Lemken na utuženie rozornej pôdy za pluhom v jednej operácii s orbou.
  rollers: >-
    Valce Lemken — stopové valce na spoľahlivé utuženie pôdy v akýchkoľvek podmienkach ako súčasť prípravy osivového lôžka.
  sirius: >-
    Sirius — ťahané poľné postrekovače Lemken na spoľahlivú aplikáciu prípravkov na ochranu rastlín. Modulárna konštrukcia s objemom nádrže 2 600 – 3 800 l, ramená 15 – 30 m, hydropneumaticky odpružený rám pre plynulý chod pri vysokých rýchlostiach a presnú distribúciu postrekovej kvapaliny.
  vega: >-
    Vega — výkonný ťahaný poľný postrekovač Lemken vyššej triedy s nádržou 4 600 – 6 200 l a ramenami do 36 m. Ovládanie ISOBUS, sekčné riadenie, automatické vedenie rámu HeightControl a presné individuálne riadenie trysiek na variabilnú aplikáciu ochrany rastlín na veľkých poliach.
