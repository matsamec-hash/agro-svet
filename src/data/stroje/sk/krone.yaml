# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko"
description: >-
  Nemecký rodinný výrobca zo Spelle (Dolné Sasko) od roku 1906, svetový špecialista na zber krmovín a slamy. Vlajkové produkty: žacie stroje EasyCut a samohybné BiG M, valcové lisy Comprima, hranolové BiG Pack (až 120×130 cm) a samohybné rezačky BiG X s výkonom nad 1 100 koní. Doplnkovo zhŕňače Swadro, obracače Vendro a samozberné vozy ZX/RX/MX.

categories:
  zaci-stroje: "Žacie stroje"
  obracece: "Obracače"
  shrnovace: "Zhŕňače"
  lisy-valcove: "Valcové lisy"
  lisy-hranolove: "Hranolové lisy"
  rezacky-samojizdne: "Samohybné rezačky"
  samosberaci-vozy: "Samozberné vozy"
  navesy-valnik: "Návesky valníkové"

series:
  easycut-f: >-
    EasyCut F — čelne nesené diskové žacie stroje na kombináciu s motýlikovým
    zadným strojom. Záber 2,80–4,00 m, k dispozícii verzie s prstovým (CV) alebo
    valcovým (CR) kondicionérom a zbernými pásmi (Collect). Nový SafeCut INSIDE
    chráni každý disk samostatnou poistkou proti nájazdu na prekážku.
  easycut-r: >-
    EasyCut R — zadne nesené diskové žacie stroje s pracovným záberom 2,40–3,60 m.
    DuoGrip dvojité stredové zavesenie zabezpečuje ideálne kopírovanie terénu, hladká
    žacia lišta s veľkými klznými taniermi. Verzie CV (prstový kondicionér) a CR
    (valcový kondicionér) sú určené na intenzívnu výrobu sena a senáže.
  easycut-b: >-
    EasyCut B — ťahané bočné a motýlikové žacie kombinácie pre stredné a veľké
    podniky. Záber od 7,3 m (B 750) až po 10,1 m (B 1000) v motýlikovom usporiadaní,
    modely Collect navyše disponujú priečnymi pásmi na tvorbu jedného veľkého riadku.
    Hydraulické odľahčenie a centrálne nastavenie tlaku patria k štandardnej výbave.
  big-m: >-
    BiG M — samohybná žacia jednotka 4×4 (štyri turbínami chladené hydromotory),
    unikátny koncept vo svete zberu krmovín. Tri žacie jednotky so záberom 13,2 m,
    valcový alebo prstový kondicionér, výkon Mercedes-Benz 449 hp (BiG M 450)
    a 530 hp (BiG M 500). Plošná výkonnosť nad 5 ha/h, ideálne pre veľké podniky
    a bioplynové stanice.
  vendro: >-
    Vendro — generácia obracačov s pracovným záberom 4,7–13,1 m, dostupné ako
    nesené (Vendro 470/560/680/790) aj ťahané (Vendro 820, 1020, 1120). OptiTurn
    rotory s asymetrickými prstami zabezpečujú jemné obracanie s minimom strát listu,
    hydraulické skládanie pri hraničnom rozhoze chráni okraje poľa.
  swadro-s: >-
    Swadro S — jednorotorové zhŕňače s pracovným záberom 3,8–4,6 m pre malé
    a stredné podniky. Bezúdržbová prevodovka Jet Effect, trojbodový záves
    a 3D kopírovanie terénu vďaka tandemovým podvozkom. Ľahká a obratná konštrukcia
    vhodná aj do svahov.
  swadro-tc: >-
    Swadro TC — dvojrotorové ťahané zhŕňače s bočným (TC 680/760) alebo
    stredovým (TC 880/930/1250) riadkom. DuraMax prevodovka v olejovom kúpeli,
    plynulé hydraulické nastavenie šírky riadku a prepravná výška pod 4 m.
    TC 1250 dosahuje záber až 12,5 m a slúži na veľkokapacitný zber.
  swadro-ts: >-
    Swadro TS — stredne veľké jednorotorové zhŕňače s tandemovou nápravou
    a stredovým riadkom. Pracovný záber 6,2–7,4 m, vyrovnávacie zariadenie rotora
    OptiTurf zabezpečuje konštantnú výšku prstov aj v nerovnom teréne.
  bellima: >-
    Bellima — vstupná rada pevnokomorových lisov s priemerom balíka 1,25 m,
    reťazová komora so 17 oceľovými lištami a zberač 1,85 m. Zamerané na malé
    a stredné farmy, kde sa očakáva jednoduchá obsluha bez elektroniky a zber
    slamy či sena z menších výmer.
  fortima: >-
    Fortima — pevnokomorové (F) aj variabilné (V) valcové lisy strednej triedy.
    Reťazová komora s tyčami pre tvrdé balíky so senom či slamou, rezací rotor
    MultiCut so 17 nožmi a integrovaný stierač na ľahké odpojenie balíka. Zberač
    EasyFlow bez vačiek zabezpečuje plynulý odber aj v ťažkých riadkoch.
  comprima: >-
    Comprima — vlajková rada valcových lisov s patentovanou pásovou komorou
    NovoGrip (lamelové pásy s polyuretánovými segmentmi), ktorá slisuje balík
    už od priemeru 0,5 m. Modely V 150/180 XC s variabilnou komorou (1,25–1,80 m),
    F 125/155 XC s pevnou komorou. Verzie XC majú rezací rotor 17 nožov, integrované
    balenie do siete alebo fólie a veľký pickup 2,15 m.
  varipack: >-
    VariPack — nová generácia variabilných valcových lisov (uvedená 2020) nahrádzajúca
    staršie modely Comprima V v segmente klasických reťazových komôr. Priemer balíka
    1,00–1,65 m (V 165) alebo 1,80 m (V 190), rezací rotor XCut s až 26 nožmi (XC),
    maximálna priepustnosť nad 60 t/h. Cieli na profesionálnych dodávateľov a veľké
    farmy lisujúce slamu aj seno.
  ultima: >-
    Ultima — svetovo unikátny non-stop lis-obaľovač s predkomorou, ktorá plynule
    preberá krmovinu počas vyhadzovania hotového balíka — traktor nemusí zastaviť.
    Modely CF 155 XC (variabilný priemer) a F 155 XC (pevná komora 1,55 m), pickup
    2,35 m, rezací rotor 26 nožov. Výkonnosť o 25 % vyššia ako klasický lis-obaľovač,
    určený na náročné komerčné zbery senáže.
  big-pack: >-
    BiG Pack — vlajková rada vysokotlakových hranolových lisov Krone, dostupná
    v rozmeroch kanála 80×70, 90×80, 90×120, 120×70, 120×90 a unikátny BiG Pack
    4×4 (120×125 cm). Verzia HDP (High Density Press) zvyšuje hustotu balíka
    o 25 %, VC (VariCut) pridáva rezací rotor 26 nožov, verzia XC až 51 nožov.
    MultiBale produkuje 2–9 menších balíkov v jednom kanáli pre chov hospodárskych
    zvierat. Profesionálni dodávatelia a veľké podniky.
  big-x: >-
    BiG X — vlajková rada samohybných rezačiek Krone s motormi MTU/Liebherr
    12,8–24,2 l a výkonom od 490 do 1 156 koní (BiG X 1180 drží svetový rekord).
    MaxFlow rezací bubon (28/36/40 nožov, šírka 800 mm), 16 nožov VariStream s plynule
    meniteľnou dĺžkou rezu. StreamControl variabilná výmetná turbína a OptiMaize
    drvič zŕn pre kukuričnú siláž. Adaptéry: EasyCollect (kukurica 6–12-radová)
    a XCollect (s diskovým žacím systémom), XDisc 620 (priamy zber obilnín).
  mx: >-
    MX — kombinované zberacie/dávkovacie vozy s objemom 32–40 m³ (DIN, nestlačené).
    PowerLoad lisovací rotor so 41 nožmi pre krátky rez 37 mm, hydraulicky sklopné
    čelá GD (Grass Dosing) na ľahké vyprázdnenie. Pre stredné podniky kombinujúce
    zber senáže a dávkovanie krmiva priamo do žľabu.
  rx: >-
    RX — výkonné samozberné vozy novej generácie (uvedené 2020) s objemom
    36–49 m³. Zberač EasyFlow Pro 2,35 m bez vačiek, rezací rotor PowerCut s 53
    nožmi (krátky rez 37 mm). PowerLoad systém s aktívnym podávacím rotorom,
    vážiaci systém a ISOBUS terminál v základnej výbave.
  zx: >-
    ZX — vlajkové dvojosé samozberné vozy s veľkou nosnosťou pre profesionálny
    zber krmovín a bioplynové stanice. PowerOff systém posuvného čela vyloží
    voz za 30 s, hliníkové steny znižujú vlastnú hmotnosť. Hydraulicky odpružený
    zberač 2,12 m a rezací rotor 40 nožov pre krátku rezanku.
  tx: >-
    TX — poľnohospodárske návesky valníkového typu na prepravu zozbieraných krmovín
    a slamy medzi poľom a silážnym žľabom či senníkom. Hydraulicky sklopné čelo,
    oceľová konštrukcia a vzduchové brzdy. Objem 46–56 m³ podľa modelu.
