# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko"
description: >-
  Nemecký priekopník no-till a minimum-till technológií so sídlom v Schwandorfe (Bavorsko). Pneumatické sejačky Pronto a Sprinter, presné sejačky Maestro, no-till disková sejačka Avatar, hĺbkové kyprače Tiger, radličkové podmietače Terrano, diskové podmietače Joker a postrekovače Leeb (ťahané aj samohybné PT/VL).

categories:
  ochrana-rostlin: "Ochrana rastlín"
  seti: "Sejba a sadenie"
  zpracovani-pudy: "Spracovanie pôdy"

series:
  leeb-ax: >-
    Leeb AX — ťahaný postrekovač pre stredné farmy, nadväzuje na predchádzajúci rad Leeb LT (4 000 a 6 000 l). Ponúka postrekovací rám BoomControl s aktívnym tlmením, presnú reguláciu jednotlivých trysiek (PrecisionSpray) a isobus terminál SmartTouch. Kompromis medzi cenou a špičkovou aplikáciou typickou pre Horsch.
  leeb-gs: >-
    Leeb GS — ťahaný postrekovač veľkej kapacity (6 000 a 8 000 l) pre veľké výmery. Sériový BoomControl Pro s ultrazvukovými snímačmi drží postrekovací rám 30–50 cm nad porastom aj pri rýchlosti nad 15 km/h. CCS Pro vnútorná cirkulácia umožňuje rýchly prechod medzi prípravkami bez kontaminácie. Postrekovací rám až do 42 m.
  leeb-pt: >-
    Leeb PT — samohybný postrekovač pre veľké farmy a aplikačné služby. Nádrž 6 000 alebo 8 000 l, pracovný záber 24–42 m. Hydropneumatické odpruženie rámu aj nápravy, plynulá regulácia svetlosti a prevodovka HydroDrive. Vlajková loď segmentu samohybných postrekovačov Horsch.
  leeb-vl: >-
    Leeb VL — samohybný postrekovač s vyššou svetlosťou (až 165 cm) určený na aplikácie vo vzrastených kultúrach ako kukurica, slnečnica a zemiaky. Nádrž 5 000 alebo 6 000 l, hydraulicky nastaviteľný rozchod kolies 1,80–2,25 m. Konfigurácia medzi PT a postrekovačom typu high-clearance.
  avatar: >-
    Avatar — ťahaná pneumatická sejačka na priamu sejbu (no-till) do nespracovanej pôdy a medziplodín. Diskový výsevný pätok SingleDisc s prítlakom až 350 kg zvládne aj pevné strnisko. Prevedenie SD je riadkové s dvoma nádržami, SL je s veľkokapacitnou nádržou na hnojivo (variant solo alebo duo). Pracovný záber 6, 8, 10 a 12 m.
  express: >-
    Express — sejacia kombinácia s aktívnym rotačným smykom (KR) alebo turbo diskovým kypričom (TD). Nesené prevedenie 3, 3,5 a 4 m na tradičnú prípravu sejbového lôžka v jednej jazde s traktorom strednej hp triedy. Pätky TurboDisc 2.0 zaručujú presné uloženie osiva.
  focus: >-
    Focus TD — ťahaná sejacia kombinácia s integrovaným hĺbkovým kypričom (TerraGrip), pätkami na hnojivo a sejacími pätkami TurboDisc 2.0. Strip-till v jednej operácii: kypri, hnojí pod osivo a seje. Pracovný záber 4 a 6 m, variant Focus s nádržou PPF na hnojivo.
  maestro: >-
    Maestro — presná sejačka na kukuricu, slnečnicu, repu a sóju s elektrickým výsevným ústrojenstvom AirVac (CV/CX) alebo AirSpeed (SV/SX) až do 15 km/h. CV/SV sú klasické s centrálnou nádržou na hnojivo, CX/SX majú individuálne zásobníky. RV je ťahané prevedenie s veľkou centrálnou nádržou PPF. Záber 6–24 m, riadky 45/50/70/75/80 cm.
  pronto: >-
    Pronto DC — vlajkový rad pneumatických univerzálnych sejačiek Horsch. Sériová kombinácia prednej pneumatiky, diskového kyprača, packerového valca a pätiek TurboDisc 2.0 umožňuje sejbu do mulča aj pripravenej orby v jednej jazde. Nesené 3 m aj ťahané až 9 m verzie, zvládnu 5 až 18 ha za hodinu.
  serto: >-
    Serto SC — ťahaná pneumatická sejačka s krátkou stavbou a dvojradovým usporiadaním pätiek TurboDisc s individuálnym prítlakom 5–120 kg. Vhodná na vysoké rýchlosti sejby do mulča aj orby s vysokým podielom zvyškov. Pracovný záber 10 a 12 m.
  sprinter: >-
    Sprinter ST/NT — pneumatická sejačka s pružnými hrebovými radlicami typu tine seeder na sejbu do nedotknutého strniska, plytko spracovanej pôdy alebo medziplodín. ST má pevný rám 6 m, NT skladací rám až 12 m s pracovnou rýchlosťou nad 12 km/h. Vhodná pre suché oblasti a jednoduchú no-till technológiu.
  versa: >-
    Versa KR — nesená pneumatická sejacia kombinácia s aktívnymi rotačnými bránami pre malé a stredné farmy. Univerzálne nasadenie v rôznych pôdnych podmienkach bez nutnosti prípravy sejbového lôžka samostatným strojom. Pracovný záber 3 a 4 m.
  cruiser: >-
    Cruiser SL/XL — radličkový podmietač na plytkú kultiváciu 3–15 cm s úzkymi radlicami v 5–6 radoch s rozstupom 15 cm. SL je nesené prevedenie 5 a 6 m, XL je ťahané až 12 m. Vhodný na rýchlu intenzívnu podmietku po zbere a urýchlenie rozkladu rastlinných zvyškov.
  finer: >-
    Finer SL — kompaktomat na prípravu jemného sejbového lôžka s kombináciou pružinových a radličkových smykov a packerového valca. Nesené prevedenie s pracovným záberom 6 m, hĺbka 2–10 cm. Slúži prevažne na jarnú prípravu pred sejbou cukrovej repy a kukurice.
  joker: >-
    Joker CT/RT/HT — kompaktný diskový podmietač s taliermi 52 cm v X-usporiadaní na plytkú kultiváciu 3–12 cm. CT je nesené 3–6 m s pevným rámom, RT je ťahané 4–12 m s pneumatikovým packerom, HT je ťahané 8–12 m s veľkokapacitnými pneumatikami pre vyššiu rýchlosť (až 18 km/h). Ideálny na intenzívnu podmietku po zbere obilia.
  terrano: >-
    Terrano FX/GX/MT — vlajkový rad radličkových podmietačov Horsch na stredne hlbokú kultiváciu 5–30 cm. FX (3 a 4 m, nesené), GX (5 a 6 m, ťahané polonesene) a MT (5–8 m, ťahané s rýchlym systémom TerraGrip). Univerzálny stroj na podmietku, hlbšie kyprenie aj prípravu pred sejbou.
  tiger: >-
    Tiger MT/AS/LT — hĺbkový kyprič na intenzívne spracovanie až do hĺbky 35 cm. MT (4 a 6 m) má radlice TerraGrip pre maximálnu priechodnosť organickej hmoty, AS (kombinovaný 4–8 m) pridáva disky a packer na plnú prípravu lôžka v jednej jazde, LT (10 a 12 m) je veľkokapacitné ťahané prevedenie pre najväčšie farmy. Nahrádza pluh v minimum-till systémoch.
