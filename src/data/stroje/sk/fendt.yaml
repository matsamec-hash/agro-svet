# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko"
description: >-
  Prémiová nemecká značka traktorov známa CVT prevodovkou Vario. Vlastnená koncernom AGCO od roku 1997. Technológia Vario (bezstupňová prevodovka) debutovala v roku 1995 a dnes pokrýva celú ponuku — od malých 200 Vario až po vlajkový 1000 Vario. Kombajny IDEAL patria medzi najpokročilejšie na svete.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"

series:
  dieselross: >-
    Pôvodný traktor Fendtu — Hermann Fendt postavil prvého „diesel horse" v dielni svojho otca v roku 1928 zo stacionárneho motora a starej kosačky. V roku 1937 bola firma zapísaná do obchodného registra ako Xaver Fendt & Co. a začala sériová výroba. Vzduchom chladený jednoválcový diesel Deutz definoval nemecký dedinský traktor — jednoduchý, robustný, navrhnutý pre malé farmy. Rad Dieselross sa pohyboval od 6 koní (F6) až po 40 koní (F40) a skončil v roku 1958, keď ho nahradili rady Favorit, Farmer a Fix.
  favorit-classic: >-
    Legendárny rad, ktorý definoval prémiovú pozíciu Fendtu. Favorit 1 z roku 1958 bol prvým modelom s novo navrhnutou prevodovkou, Favorit 4 bol prvým 6-valcom značky a Favorit 600 LS priniesol v roku 1979 hydrodynamickú Turbomatik (riadený rozjazd cez hydraulickú spojku) spolu s plne synchronizovanou prevodovkou TriPower. Vlajkový Favorit 626 LS Turbomatik s 252 koňmi a motorom MAN D2566 bol po mnoho rokov najvýkonnejším traktorom značky — vyrobených iba 66 kusov. Tento rad je priamym predchodcom Favorit 500/700/800/900 z 90. rokov a stojí pri zrode prémiovej reputácie Fendtu.
  farmer-100-200: >-
    Nástupca radu Dieselross v malej a strednej triede. Klasický Farmer s mechanickou synchronizovanou prevodovkou, hojne dovážaný do vtedajšieho ČSSR a krajín RVHP po politickom uvoľnení 60. rokov. V roku 1978 bol na DLG predstavený rad 100 v prevedeniach S a LSA s mierne zvýšeným výkonom a kabínou Edition. Motor MWM AKD alebo Deutz F3L912 chladený vzduchom bol typický spoľahlivosťou a nízkou náročnosťou na údržbu. Rad 200 bol neskôr nahradený špecializovaným kompaktným radom pre vinice a sady (1987+).
  farmer-300-400-lsa: >-
    Stredná a väčšia trieda Farmer s mechanickou prevodovkou. Motor MWM/Deutz, synchronizovaná prevodovka 21/6 alebo 24/8. Robustná koncepcia, dodnes obľúbená v drobnom a ovocinárskom hospodárstve.
  xylon: >-
    Špecialita Fendtu — univerzálny systémový traktor so stredovou kabínou, reverzným riadením a tromi závesmi (predný, stredný, zadný). Pre komunálne a špecializované nasadenie.
  favorit-500-c: >-
    Mechanická prevodovka 44/44 TurboMatik, pred príchodom technológie Vario. Motor MWM 6-valec 6,2 L.
  favorit-500-vario: >-
    **Historický míľnik** — prvý sériovo vyrábaný traktor na svete s plynulou variátorovou prevodovkou (CVT). Prevodovka ML70 Vario pracuje bez radiacich stupňov, s neobmedzene plynulou zmenou rýchlosti od 0 do 40 km/h. Prelom v konštrukcii traktorov.
  favorit-700-vario: >-
    Vlajkový rad po Favorit 500/600. Motor MAN 6-valec 6,9 L, prevodovka ML85 Vario s plynulou zmenou 0–50 km/h.
  favorit-800-vario: >-
    Veľký prémiový rad. Motor MAN 6-valec 7,1 L, prevodovka ML100 Vario.
  favorit-900-vario: >-
    Vlajkový rad pre veľkofarmy. Motor MAN 6-valec 10,5 L, prevodovka ML150 Vario. Prvý traktor s Vario nad 200 k.
  200-vario: >-
    Najmenší Fendt — generácia Gen3 uvedená do predaja od konca januára 2021 (objednávky od októbra 2020) plne nahradila pôvodný rad z roku 2009. Varianty pre sady, vinice a komunálne nasadenie (prevedenia V/F/P). Kompaktná kabína s ovládaním FendtONE ako štandardom, prevodovka Vario, motor AGCO Power 3-valec 3,3 L Stage V.
  300-vario-gen1: >-
    Úžitkový rad Vario. Motor Deutz 4-valec 4,0 L turbo s intercooler om, prevodovka ML75 Vario, kabína Visio Plus.
  300-vario-gen2: >-
    Generácia S4 s novou kabínou Visio Cab, displejom VarioTerminal 7" a motorom Tier 4 AGCO Power 4,4 L.
  500-vario-gen1: >-
    Stredný rad. Motor Deutz 4-valec 4,0 L, prevodovka ML90 Vario.
  500-vario-s4: >-
    Generácia S4/Gen3. Motor Deutz 4-valec 4,0 L Stage IV/V, kabína Visio Cab, displej 7", FendtONE farmer terminal od 2021.
  700-vario-gen1: >-
    Najpredávanejší prémiový rad v Európe. Motor Deutz 6-valec 6,1 L, prevodovka ML120 Vario. Ikonické usporiadanie.
  700-vario-s4: >-
    Generácie S4 a Gen6. Motor Deutz 6-valec 6,1 L Stage IV/V, kabína VisioPlus, displej VarioGuide + TI Headland. Rekordné predaje v CZ a SK.
  700-vario-gen7: >-
    Kompletne nová platforma. Motor AGCO Power 7,5 L Core75 so systémom eHybrid (48V generátor), prevodovka Vario TA 150, kabína FendtONE, dynamická riadiaca náprava VarioDrive. Výkon do 303 k, úplne nová dizajnová línia.
  800-vario-gen1: >-
    Veľký rad row-crop. Motor Deutz 6-valec 7,8 L, prevodovka ML130 Vario.
  800-vario-s4: >-
    Generácia Gen5/Gen6. Motor **Deutz TCD 6.1 L** (6-valec, 6,06 L) Stage V, kabína ProfiPlus, ConceptCab. Aktuálna zostava: 826/829/832 Vario.
  900-vario-gen2: >-
    2. generácia radu 900. Motor MAN 6-valec 9,0 L, prevodovka ML260 Vario, hydraulika 220 l/min, predné odpruženie.
  900-vario-gen3: >-
    Kompletne nová generácia — MAN D3876 6-valec 9,0 L, VarioDrive, FendtONE, kompletná digitalizácia. Najvýkonnejší 942 s 415 k je najvyšším Vario v konvenčnom kolesovom traktore.
  1000-vario: >-
    Najväčší Fendt — kompletne nová platforma. Motor MAN D4276 6-valec 12,4 L, pohon VarioDrive s elektronicky riadenými nápravami, prevodovka TA300 Vario. Hmotnosť 14 t, najvýkonnejší kolesový traktor v štandardnej konfigurácii.
  1100-vario-mt: >-
    Pásový traktor — vlajková loď Fendt. Motor MAN, gumové pásy MTrack, prevodovka VarioDrive. Pre veľké poľnohospodárske a stavebné nasadenie.
  600-vario: >-
    Aktuálny Fendt 600 Vario — dáta synchronizované z api.fendt.com.
  900-vario-mt: >-
    Aktuálny Fendt 900 Vario MT — dáta synchronizované z api.fendt.com.
  1000-vario-gen4: >-
    Aktuálny Fendt 1000 Vario Gen4 — dáta synchronizované z api.fendt.com.
  c-series: >-
    Ekonomický rad konvenčných kombajnov prevzatý z Laverda (AGCO). Vhodný pre stredné farmy. Motor AGCO Power 6,6 L.
  l-series: >-
    Konvenčné kombajny Laverda so značením Fendt. 6-slamníkový systém, rotačný doseparátor. Motor AGCO SISU Power 7,4 L.
  ideal: >-
    Revolučná platforma vyvíjaná 7 rokov spoločne AGCO + MIT. Dva 600 mm rotory HARVEST CORE, optimalizácia IDEALharvest pomocou AI, uhlíkové konštrukcie. Varianty 7, 8, 9, 10 podľa výkonu. Pásové verzie -T pre menej utlačenú pôdu.
  corus-500: >-
    Aktuálny Fendt CORUS 500 — dáta synchronizované z api.fendt.com.

