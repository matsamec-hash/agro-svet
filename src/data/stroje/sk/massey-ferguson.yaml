# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Kanada / USA"
description: >-
  Tradičná kanadsko-americká značka vzniknutá v roku 1953 fúziou Massey-Harris (Kanada, 1847) a Ferguson (UK, 1933). Od roku 1994 súčasť koncernu AGCO. Traktory vyrábané v Beauvais (Francúzsko), kombajny v Breganze (Taliansko) a Hesstonu (USA). Známa trojuholníkovým logom a číslovaním radov (3000, 4700, 5M, 5S, 6S, 7S, 8S, 9S). Kľúčová inovácia **Ferguson System** (3-bodový záves, 1933) ovplyvnila všetky moderné traktory.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"

series:
  100: >-
    Najikonickejší rad Massey Ferguson a kľúčový míľnik značky pre západnú Európu. Modely **135, 148, 165, 175, 178, 185, 188** a ďalšie (130, 230, 235) predstavili moderný priemyselný dizajn firmy Roberts & Sons z konca 50. rokov, hydraulický **Ferguson System** a spoľahlivé motory Perkins. V 60. a 70. rokoch boli tieto MF masívne nasadzované v poľnohospodárskych družstvách (JRD) v ČSSR a dodnes tvoria kľúčový segment trhu s veteránmi. Len modelu MF 135 sa vyrobilo viac ako **350 000 kusov** — patrí k najpredávanejším traktorom v histórii.
  500: >-
    Klasický úžitkový rad 70. a 80. rokov. Vyrábaný v Coventry (UK). Motor Perkins 4-valec, mechanická prevodovka Multi-Power.
  1000: >-
    Veľké row-crop traktory vyrábané v Detroite pre severoamerický trh. Motory Perkins 6-valec a V8 Perkins (pri najvýkonnejších verziách).
  200: >-
    Dlhodobo úspešný úžitkový rad. Motory Perkins 3- a 4-valec. Nahradil rad 100 a neskôr bol nahradený radom 300 Series.
  300: >-
    Nástupca 200 Series. Kompletné prepracovanie kabíny, motory Perkins 4- a 6-valec. Vyrábaný v Coventry a Beauvais. Nad 3600/3610 postupne prešiel do 3000 Series.
  3000: >-
    Dlhý rad stredných a výkonnejších traktorov. Motor Perkins 4- a 6-valec, prevodovka Speedshift.
  4200: >-
    Komplexný úžitkový rad pre malé a stredné farmy. Motor Perkins 1000 Series, 3- a 4-valec s turbom pri vyšších variantoch. Synchronizovaná prevodovka 12/12.
  4300: >-
    Modernizovaný úžitkový rad. Motor Perkins 900 a 1000 Series, prevodovka Speedshift s elektrohydraulickým reverzom. Kabína s nízkym hlukom.
  5400: >-
    Univerzálny stredný rad. Motor Perkins 1100 4- a 6-valec, prevodovka Dyna-4 a Dyna-6 Powershift. Kabína Tech-Platform.
  5600: >-
    Kompaktný univerzálny rad. Krátky rázvor pri 3-valcových modeloch (5608–5610) a dlhý rázvor pri 4-valcových (5611–5613). Motor AGCO Power, prevodovka Dyna-4.
  6100-6200: >-
    Stredný row-crop. 6100 (1995–1999) nahradil 3000 Series, 6200 (1999–2002) ako evolúcia. Motor Perkins 1000 Series 4- a 6-valec, prevodovka Dynashift 32/32.
  3700: >-
    Úzky úžitkový rad pre sady a komunálne využitie. Motor AGCO Power 3-valec 3,3 L.
  4700: >-
    Úžitkový rad. Motor AGCO Power 4-valec 4,4 L, synchronizovaná prevodovka 12/12.
  5700: >-
    Univerzálny stredný rad. Motor AGCO Power 4-valec 4,4 L a 4,9 L, prevodovka Dyna-4.
  6700: >-
    Prémiový univerzálny rad. Motor AGCO Power 4,9 L alebo 6,6 L, prevodovka Dyna-4 alebo Dyna-6 Powershift, voliteľná Dyna-VT (CVT). Nahradený radom MF 6S v roku 2022.
  7700: >-
    Row-crop s motorom AGCO Power 7,4 L. Varianty S (mechanická), Dyna-6 Powershift a Dyna-VT (CVT). Nahradený radom MF 7S v roku 2022.
  8700: >-
    Vlajkový row-crop. Motor AGCO Power 8,4 L, prevodovka Dyna-VT CVT, kabína MF 8700 S s panoramatickou presklenou strechou. Nahradený radom MF 9S v roku 2024.
  5s: >-
    Nový úžitkový rad s motorom AGCO Power 4,4 L 4-valec, prevodovkou Dyna-4 Powershift a kabínou Visio navrhnutou pre maximálnu viditeľnosť. Red Dot Design Award 2022.
  6s: >-
    Stredný výkonný rad s motorom AGCO Power 4,9 L 4-valec (najvyšší výkon zo 4-valca na trhu). Prevodovka Dyna-6 alebo Dyna-VT (CVT).
  7s: >-
    Nástupca 7700 S. Motor AGCO Power 6,6 L 6-valec, prevodovka Dyna-6 alebo Dyna-VT (CVT). EPM (Engine Power Management) +30 HP.
  8s: >-
    Prémiový row-crop. Motor AGCO Power 7,4 L 6-valec, prevodovka Dyna-VT (CVT) s Dynamic Tractor Management. Kabína Protect-U s izolovanou konštrukciou.
  9s: >-
    Vlajkový row-crop rad, nástupca 8700 S. Motor AGCO Power 8,4 L 6-valec, prevodovka Dyna-VT (CVT). Kabína Protect-U. Debutoval na Farm Progress Show 2024. Šesť modelov 285–425 HP.
  5m: >-
    Aktuálny Massey Ferguson MF 5M — údaje synchronizované z masseyferguson.com.
  6400: >-
    Stredný row-crop rad s motorom Perkins / AGCO Power 4,4 L 4-valec. Prvé **Dyna-VT** (CVT) vo svojej triede pri modeloch s príponou „VT", varianty Dyna-6 Powershift a Dyna-4. Nahradený radom MF 6600 a následne 6700.
  6600: >-
    Medzigenerácia medzi 6400 a 6700. Motor AGCO Power 4,9 L 4-valec a 6,6 L 6-valec, prevodovka Dyna-4, Dyna-6 alebo Dyna-VT (CVT). Emisie Stage IIIB / Tier 4i.
  7400: >-
    Prémiový row-crop s motorom Perkins / Sisu / AGCO Power 6,6 L a 7,4 L 6-valec, prevodovka Dyna-6 Powershift alebo Dyna-VT (CVT) — generácia s najširším rozsahom výkonu pre stredoeurópske farmy. Nahradený radom 7600 / 7700.
  7600: >-
    Modernizácia 7400 Series s motorom AGCO Power 6,6 L a 7,4 L 6-valec spĺňajúcim Stage IIIB. Prevodovka Dyna-6 alebo Dyna-VT (CVT). Predchodca 7700 Series.
  8000: >-
    Vlajkový rad veľkých row-crop traktorov 80. a 90. rokov. Motor Perkins / Sisu 6-valec, mechanická prevodovka Powershift. Výkony **145–210 k**. Predchodca radu 8100/8200/8400.
  8100: >-
    Modernizácia radu 8000 s novou kabínou, motorom Perkins 6-valec a prevodovkou Dynashift 32/32 (Powershift). Výkony **160–230 k**.
  8200: >-
    Ďalšia generácia veľkých traktorov s aktualizovaným motorom Perkins 6-valec, prevodovkou Dynashift Plus a integrovanou elektronickou reguláciou zdvíhacieho mechanizmu. Výkony **160–260 k**.
  8400: >-
    Kľúčový rad — **prvé sériové nasadenie Dyna-VT (CVT)** v Massey Ferguson. Motor Sisu 8,4 L 6-valec, kabína Tech-Platform. Tento rad zaviedol bezstupňové prevodovky do mainstreamu MF a predznamenal rady 8600 a 8700.
  8600: >-
    Vlajkový row-crop pred 8700. Motor AGCO Sisu Power 8,4 L 6-valec s technológiou e3 SCR (selektívna katalytická redukcia — premiéra v segmente veľkých traktorov). Prevodovka Dyna-VT. Výkony **270–370 k**.
  30-series-old: >-
    Historický rad konvenčných kombajnov Dronningborg/MF. Klasické slamníkové mlátiace ústrojenstvo, motor Perkins/Sisu 6-valec.
  cerea: >-
    Vyššia trieda konvenčných kombajnov vyrábaná v Dronningborgu (Dánsko). Rotor APS a 5 slamníkov. Motor SisuDiesel 6-valec.
  activa: >-
    Stredné konvenčné kombajny. Motor AGCO Sisu Power 6-valec 6,6 L, 5 slamníkov.
  beta: >-
    Vyššia trieda konvenčných kombajnov. Rotor APS Plus.
  delta: >-
    Hybridný systém APS + rotor. Motor AGCO Power 7,4 L.
  ideal-mf: >-
    Zdieľaná platforma s Fendt IDEAL. Varianty 7, 8, 9 pod značkou MF pre sieť AGCO.
  activa-s: >-
    Modernizácia radu Activa s 5 slamníkmi. Motor AGCO Power 6,6 L 6-valec, mlátiaci bubon Power Flow, drvenie slamy V-Inox. Vstupná trieda konvenčných kombajnov MF pre stredne veľké farmy. Modely 7340 S, 7344 S, 7345 S.
  beta-s: >-
    Vyššia trieda konvenčných kombajnov s 5 slamníkmi a systémom APS (Accelerated Pre-Separation). Motor AGCO Power 7,4 L 6-valec, väčší zásobník zrna a vyššia priepustnosť ako Activa S.
  delta-s: >-
    Prémiové hybridné kombajny — kombinácia rotora APS a slamníkov. Motor AGCO Power 9,8 L 6-valec, prevodovka ParaLevel pri svahových variantoch. Najvyššia trieda v konvenčnom programe MF pred nástupom IDEAL.

models:
  massey-ferguson-130: >-
    Iba britský trh. Najmenší zo 100 Series.
  massey-ferguson-135: >-
    Vstupný model a bestseller radu — vyrobených vyše 350 000 kusov. V ČSSR jeden z najčastejších západných traktorov v JRD.
  massey-ferguson-165: >-
    Stredná trieda radu. 4-valec Perkins, obľúbený pre orbu aj transport.
  massey-ferguson-188: >-
    Vrchol radu 100 — 4-valec Perkins 4,1 L.
