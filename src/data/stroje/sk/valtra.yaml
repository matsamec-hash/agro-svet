# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Fínsko"
description: >-
  Fínsky výrobca traktorov s dlhou tradíciou (predtým Valmet). Súčasť koncernu AGCO od roku 2004. Známy robustnou konštrukciou pre severské podmienky, reverzným systémom TwinTrac (kabína s otočným sedadlom pre prácu zozadu) a personalizáciou — každý traktor sa vyrába na mieru podľa požiadaviek zákazníka. Kombajny nevyrába.

categories:
  traktory: "Traktory"

series:
  valmet-6000-8000: >-
    Posledná generácia pod značkou Valmet pred premenovaním na Valtra (2001). Motor Valmet 4- a 6-valec, prevodovka synchronizovaná 30/30. Obľúbené v ČR pre jednoduchosť a dostupnosť.
  hitech: >-
    Prvá generácia pod značkou Valtra (od 2001). Motor Sisu Power 4- a 6-valec, prevodovka HiShift s elektronickým radením 40/40. Dostupný reverzný systém TwinTrac.
  direct-legacy: >-
    Prvá Valtra s plynulou variátorovou prevodovkou (CVT). Revolučná technológia pre výrobcu historicky založeného na mechanických prevodovkách.
  n-gen1: >-
    Nový univerzálny rad. Motor AGCO Power 4-valec, prevodovka HiTech 5 / Versu Powershift 36/36 / Direct CVT. Kabína vyvinutá v spolupráci s priemyselným dizajnérom.
  n-gen2: >-
    Tretia generácia N (Valtra ju marketingovo označuje ako 4. generáciu). Motor AGCO Power 4,4 L (4-valec) alebo 4,9 L (4-valec), Stage IV/V. Verzie Active (mechanická), Versu (Powershift) a Direct (CVT). Kabína so strechou SkyView pre predný nakladač. Modely so sufixom -4 (N104, N114, …, N174).
  n-gen3: >-
    Štvrtá generácia radu N (Valtra Unlimited). Motor AGCO Power 4,9 L Stage V, prevodovka Active / Versu (Powershift) / Direct (CVT). Kabína SmartTouch 3 s 9" displejom, lakťová opierka s OLED tlačidlami. Modely bez sufixu -4 (premenovanie na N135/N155/N175/N195).
  t-gen1: >-
    Vlajkový rad row-crop. Motor Sisu/AGCO Power 6-valec 6,6 L a 7,4 L. Verzie HiTech, HiTech 5, Versu (Powershift) a Direct (CVT).
  t-gen2: >-
    4. a 5. generácia. Motor AGCO Power 6-valec 7,4 L, prevodovka HiTech 5, Active, Versu (Powershift 5x5), Direct (CVT). Kabína SmartTouch (2015+) — integrovaný 9" displej a joystick s OLED symbolmi.
  s-gen1: >-
    Prvá generácia S Series. Motor AGCO Power 8,4 L, prevodovka Direct CVT, kabína TwinTrac (reverzná).
  s-gen5: >-
    5. generácia. Motor AGCO Power 8,4 L Stage V, prevodovka AGCO PowerSplit CVT. Kabína SmartTouch.
  a-series: >-
    Úžitkový rad pre menšie hospodárstva a komunálnu sféru. Motor AGCO Power 3,3 L a 4,4 L, prevodovka Mechanical / HiTech, reverzor Power Shuttle.
  g-series: >-
    Stredná trieda medzi A a N. Motor AGCO Power 4,4 L Stage V, kompaktné rozmery s modernou kabínou SmartTouch (voliteľná) alebo Classic.
  q-series: >-
    Najnovší rad medzi T a S, uvedený v roku 2022 (FIMA Zaragoza). Motor **AGCO Power CORE66 6,6 L** (NIE 7,4 L ako T-series) Stage V, prevodovka PowerSplit CVT, kabína SmartTouch 3 s reverzným riadením TwinTrac ako opcia, Valtra SmartControl, režim EcoPower pre nižšiu spotrebu.
