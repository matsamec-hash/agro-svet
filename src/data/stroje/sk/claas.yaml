# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko"
description: >-
  Nemecká rodinná firma založená v roku 1913 bratmi Claasovými. Svetová jednotka v kombajnoch (rad Lexion) a samohybných rezačkách Jaguar. Traktory CLAAS nadväzujú na dedičstvo francúzskeho Renault Agriculture (odkúpenie 2003). Sídlo v Harsewinkeli.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"
  sklizen-picnin: "Samohybné rezačky"

series:
  ares: >-
    Po akvizícii Renault Agriculture (2003) pokračujúci rad zdedený od francúzskeho výrobcu. Motor John Deere 4- a 6-valec.
  atles: >-
    Veľký vlajkový rad pred príchodom Axion. Motor DPS 6-valec 7,4 L.
  celtis: >-
    Cenovo dostupný vstupný rad zdedený z Renaultu. Motor Perkins 4-valec.
  elios: >-
    Kompaktný úžitkový rad. Motor FPT 4-valec, jednoduchá mechanická prevodovka.
  atos: >-
    Úžitkový traktor s prevodovkou Revershift a hydraulikou Power Shuttle.
  nexos: >-
    Úzky špecializovaný rad pre sady a vinice. Motor FPT NEF 4-valec.
  arion-gen1: >-
    Univerzálny prémiový rad pre zmiešané hospodárstva. Motor DPS Perkins, prevodovka QuadriShift alebo HexaShift.
  arion-gen2: >-
    Modernizovaný rad. Motor FPT/DPS, prevodovka HexaShift alebo CMATIC (CVT). Kabína PANORAMIC s panoramatickou presklenou strechou pre predný nakladač.
  axion-800-900: >-
    Vlajkový veľký rad vyrábaný v Le Mans (Francúzsko). Motor FPT NEF 6,7 L (Axion 800) a FPT Cursor 9 8,7 L (Axion 900). Prevodovka CMATIC (ZF Eccom CVT), joystick CMOTION, terminál CEBIS Touch. Axion 960 = 445 k, vlajkový model traktora CLAAS (Stage V). Axion 940 bol Tractor of the Year 2014.
  xerion: >-
    Systémový traktor s reverzným riadením (otočná kabína Trac VC) a 4 rovnako veľkými kolesami. Motor **Mercedes-Benz** (OM906 / OM471 / OM473 6-valec, 7,7–12,8 L podľa modelu), prevodovka **HM4** hydromechanická 4-mode CVT (voliteľne ZF Eccom). Vyrábaný v Harsewinkeli. Varianty **Trac** (štandardný) a **Saddle Trac** (pevne umiestnená kabína pre nesené stroje, napr. na kejdu). **Xerion 5000** bol Tractor of the Year 2014.
  dominator: >-
    Legendárne konvenčné kombajny, ktoré vyniesli CLAAS na čelo. V ČR ešte bežne vídané v menších prevádzkach.
  mega: >-
    Stredná trieda konvenčných kombajnov. Motor Mercedes-Benz 6-valec. Technológia APS pre vyššiu priepustnosť.
  avero: >-
    Cenovo dostupný vstupný rad pre menšie hospodárstva. Motor John Deere 4-valec.
  tucano: >-
    Stredná trieda. Konvenčné varianty Tucano 300–500 alebo rotorové hybridné série 400 s jedným rotorom APS HYBRID.
  lexion-400-500-600-700: >-
    Vlajkový rad CLAAS uvedený v roku 1995 modelom Lexion 480 — prvý **APS HYBRID** (APS pre-separator + 1 longitudinal rotor ROTO PLUS) v Európe. Motor Mercedes-Benz (OM906/OM471/OM473) alebo Caterpillar (trh USA, joint venture 1999+). Vyrábané v Harsewinkeli (Nemecko) a Omaze (Nebraska, USA).
  lexion-5000-8000: >-
    Kompletne nová platforma uvedená v roku 2019. Dizajn Volker Groth (ex-BMW), APS Synflow Walker (5000 — konvenčný so 6 slamníkmi) alebo APS Synflow Hybrid (6000–8000 — 1 longitudinal rotor ROTO PLUS s priemerom 600 mm). Cemos Auto Threshing / Cleaning / Separation, FieldScanner, motor Mercedes-Benz OM471 / OM473 (Stage V). Lexion 8900 s 790 k patrí medzi najvýkonnejšie kombajny sveta.
  trion: >-
    Nástupca Tucano. Kompletne nová platforma medzi Tucano a Lexion. Varianty APS / APS HYBRID, Trion Montana s vyrovnávaním svahov do 18 %.
  jaguar-700: >-
    Prvá generácia samohybných rezačiek Jaguar — uvedená v roku 1973 modelmi Jaguar 60 SF, 70 SF a 80 SF. Ikonické stroje na zber kukuričnej siláže a trávnych krmovín v 70. a 80. rokoch. Motor Mercedes-Benz 6-valec, mechanická 4-stupňová prevodovka. Neskoršie modely 685/690/695 SL priniesli automatizáciu a vyšší výkon. V ČSSR a neskôr ČR jedny z prvých dovážaných moderných rezačiek.
  jaguar-800: >-
    Modernizovaná generácia s digitálnou reguláciou a širším rezacím bubnom (V-MAX). Motor Mercedes-Benz OM441/OM442 6/8-valec, automatické brúsenie nožov. Modely 820/840/860/880/890/900 vo výkonovom rozsahu 286–605 hp. Druhá najpredávanejšia generácia Jaguar v ČR (po 900).
  jaguar-900-modern: >-
    Moderná generácia s technológiou **Dynamic Power** (variabilný výkon motora podľa záťaže) a Auto Fill (automatické plnenie návesu). Motor Mercedes-Benz OM502 V8, neskôr MAN V12 (980). Modely 930/940/950/960/970/980/990, výkon 360–884 hp. Vlajkový Jaguar 980 dlho držal titul najvýkonnejšej rezačky sveta.
  jaguar-current: >-
    Súčasná generácia Stage V. Tri výkonové triedy: **Jaguar 800** (vstupná, 408–490 hp), **Jaguar 900** (hlavná, 503–925 hp) a vlajkový **Jaguar 1000** (uvedený 2023, 925 hp, najvýkonnejšia samohybná rezačka sveta). Motor MAN V12 24,2 L (1000), Mercedes-Benz OM471/OM473 (900). CEMOS Auto Performance, konzervačný systém Shredlage, Auto Fill 3D. V ČR dominantný stroj na zber kukuričnej siláže.

models:
  claas-lexion-8700: >-
    CLAAS Lexion 8700 je hybridný kombajn vyššej triedy s výkonom 625 k (460 kW) a zásobníkom zrna 13 500 l. Patrí do generácie Lexion 8000 (od roku 2019) s mlátiacim systémom APS SYNFLOW HYBRID. Lexion 8700 cieli na veľké obilninárske prevádzky s vysokými dennými výkonmi; nižšou alternatívou je Lexion 8600, výkonnejším modelom Lexion 8800.
