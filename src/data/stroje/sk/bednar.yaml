# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Česko"
description: >-
  BEDNAR FMT je český výrobca prémiových strojov na spracovanie pôdy, sejbu a aplikáciu hnojív, založený v roku 1997 v Rychnove nad Kněžnou. Firma vyrába robustné stroje pre veľké prevádzky s dôrazom na pracovný záber 3–18 m a vysokú plošnú výkonnosť. Vlajkové rady tvoria hĺbkové kypriče TERRALAND, kompaktomaty SWIFTER, diskové podmietače ATLAS a univerzálne sejačky OMEGA. Bednar dodáva do viac ako 40 krajín sveta a patrí medzi najvýznamnejšie české značky poľnohospodárskej techniky.

categories:
  seti: "Sejba a sadenie"
  zpracovani-pudy: "Spracovanie pôdy"

series:
  omega: >-
    OMEGA je vlajková univerzálna pneumatická sejačka BEDNAR pre min-till, mulch-till
    aj konvenčné technológie. Pracovný záber 3–9 m, dvojkotúčové sejacie botky CrossBoard Heavy
    a centrálny zásobník 3 000–5 000 l. Modely OO (ťahaný) a OF (s predradličkami) umožňujú
    sejbu do mulču, slamy aj kompaktného strniska. Stroj je obľúbený medzi veľkými farmami
    v Českej republike aj vo východnej Európe.
  ferox: >-
    FEROX je rýchlostná pneumatická sejačka BEDNAR optimalizovaná pre vysoké pracovné
    rýchlosti až 18 km/h. Krátka pracovná dĺžka, agresívna disková sekcia a presné dávkovanie
    umožňujú vysokú plošnú výkonnosť na veľkých honoch. Záber 4–6 m, ideálna pre
    kombináciu s predspracovaním pôdy.
  corsa: >-
    CORSA je presná sejačka BEDNAR na sejbu kukurice, slnečnice, repy a sóje. Pneumatická
    singulácia, elektrický pohon výsevných jednotiek a sekcia s individuálnou kontrolou prítlaku.
    Záber od 4,5 m pri medziradkovej vzdialenosti 70 cm, určená pre precízne poľnohospodárstvo
    s ISOBUS terminálom.
  combo: >-
    COMBO LO je kombinovaná sejačka BEDNAR spájajúca predspracovanie pôdy s presným
    výsevom v jednej jazde. Disková sekcia, kompaktomatový kotúč a pneumatická sejacia jednotka
    umožňujú sejbu do nespracovanej pôdy alebo po podmietke. Záber 4–6 m, vhodná pre mulch-till
    systémy.
  ferti-box: >-
    FERTI-BOX FB je čelne nesený zásobník hnojív BEDNAR na doplnenie sejačiek
    o aplikáciu minerálnych hnojív pri sejbe. Objem 1 700–3 000 l, pneumatický transport
    hnojiva potrubím k sejacej jednotke vzadu. Umožňuje strip-till hnojenie a štartovacie
    dávky pre kukuricu a repku.
  terraland: >-
    TERRALAND je vlajkový rad hĺbkových kypričov BEDNAR pre hĺbkové kypenie až do 65 cm
    bez obracania pôdy. Robustný rám, slzičkovité dláto Active-Mix a zadný pech CrossBoard
    zabezpečujú premiešanie rastlinných zvyškov a štruktúru pôdy. Modely TN (nesený), TO (ťahaný)
    a DO (ťahaný s diskovou sekciou) pokrývajú zábery 3–7 m a vyžadujú traktor 200–500 HP.
  swifter: >-
    SWIFTER je vlajkový kompaktomat BEDNAR na prípravu sejbového lôžka v jednej jazde.
    Kombinácia predného smyku, kompaktomatovej sekcie, prútovej brány a zadného pecha zabezpečuje
    rovný a štruktúrovaný profil pre sejbu. Zábery 6–18 m podľa modelu (SO nesený,
    SM stredný, SN ťahaný) patria medzi najširšie v kategórii.
  atlas: >-
    ATLAS je rad krátkych diskových podmietačov BEDNAR pre plytkú kultiváciu 5–15 cm
    a podmietku po zbere. Veľké kotúče 620–660 mm s individuálnym uložením v gumových
    silentblokoch zvládajú aj tvrdé strniská. Zábery 3–15 m podľa modelu: AO (nesený),
    AN (ťahaný stredný) a AM (ťahaný veľký) pokrývajú farmy od 200 do 5 000 ha.
  fenix: >-
    FENIX je radličkový podmietač BEDNAR pre plytkú až strednú kultiváciu 8–25 cm. Šípovité
    radlice so širokým presahom zabezpečujú celoplošné podrezanie a premiešanie rastlinných
    zvyškov. Model FN je nesený do 4 m záberu, FO ťahaný 4–7 m. Vhodný na podmietku, jarné
    kypenie aj prípravu pred sejbou.
  versatill: >-
    VERSATILL je univerzálny radličkový kypič BEDNAR pre strednú hĺbku 10–35 cm
    s rýchlovýmenným systémom dlát. Vďaka modulárnej konštrukcii zvláda podmietku, prekypenie
    aj prípravu sejbového lôžka. Záber 3–6 m, model VO v nesenom aj ťahanom vyhotovení.
  kor: >-
    KOR je kompaktný nesený diskový podmietač BEDNAR pre menšie a stredné farmy. Kotúče 510 mm
    v X-usporiadaní zabezpečujú agresívny rez a premiešanie. Záber 2,5–4 m, vhodný pre traktory
    od 100 HP. Model KO je dostupný výhradne v nesenom vyhotovení.
  mulchfarmer: >-
    MULCHFARMER je kombinovaný kypič BEDNAR navrhnutý pre mulch-till technológiu. Spája
    diskovú sekciu, radličky a pech v jednej jazde, čo umožňuje prípravu pôdy s vysokým
    podielom rastlinných zvyškov. Záber 4–6 m, model MF zvláda náročné podmienky po kukurici
    a repke.
  strip-master: >-
    STRIP-MASTER je strip-till stroj BEDNAR na pásové spracovanie pôdy s aplikáciou hnojiva.
    Kypí iba pás široký 20 cm v rozstupe 45–80 cm, medzi pásmi zachováva mulč. Umožňuje
    úsporu paliva, ochranu pôdy pred eróziou a presnú výživu. Model SM v zábere 3–6 m
    s integrovaným zásobníkom alebo napojením na FERTI-BOX.
  row-master: >-
    ROW-MASTER RN je medziradková plečka BEDNAR na mechanické ošetrenie kukurice, slnečnice,
    repy a sóje. Sekcia s nožovými radlicami a kotúčmi na presné vedenie v medziradku
    45–80 cm. Možnosť doplnenia o aplikáciu kvapalných hnojív alebo pásového prihnojenia.
    Záber 6–12 m.
  galaxy: >-
    GALAXY je rad ťažkých valcov BEDNAR na rekonsolidáciu pôdy po orbe, kultivácii alebo
    v jarnom období na pšenici. Segmenty Cambridge alebo Crosskill s priemerom 530–630 mm,
    zábery 6–18 m. Model GO so sklopným rámom pre veľkoplošné nasadenie.
  presspack: >-
    PRESSPACK je nesený pres-valec BEDNAR za pluhom alebo kypričom na okamžitú
    rekonsolidáciu a uzavretie profilu. Gumové alebo oceľové prstence s priemerom 700–900 mm
    s vysokou hmotnosťou pre hĺbkové pôsobenie. Model PP v záberoch 3–6 m, montáž na zadný
    trojbodový záves alebo priamo na náradie.
  presser: >-
    PRESSER PE je ťahaný pres-valec BEDNAR za pluhom na priebežnú rekonsolidáciu ornice
    počas orby. Eliminuje druhý prejazd s valcom a umožňuje priamu nadväznosť na sejbu.
    Zábery zodpovedajú veľkosti pluhu, model PE pre 5–9 radlicové pluhy.
