# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Francúzsko"
description: >-
  Francúzsky líder v teleskopických manipulátoroch a nakladačoch pre poľnohospodárstvo. Vlajková rada MLT NewAg (heavy-duty teleskopy 6–10 m, nosnosť 2,5–6 t) s prémiovou kabínou, telematikou EasyManager a motormi Stage V 75–160 hp. Kompaktná rada MT-X pre malé farmy, kĺbové MLA-T pre maštale, čelné nakladače MAC a šmykové R/RT pre univerzálne nasadenie.

categories:
  manipulace: "Manipulácia a nakladanie"

series:
  mlt-625: >-
    MLT 625 — vstupný heavy-duty teleskopický manipulátor radu NewAg. Max. výška 6,1 m, nosnosť 2,5 t.
    Motor Stage V 75 hp, hydrostatická prevodovka, kabína NewAg s panoramatickým výhľadom.
    Vhodný pre malé až stredné farmy na manipuláciu s balíkmi slamy, krmovín a paletizovaného tovaru.
  mlt-730: >-
    MLT 730 — kompaktný heavy-duty teleskopický manipulátor NewAg s dosahom 7 m a nosnosťou 3 t.
    K dispozícii v prevedení 115 hp (D — direct drive) a 130 hp (PS+ — powershift). Kabína NewAg,
    joystick JSM, telematika EasyManager. Univerzálny stroj pre stredné farmy a družstvá.
  mlt-737: >-
    MLT 737 — heavy-duty teleskop NewAg s dosahom 7 m a vyššou nosnosťou 3,7 t pre náročnejšiu
    manipuláciu s objemnými balíkmi a hnojom. Motor Stage V 130 hp, prevodovka PS+ powershift,
    kabína NewAg. Obľúbený stroj na veľkých farmách s mliečnou produkciou.
  mlt-840: >-
    MLT 840 — heavy-duty teleskopický manipulátor NewAg pre veľké farmy. Max. výška 7,55 m,
    nosnosť 4 t, motor 145 hp Stage V s PS+ powershiftom. Kabína NewAg s pneumatickým sedadlom,
    telematika EasyManager, vhodný pre náročné celodenné nasadenie a kŕmne dvory.
  mlt-940: >-
    MLT 940 — vrcholný heavy-duty teleskop radu NewAg s dosahom 9 m a nosnosťou 4 t.
    Vario hydrostatická prevodovka V+, motor 140 hp Stage V, prémiová kabína NewAg. Ideálny na
    stohovanie veľkých balíkov, plnenie žľabov a manipuláciu vo veľkých skladoch.
  mlt-961: >-
    MLT 961 — extra ťažký teleskop NewAg s nosnosťou 6 t a dosahom 9 m, určený pre najnáročnejšiu
    prevádzku. Motor 145 hp Stage V s prevodovkou Vario+, zosilnený zdvíhací mechanizmus. Stohovanie
    objemných balíkov, manipulácia s ťažkými paletami v bioplynových staniciach a kompostárňach.
  mlt-1041: >-
    MLT 1041 — vlajkový heavy-duty teleskopický manipulátor NewAg s rekordným dosahom 9,65 m
    a nosnosťou 4,1 t. Motor 145 hp Stage V, PS+ powershift, prémiová kabína NewAg. Pre veľké
    prevádzky, kde treba dosiahnuť na najvyššie poschodia stohov a síl.
  mt-x-420: >-
    MT-X 420 — kompaktný teleskopický manipulátor pre malé farmy a stiesnené priestory.
    Max. výška 4,3 m, nosnosť 2 t, šírka pod 1,8 m pre prejazd nízkymi maštaľami. Motor 75 hp,
    hydrostatická prevodovka, jednoduchá obsluha pre každodennú prácu na dvore.
  mt-x-625: >-
    MT-X 625 — kompaktný teleskop s dosahom 6 m a nosnosťou 2,5 t, vhodný pre stredné farmy
    s dôrazom na manévrovateľnosť. Motor 75 hp Stage V, hydrostatická prevodovka,
    štvorkolesové riadenie s režimami súbežnej a krabej jazdy.
  mt-x-730: >-
    MT-X 730 — top model kompaktnej rady MT-X s dosahom 7 m a nosnosťou 3 t. Motor 75 hp Stage V,
    hydrostatický pohon, kompaktné rozmery pre nízke maštale a úzke priechody.
    Ideálna kombinácia dosahu a manévrovateľnosti pre stredne veľké farmy.
  mac-50: >-
    MAC 50 — kompaktný kolesový čelný nakladač pre poľnohospodárstvo s nosnosťou 5 t a výklopnou výškou
    nad 3 m. Motor Stage V, hydrostatická prevodovka, kabína s panoramatickým výhľadom.
    Vhodný na nakladanie hnoja, krmovín a sypkých materiálov na dvore.
  mac-60: >-
    MAC 60 — väčšia varianta kompaktného kolesového nakladača MAC s nosnosťou 6 t. Vyššia výklopná
    výška a väčší objem lyžice, motor Stage V s hydrostatickou prevodovkou. Pre stredné a veľké
    farmy s pravidelnou manipuláciou s objemnými materiálmi.
  mla-t-516: >-
    MLA-T 516 — kĺbový teleskopický nakladač pre poľnohospodárstvo s nosnosťou 1,6 t a dosahom 5 m.
    Kombinuje výhody čelného nakladača (manévrovateľnosť, krátky polomer otáčania) s teleskopickým
    výsuvom. Motor Stage V, hydrostatický pohon, ideálny pre prácu v úzkych maštaliach.
  mla-t-533: >-
    MLA-T 533 — top kĺbový teleskopický nakladač s nosnosťou 3,3 t a dosahom 5 m. Varianty
    PS+ (powershift) a V+ (Vario hydrostat) s motorom 130 alebo 145 hp Stage V. Kabína s joystickom
    JSM, telematika EasyManager. Vhodný pre veľké maštale a kŕmne dvory.
  rr-13: >-
    RR 13 — kompaktný šmykový nakladač s nosnosťou 1,3 t pre prácu v úzkych priestoroch maštalí
    a hospodárskych budov. Motor Stage V, vertikálny zdvih, široká ponuka adaptérov
    (lyžice, vidly, metly). Ideálny na každodennú údržbu a manipuláciu s krmivami.
  rr-16: >-
    RR 16 — stredne veľký šmykový nakladač s nosnosťou 1,6 t a vertikálnym zdvihom.
    Motor Stage V, robustná konštrukcia, kompatibilita s celou škálou adaptérov Manitou.
    Vhodný pre stredné farmy s dennou manipuláciou s objemnými materiálmi.
  rr-18: >-
    RR 18 — top šmykový nakladač radu RR s nosnosťou 1,8 t. Vyšší výkon motora, robustný rám
    a vertikálny zdvih pre maximálny dosah. Pre veľké farmy a univerzálne nasadenie s ťažkými
    adaptérmi (kefy, snehové radlice, vidly na balíky).
  mrt: >-
    MRT (Manitou Roto) — vlajková rada otočných teleskopických manipulátorov s 360° otočnou vežou,
    prvýkrát uvedená v roku 1981. Jedinečná kombinácia teleskopu a mobilného žeriavu: dosah až nad
    30 m pri vrcholových modeloch, nosnosť 4,5–7 t, plné otáčanie nakladacieho ramena bez nutnosti
    presúvať stroj. Súčasná moderná generácia MRT-X / MRT Vision+ ponúka pokročilú stabilizáciu,
    telematiku Manitou EasyManager, plne otočnú kabínu a motory Stage V. Profesionálny stroj
    využívaný predovšetkým v stavebníctve, vo veľkých skladoch a pri špeciálnych manipulačných
    úlohách v poľnohospodárstve — alternatíva mobilného žeriavu pre oblasti s obmedzeným priestorom.

