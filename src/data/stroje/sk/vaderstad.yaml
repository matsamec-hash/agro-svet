# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Švédsko"
description: >-
  Švédsky výrobca vysokovýkonných sejačiek (Tempo, Rapid, Spirit, Inspire, Proceed) a strojov na spracovanie pôdy (Carrier, Cultus, TopDown, Opus, NZ Aggressive). Globálny líder presného siatia kukurice so systémom Tempo, ktorý drží svetové rekordy v rýchlosti presného siatia (až 20 km/h). Sídlo vo švédskom Väderstade, robustná konštrukcia a precízne agronomické riešenia sú poznávacím znakom značky.

categories:
  seti: "Siatie a sadenie"
  zpracovani-pudy: "Spracovanie pôdy"

series:
  inspire: >-
    Inspire 1200S je univerzálna ťahaná pneumatická sejačka pre malé a stredné farmy. Kombinuje predspracovanie pôdy (disky a packer) s presným ukladaním osiva v jednom prejazde. Pracovný záber 12 m, kapacita zásobníka 6 300 l a hydraulicky riadený coulter pressure umožňujú flexibilné siatie v rôznych technológiách spracovania pôdy.
  proceed: >-
    Proceed V je nová precízna platforma Väderstad na siatie pšenice, sóje, repky a ďalších plodín s individuálnou kontrolou každého zrna. Singulácia zrna v každom riadku prináša úsporu osiva 20–40 % oproti klasickému riadkovému siatiu a vyrovnaný porast. Vrcholná novinka v portfóliu — Proceed prenáša princípy precision plantingu z kukurice na drobnozrnné plodiny.
  rapid-a: >-
    Rapid A je ťahaná univerzálna sejačka, vlajková rada Väderstad pre veľké farmy. Pracovné zábery 4–9 m, systém OffSet na presné ukladanie osiva a System Disc na predspracovanie pôdy zvládajú siatie v mulčovaných aj klasicky spracovaných pôdach. Veľkokapacitný zásobník 3 900–5 500 l minimalizuje prestoje pri dopĺňaní osiva a hnojiva.
  rapid-rd: >-
    Rapid RD 300–400C je nesená pneumatická sejačka pre intenzívne siatie na stredných a menších plochách. Kombinuje pasívne spracovanie pôdy diskami s presným ukladaním osiva. Pracovné zábery 3–4 m, hmotnosť prispôsobená pre stredne výkonné traktory a osvedčené coultery Väderstad zaručujú kvalitný porast aj v náročných podmienkach.
  spirit: >-
    Spirit je výkonná ťahaná sejačka s veľkými pracovnými zábermi 6–9 m pre veľkoplošné farmy. System Disc Aggressive a Crossboard Heavy zabezpečujú prípravu pôdy v jednom prejazde aj v náročných podmienkach. Veľkokapacitný zásobník 5 000 l a precízny pneumatický distribučný systém zvládajú vysokovýkonné siatie obilnín a repky.
  spirit-r: >-
    Spirit R je radličková verzia Spirit s active row coulterom, určená na siatie v technológii minimum tillage a no-till. Pracovné zábery 3–4 m, individuálne riadený prítlak na každý radličkový coulter zaručuje rovnomernú hĺbku siatia. Vhodný pre intenzívne porasty obilnín, repky a strukovín v osevných postupoch s redukovaným spracovaním pôdy.
  tempo-f: >-
    Tempo F je čelne nesený precision planter na kombináciu s nesenou sejačkou Rapid na zadnom trojbodovom závese. Umožňuje súčasné siatie kukurice alebo slnečnice s aplikáciou štartovacieho hnojiva v jednom prejazde. Systém PowerShoot od Väderstad zaručuje presné ukladanie zŕn aj pri rýchlostiach 12–15 km/h.
  tempo-l: >-
    Tempo L je vlajkový ťahaný precision planter Väderstad, dostupný v konfiguráciách 6, 8, 12, 16 a 18 radov. Systém PowerShoot s aktívnou výsevnou jednotkou udržiava presnú singuláciu zrna aj pri rekordných rýchlostiach 15–20 km/h — dvojnásobok tradičných sejačiek. Light pulse seed monitoring kontroluje každé zrno v reálnom čase a prispôsobuje výsev podmienkam poľa.
  tempo-r: >-
    Tempo R je ťahaný precision planter s rigidným rámom, určený pre stredne veľké farmy v zábere 6–8 radov. Robustná konštrukcia a výsevná jednotka PowerShoot zaručujú vysokú produktivitu pri siatí kukurice, slnečnice, sóje a repky. Jednoduchá údržba a kompaktné prepravné rozmery vďaka pevnému rámu.
  tempo-v: >-
    Tempo V je nesená varianta precision planteru so 6–8 radmi, vhodná pre európske farmy s menšou výmerou. Hydraulické skladanie zaručuje prepravnú šírku pod 3 m. Výsevná jednotka PowerShoot a aktívny depth control udržiavajú konzistentnú hĺbku siatia 1–7 cm pri rýchlosti 12–18 km/h.
  carrier: >-
    Carrier je vlajková diskovačka Väderstad na plytké až stredne hlboké spracovanie strniska, mulčovanie pozberových zvyškov a prípravu sejbového lôžka. Kovaný disk CrossCutter Disc alebo TrueCut s priemerom 450–510 mm reže slamu aj pri vysokých rýchlostiach 12–20 km/h. Modulárna rada od 3 m (Carrier základ) až po 12 m (Carrier XL/XT) pre ľubovoľnú veľkosť farmy.
  crosscutter-disc: >-
    CrossCutter Disc je ultra-plytká diskovačka na plošné podrezanie strniska v hĺbke 2–5 cm a podporu klíčenia výdrolu aj burín. Špeciálne tvarované disky s konkávou 14° agresívne režú bez zbytočného miešania pôdnych vrstiev. Kľúčový stroj na manažment strniska v rámci CTF a regeneratívneho poľnohospodárstva. Pracovné zábery 5–12 m pri rýchlosti až 20 km/h.
  cultus: >-
    Cultus CS je univerzálny radličkový kyprič pre stredné hĺbky 5–25 cm. Rozstup nosníkov 80 cm a poistené pružinové radlice s uvoľňovacou silou 600 kg zaručujú priechodnosť aj v kamenitých pôdach. Trojradové usporiadanie radlíc minimalizuje upchávanie rastlinnými zvyškami. Vhodný na podmietku, hlboké kypenie aj prípravu sejbového lôžka v jednom stroji.
  swift: >-
    Swift je vysokorýchlostný radličkový podmietač na plytké spracovanie strniska v hĺbke 3–15 cm. Pracovná rýchlosť 12–20 km/h zaručuje vysoký plošný výkon pri nízkej spotrebe paliva. Kombinácia 2 radov radlíc s úzkymi 50 mm radličkami a koncovým valcom v jednom prejazde kompletizuje povrchové spracovanie aj sejbové lôžko.
  opus: >-
    Opus L500 je hĺbkový kyprič Väderstad na intenzívne kypenie do hĺbky 35 cm. Hydraulicky poistené radlice s uvoľňovacou silou až 850 kg a rozstup radov 80 cm zvládajú rozrušenie utužených pôdnych horizontov aj v ťažkých pôdach. Dvojradové valcové vybavenie vracia pôdu do štruktúry vhodnej na siatie v jednom prejazde.
  topdown: >-
    TopDown je kombinovaný stroj pre one-pass tillage spájajúci 4 pracovné operácie v jednom prejazde: disky na plytké premiešanie, hĺbkové radlice (až 30 cm), vyrovnávacie disky a koncový valec. Ideálny na prechod z konvenčného spracovania na minimum tillage. Pracovné zábery 3–7 m, hĺbka kypenia plynule nastaviteľná hydraulicky z kabíny.
  nz-aggressive: >-
    NZ Aggressive je výkonný kompaktomat s pružinovými radlicami na intenzívnu prípravu sejbového lôžka v hĺbke 3–10 cm. Pracovné zábery 5–10 m a štvorriadové usporiadanie radlíc zaručujú jemné drobenie a vyrovnanie povrchu aj po hlbokej orbe. Vhodný na jarnú aj jesennú prípravu osivového lôžka pod obilniny, repku a okopaniny.
  rexius: >-
    Rexius je ťažký pozberový a predseťový valec Väderstad na rekonsolidáciu pôdy a urovnanie povrchu po orbe alebo kypení. Pracovné zábery 6,2–12,4 m, prevádzková hmotnosť 600 kg/m rozdrobí hrudy a vytvára optimálnu kapilaritu pre klíčenie. Predný equalizer CrossBoard Heavy vyrovnáva nerovnosti.
  rexius-twin: >-
    Rexius Twin je dvojitý valec s dvoma radmi krúžkov CambridgeRing (Ø 470 + 510 mm) na extra rekonsolidáciu a maximálnu kapilaritu pôdy. Vyššia hmotnosť a dvojnásobný kontakt s pôdou zaručujú istejšie zakladanie porastov obilnín a repky. Vhodný pre náročné technológie minimum tillage a regeneratívne poľnohospodárstvo.
  rollex: >-
    Rollex je kompaktný pneumaticky ťahaný valec pre menšie a stredné farmy v zábere 6,2–12,4 m. Ľahšia konštrukcia ako Rexius umožňuje agregáciu s traktormi od 120 hp. Štandardne osadený krúžkami Cambridge alebo CrossKill s priemerom 470 mm pre rôzne pracovné podmienky. Hydraulické skladanie na prepravu pod 3 m.
