# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Japonsko"
description: >-
  Japonský výrobca s bohatou tradíciou. Silná pozícia v segmente kompaktných a stredných traktorov, historicky známy pre sady, vinice a komunálne služby. V posledných rokoch expanduje aj do triedy row-crop (rad M nad 130 koní). Kombajny pod značkou Kubota sú v ČR minoritné (rad DC), primárne pre japonský/ázijský trh.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"

series:
  b: >-
    Kompaktné traktory do 30 koní pre záhrady, sady, komunálne služby a hobby farmy. Motor Kubota 3-valec diesel, prevodovka HST alebo stupňová. Aktuálny modelový rad B01 (B2301, B2601) nadväzuje na historické B7500/B2920/B3350.
  bx: >-
    Subkompaktné traktory pre záhrady, komunálne služby a hobby farmy. Motor Kubota 3-valec diesel, hydrostatická prevodovka (HST).
  l: >-
    Kompaktná úžitková trieda 20–60 koní. Motor Kubota 3-valec, prevodovka HST alebo synchronizovaná.
  lx: >-
    Kompaktné úžitkové traktory 24–30 koní. Vstupná trieda pre hobby farmárov a komunálnu údržbu — pod 30 hp. Motor Kubota 3-valec diesel, hydrostatická prevodovka HST. Nahradili staršie kompaktné modely L v segmente pod 30 koní.
  l02: >-
    Najnovšia generácia kompaktných traktorov radu L spĺňajúca emisnú normu Stage V. Modernizovaná kabína, podpora ISOBUS, výkon 38–62 koní. Predávaná súbežne s LX (LX = jednoduchšia vstupná trieda, L02 = plne vybavená prémiová kompaktná trieda).
  sta: >-
    Malotraktory kompaktnej triedy s dieselovým 3-valcom. Určené pre komunálne služby, záhrady a menšie hobby farmy. Pohon 4x4 MFWD, synchronizovaná prevodovka a rám ROPS.
  me: >-
    Úžitkový rad určený predovšetkým pre japonský a ázijský trh s exportom aj do Európy. Vhodný pre sady, vinice a poľné práce. Verzia Narrow DTN so zúženým rozchodom pre špecializované sadárske nasadenie.
  mx: >-
    Univerzálny stredný farmový traktor — medzi radmi B/L (kompaktné) a M (veľké). Motor Kubota Stage V, výkon 55–63 koní. Nahrádza starší úžitkový rad M5040/M5640/M6040.
  m60-legacy: >-
    Staršia úžitková trieda 60–100 koní. Prvá generácia M6040/M7040/M8540/M9540 (2007–2013) s motorom V3300/V3800, následne nahradená modernejšími M6060/M7060/M8560/M9960 s Common Rail a emisiami Tier IV.
  mgx: >-
    Tzv. „M Grand X" — vyššia úžitková trieda s 8-stupňovým prevodom Powershift a priestrannou kabínou. Motor V3800 (100/110 HP) a V6108 (126/135 HP). Generácie označované MGX, MGX-II, MGX-III a MGX-IV s postupnými inováciami (Stage IIIB → Stage V, odpruženie prednej nápravy FSS na verzii S).
  m4002: >-
    Cenovo dostupná úžitková trieda. Motor Kubota V3307 4-valec 3,3 l.
  m5: >-
    Populárny úžitkový rad 95–115 koní. Motor Kubota V3800 4-valec turbo, prevodovka Speed-Shift 36/36. Kabína Premium.
  m6: >-
    Stredný prémiový rad. Motor Kubota V6108 4-valec 6,1 l, prevodovka Powershift 24/24, voliteľná CVT (rad MGX).
  m5002: >-
    Modernizácia populárneho radu M5 spĺňajúca emisnú normu Stage V. Motor Kubota V3800 4-valec turbo 3,8 l, prevodovka Speed-Shift 36/36. Dostupný aj ako M5002 Narrow pre sady a vinice.
  m6002: >-
    Nástupca pôvodného radu M6, predstavený na veľtrhu FIMA 2020 v Zaragoze. Motor Kubota V6108-TIEF5 4-valec 6,1 l s funkciou boost, prevodovka 24/24 s elektronickým radením troch skupín a 8 load-shift stupňami. Rozvor 2 690 mm, systém Bi-speed na zmenšenie polomeru otáčania.
  m7: >-
    Vlajkový rad row-crop — prvá Kubota v kategórii nad 150 k. Motor Kubota V6108 6,1 l common-rail, prevodovka Powershift 24/24 alebo KVT (CVT). Vyrábaný v Bierne, Francúzsko.
  m7002: >-
    Generácia vlajkového radu M7 spĺňajúca emisnú normu Stage V. Motor Kubota V6108 TIER V 6,1 l s optimalizovanou charakteristikou výkonu. Nová 6-stupňová prevodovka Powershift 30F/15R, prípadne 54F/27R s plazivou redukciou. Nástupca M7-1/M7001, vystriedaný generáciou M7-4 (2023+).
  m8: >-
    Najväčší poľnohospodársky traktor v histórii Kubota. Výsledok spolupráce s kanadskou firmou Buhler Industries (výrobca Versatile), montáž vo Winnipegu. Motor Cummins B6.7 6-valec Tier 4 Final bez EGR (SCR + DPF), voliteľný Semi-Powershift 30x15 alebo Variable Transmission (CVT).
  mk: >-
    Úzke varianty pre vinice a sady. Motor Kubota 4-valec 3,8 l, šírka od 1,2 m.
  sr: >-
    Rad kompaktných kombajnov primárne pre japonský a ázijský trh, určený predovšetkým na zber ryže, pšenice a jačmeňa. Na európskom trhu sa nevyskytujú, dovoz prebieha len okrajovo prostredníctvom japonských obchodníkov s použitými strojmi.
  dc: >-
    Menšie kompaktné kombajny primárne pre ázijské trhy, v ČR minoritné. Vhodné na zber ryže, pšenice, sóje.
