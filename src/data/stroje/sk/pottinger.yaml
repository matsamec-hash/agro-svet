# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Rakúsko"
description: >-
  Rakúsky rodinný výrobca so širokým portfóliom strojov na spracovanie pôdy (Servo pluhy, Terradisc, Synkro, Lion), sejbu (Aerosem, Terrasem, Vitasem) a najmä zber krmovín (Novacat žacie stroje, Top zhŕňače, Hit obracače, Impress lisy, Jumbo a Faro samozberné vozy). Sídlo Grieskirchen, výrobné závody v Rakúsku, ČR (Vodňany), Nemecku a Poľsku.

categories:
  seti: "Sejba a sadenie"
  sklizen-picnin: "Zber krmovín a slamy"
  zpracovani-pudy: "Spracovanie pôdy"

series:
  aerosem: >-
    AEROSEM sú pneumatické sejačky Pöttinger určené na nasadenie v kombinácii s rotačnou bránou (Lion) alebo samostatne. Vyznačujú sa centrálnym distribútorom, technológiou IDS na vypínanie koľajových riadkov a unikátnou funkciou PCS (Precision Combi Seeding) na sejbu kukurice v rámci univerzálnej sejačky. Cieľovou skupinou sú stredne veľké a veľké podniky, ktoré potrebujú všestranný stroj na obilniny aj riadkové plodiny.
  terrasem: >-
    TERRASEM je vlajková rada sejacích kombinácií Pöttinger s integrovaným krátkym diskovým podmietačom, zhutňovacími pneumatikami a pätkami DUAL DISC. Stroj v jednom prejazde vykonáva plytké spracovanie, urovnanie, zhutnenie a sejbu, čím šetrí čas aj náklady. Ťahané verzie C a V sú určené pre veľké podniky a profesionálne agrofirmy s dôrazom na výkon a univerzálnosť (obilniny, repka, kukurica so systémom výsevu ISOBUS).
  vitasem: >-
    VITASEM sú klasické mechanické sejačky Pöttinger so zubovým výsevným ústrojenstvom a možnosťou agregácie s rotačnou bránou Lion (variant M). Spoľahlivá technológia pre malé a stredné farmy, ktoré vyžadujú jednoduchú obsluhu, nízku obstarávaciu cenu a univerzálne použitie na obilniny aj drobnosemenné plodiny. Zábery 2,5–4 m pokrývajú potreby drvivej väčšiny rodinných fariem.
  eurocat: >-
    EUROCAT boli bubnové žacie stroje Pöttinger určené pre horské oblasti a malé farmy s ľahkými traktormi. Bubnová konštrukcia odolávala kameňom a nerovnostiam lepšie ako diskové žacie stroje, mala však vyššiu spotrebu energie. Rad bol postupne nahradený modernými diskovými strojmi NOVACAT a NOVADISC, ktoré ponúkajú nižšiu hmotnosť a lepšiu kvalitu rezu. Stroje sú stále v prevádzke na tisíckach horských fariem v Rakúsku a Bavorsku.
  hit: >-
    HIT (HEUTEDDER) sú obracače píce Pöttinger v širokom spektre záberov od 4,5 m (4 rotory) až po 12,7 m (12 rotorov). Kľúčové technológie zahŕňajú systém DYNATECH s aerodynamickým tvarom rotorov na šetrné obracanie a LIFTMATIC na plynulé zdvíhanie rotorov na súvratiach bez kontaktu s drnom. Cieľom je maximálna kvalita píce s minimálnymi stratami listov pri ďatelinách a lucerne.
  impress: >-
    IMPRESS je prvá generácia valcových lisov Pöttinger uvedená v roku 2017, navrhnutá kompletne na zelenej lúke. Kľúčovou inováciou je technológia LIFTUP s rotorom v hornej polohe (lis sa otvára nahor), vďaka ktorej má lis najkratšiu dráhu materiálu a vysokú priepustnosť. Dostupné varianty F (fix-chamber 125 cm), V (variabilný 155/185 cm) a kombinácie s obaľovačkou (FC PRO, VC PRO). Cieľovou skupinou sú náročné podniky a služby, ktoré vyžadujú vysoký výkon a špičkovú hustotu balíka.
  jumbo: >-
    JUMBO je vlajková rada samozberných vozov Pöttinger s najvyššími objemami v portfóliu (38–50 m³ DIN). Stroje sú určené pre veľké podniky a služby, ktoré potrebujú maximálny výkon pri zbere krmovín. Kľúčové vlastnosti: krátka dráha plodiny, rezacie ústrojenstvo so 45 nožmi (dĺžka rezu 4 cm), automatické brúsenie, trojosové nápravy s núteným riadením a hydraulické odpruženie. Modernizácia 2022 priniesla nové HMI a integráciu so sekčným riadením ISOBUS.
  faro: >-
    FARO sú stredne veľké samozberné vozy Pöttinger určené pre stredné podniky, ktoré nepotrebujú kapacitu vlajkovej rady JUMBO. Objem 25–35 m³ DIN, rezacie ústrojenstvo s 31 nožmi, dvojosové nápravy. Cenovo výhodnejšia alternatíva s nižšími nárokmi na traktor (od 100 hp). Variant COMBILINE umožňuje použitie ako samozberný aj ako prepravný voz na rezanku z rezačky.
  novacat: >-
    NOVACAT je kľúčová rada diskových žacích strojov Pöttinger pokrývajúca celé spektrum od malých nesených strojov 2,6 m až po žacie kombinácie 10 m s predným a dvojicou zadných žacích strojov. Kľúčové technológie: pohon Y DRIVE s priestorom na premiešanie píce, hydraulické odľahčenie (Hydraulic Compensation), kondicionér ED (prsty) alebo RC (valcový) a systém kolíznej ochrany NONSTOP LIFT. Vlajkový model A10 ponúka variabilný záber 9,52–10,02 m s automatickou kontrolou prekrytia.
  novadisc: >-
    NOVADISC sú ľahké diskové žacie stroje Pöttinger bez kondicionéra, určené pre horské oblasti, malé farmy a chovateľov koní, ktorí uprednostňujú presychanie píce v prirodzenom riadku. Nízka hmotnosť (250–500 kg) umožňuje nasadenie aj na traktory od 40 hp. Zábery 2,2–3,5 m, 4–7 diskov. Cenovo dostupná alternatíva k NOVACATu pre extenzívne hospodárenie.
  top: >-
    TOP je najširšia rada zhŕňačov Pöttinger zahŕňajúca jednorotorové (3,4–4,6 m), dvojrotorové s bočným ukladaním (6,8–9,5 m), štvorrotorové s centrálnym ukladaním (8,8–12,5 m) a jeden stredový zhŕňač pre maximálny záber. Kľúčové technológie: TOPTECH PLUS pre prevodovku v olejovom kúpeli, kopírovacie koleso MULTITAST na šetrné kopírovanie terénu a hydraulické skladanie do prepravnej polohy. Široké pokrytie potrieb od malých fariem až po profesionálne podniky.
  fox: >-
    FOX je vstupná rada kompaktomatov Pöttinger určená pre malé a stredné farmy s traktormi 80–130 hp. Kombinácia predných šmykových líšt, dvoch radov diskov a zadného valca zabezpečuje prípravu sejbového lôžka v jednom prejazde. Záber 3 m, nesené vyhotovenie. Cenovo atraktívne riešenie pre farmy, ktoré nepotrebujú širokozáberové stroje TERRADISC alebo TERRIA.
  lion: >-
    LION je rada robustných rotačných brán Pöttinger na náročnú prípravu sejbového lôžka, najmä po orbe, na ťažkých pôdach a v kombinácii so sejačkami AEROSEM alebo VITASEM. Zábery 2,5–6 m, prevodovky pre výkony až 360 hp. Verzie CLASSIC, MASTER a SUPERIOR sa líšia robustnosťou a maximálnym prípustným výkonom traktora. Kľúčové vlastnosti: rýchlozameniteľné nože QUICKFIT, integrované predné valce a kompatibilita s 3-bodovým systémom sejačiek.
  servo: >-
    SERVO je vlajková rada otočných pluhov Pöttinger, dlhodobo uznávaná ako jeden z najkvalitnejších pluhov na trhu. Sortiment zahŕňa nesené pluhy (3–6 radlíc), polonesené (5–9 radlíc) a ťahané (až 14 radlíc). Kľúčové technológie: TRACTION CONTROL na automatickú reguláciu prítlaku, SERVOMATIC plus na jednoduché nastavenie záberu a sklonu, hydraulické zaistenie proti preťaženiu NONSTOP a univerzálne orničné telesá pre rôzne typy pôd. Generácia SERVO 3000/4000 (2020+) priniesla 50 % nárast tuhosti rámu.
  synkro: >-
    SYNKRO sú viacradové radličkové kypriče Pöttinger na plytké podmietanie aj hlboké kyprenie do 30 cm. K dispozícii sú 2-, 3- a 4-radové varianty so zábermi 2,5–6 m (nesené) a až 8 m (ťahané). Kľúčové vlastnosti: hydraulické zaistenie proti preťaženiu NONSTOP, široká ponuka radlíc (úzke/široké/dlátové) a zadný valec (tubový, prstový, gumový). Univerzálny stroj pre celý cyklus spracovania pôdy medzi zberom a sejbou.
  terradisc: >-
    TERRADISC je rada krátkych diskových podmietačov Pöttinger na rýchle a kvalitné plytké spracovanie strniska (5–15 cm). Veľké disky (510 alebo 580 mm) s individuálnym uložením v gumových silentblokoch zabezpečujú dobré kopírovanie terénu aj v kamenitých pôdach. Zábery 3–6 m (nesené, skladacie, ťahané). Vlajkový stroj pre stredné a veľké podniky na likvidáciu strniska, zapravenie organických hnojív a prípravu na sejbu ozimín.
  terria: >-
    TERRIA je nová rada hĺbkových radličkových kypričov Pöttinger uvedená v roku 2020, určená na hlboké spracovanie pôdy 5–35 cm. Štvorradová konštrukcia s veľkou rozstupou medzi radmi (95 cm) zabezpečuje vynikajúci priechod organickej hmoty a slamy. Robustná konštrukcia s rýchlozameniteľnými radlicami a širokým spektrom zadných valcov. Cieľovou skupinou sú veľké podniky a profesionálni poľnohospodári uprednostňujúci bezorebné a minimalizačné technológie.
