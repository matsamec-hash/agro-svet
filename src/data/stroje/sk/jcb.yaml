# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Spojené kráľovstvo"
description: >-
  Britský rodinný výrobca stavebných a poľnohospodárskych strojov, ktorý založil Joseph Cyril Bamford. Pre poľnohospodárstvo vyrába ikonické teleskopické manipulátory Loadall (od kompaktných 525-60 po heavy-duty 560-80), kompaktné pivot-steer manipulátory TM Telemaster, kompaktné kolesové nakladače radu 400 a unikátne vysokorýchlostné traktory Fastrac s pruženým podvozkom a cestovnou rýchlosťou 70 km/h.

categories:
  manipulace: "Manipulácia a nakladanie"
  traktory: "Traktory"

series:
  compact-wheel-loader: >-
    Kompaktné kolesové nakladače JCB radu 400 na prácu na dvore, v krmnom koridore a v úzkych priestoroch stajne. Ponúkajú výborný výhľad cez nízku kapotu, malý polomer otáčania a kĺbový rám na manévrovanie v stiesnených priestoroch. Modely od 2,6 t (403) po 10,3 t (417) pokrývajú hospodárstva všetkých veľkostí.
  loadall-525: >-
    Najkompaktnejší Loadall — teleskopický manipulátor so šírkou len 1,84 m a výškou 1,9 m, ideálny pre nízke stajne a úzke priechody. Nosnosť 2,5 t a dosah 6 m pokrývajú bežnú manipuláciu s balíkmi, paletami aj krmivom. Charakteristický 360° výhľad z kabíny CommandPlus vďaka nízkemu ramenu naľavo od vodiča.
  loadall-527: >-
    Kompaktný Loadall pre stredné hospodárstva — vyššia nosnosť 2,7 t oproti modelu 525 pri zachovaní kompaktných rozmerov a výborného výhľadu. Dosah 5,8 m a nízka prepravná výška robia zo 527-58 obľúbený stroj na prácu v starších stajniach a budovách s nízkymi priejazdmi.
  loadall-532: >-
    Stredný Loadall s nosnosťou 3,2 t — najpredávanejšia veľkosť v rámci radu, dostupná v dvoch dĺžkach ramena (6 m a 7 m). Vhodný pre väčšinu bežných poľnohospodárskych operácií: balíky, krmivo, nakladanie hnoja, paletizácia. Dostupný vo výbavových stupňoch Agri, Agri Plus, Agri Super, Agri Pro a Agri Xtra podľa požiadaviek na prevodovku a komfort.
  loadall-536: >-
    Stredne veľký Loadall s nosnosťou 3,6 t — obľúbený na stredných a väčších hospodárstvach pre vyššiu zdvíhaciu kapacitu pri zachovaní stredných rozmerov. K dispozícii s ramenom 6 m aj 7 m a v rôznych výbavových stupňoch od základného Agri po Agri Pro s prevodovkou DualTech VT.
  loadall-538: >-
    Compact Loadall s najvyššou nosnosťou v rade 3,8 t pri zachovaní kompaktných rozmerov (šírka pod 2,3 m). Dostupný s ramenom 6 m aj 7 m; výbavový stupeň Agri Plus pridáva komfortnejšiu kabínu a hydraulické funkcie. Obľúbená veľkosť pre mliečne farmy s krmným vozom.
  loadall-542: >-
    Heavy-duty Loadall s nosnosťou 4,2 t a dosahom 7 m — prechod do ťažkej triedy. K dispozícii v najvyšších výbavových stupňoch Agri Pro (prevodovka DualTech VT), Agri Super (hydrostatická) a Agri Xtra (powershift) pre nasadenie od bežných hospodárstiev po dopravných kontraktorov.
  loadall-550: >-
    Heavy-duty Loadall s nosnosťou 5 t a dosahom 8,1 m — určený pre veľké hospodárstva, družstvá a kontraktorov. Schopný stohovať balíky do 8 výšok a nakladať aj do najvyšších silážnych vozov. K dispozícii vo výbavových stupňoch Agri Pro (DualTech VT) a Agri Super (hydrostatická).
  loadall-555: >-
    Heavy-duty Loadall s extra dlhým ramenom 9,5 m a nosnosťou 5,5 t — špeciálne pre vysoké silážne jamy, vysoké stohovanie balíkov a nakladanie do vysokých zásobníkov. Najväčší dosah v rade Loadall.
  loadall-560: >-
    Vrcholový Loadall s nosnosťou 6 t a dosahom 8,1 m — najväčší a najvýkonnejší agri teleskop v ponuke JCB. Určený pre najťažšie aplikácie: nakladanie prívesov s obilím, manipuláciu s ťažkými balíkmi biomasy a kontraktorské operácie. K dispozícii výhradne vo výbavovom stupni Agri Pro s prevodovkou DualTech VT.
  loadall-tm: >-
    Telemaster — kĺbové (pivot-steer) teleskopické nakladače JCB, hybrid medzi kolesovým nakladačom a teleskopom. Kĺbové riadenie ponúka extrémnu obratnosť v stiesnených stajniach, teleskopické rameno pridáva dosah do výšky. Ideálny pre mliečne farmy s úzkymi krmnými chodbami. Modely TM 220, TM 320 a TM 420 pokrývajú nosnosti od 2,1 do 4,1 t.
  fastrac-2000: >-
    Druhá generácia priekopníckych vysokorýchlostných traktorov JCB Fastrac s centrálne umiestnenou kabínou, predným aj zadným pružením a brzdami ABS — koncept pripomínajúci skôr nákladný automobil než klasický traktor. Cestovná rýchlosť 75 km/h zásadne zmenila logistiku hospodárstiev, pretože stroj zvládol poľnú prácu aj cestnú prepravu rovnakou rýchlosťou ako kamión. Modely 2115, 2125, 2135 a 2155 (neskôr 2150 a 2170) so 6-valcovými motormi Cummins o výkone 115–170 hp. Predchodca dnešného radu Fastrac 4000/8000.
  fastrac-4000: >-
    Stredne výkonový rad vysokorýchlostných traktorov Fastrac (160–235 hp) s plne pruženým podvozkom (predné aj zadné pneumatické pruženie), 4-kolovým riadením a cestovnou rýchlosťou 60 km/h. Symetrická konštrukcia s kabínou uprostred ponúka rozloženie hmotnosti 50/50, dvojité brzdy a flatbed za kabínou pre nesené náradie. Unikát na trhu — jediný traktor použiteľný aj na cestnú prepravu rýchlosťou osobného automobilu.
  fastrac-8000: >-
    Vlajkový rad Fastrac s výkonmi 290–348 hp a rekordnou cestovnou rýchlosťou 70 km/h — najrýchlejší sériový traktor na svete. Prevodovka CVT, plné pruženie a nosnosť 18 t pre nesené náradie robia z modelu 8000 ideálny stroj pre kontraktorov, kombináciu poľných prác a transport silážnej hmoty na veľké vzdialenosti. Limitovaná edícia Iconic oslavuje históriu Fastracu.
