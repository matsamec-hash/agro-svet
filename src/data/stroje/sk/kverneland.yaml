# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nórsko"
description: >-
  Nórsky výrobca poľnohospodárskej techniky založený roku 1879 v Kvernelande (Jæren), od roku 2012 súčasť japonskej skupiny Kubota Corporation. Tradične označovaný ako „king of plows" — klasické pluhy 150 / 2300 / ED / EG, semi-mounted PB100 / 6300 a ich radlice z patentovanej Kverneland ocele sú globálnym etalonom orby. Doplnkovo diskové podmietače Qualidisc Pro/Farmer, radlicové Enduro / CTC / Turbo, rotačné brány NG-S/H, valce Actiroll a precízne sejačky Optima (presné), e-drill / u-drill / Accord (pneumatické) a TS-Evo (mechanické). Pre hnojenie rozmetadlá Exacta CL / TL / HL s exkluzívnou technológiou GEOSPREAD pre section control až 1 m úsek po úseku. Ochrana rastlín: nesené iXter B/A, ťahané iXtrack T3/T4/T6 a samohybné iXdrive 4180–5240. Kverneland Group združuje aj sesterské značky Vicon, Roc a Kubota Implements.

categories:
  zpracovani-pudy: "Spracovanie pôdy"
  seti: "Sejba a sadenie"
  hnojeni: "Hnojenie"
  ochrana-rostlin: "Ochrana rastlín"
  sklizen-picnin: "Zber krmovín"

series:
  plough-150: >-
    Kverneland 150 — klasický nesený otočný pluh pre 3–6 radlíc, vlajková rada
    pre malé a stredné hospodárstva. Verzia B (mechanické nastavenie záberu), S (Shear-bolt
    istenie proti preťaženiu) a V (Vari-Width plynulé nastavenie šírky brázdy
    30–50 cm hydraulicky z kabíny). Radlice zo špeciálnej Kverneland ocele s vysokou
    životnosťou a univerzálnou geometriou pre orbu do hĺbky 30 cm.
  plough-2300: >-
    Kverneland 2300 — nesený otočný pluh pre 5–7 radlíc určený pre stredné a väčšie
    hospodárstva s traktormi 130–280 hp. Robustný rám s automatickým odistením Auto-reset
    (verzia S) chráni radlice pri nájazde na kameň a po prekonaní prekážky sa vráti
    do pracovnej polohy bez nutnosti zastavenia. Systém Vari-Width umožňuje
    plynulú zmenu šírky brázdy 30–55 cm pre prispôsobenie rôznym pôdnym podmienkam.
  plough-ed: >-
    Kverneland ED — kompaktný nesený otočný pluh pre 3–5 radlíc, vhodný pre malé
    hospodárstva a traktory 80–150 hp. Ľahká konštrukcia s nízkou hmotnosťou a jednoduchá
    obsluha v kombinácii s radlicou Kverneland zaručujú kvalitnú orbu aj v podmienkach
    bežných pre stredoeurópske hospodárstva. K dispozícii varianty s mechanickým alebo
    hydraulickým nastavením pracovného záberu.
  plough-eg: >-
    Kverneland EG — heavy-duty nesený otočný pluh pre 5–7 radlíc určený pre veľké
    hospodárstva s traktormi 180–360 hp. Mohutný rám 200×200 mm a istenie Auto-reset
    umožňujú orbu aj v kamenitých pôdach bez prestojov. Verzia Vari-Width ponúka
    plynulú zmenu šírky brázdy z kabíny, skrutkové istenie X-Bolt pevné
    nastavenie s vyššou priepustnosťou.
  plough-pb100: >-
    Kverneland PB100 — semi-mounted (polonesený) otočný pluh pre 6–9 radlíc,
    vlajková rada pre veľké hospodárstva a kontraktory. Vlastné pojazdové koleso prenáša
    časť hmotnosti, takže traktor 200–360 hp dokáže orať naplno aj s veľkým záberom
    bez preťaženia zadnej nápravy. Istenie Auto-reset a Vari-Width pre plynulú
    zmenu šírky brázdy 30–55 cm sú štandardom. Robustný rám pre celoročné
    intenzívne nasadenie.
  plough-6300: >-
    Kverneland 6300 — heavy-duty semi-mounted otočný pluh pre 7–12 radlíc,
    vrcholná rada určená pre veľké polia a kontraktory s traktormi 280–500 hp.
    Hydraulicky riadený transportný systém, masívny hlavový kĺb a robustný rám
    umožňujú veľké pracovné zábery až 6,6 m. Hydraulické istenie Auto-reset
    a nastavenie šírky brázdy Vari-Width z kabíny zaručujú maximálnu efektivitu
    a životnosť pri intenzívnom celoročnom nasadení.
  qualidisc: >-
    Qualidisc — diskové podmietače Kverneland s X-konfiguráciou diskov pre plytké
    spracovanie strniska a zapracovanie pozberových zvyškov. Verzia Pro
    (heavy-duty s pracovnou hĺbkou 3–15 cm a záberom 3–7 m, nesené aj ťahané)
    a Farmer (ľahšia, pre stredné hospodárstva). Veľké disky s priemerom 510 mm
    a hydraulicky nastaviteľný uhol umožňujú prácu aj v zvyškoch kukuričnej slamy
    pri rýchlosti 8–15 km/h.
  enduro: >-
    Enduro — radlicový podmietač Kverneland pre stredné a hlboké spracovanie
    pôdy do 30 cm. Tri až štyri rady šípových radlíc s automatickým hydraulickým
    istením Triflex chránia pred poškodením v kamenitých pôdach. Záber 3–6 m,
    k dispozícii nesené aj ťahané verzie. Vhodné pre mulčovanú sejbu aj tradičné
    spracovanie s následnou prípravou pôdy.
  ctc: >-
    CTC (Conventional Tillage Cultivator) — heavy-duty radlicový podmietač
    Kverneland pre hlboké spracovanie až 35 cm. Štyri rady šípových radlíc
    s veľkými rozstupmi (95 cm medzi radmi) zaručujú vysokú priepustnosť
    pozberových zvyškov bez upchávania. Robustný rám s hydraulickým istením
    a veľký presvetlený priestor umožňujú kvalitné spracovanie aj v ťažkých
    ílovitých pôdach s veľkým objemom slamy.
  turbo: >-
    Turbo — radlicový plytký podmietač Kverneland pre rýchle spracovanie strniska
    do hĺbky 5–15 cm. Husté osadenie úzkych radlíc (3 rady, rozstup 27 cm)
    zaručuje 100 % priechod profilu a kvalitné podrezanie strniska aj drobných
    burín. Ideálny stroj pre plytké podmietnutie ihneď po zbere s následným
    výsevom medziplodín alebo bez prípravy sejbového lôžka.
  ng: >-
    NG — rotačné brány Kverneland pre prípravu sejbového lôžka v kombinácii
    so sejačkami. Verzia NG-S (compact, pre traktory do 180 hp, záber
    2,5–4,0 m), NG-H (heavy-duty, do 250 hp, záber 3,0–4,5 m) a NG-M
    (skladacie, záber až 6 m). Robustná prevodovka, ľahko vymeniteľné nože
    a systém Quick-Fit pre rýchle pripojenie valcového a sejacieho stroja
    v jednom prejazde.
  actiroll: >-
    Actiroll — ťahaný valec Kverneland pre rekonsolidáciu pôdy po orbe alebo
    podmietnutí. Pracovné zábery 6,3 / 8,3 / 9,9 / 12,3 m, skladacia konštrukcia
    pre transport. K dispozícii Cambridge prstencové krúžky (522 mm) alebo
    Crosskill (550 mm) pre rôzne pôdne podmienky. Centrálna hydraulická regulácia
    prítlaku z kabíny umožňuje prispôsobenie vlhkosti pôdy.
  optima: >-
    Optima — presná (precision) sejačka Kverneland pre sejbu kukurice,
    slnečnice, repy, sóje a ďalších širokoriadkových plodín. Verzia TF Profi
    (ťahaný rám pre vysokú rýchlosť), SX (e-drive elektrický pohon výsevného
    ústrojenstva), HD-II (heavy-duty pneumatický disk) a M (mechanická). Singulácia
    osiva prebieha v každej sekcii individuálne, GEOCONTROL section control
    umožňuje vypínanie sekcií na úvratiach. Pracovné zábery 3–12 m, rozstup
    riadkov 45–80 cm.
  e-drill: >-
    e-drill — kompaktná nesená pneumatická sejačka Kverneland pre malé
    a stredné hospodárstva. Elektrický pohon výsevného ústrojenstva umožňuje plynulú
    variabilnú dávku osiva (VRT) z ISOBUS terminálu bez nutnosti mechanickej
    prevodovky. Pracovný záber 3–4 m, zásobník 1100 l, k dispozícii verzia
    maxi (väčší zásobník) a compact (ľahšia konštrukcia). Ideálna pre sejbu
    do pripraveného sejbového lôžka v kombinácii s rotačnou bránou NG.
  u-drill: >-
    u-drill — univerzálna ťahaná pneumatická sejačka Kverneland pre sejbu
    do mulča aj klasicky spracovanej pôdy. Krátka konštrukcia s diskovými
    radlicami CX-II umožňuje prácu v pozberových zvyškoch bez upchávania.
    Verzia Pro (Plus s veľkým zásobníkom 4350 l a deleným fronthopperom
    pre hnojivo) a standard pre pracovné zábery 3, 4 a 6 m. Tlak na radlice
    až 200 kg pre spoľahlivé uloženie semena.
  accord: >-
    Accord — tradičná pneumatická sejacia jednotka Kverneland s integrovaným
    výsevným ústrojenstvom a radlicami CX-II. Modely DA (nesený, záber 3 m
    v kombinácii s rotačnou bránou) a MSC (Mounted Seedline Combination,
    modulárna kombinácia s bránou NG-H). Osvedčená technológia od 80. rokov
    stále používaná v Európe pre spoľahlivú sejbu obilnín a repky
    v intenzívnych systémoch.
  ts-evo: >-
    TS-Evo — mechanická sejačka Kverneland s gravitačnou dávkou osiva
    pre malé a stredné hospodárstva. Pracovné zábery 2,5 / 3,0 / 4,0 m, jednoduchá
    obsluha bez ISOBUS, robustná prevodovka Norton. Ideálna pre sejbu
    obilnín, ďatelinovín a medziplodín v podmienkach, kde nie je potrebná
    variabilná dávka. K dispozícii nesená alebo v kombinácii s bránou NG
    ako TS-Drill.
  exacta: >-
    Exacta — rozmetadlo minerálnych hnojív Kverneland s exkluzívnou technológiou
    GEOSPREAD pre presné dávkovanie po sekciách (až 1 m úsek po úseku) riadené
    cez GPS. Verzia CL (compact, 750–1900 l, záber 9–28 m), TL (medium,
    1100–2700 l, záber 12–42 m) a HL (heavy, 1500–3900 l, záber 18–54 m).
    Dvojité disky s lopatkami ProfShape zaručujú rovnomerný rozhoz
    so symetrickým vejárom aj pri hraničnom rozhoze (Border-spread). ISOBUS
    štandard, integrácia s farm management softvérom pre variabilnú aplikáciu (VRA).
  ixter: >-
    iXter — nesené postrekovače Kverneland pre malé a stredné hospodárstva.
    Verzia iXter B (compact, 1000–1800 l, záber 15–28 m) a iXter A (advanced,
    ISOBUS, BoomGuide automatické vyrovnávanie ramena, 1500 l). Hliníkové ramená
    HC s pneumatickým zavesením, iXflow-Air kontinuálna cirkulácia pre rýchle
    prepnutie medzi prípravkami bez výplachu. SectionControl pre vypínanie sekcií
    podľa GPS na úvratiach.
  ixtrack: >-
    iXtrack — ťahané postrekovače Kverneland pre stredné a veľké hospodárstva.
    Verzia T3 (compact, 2400–3400 l, záber 18–30 m), T4 (medium, 3400–4600 l,
    záber 24–36 m) a T6 (heavy, 4600–6400 l, záber 27–40 m). Hliníkové ramená
    HC s BoomGuide ProActive pre presné kopírovanie porastu, iXflow-Air
    kontinuálna cirkulácia a integrovaný ISOBUS terminál Tellus PRO.
    Hydropneumatické zavesenie nápravy a TrailControl riadenie pojazdu.
  ixdrive: >-
    iXdrive — samohybné postrekovače Kverneland s vlastným motorom a kabínou.
    Modely 4180 (4000 l, 180 hp) a 5240 (5200 l, 220 hp) s pracovnými zábermi
    24–40 m. Hydrostatický pohon všetkých štyroch kolies, svetlá výška 1,25 m a nastaviteľný
    rozchod 1,80–2,25 m umožňujú vjazd do vyšších porastov. Vzduchom
    odpružená kabína, automatické riadenie BoomGuide ProActive a cirkulácia iXflow-Air.
    Ideálne pre veľké hospodárstva a kontraktory s vysokými výkonmi aplikácie.
  5000-m: >-
    Kverneland 5000 M — zadné nesené diskové žacie stroje s pracovnými zábermi
    2,4–3,2 m (modely 5087 M / 5095 M / 53100 M). Robustná žacia lišta
    s 6–8 diskami, ProLine geometria nožov pre čistý rez a jednoduchú výmenu.
    Závesný systém QuattroLink zaručuje ideálne kopírovanie terénu aj na svahoch.
    Voliteľné kondicionéry s prstovým alebo valcovým rotorom urýchľujú
    zavädanie pokoseniny.
  51000-mt: >-
    Kverneland 51000 MT — čelne nesený diskový žací stroj pre kombináciu
    so zadnou motýlikovou žačkou 53100 MT a celkový záber až 9 m. Pull-type
    záves zaručuje ideálne kopírovanie terénu aj v zákrutách, ProtectionDrive
    chráni prevodovku pri nájazde na prekážku. Vhodný pre kontraktory
    a veľké hospodárstva s intenzívnym zberom krmovín.
