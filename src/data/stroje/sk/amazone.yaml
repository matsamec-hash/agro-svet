# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko"
description: >-
  Nemecký špecialista (sídlo Hasbergen-Gaste) na rozmetadlá minerálnych hnojív (rady ZA-V, ZA-TS, ZG-TS), postrekovače (UF, UX, samohybná Pantera), sejačky (Cataya, Centaya, Cirrus, Precea, Primera DMC) a spracovanie pôdy (diskové podmietače Catros/Catros XL, radličkové Cenius/Cenio, hlbinný Cobra, rotačné brány KE/KG/KX). Známy technológiami ArgusTwin (rozmetadlá) a SmartSprayer (postrekovače).

categories:
  hnojeni: "Hnojenie"
  ochrana-rostlin: "Ochrana rastlín"
  seti: "Sejba a sadenie"
  zpracovani-pudy: "Spracovanie pôdy"

series:
  za-v: >-
    ZA-V — nesené diskové rozmetadlo minerálnych hnojív pre stredné a väčšie farmy.
    Pracovný záber 10–36 m, objem zásobníka 1 400–4 200 l podľa nástavby. Hmotnostná
    regulácia dávky systémom AMADOS+, hraničný rozhoz BorderTS. Výhodný pomer
    cena/výkon, ideálne pre farmy 100–500 ha. Váženie a sekčný rozhoz voliteľne.
  za-ts: >-
    ZA-TS — vlajková loď nesených rozmetadiel pre precíznu aplikáciu. Pracovný
    záber až 54 m, objem 1 400–4 200 l. Systém ArgusTwin nepretržite kontroluje uhol
    dopadu hnojiva štyrmi radarmi a koriguje polohu lopatiek pre homogénny rozhoz.
    AutoTS umožňuje automatický hraničný a úvraťový rozhoz bez výmeny lopatiek.
    Vhodné pre variabilnú aplikáciu podľa GPS máp.
  za-m: >-
    ZA-M — vstupný rad nesených rozmetadiel s pracovným záberom 10–36 m a objemom
    1 000–3 000 l. Jednoduchá konštrukcia s mechanickým alebo hydraulickým ovládaním
    klapiek. Vhodné pre menšie farmy a komunálne nasadenie (hnojenie parkov, soľ
    v zime). Cenovo najdostupnejší model v portfóliu.
  zg-ts: >-
    ZG-TS — ťahané veľkoplošné rozmetadlo pre najnáročnejšiu prevádzku. Objem
    5 500–10 500 l, pracovný záber až 54 m s ArgusTwin a AutoTS. Hydraulický
    podvozok s odpružením, sekčný rozhoz pre variabilnú aplikáciu podľa GPS.
    Určené pre farmy nad 500 ha a hnojivárske servisy. Možnosť ISOBUS Section
    Control v kombinácii s navigáciou traktora.
  pantera: >-
    Pantera — samohybný postrekovač s nádržou 4 500 l a pracovným záberom 24–40 m.
    Verzia H s hydropneumatickým podvozkom 1,25 m, W s vyššou svetlou výškou pre
    aplikáciu do vzrastlých kultúr (kukurica, slnečnica). Motor Deutz 6-valec
    o výkone 218 hp (4503) alebo 250 hp (4504). Hydrostatický pohon všetkých kolies,
    GPS navigácia a sekčné vypínanie AmaSwitch v cene. Voliteľne AmaSelect na
    prepínanie trysiek za jazdy.
  ux: >-
    UX — ťahaný postrekovač pre stredné a veľké farmy. Objem nádrže 4 200–11 200 l,
    pracovný záber 21–42 m. Verzia Super s aktívnym riadením nápravy, ContourControl
    pre automatické kopírovanie terénu rampou. SmartCenter ovládacie centrum
    s indukčným plnením. Vhodné pre intenzívne obilninárstvo a olejniny.
  uf: >-
    UF — nesený postrekovač s objemom nádrže 1 002–2 002 l a záberom 12–30 m.
    Kompaktné rozmery pre malé až stredné farmy alebo ako doplnok k samohybnému
    stroju. Ovládacie centrum DC alebo TC, kompatibilné s AmaSelect a AmaSwitch.
    Voliteľne predná nádrž FT 1502 na zvýšenie kapacity až na 3 500 l bez straty
    manévrovateľnosti.
  cataya: >-
    Cataya — nesená mechanická sejačka pre kombináciu s rotačnou bránou KE alebo
    kompaktomatom KG. Pracovný záber 3,0–4,0 m, dávkovacie ústrojenstvo s elektrickým
    pohonom (eDrive) pre variabilnú dávku podľa mapy. Pätky WS (kotúčové) alebo
    RoTeC pre zárezové sejanie v rôznych podmienkach. Verzia Special pre klasické
    nasadenie, Super s preddávkovacím systémom a vyšším komfortom.
  centaya: >-
    Centaya — nesená pneumatická sejačka so záberom 3,0–4,0 m pre kombináciu
    s rotačnou bránou KE/KG alebo s kompaktomatom KX. Centrálne dávkovanie
    s distribučnou hlavou, pätky TwinTeC s tlakom až 70 kg na pätku pre spoľahlivé
    uloženie do tvrdej pôdy. Verzia Super s preddávkovaním pre plynulé dotáčanie
    úvratí, ISOBUS štandard. Centaya 6000-2 Super (variant 2C) je ťahaná
    dvojradová verzia pre veľké farmy so záberom 6 m.
  cirrus: >-
    Cirrus — ťahaná univerzálna sejacia kombinácia pre mulčované aj konvenčné sejanie.
    Záber 3–9 m, kotúčové pätky TwinTeC so zníženou ťažnou silou a tlakom až
    50 kg/pätku. Verzia 02 (jednoduchá), 2C (dva zásobníky pre osivo + hnojivo
    pre aplikáciu hnojiva pod pätu) a 2CC (kombinácia plus mikrogranulát).
    Aktuálna generácia 9004-2C a 6004-2C nahradila staršie modely 9003-2.
    ISOBUS, sekčné vypínanie, GPS pre variabilnú dávku.
  precea: >-
    Precea — presná sejačka novej generácie pre kukuricu, slnečnicu, repu
    a ďalšie širokoriadkové plodiny. Záber 3–6 m, dávkovacie ústrojenstvo
    s vákuovou turbínou pracujúcou až do 15 km/h. Verzia 3000-A (nesená), 4500-2
    a 6000-2 (ťahané dvojradové), 6000-2CC (s mikrogranulátem) a TCC (s veľkokapacitným
    zásobníkom na hnojivo). FertiSpot pre bodovú aplikáciu hnojiva pod pätu.
    Nahrádza staré rady ED a EDX.
  primera-dmc: >-
    Primera DMC — ťahaná sejačka špecialista na priame sejanie (no-till)
    do mulča aj strniska. Záber 6–9 m, radličkové pätky s tlakom až 130 kg
    pre prienik do tvrdej suchej pôdy. Veľkokapacitný zásobník 4 200–5 000 l,
    ISOBUS štandard. Vyhľadávaný model v aridných oblastiach (juh ČR, Maďarsko)
    a na farmiach s konzervačnou agrotechnikou.
  catros: >-
    Catros — kompaktný diskový podmietač pre plytké spracovanie strniska do
    hĺbky 5–12 cm. Záber 3–12 m, kotúče 510 mm v X-usporiadaní s vlastným
    zavesením každého kotúča. Bezúdržbové ložisko, valce voliteľné (klietkový, zubový,
    gumový, dvojitý). Verzia 2TX (ťahaná dvojosá) a 2TS (ťahaná pre veľké zábery
    s podvozkom). Vhodné pre slamu, repku a medziplodiny.
  catros-xl: >-
    Catros XL — verzia s väčšími kotúčmi 610 mm pre hlbšie spracovanie až 15 cm
    a lepší prienik do tvrdej pôdy. Záber 3–9 m, vyšší tlak na kotúč pre rezanie
    objemných pozberových zvyškov (kukurica, slnečnica). Odporúčané pre
    prvý podmietok po zbere alebo zelené hnojenie s objemnou hmotou.
  cenius: >-
    Cenius — radličkový podmietač/kyprič pre stredné hĺbky 5–30 cm. Záber
    3–8 m, trojbodový rám s rozstupmi 28,5 cm. Voliteľne bezpečnostné zaistenie
    C-Mix Shear (strižná skrutka) alebo Cenius Super (vinutá pružina pre kamenisté
    podmienky). Univerzálny stroj pre podmietok, predsejbovú prípravu aj hlbšie
    kyprenie. Verzia 2TX dvojosá ťahaná pre zábery 4 m a viac.
  cenio: >-
    Cenio — kompaktný nesený radličkový podmietač predstavený v roku 2022 ako vstupný
    model pod Cenius. Záber 3–4 m, štvorriadový rám s radličkami pre plytký podmietok
    5–15 cm. Verzia Special s pevnými radlicami, Super s pružinovým zaistením
    C-Mix Pro pre kamenisté pôdy. Vhodné pre malé a stredné farmy.
  ceus: >-
    Ceus — kombinovaný kyprič spájajúci dva rady kotúčov a tri rady radličiek
    pre hĺbku 10–30 cm na jeden prejazd. Záber 4–7 m, ťahaná dvojosá
    konštrukcia. Šetrí prejazdy: nahrádza samostatný podmietok a hlboké
    kyprenie. Vhodné ako alternatíva k pluhu pri bezorbových systémoch.
  cobra: >-
    Cobra — hlbinný kyprič na narušenie utuženeného podorničia do hĺbky 40 cm.
    Pracovný záber 3 m, sedem úzkych radlíc s nízkym ťažným odporom. Šetrí
    štruktúru povrchu — narušuje hlbokú vrstvu, ale nemieša horizonty.
    Odporúčané pre dlhodobo bezorbové pôdy alebo po zbere cukrovej repy.
  kg: >-
    KG — výkonná rotačná brána pre výkonné traktory 130–360 hp. Záber 3,0–6,0 m,
    šesťhranná prevodovka, rotory s rýchloupínacími hrotmi QuickChange. Verzia
    2 (KG 4001-2, KG 6001-2) sú skladacie pre veľké zábery. Ideálny partner
    pre Centaya/Cataya pri kombinovanej sejbe.
  ke: >-
    KE — rotačná brána pre strednú výkonnostnú triedu (do 200 hp). Záber 3,0–4,0 m,
    klasické riešenie pre kombináciu so sejačkou Cataya alebo Centaya. Verzia
    Special so šúpatkovou prevodovkou, Super s plávajúcim zavesením a integrovaným
    valcom. Označenie 190 znamená prevodovku pre 190 hp.
  kx: >-
    KX — rotačná brána pre strednú triedu, kompaktnejšia verzia ako KG. Pracovný
    záber 3,0 m, príkon traktora do 190 hp. Ľahšia konštrukcia, vhodné pre
    farmy s traktormi 100–180 hp ako kombinácia so sejačkou.
