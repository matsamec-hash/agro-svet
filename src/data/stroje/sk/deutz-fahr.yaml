# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Nemecko / Taliansko"
description: >-
  Nemecká značka s dlhou tradíciou od roku 1864 (Deutz), fúzia s Fahr 1969. Súčasť SDF Group (Same Deutz-Fahr) s talianskou zložkou. Traktory vyrábané v Lauingene (Nemecko) a Treviglio (Taliansko). Výrazné zelené sfarbenie. Silná pozícia v rade 5G a 6G v ČR, vlajkový je 9 Series.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"

series:
  06-series: >-
    Ikonická rada zelených traktorov Deutz z konca 60. a 70. rokov — najvýznamnejší komerčný úspech značky s viac ako 600 000 vyrobenými kusmi celosvetovo. Celá rada využívala vzduchom chladené dieselové motory Deutz F3L / F4L / F6L / F8L / F10L (513 a 413), čo robilo traktory nezávislými od chladiacej kvapaliny — výhoda v oblastiach s extrémnou klímou. V ČSSR a krajinách RVHP boli hojne dovážané ako prémiová alternatíva k Zetorom, obľúbené pre jednoduchú údržbu a spoľahlivosť. Modely D 4006, D 4506, D 5206, D 6206, D 6806, D 7206, D 7506, D 8006, D 9006, D 10006 a vlajkový D 13006 pokrývali výkon od 40 do 160 hp.
  dx: >-
    Historická klasika Deutz-Fahr so vzduchom chladenými motormi Deutz F3L / F4L / F6L 912 a 913. Ikonická rada rozdelená do tried DX 3 (kompaktný 3-valec), DX 4 (4-valec), DX 6 (6-valec) a vlajkových DX 7/8. V roku 1983 modernizácia s vyšším výkonom.
  agrostar: >-
    Predchodca rady Agrotron. Modernizovaný nástupca rady DX so vzduchom chladenými motormi Deutz. Reprezentatívna „hviezda" 90. rokov s charakteristickým dizajnom a otvorenou kabínou StarCab.
  agroxtra: >-
    Prechodná rada medzi AgroStar a Agrotron. Motor Deutz 6-valec vzduchom chladený (BF6L).
  agrotron-legacy: >-
    Ikonická generácia Agrotron — Tractor of the Year 1996. **MK1** (1995–1997) mala revolučnú presklenú kabínu a motor Deutz s problematickou prevodovkou ZF Eccom. **MK2** (1997–2000) odstránila problémy so spoľahlivosťou. **MK3** (2000–2003) priniesla modely 80–230 a v roku **2001 prvý Agrotron TTV** s CVT (plynulá variátorová).
  agroplus: >-
    Kompaktné úžitkové traktory založené na technike SAME. Prvá generácia 60/70/80 so vzduchom chladenými motormi Deutz (1996–2004), druhá generácia 75/85/95/100 s vodou chladenými turbomotormi. Agroplus 100 bol prvý 6-valec v kompaktnej triede. Varianty S (špeciálne úzke) pre vinohradníctvo a ovocinárstvo, F Keyline pre úzke práce.
  agrofarm: >-
    Vstupná úžitková rada pre menšie hospodárstva. Prvá generácia 85/95/100 a 410/420/430 (2008–2013) s motormi Deutz Tier 3, pokročilejší variant TTV s CVT prevodovkou. Od roku 2018 G-series (85/100/115) s modernými motormi SDF a emisiami Stage V.
  agrotron-m: >-
    Prémiová stredne veľká rada. M410/M420 sú 4-valcové, M600–M650 sú 6-valcové s motormi Deutz TCD 2012 / TCD 2013 a vstrekovaním DCR (Deutz Common Rail). Dostupné aj vo variante Profiline.
  agrotron-k: >-
    Nástupca najmenších Agrotron MK3. 4-valcové traktory s elektronicky riadenými vodou chladenými motormi Deutz. Verzia Profiline s automatickým powershiftom, load-sensing hydraulikou a automatizáciou headland management.
  5g: >-
    Úžitková rada pre malé a stredné hospodárstva. Motor Deutz TCD 3.6 / 4.1 L 4-valec, prevodovka Powershift 60/60 (5 stupňov x 4 skupiny x 3 reverzor).
  6g: >-
    Univerzálna stredná rada. Motor Deutz TCD 4.1 L / 6.1 L, prevodovka Powershift 6x6 alebo RCShift 50/50 s reverzáciou, voliteľná CVT (variant TTV).
  7: >-
    Prémiová row-crop rada. Motor Deutz TCD 6.1 L, prevodovka Powershift alebo CVT (TTV). Dizajn Giugiaro (taliansky).
  8: >-
    Nová generácia po dlhej absencii v tejto triede. Motor Deutz TCD 9.0 L, prevodovka TTV CVT. Nová kabína MaxiView.
  9: >-
    Vlajková row-crop rada. Motor Deutz TCD 7.8 L, prevodovka CVT (TTV). Dizajn Giugiaro. Kabína MaxiVision 4 s panoramatickou presklenou strechou.
  9-warrior: >-
    Špeciálna edícia Warrior vlajkovej rady 9. LED osvetľovací paket 4. generácie, pohodlné sedadlo Evolution Active, automatická klimatizácia, podložka DEUTZ-FAHR v čiernej farbe. Dostupné aj v klasickej zelenej farbe.
  6c: >-
    Kompaktná 4-valcová rada 6 Series s motormi Stage V a kabínou TopVision. Tri varianty prevodovky: Powershift 3-stupňový, RVshift full-powershift 20F/16R alebo CVT TTV. Load-sensing hydraulika 120 l/min, nosnosť zadného zdvíhača 7 000 kg.
  5d: >-
    Vstupná rada s motorom FARMotion 35 (3-valec) v súlade s emisiami Stage V. Elektronický common-rail 2 000 bar, recirkulácia spalín, intercooler a DOC. Dve mechanické 5-rýchlostné prevodovky (15+15 alebo 30+15), max. 40 km/h pri 1 870 ot/min.
  m-series-old: >-
    Staršia generácia klasických konvenčných kombajnov pred modernizáciou na Topliner. Vzduchom chladené diesely Deutz F5L / F6L 912 a 913. Modely M1080, M2385, M2480, M2580, M2680, M2685, M2780 a M34 / M36 pre veľké hospodárstva.
  starliner: >-
    Stredné konvenčné kombajny Starliner. Klasické 5-klávesové slamové drviče s priamym remeňovým pohonom. Paralelná generácia k Topliner pre nižšiu výkonovú triedu.
  htc-old: >-
    Veľké konvenčné kombajny so systémom APS (Advanced Propulsion System) — dvojitý urýchľovací bubon a dlhé vytriasadlá. Spomedzi modelov 5690 HTS a 6090 HTS bol najvýkonnejší 7545 RTS s rotačnou separáciou.
  topliner: >-
    Legendárne konvenčné kombajny. V 90. rokoch dominantné na stredoeurópskom trhu.
  c-series-old: >-
    Stredné a veľké konvenčné kombajny. Motor MTU/Deutz, rotačný separátor.
  c-series-new: >-
    Nová generácia kombajnov. Motor Deutz TCD 6.1 L a 12.0 L, hybridný systém pri vlajkovom C9000 (APS + rotor).
