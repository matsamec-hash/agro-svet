# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Belgicko"
description: >-
  Belgický špecialista na cisterny na kejdu a poľnohospodárske návesy. Cisterny Modulo 2, Quadra, Komfort 2, Volumetra, X-Trem, Cargo a EuroLiner, návesy Trans-CAP, Trans-KTP, Trans-SPACE, Trans-EX a Drakkar, aplikátory Pendislide, Pendiwing, Solodisc a Multitwist a rozmetadlá statkových hnojív Tornado3, Ferti-CAP a Siroko.

categories:
  doprava: "Doprava"
  hnojeni: "Hnojenie"

series:
  drakkar: >-
    Drakkar je veľkoobjemový náves s posuvným dnom na siláž, senáž, obilie a štiepku. Robustné šasi s tandemovou alebo tridem nápravou zvládne až 38 m³ objemu a 30 t úžitkovej hmotnosti. Hydraulicky poháňaný reťazový dopravník umožňuje rýchle a šetrné vyprázdnenie bez zdvíhania korby, čo je ideálne pre nízke haly a bioplynové stanice. Pneumaticky tlmené nápravy a hydraulické riadenie zabezpečujú stabilitu aj pri vysokých rýchlostiach.
  trans-cap: >-
    Trans-CAP je trojstranný sklápací náves strednej triedy na univerzálne farmárske použitie. Hydraulicky ovládané sklápanie do troch strán umožňuje pohodlné vykladanie na úzkych priestranstvách. Korba je vyrobená z vysokopevnostnej ocele HARDOX a prispôsobená na prepravu obilia, repy, zemiakov aj organických hnojív. Pneumaticky brzdené nápravy a komerčné pneumatiky zaručujú bezpečnú prepravu po ceste.
  trans-ktp: >-
    Trans-KTP je heavy-duty zadný sklápač určený na najťažšie prepravné úlohy v poľnohospodárstve aj stavebníctve. Robustná monocoque korba zo 6 mm plechu HARDOX odolá kameňom, štrku aj zmrznutej hline. Tridem náprava so samoriadiacou poslednou nápravou znižuje opotrebenie pneumatík a zvyšuje obratnosť. Hydraulické zadné čelo s automatickým otváraním urýchľuje vykladanie.
  trans-space: >-
    Trans-SPACE je veľkoobjemový náves s posuvnou čelnou stenou na maximálne využitie nákladového priestoru. Konštrukcia s rovnou podlahou a hladkými hliníkovými bočnicami minimalizuje zvyšky nákladu a uľahčuje čistenie. Hydraulicky poháňaná čelná stena postupne vytláča náklad von, čo je šetrné k materiálu aj k samotnému stroju. Ideálny na siláž, senáž, zemiaky alebo cukrovú repu.
  trans-ex: >-
    Trans-EX je ekonomický sklápací náves vstupnej triedy pre malé a stredné farmy. Jednonápravová alebo tandemová varianta je optimalizovaná na nízke obstarávacie náklady pri zachovaní kvality Joskin. Hydraulické sklápanie dozadu alebo do troch strán pokryje bežné prepravné úlohy. Boky korby sú ľahko demontovateľné na prestavbu na valníkový náves.
  euroliner: >-
    EuroLiner je diaľkový náves s posuvným dnom určený na cestnú prepravu siláže a štiepky medzi farmami a bioplynovými stanicami. Aerodynamická hliníková nadstavba znižuje hmotnosť a spotrebu. Tridem náprava s air-suspension umožňuje legálnu cestnú prepravu rýchlosťou až 60 km/h. Posuvné dno s pomalým tempom vykladania šetrí podlahu aj reťaze.
  cargo: >-
    Cargo je kompaktná cisterna na kejdu pre malé a stredné farmy s objemami 2 700 až 7 100 litrov. Jednonápravová konštrukcia s nízkym ťažiskom umožňuje prácu na svažitých pozemkoch. Štandardnou výbavou je odstredivé čerpadlo Joskin a samonasávací systém na rýchle plnenie. Cisterna je kompatibilná s celým radom aplikátorov Joskin vrátane Pendislide a Solodisc.
  ferti-cap: >-
    Ferti-CAP je kompaktné rozmetadlo statkových hnojív s vertikálnymi rotormi na rovnomerné rozdeľovanie hnoja, kompostu alebo digestátu. Robustná podlaha z HARDOX 450 odolá abrazívnym materiálom. Hydraulicky regulovaná rýchlosť dopravného reťaza umožňuje presné dávkovanie v kg/ha. Pracovný záber 6–12 m je ideálny pre malé a stredné farmy.
  komfort-2: >-
    Komfort 2 je cisterna na kejdu strednej triedy s dôrazom na komfort obsluhy a jednoduchú údržbu. Centralizovaný hydraulický panel združuje všetky ovládacie prvky na jednom mieste. Pneumatické brzdy a výkyvná oj so vzduchovým odpružením tlmia nárazy pri poľnej práci. Štandardná výbava zahŕňa vákuovú pumpu Battioni alebo odstredivé čerpadlo Joskin.
  modulo-2: >-
    Modulo 2 je vlajková cisterna Joskin na kejdu s modulárnou konštrukciou, ktorá pokrýva objemy od 4 500 do 18 000 litrov. Pozinkovaná oceľová nádrž s hrúbkou 6 mm odolá korózii aj najagresívnejšej kejde po celé desaťročia. Tandemová alebo tridem náprava s pneumatickým odpružením umožňuje rýchlu cestnú prepravu. Široké portfólio aplikátorov (Pendislide, Pendiwing, Solodisc, Multitwist) z nej robí univerzálne riešenie pre každú farmu.
  pendislide: >-
    Pendislide je vlečný hadicový aplikátor kejdy na presnú aplikáciu priamo k zemi medzi rastliny. Oceľové smyky na konci každej hadice rozhrňujú porast a kladú kejdu priamo na povrch pôdy, čím minimalizujú straty amoniaku. Hydraulicky sklopné ramená zabezpečujú kompaktné prepravné rozmery. Vhodný na kukuricu, obilniny aj trvalé trávne porasty.
  pendiwing: >-
    Pendiwing je flexibilný hadicový aplikátor s teleskopicky nastaviteľnými ramenami pre úzkoriadkové aj širokoriadkové plodiny. Patentovaný systém TerraFlex automaticky kopíruje terénne nerovnosti pre rovnomernú aplikáciu. Pulzátor zaručuje konštantný prietok vo všetkých hadicách bez upchania. Ideálny na úzke lány, sady a nerovné pozemky.
  quadra: >-
    Quadra je heavy-duty štvornápravová cisterna na kejdu pre najväčšie farmy a aplikačné družstvá. Oceľová nádrž s objemom až 28 000 litrov je nesená štyrmi riadenými nápravami pre minimálne zhutnenie pôdy. Dva páry riadených náprav (predné aj zadné) umožňujú manévrovanie aj s plne naloženým strojom. Štandardne osadená turbínovým plniacim ramenom s prietokom až 12 000 l/min.
  siroko: >-
    Siroko je univerzálne rozmetadlo statkových hnojív s horizontálnymi rotormi pre pracovný záber až 18 m. Hydraulicky regulovateľná rýchlosť dopravného reťaza umožňuje presné dávkovanie od 5 do 60 t/ha. Robustná konštrukcia z HARDOX 450 zvládne hnoj, kompost, hydinový trus aj digestát. Voliteľný terminál ISOBUS umožňuje GPS section control na úsporu hnojív.
  solodisc: >-
    Solodisc je diskový aplikátor kejdy s injektážnymi kotúčmi, ktoré zapracúvajú kejdu plytko do pôdy, čím výrazne znižujú emisie amoniaku. Každý kotúč je pružinou nezávisle odpružený na kopírovanie terénu. Hydraulicky sklopné ramená umožňujú prepravnú šírku pod 3 m. Ideálny na strnisko, podmietku a aplikácie v súlade s dusíkovou smernicou EÚ.
  multitwist: >-
    Multitwist je rotačný rozdeľovač pre hadicové aplikátory kejdy zabezpečujúci rovnomerný prietok medzi všetkými hadicami. Patentovaný systém s rotujúcim nožom reže pevné častice a bráni upchaniu. Robustná liatinová konštrukcia má servisné intervaly dlhšie ako 5 000 hektárov. Kompatibilný so všetkými cisternami Joskin Modulo 2, Komfort 2 a Volumetra.
  tornado3: >-
    Tornado3 je tretia generácia vlajkového rozmetadla statkových hnojív s vertikálnymi alebo horizontálnymi rotormi podľa výberu. Maximálne úžitkové zaťaženie 24 ton a pracovný záber až 24 m robia z Tornado3 najvýkonnejší stroj vo svojej triede. Hydraulická korba s posuvným dnom je vyrobená z 8 mm plechu HARDOX. ISOBUS s automatickým GPS section control umožňuje presnú aplikáciu s premennými dávkami podľa agronomickej mapy.
  volumetra: >-
    Volumetra je veľkoobjemová cisterna na kejdu s objemami od 12 000 do 30 000 litrov určená pre veľké poľnohospodárske podniky a aplikačné družstvá. Tridem náprava s pneumatickým odpružením a všetky riadené nápravy zabezpečujú obratnosť aj s plnou nádržou. Štandardná výbava zahŕňa turbínové plniace rameno s pamäťou poslednej polohy. Pozinkovaná oceľová nádrž s hrúbkou 6 mm odolá najagresívnejšej kejde aj digestátu po celé desaťročia.
  x-trem: >-
    X-Trem je najvýkonnejšia cisterna v portfóliu Joskin pre najnáročnejšie aplikácie na veľkých farmách a v aplikačných družstvách. Extrémne objemy nad 30 000 litrov v kombinácii s heavy-duty štvornápravovým podvozkom umožňujú aplikovať 200 ha za deň. Patentovaný systém TridemAxle s nezávislým riadením všetkých troch náprav minimalizuje stopy v poli. Voliteľný GPS auto-steering a section control na plne automatickú aplikáciu.
