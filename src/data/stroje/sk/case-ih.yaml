# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "USA / UK"
description: >-
  Americká značka s koreňmi v Case Corporation (1842) a International Harvester (1902), zlúčená v roku 1985. Pod koncernom CNH Industrial. Charakteristická červená farba a vlajková rada Magnum, oceňovaná pre robustnosť a CVT prevodovky. Kombajny Axial-Flow držia prvenstvo v jednorootorovej konštrukcii od roku 1977.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"

series:
  7100-magnum: >-
    Legendárna prvá generácia Magnum — prvý traktor značky Case IH po zlúčení. Motor Case 5,9 L turbo, prevodovka Powershift 18/2.
  8900-magnum: >-
    Krátka generácia medzi 7000 a MX. Motor Case 8,3 L s vyšším výkonom.
  mx-maxxum: >-
    Pôvodná rada MX Maxxum (predchodca MXM a moderného Maxxumu). Stredný úžitkový traktor vyrábaný v Doncasteri (UK) a Racine (USA). Motor Case 4- a 6-valec, prevodovka 16/12 Synchro. Modely 80–150 hp.
  mx-magnum: >-
    Nová generácia Magnum s označením MX. Motor Case 8,3 L common-rail, prevodovka 18/4 PowerShift alebo 8/2 ClutchPak.
  cvx: >-
    Prvá rada Case IH s plynulou CVT prevodovkou — technológia prevzatá po akvizícii Steyr (1996). Vyrábaná v St. Valentinu (Rakúsko). Motor Sisu/Iveco 6-valec, prevodovka **Steyr S-Matic CVT**. Pôvodná generácia CVX 130/150/170 (1999), modernizácia CVX 1135/1145/1155/1170/1190/1195 (2003+). Predchodca Puma CVX a Maxxum CVX.
  mxm: >-
    Univerzálna rada nadväzujúca na MX Maxxum, predchodca Puma. Vyrábaná v Basildone (UK) v spolupráci s New Holland (sesterský model TM). Motor Iveco/NEF 6-valec, prevodovka Range Command 18/6 alebo Power Command 19/6. Modely 110–180 hp.
  cs-series: >-
    Úžitková trieda zo závodu **St. Valentin (Rakúsko)** — bývalá továreň Steyr. Motor **Sisu/Steyr 4-valec 4,5 L** (zdieľaný so Steyr Profi/Profi Plus), prevodovka Synchro-Shuttle 16/8. Predchodca Maxxum a Vestrum.
  cx-series: >-
    Úžitkové traktory pre malé a stredné hospodárstva. Motor Case 4-valec, hydraulika 80 l/min.
  farmall: >-
    Úžitková rada nadväzujúca na slávne meno Farmall zo 70. rokov IH. Motor FPT 3- až 4-valec, prevodovka mechanická alebo ActiveDrive. Lokálne vyrábaná v Taliansku aj Turecku.
  maxxum: >-
    Stredná rada pre zmiešané hospodárstva. Motor FPT NEF 6,7 L, prevodovka 16/16 Electro Command alebo ActiveDrive 8 (nová verzia s dvojitou spojkou), voliteľná CVT (CVXDrive).
  puma: >-
    Prémiová univerzálna rada. Motor FPT NEF 6,7 L (do Puma 220), Cursor 9 (Puma 230+), prevodovka Full Powershift 18/6 alebo CVXDrive (CVT). Kabína MultiControl armrest.
  magnum: >-
    Vlajková row-crop rada. Motor FPT Cursor 9 (8,7 L) a Cursor 13 (12,9 L), prevodovka Full Powershift 19/4 alebo CVXDrive. AFS AccuTurn, pásové varianty Rowtrac.
  optum: >-
    Medzi Magnum a Puma — kompaktný row-crop s CVT. Motor FPT Cursor 9, prevodovka CVXDrive (plynulá).
  vestrum: >-
    Kompaktná stredná rada s plynulou CVT prevodovkou (CVXDrive). Vypĺňa medzeru medzi Maxxum a Puma. Motor FPT NEF 4-valec 4,5 L Stage V, prevodovka CVXDrive S-Matic. Kabína MultiControl Armrest, terminál AFS Pro 700.
  steiger: >-
    Kĺbové 4WD traktory pre veľké hospodárstva, vyrábané vo Fargo (North Dakota, USA). Akvizícia Steiger Tractor Co. prebehla v roku **1986** (založená 1957 v Red Lake Falls, Minnesota). Súčasné varianty: **kolesový Steiger** (klasický rám) a **Quadtrac** (4 trojuholníkové gumové pásy, uvedený v roku 1996 ako STX375 Quadtrac). Motor FPT Cursor 13 (12,9 L) a Cursor 16 (16 L) v aktuálnych modeloch.
  quadtrac: >-
    Prvý kĺbový traktor na svete so 4 nezávislými gumovými pásmi (4-track). Uvedený v roku 1996 ako Steiger STX 4-Track, od roku 2006 plne pod značkou Case IH Quadtrac. Vyrábaný vo Fargo (North Dakota, USA). Špeciálne určený na veľkú orbu a kultiváciu s nízkym tlakom na pôdu (kontaktná plocha 4× väčšia ako pri kolesách). Motor FPT Cursor 13 (12,9 L) a Cursor 16 (16 L), prevodovka Full Powershift 16/2. V ČR nasadzovaný na veľkých farmách na hlboké spracovanie pôdy. Súčasné modely: Quadtrac 470, 500, 540, 580, 620 a vlajkový **Quadtrac 715** (2024) — najvýkonnejší traktor Case IH.
  axial-flow-16-21-series: >-
    Legendárna jednorotorová konštrukcia — Case IH vynašiel axiálny mlátiaci systém v roku 1977. Rady 1660, 1666, 1680, 1688, 2166, 2188, 2366, 2388 boli vo výrobe viac ako 20 rokov a dodnes sa v ČR bežne predávajú na sekundárnom trhu.
  axial-flow-80-series: >-
    Pokračovanie radu Axial-Flow. Motor Iveco/FPT 8,3 a 10,3 L, vylepšený mlátiaci systém.
  axial-flow-130-140-series: >-
    Motory FPT Tier 4, AFS Harvest Command, variabilný rotor. Séria 140 pre náročnú prevádzku.
  axial-flow-150-250-series: >-
    Najmodernejšia generácia. AFS Harvest Command Automation s AI, motory FPT Cursor 9/13 Stage V, plne automatické nastavenie mlátiaceho systému podľa plodiny. Vlajkový 9250 je najvýkonnejší kombajn Case IH.
