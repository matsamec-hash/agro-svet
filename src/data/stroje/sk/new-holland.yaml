# SK overlay (popisy/polia) na cs štruktúru. AI draft+editor, review nutný.

country: "Taliansko / USA"
description: >-
  Taliansko-americká značka pod koncernom CNH Industrial (spolu s Case IH). Traktory sa vyrábajú v Bazileji a St. Valentin, kombajny v Zedelgeme (Belgicko). Charakteristická modrá farba a série Ford-based z 90. rokov. Dnes pokrývajú rad T4 (40 k) až T9 (700+ k), kombajny CR dominujú v triede rotorových kombajnov.

categories:
  traktory: "Traktory"
  kombajny: "Kombajny"

series:
  40-series: >-
    Prvá generácia po fúzii Ford Tractors + New Holland (1991). Motor Ford/Genesis 7,5 L, pohon 4WD, mechanická prevodovka 16/9.
  60-series: >-
    Nástupca 40 Series s vylepšenou hydraulikou a prevodovkou ElectroShift. Motor Genesis s interchladičom.
  ts: >-
    Kompaktnejší úžitkový rad. Štvorvalcové verzie (TS90/100/110) mali motor 5 000 cm³, šesťvalcové (TS115) atmosférický motor 7 480 cm³ — TS115 bol veľmi obľúbený na českom trhu. Prevodovka Synchro Shuttle alebo Electro Command 16/16, dvojito redukovaná zadná náprava s planetovými prevodmi, uzávierka diferenciálu Electrolok a viaclamelové mokré brzdy.
  ts-a: >-
    Päť úplne nových modelov s kabínou Horizon (bez štvrtého stĺpika). Motor s Common Rail vstrekovaním, turbom a interchladičom, výkon 101–136 k, s funkciou Power Management až 168 k (TS135A). V roku 2006 pribudli varianty TS-A Plus a TS-A Delta. Predná náprava SuperSteer alebo odpružená Terraglide.
  tm: >-
    Väčší row-crop rad s piatimi modelmi 116–168 k (ISO). Motory Ford turbo, prevodovka Electroshift 16/16, vzduchom odpružené sedadlo, hydraulika Bosch EHR, odpružená predná náprava Terraglide a odpruženie kabíny Comfort Ride. Voliteľná náprava SuperSteer s uhlom riadenia 65° skrátila polomer otáčania o ~3 m. Modely TM175 a TM190 DT (2002–2007) mali prevodovku Powershift 18/6 alebo 19/6, hydraulický generátor 120 l/min, PowerBoost +46 k a elektronicky riadené čerpadlo Bosch VP44.
  tl: >-
    Cenovo dostupný úžitkový rad. Motor 4-valec 4,5 L, prevodovka Synchro Shuttle 12/12.
  tg: >-
    Vrcholový row-crop rad vyrábaný v závode Racine (USA), nahradil dva najvýkonnejšie modely NH 70A. Šesťvalcový motor Cummins 8,3 l so štyrmi ventilmi na valec (TG255/285) pri 2 200 ot./min, prevodovka Ultra Command Powershift 18/4. Hydraulika MegaFlow s prietokom až 257 l/min — jedna z najvýkonnejších v segmente svojej doby. Predchodca radu T8.
  t4: >-
    Úžitkový rad pre menšie hospodárstva, sady a vinice. Motor Iveco F5C 3,4 L, prevodovka Dual Command / Electro Command, emisie Tier 4B / Stage V.
  t5: >-
    Univerzálny rad pre živočíšnu aj rastlinnú výrobu. Motor FPT NEF 4,5 L, prevodovka Dual/Electro Command 24/24. V roku 2024 bola uvedená tretia generácia T5 DynamicCommand s výkonom až 140 k.
  t6: >-
    Najpredávanejší rad. Motor FPT NEF 6,7 L, prevodovka Electro Command (16/16) alebo Auto Command CVT (plynulá). Metánová varianta T6 Methane Power od roku 2020 — prvý sériový traktor na biometán.
  t7: >-
    Prémiový row-crop rad nahrádzajúci TM. Predchodca T7000 PowerCommand bol uvedený v roku 2007; v roku 2009 pribudla varianta T7000 Auto Command s plynule meniteľnou prevodovkou (CVT), ktorá nadviazala na T7500 vyrábaný v rakúskom Sankt Valentinu (pôvodné označenie TVT). Vrcholová verzia mala 18-stupňovú prevodovku Power Command — za tri roky bolo vyrobených viac ako 23 000 kusov. Súčasný T7 má motor FPT NEF 6,7 L (T7.170–T7.245) alebo FPT Cursor 9 (T7.260+), prevodovku Range Command 18/6 alebo Auto Command CVT a kabínu triedy SideWinder II s joystickom.
  t8: >-
    Vlajkový row-crop rad. Predchodca T8000 (uvedený 2006) mal motor 8 268 cm³ s 24 ventilmi a vstrekovaním Common Rail; varianta T8050 dostala 9-litrový motor 325 k a 19-stupňovú prevodovku umožňujúcu 40 km/h pri nižších otáčkach. Súčasný T8 má motor FPT Cursor 9 8,7 L, prevodovku Ultra Command 18/4 alebo Auto Command CVT, monitor IntelliView, IntelliSense a pásové verzie T8 SmartTrax.
  t9: >-
    Kĺbové 4WD traktory pre veľké hospodárstva a americký trh. Motor FPT Cursor 13 (12,9 L) alebo Cursor 16 (16 L), prevodovka 16/4 PowerShift. Pásové varianty SmartTrax.
  tx: >-
    Konvenčné kombajny so slamníkmi. Motor NH/FPT 6-valec 7,5 L, 5 slamníkov, rotačný doseparátor.
  cx: >-
    Konvenčný vlajkový rad (bubon + 5 slamníkov). V Zedelgeme od roku 2002, viackrát modernizovaný. CX7 / CX8 / CX8.91 — najväčšie v kategórii konvenčných kombajnov.
  cr: >-
    Dvojrotorový vlajkový rad. Revolučná konštrukcia Twin Rotor — dva pozdĺžne rotory s variabilným vyvážením. CR11 (uvedená 2023) drží svetový rekord v dennej produktivite.

models:
  new-holland-cr11: >-
    Vlajkový model CR11 nahrádza CR10.90. Motor Cursor 16 so zdvihom 16 L, optimalizácia IntelliSense AI, až 20 000 l zásobník. Drží svetový rekord v zbere kukurice.
