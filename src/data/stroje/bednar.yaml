slug: bednar
name: Bednar
country: Česko
founded: 1997
website: https://www.bednar-machinery.com/
description: >
  BEDNAR FMT je český výrobce prémiových strojů pro zpracování půdy, setí a aplikaci hnojiv,
  založený v roce 1997 v Rychnově nad Kněžnou. Firma vyrábí robustní stroje pro velké provozy
  s důrazem na pracovní záběr 3–18 m a vysokou plošnou výkonnost. Vlajkové řady tvoří hloubkové
  kypřiče TERRALAND, kompaktomaty SWIFTER, diskové podmítače ATLAS a univerzální secí stroje OMEGA.
  Bednar dodává do více než 40 zemí světa a patří mezi nejvýznamnější české značky zemědělské techniky.
categories:
  seti:
    name: Setí a sázení
    series:
      - slug: omega
        name: OMEGA
        family: omega
        subcategory: seci-stroje-pneumaticke
        description: |
          OMEGA je vlajkový univerzální pneumatický secí stroj BEDNAR pro min-till, mulch-till
          i konvenční technologie. Pracovní záběr 3–9 m, dvojkotoučové secí botky CrossBoard Heavy
          a centrální zásobník 3 000–5 000 l. Modely OO (tažený) a OF (s předradličkami) umožňují
          setí do mulče, slámy i kompaktního strniska. Stroj je oblíbený mezi velkými farmami
          v České republice i východní Evropě.
        models:
          - slug: omega-oo
            name: OMEGA OO
            url: https://www.bednar-machinery.com/en/products/omega
            pracovni_zaber_m: 6
            prikon_traktor_hp_min: 200
