      - slug: 30-series-sound-gard
        name: "30 Series Sound-Gard (1972–1977)"
        year_from: 1972
        year_to: 1977
        description: >
          Generace, která definovala pohodlí v zemědělství. V září 1972 představila John Deere
          revoluční kabinu **Sound-Gard** — první integrovanou zvukově izolovanou kabinu
          v zemědělské technice s klimatizací, topením a tlumením vibrací (max 80 dB(A)
          uvnitř). Přezdívána „Generation II". Modely 4030/4230/4430/4630 nahradily úspěšné
          řady 4020/4320/4520/4620 a stanovily nové standardy ergonomie pro celé odvětví.
