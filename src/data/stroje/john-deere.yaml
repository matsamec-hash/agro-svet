            name: "3010"
            year_from: 1960
            year_to: 1963
            power_hp: 59
            power_kw: 44
            engine: "4-válec 3.7 L"
          - slug: john-deere-4010
            name: "4010"
            year_from: 1960
            year_to: 1963
            power_hp: 84
            power_kw: 63
            engine: "6-válec 6.1 L"
          - slug: john-deere-5010
            name: "5010"
