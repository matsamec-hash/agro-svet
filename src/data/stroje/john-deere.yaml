            engine: "6-válec 8.7 L"
            description: >
              První John Deere, který oficiálně překročil 100 koní. Velký terénní traktor
              určený pro západní pláně USA.

      - slug: 20-series-1963
        name: "20 Series (1963–1972)"
        year_from: 1963
        year_to: 1972
        description: >
          Vylepšená generace 10 Series. Klíčový model 4020 (1963–1972) se stal jedním
          z nejprodávanějších traktorů v historii John Deere — vyrobeno přes 184 000 kusů.
          Disponoval volitelnou Power Shift převodovkou (8 rychlostí pod zatížením),
          šestiválcovým motorem 6,6 L a později ikonickou „hex-shaped" kabinou (1972).
          V roce 1965 zahájila továrna Mannheim (Německo) výrobu řady 20 pro evropský trh —
          první evropská produkce John Deere.
        models:
          - slug: john-deere-1020
            name: "1020"
            year_from: 1965
            year_to: 1973
            power_hp: 39
            power_kw: 29
            engine: "3-válec 2.7 L"
