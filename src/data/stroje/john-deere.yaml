slug: john-deere
name: John Deere
country: USA
founded: 1837
website: https://www.deere.com
wikipedia: https://cs.wikipedia.org/wiki/Deere_%26_Company
wikidata: https://www.wikidata.org/wiki/Q496302
description: >
  Největší výrobce zemědělské techniky na světě. Americká společnost se zelenými
  traktory a žlutou hvězdou dominuje trhu v Severní Americe, Evropě i Asii.

categories:
  traktory:
    name: Traktory

    series:
      # ========== AMERICKÉ HISTORICKÉ ŘADY (Waterloo / Dubuque) ==========
      - slug: new-generation-10-series
        name: "New Generation 10 Series (1960–1972)"
        year_from: 1960
        year_to: 1972
        description: >
          Přelomová generace, která ukončila éru dvouválcových motorů John Deere („Johnny Popper").
          Premiéra 30. srpna 1960 v Dallasu („Deere Day in Dallas") představila kompletně nové
          víceválcové vznětové motory — řadové čtyřválce a šestiválce, novou převodovku
          Synchro-Range a moderní hydrauliku. Ohromnou modernizaci provázel přesun produkce
          do Waterloo (Iowa) a Dubuque. New Generation položila základ všem následujícím řadám
          a definovala John Deere jako technologického lídra v zemědělství.
        models:
          - slug: john-deere-1010
            name: "1010"
            year_from: 1960
            year_to: 1965
            power_hp: 36
            power_kw: 27
            engine: "4-válec benzín / nafta 2.1 L"
          - slug: john-deere-2010
            name: "2010"
            year_from: 1960
            year_to: 1965
            power_hp: 47
            power_kw: 35
            engine: "4-válec 2.4 L"
