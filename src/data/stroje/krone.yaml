slug: krone
name: Krone
country: Německo
founded: 1906
website: https://landmaschinen.krone.de/
description: >
  Německý rodinný výrobce ze Spelle (Dolní Sasko) od roku 1906, světový specialista
  na sklizeň pícnin a slámy. Vlajkové produkty: žací stroje EasyCut a samojízdné BiG M,
  válcové lisy Comprima, hranolové BiG Pack (až 120×130 cm) a samojízdné řezačky BiG X
  s výkonem přes 1 100 koní. Doplňkově shrnovače Swadro, obraceče Vendro a samosběrací
  vozy ZX/RX/MX.
categories:
  zaci-stroje:
    name: Žací stroje
    series:
      - slug: easycut-f
        name: EasyCut F
        family: easycut
        subcategory: zaci-stroje
        url: https://landmaschinen.krone.de/en/products/mowers
        description: |
          EasyCut F — čelně nesené diskové žací stroje pro kombinaci s motýlkovým
          zadním strojem. Záběr 2,80–4,00 m, k dispozici verze s prstovým (CV) nebo
          válcovým (CR) kondicionérem a sběrnými pásy (Collect). Nový SafeCut INSIDE
          chrání každý disk samostatnou pojistkou proti najetí na překážku.
        models:
          - slug: easycut-f-280
            name: EasyCut F 280
