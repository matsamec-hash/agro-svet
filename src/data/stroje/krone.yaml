          BiG M — samojízdná žací jednotka 4×4 (čtyři turbinami chlazené hydromotory),
          unikátní koncept ve světě sklizně pícnin. Tři žací jednotky se záběrem 13,2 m,
          válcový nebo prstový kondicionér, výkon Mercedes-Benz 449 hp (BiG M 450)
          a 530 hp (BiG M 500). Plošná výkonnost přes 5 ha/h, ideální pro velké podniky
