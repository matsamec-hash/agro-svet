        name: Comprima
        family: comprima
        subcategory: lisy-valcove
        url: https://landmaschinen.krone.de/en/products/round-balers
        description: |
          Comprima — vlajková řada válcových lisů s patentovanou pásovou komorou
          NovoGrip (lamelové pásy s polyuretanovými segmenty), který slisuje balík
          už od 0,5 m průměru. Modely V 150/180 XC s variabilní komorou (1,25–1,80 m),
          F 125/155 XC s pevnou komorou. Verze XC mají řezací rotor 17 nožů, integrované
          balení do sítě nebo fólie a velký pickup 2,15 m.
