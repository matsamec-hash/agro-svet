            tagline: Variabilní komora 1,90 m
          - slug: varipack-190-xc
            name: VariPack 190 XC
            tagline: Variabilní 1,90 m s řezacím rotorem
      - slug: ultima
        name: Ultima
        family: ultima
        subcategory: lisy-valcove
        url: https://landmaschinen.krone.de/en/products/baler-wrapper-combinations
        description: |
          Ultima — světově unikátní non-stop lis-obalovač s předkomorou, která plynule
          přejímá pícninu během vyhazování hotového balíku — traktor nemusí zastavit.
          Modely CF 155 XC (variabilní průměr) a F 155 XC (pevná komora 1,55 m), pickup
          2,35 m, řezací rotor 26 nožů. Výkonnost o 25 % vyšší než klasický lis-obalovač,
          určen pro náročné komerční sklizně senáže.
        models:
