      - slug: varipack
        name: VariPack
        family: varipack
        subcategory: lisy-valcove
        url: https://landmaschinen.krone.de/en/products/round-balers
        description: |
          VariPack — nová generace variabilních válcových lisů (uvedeno 2020) nahrazující
          starší modely Comprima V v segmentu klasických řetězových komor. Průměr balíku
          1,00–1,65 m (V 165) nebo 1,80 m (V 190), řezací rotor XCut s až 26 noži (XC),
          maximální propustnost přes 60 t/h. Cílí na profesionální dodavatele a velké
          farmy lisující slámu i seno.
        models:
