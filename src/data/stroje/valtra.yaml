slug: valtra
name: Valtra
country: Finsko
founded: 1951
website: https://www.valtra.cz
description: >
  Finský výrobce traktorů s dlouhou tradicí (dříve Valmet). Součást koncernu AGCO od roku 2004.
  Známý robustní konstrukcí pro severské podmínky, reverzním systémem TwinTrac (kabina
  s otočným sedadlem pro práci zezadu) a personalizací — každý traktor se vyrábí na míru
  zákaznickým požadavkům. Kombajny nevyrábí.

