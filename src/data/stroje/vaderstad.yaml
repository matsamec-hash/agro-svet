slug: vaderstad
name: Väderstad
country: Švédsko
founded: 1962
website: https://www.vaderstad.com/
wikipedia: https://en.wikipedia.org/wiki/V%C3%A4derstad_Group
wikidata: https://www.wikidata.org/wiki/Q2535939
description: >
  Švédský výrobce vysokovýkonných secích strojů (Tempo, Rapid, Spirit, Inspire, Proceed) a strojů na zpracování půdy (Carrier, Cultus, TopDown, Opus, NZ Aggressive). Globální lídr precizního setí kukuřice se systémem Tempo, který drží světové rekordy v rychlosti přesného setí (až 20 km/h). Sídlo ve švédském Väderstadu, robustní konstrukce a precizní agronomické řešení jsou poznávacím znamením značky.
categories:
  seti:
    name: Setí a sázení
    series:
      - slug: inspire
        name: Inspire
        family: inspire
        subcategory: seci-stroje-pneumaticke
        description: |
          Inspire 1200S je univerzální tažený pneumatický secí stroj pro malé a střední farmy. Kombinuje předzpracování půdy (disky a packer) s přesným ukládáním osiva v jednom přejezdu. Pracovní záběr 12 m, kapacita zásobníku 6300 l a hydraulicky řízený coulter pressure umožňují flexibilní setí v různých technologiích zpracování půdy.
        models:
          - slug: inspire-1200s
            name: Inspire 1200S
            url: https://www.vaderstad.com/en/products/seed-drills/inspire/
            pracovni_zaber_m: 12
