        name: Cultus
        family: cultus
        subcategory: podmitace-radlickove
        description: |
          Cultus CS je univerzální radličkový kypřič pro střední hloubky 5-25 cm. 80 cm rozteč mezi nosníky a jištěné pružinové slupice se 600 kg uvolňovací silou zaručují průchodnost i v kamenitých půdách. 3-řadé uspořádání slupic minimalizuje ucpávání rostlinnými zbytky. Vhodný pro podmítku, hluboké kypření i přípravu seťového lůžka v jednom stroji.
