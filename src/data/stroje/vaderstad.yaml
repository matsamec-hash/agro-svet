      - slug: crosscutter-disc
        name: CrossCutter Disc
        family: crosscutter
        subcategory: podmitace-diskove
        description: |
          CrossCutter Disc je ultra-mělká diskovka pro plošné podříznutí strniště v hloubce 2-5 cm a podporu klíčení výdrolu i plevelů. Speciálně tvarované disky s konkávou 14° agresivně řežou bez zbytečného mísení vrstev půdy. Klíčový stroj pro stub management v rámci CTF a regenerativního zemědělství. Pracovní záběry 5-12 m při rychlosti až 20 km/h.
