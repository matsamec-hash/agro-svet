      # ========== TS Series (1997-2007) ==========
      - slug: ts
        name: "TS Series (1997–2004)"
        year_from: 1997
        year_to: 2004
        description: >
          Kompaktnější utility třída. Čtyřválcové verze (TS90/100/110) měly motor 5 000 cm³,
          šestiválcové (TS115) atmosférický motor 7 480 cm³ — TS115 byl velmi populární na českém
          trhu. Převodovka Synchro Shuttle nebo Electro Command 16/16, dvojitě redukovaná zadní
          náprava s planetovými převody, uzávěrka diferenciálu Electrolok a vícelamelové mokré brzdy.
