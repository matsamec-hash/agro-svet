      # ========== TG Series (heavy utility, 2003-2007) ==========
      - slug: tg
        name: "TG Series (2003–2007)"
        year_from: 2003
        year_to: 2007
        description: >
          Top row-crop řada vyráběná v závodě Racine (USA), nahradila dva nejsilnější modely
          NH 70A. Šestiválcový motor Cummins 8,3 l se čtyřmi ventily na válec (TG255/285) při
          2200 ot./min, převodovka Ultra Command Powershift 18/4. Hydraulika MegaFlow s průtokem
          až 257 l/min — jedna z nejvýkonnějších v segmentu té doby. Před příchodem T8.
