      # ========== TM Series (1997-2007) ==========
      - slug: tm
        name: "TM Series (1997–2007)"
        year_from: 1997
        year_to: 2007
        description: >
          Větší row-crop řada s pěti modely 116–168 k (ISO). Ford turbo motory, převodovka
          Electroshift 16/16, vzduchem odpružené sedadlo, Bosch EHR hydraulika, odpružená přední
          náprava Terraglide a odpružení kabiny Comfort Ride. Volitelná SuperSteer náprava
          s rejdem 65° zkrátila otáčecí poloměr o ~3 m. Modely TM175 a TM190 DT (2002–2007)
          měly převodovku Powershift 18/6 nebo 19/6, hydraulický generátor 120 l/min,
          PowerBoost +46 k a elektronicky řízené čerpadlo Bosch VP44.
