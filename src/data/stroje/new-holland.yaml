slug: new-holland
name: New Holland
country: Itálie / USA
founded: 1895
website: https://agriculture.newholland.com
wikipedia: https://en.wikipedia.org/wiki/New_Holland_Agriculture
wikidata: https://www.wikidata.org/wiki/Q1423217
description: >
  Italsko-americká značka pod koncernem CNH Industrial (s Case IH). Traktory vyráběné v Bazileji
  a St. Valentin, kombajny z Zedelgem (Belgie). Charakteristická modrá barva a série Ford-based
  z 90. let. Dnes pokrývají T4 (40 k) až T9 (700+ k), kombajny CR dominují ve třídě rotorových mlátiček.

