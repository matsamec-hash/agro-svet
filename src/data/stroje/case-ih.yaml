slug: case-ih
name: Case IH
country: USA / UK
founded: 1842
website: https://www.caseih.com
wikipedia: https://en.wikipedia.org/wiki/Case_IH
wikidata: https://www.wikidata.org/wiki/Q1046997
description: >
  Americká značka s kořeny v Case Corporation (1842) a International Harvester (1902),
  fúzovaná 1985. Pod koncernem CNH Industrial. Charakteristická červená barva a vlajková řada
  Magnum, oceňovaná pro robustnost a CVT převodovky. Kombajny Axial-Flow drží prvenství
  v jednorotorové konstrukci od roku 1977.

