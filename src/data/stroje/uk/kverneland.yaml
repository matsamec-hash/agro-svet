  seti: "Сівба та садіння"
  hnojeni: "Внесення добрив"
  ochrana-rostlin: "Захист рослин"
  sklizen-picnin: "Заготівля кормів"

series:
  plough-150: >-
    Kverneland 150 — класичний навісний оборотний плуг для 3–6 корпусів, флагманська серія
    для малих та середніх господарств. Версія B (механічне регулювання захвату), S (Shear-bolt
    захист від перевантаження) та V (Vari-Width плавне регулювання ширини скиби
    30–50 см гідравлічно з кабіни). Корпуси зі спеціальної сталі Kverneland з високою
    довговічністю та універсальною геометрією для оранки на глибину до 30 см.
  plough-2300: >-
    Kverneland 2300 — навісний оборотний плуг для 5–7 корпусів, призначений для середніх та більших
    господарств із тракторами 130–280 к.с. Міцна рама з автоматичним розчепленням Auto-reset
    (версія S) захищає корпуси при наїзді на камінь і після подолання перешкоди повертається
    у робоче положення без потреби зупинки. Система Vari-Width дозволяє
    плавно змінювати ширину скиби 30–55 см для адаптації до різних ґрунтових умов.
  plough-ed: >-
    Kverneland ED — компактний навісний оборотний плуг для 3–5 корпусів, придатний для малих
    господарств та тракторів 80–150 к.с. Легка конструкція з низькою масою та просте
    обслуговування в комбінації з корпусом Kverneland гарантують якісну оранку навіть в умовах
    типових для центральноєвропейських господарств. Доступні варіанти з механічним або
    гідравлічним регулюванням робочого захвату.
  plough-eg: >-
    Kverneland EG — heavy-duty навісний оборотний плуг для 5–7 корпусів, призначений для великих
    господарств із тракторами 180–360 к.с. Потужна рама 200×200 мм та захист Auto-reset
    дозволяють оранку навіть на кам'янистих ґрунтах без простоїв. Версія Vari-Width пропонує
    плавну зміну ширини скиби з кабіни, болтовий захист X-Bolt — жорстке
    налаштування з вищою пропускною здатністю.
  plough-pb100: >-
    Kverneland PB100 — semi-mounted (напівнавісний) оборотний плуг для 6–9 корпусів,
    флагманська серія для великих господарств та підрядників. Власне опорне колесо переносить
    частину маси, тож трактор 200–360 к.с. здатний орати на повну потужність навіть з великим захватом
    без перевантаження задньої осі. Захист Auto-reset та Vari-Width для плавної
    зміни ширини скиби 30–55 см є стандартом. Міцна рама для цілорічного
    інтенсивного застосування.
  plough-6300: >-
    Kverneland 6300 — heavy-duty semi-mounted оборотний плуг для 7–12 корпусів,
    топова серія, призначена для великих полів та підрядників із тракторами 280–500 к.с.
    Гідравлічно керована транспортна система, масивний головний шарнір та міцна рама
    дозволяють великі робочі захвати до 6,6 м. Гідравлічний захист Auto-reset
    та регулювання ширини скиби Vari-Width з кабіни гарантують максимальну ефективність
    і довговічність при інтенсивному цілорічному застосуванні.
  qualidisc: >-
    Qualidisc — дискові лущильники Kverneland з X-конфігурацією дисків для мілкого
    обробітку стерні та загортання післязбиральних решток. Версія Pro
    (heavy-duty з робочою глибиною 3–15 см та захватом 3–7 м, навісні та причіпні)
    та Farmer (легша, для середніх господарств). Великі диски діаметром 510 мм
    та гідравлічно регульований кут дозволяють працювати навіть у рештках кукурудзяної соломи
    при швидкості 8–15 км/год.
  enduro: >-
    Enduro — лаповий лущильник Kverneland для середнього та глибокого обробітку
    ґрунту до 30 см. Три-чотири ряди стрілчастих лап з автоматичним гідравлічним
    захистом Triflex захищають від пошкодження на кам'янистих ґрунтах. Захват 3–6 м,
    доступні навісні та причіпні версії. Придатний для мульчованої сівби та традиційного
    обробітку з подальшою підготовкою ґрунту.
  ctc: >-
    CTC (Conventional Tillage Cultivator) — heavy-duty лаповий лущильник
    Kverneland для глибокого обробітку до 35 см. Чотири ряди стрілчастих лап
    з великими інтервалами (95 см між рядами) гарантують високу пропускну здатність
    післязбиральних решток без забивання. Міцна рама з гідравлічним захистом
    та великий просвітлений простір дозволяють якісний обробіток навіть на важких
    глинистих ґрунтах з великим обсягом соломи.
  turbo: >-
    Turbo — лаповий мілкий лущильник Kverneland для швидкого обробітку стерні
    на глибину 5–15 см. Густе розташування вузьких лап (3 ряди, інтервал 27 см)
    гарантує 100 % прохід профілю та якісне підрізання стерні й дрібних
    бур'янів. Ідеальна машина для мілкого лущення одразу після збирання з подальшим
    висівом проміжних культур або без підготовки посівного ложа.
  ng: >-
    NG — ротаційні борони Kverneland для підготовки посівного ложа в комбінації
    із сівалками. Версія NG-S (compact, для тракторів до 180 к.с., захват
    2,5–4,0 м), NG-H (heavy-duty, до 250 к.с., захват 3,0–4,5 м) та NG-M
    (складані, захват до 6 м). Міцна коробка передач, легко змінні ножі
    та система Quick-Fit для швидкого приєднання котка та сівалки
    за один прохід.
  actiroll: >-
    Actiroll — причіпний коток Kverneland для реконсолідації ґрунту після оранки або
    лущення. Робочі захвати 6,3 / 8,3 / 9,9 / 12,3 м, складана конструкція
    для транспортування. Доступні Cambridge кільцеві кільця (522 мм) або
    Crosskill (550 мм) для різних ґрунтових умов. Центральне гідравлічне регулювання
    притиску з кабіни дозволяє адаптацію до вологості ґрунту.
  optima: >-
    Optima — точна (precision) сівалка Kverneland для сівби кукурудзи,
    соняшнику, буряку, сої та інших широкорядних культур. Версія TF Profi
    (причіпна рама для високої швидкості), SX (e-drive електричний привід висівного
    апарата), HD-II (heavy-duty пневматичний диск) та M (механічна). Одиничний відбір
    насіння відбувається в кожній секції індивідуально, GEOCONTROL section control
    дозволяє відключення секцій на розворотних смугах. Робочі захвати 3–12 м, інтервал
    рядків 45–80 см.
  e-drill: >-
    e-drill — компактна навісна пневматична сівалка Kverneland для малих
    та середніх господарств. Електричний привід висівного апарата дозволяє плавну
    змінну норму насіння (VRT) з ISOBUS-термінала без потреби механічної
    коробки передач. Робочий захват 3–4 м, бункер 1100 л, доступна версія
    maxi (більший бункер) та compact (легша конструкція). Ідеальна для сівби
    у підготовлене посівне ложе в комбінації з ротаційною бороною NG.
  u-drill: >-
    u-drill — універсальна причіпна пневматична сівалка Kverneland для сівби
    у мульчу та класично обробленого ґрунту. Коротка конструкція з дисковими
    сошниками CX-II дозволяє роботу в післязбиральних рештках без забивання.
    Версія Pro (Plus з великим бункером 4350 л та поділеним фронт-хопером
    для добрива) та standard для робочих захватів 3, 4 та 6 м. Тиск на сошники
    до 200 кг для надійного заробляння насіння.
  accord: >-
    Accord — традиційний пневматичний висівний вузол Kverneland з інтегрованим
    висівним апаратом та сошниками CX-II. Моделі DA (навісний, захват 3 м
    у комбінації з ротаційною бороною) та MSC (Mounted Seedline Combination,
    модульна комбінація з бороною NG-H). Перевірена технологія від 80-х років,
    яка досі використовується в Європі для надійної сівби зернових та ріпаку
    в інтенсивних системах.
  ts-evo: >-
    TS-Evo — механічна сівалка Kverneland з гравітаційним дозуванням насіння
    для малих та середніх господарств. Робочі захвати 2,5 / 3,0 / 4,0 м, просте
    обслуговування без ISOBUS, міцна коробка передач Norton. Ідеальна для сівби
    зернових, конюшинових та проміжних культур в умовах, де не потрібна
    змінна норма. Доступна навісна або в комбінації з бороною NG
    як TS-Drill.
  exacta: >-
    Exacta — розкидач мінеральних добрив Kverneland з ексклюзивною технологією
    GEOSPREAD для точного дозування по секціях (до 1 м ділянка за ділянкою), керованого
    через GPS. Версія CL (compact, 750–1900 л, захват 9–28 м), TL (medium,
    1100–2700 л, захват 12–42 м) та HL (heavy, 1500–3900 л, захват 18–54 м).
    Подвійні диски з лопатками ProfShape гарантують рівномірне розкидання
    із симетричним віялом навіть при граничному розкиданні (Border-spread). ISOBUS
    стандарт, інтеграція з farm management програмним забезпеченням для змінного внесення (VRA).
  ixter: >-
    iXter — навісні обприскувачі Kverneland для малих та середніх господарств.
    Версія iXter B (compact, 1000–1800 л, захват 15–28 м) та iXter A (advanced,
    ISOBUS, BoomGuide автоматичне вирівнювання штанги, 1500 л). Алюмінієві штанги
    HC з пневматичним підвішуванням, iXflow-Air безперервна циркуляція для швидкого
    перемикання між препаратами без промивання. SectionControl для відключення секцій
    за GPS на розворотних смугах.
  ixtrack: >-
    iXtrack — причіпні обприскувачі Kverneland для середніх та великих господарств.
    Версія T3 (compact, 2400–3400 л, захват 18–30 м), T4 (medium, 3400–4600 л,
    захват 24–36 м) та T6 (heavy, 4600–6400 л, захват 27–40 м). Алюмінієві штанги
    HC з BoomGuide ProActive для точного копіювання травостою, iXflow-Air
    безперервна циркуляція та інтегрований ISOBUS-термінал Tellus PRO.
    Гідропневматичне підвішування осі та TrailControl керування рухом.
  ixdrive: >-
    iXdrive — самохідні обприскувачі Kverneland з власним двигуном та кабіною.
    Моделі 4180 (4000 л, 180 к.с.) та 5240 (5200 л, 220 к.с.) з робочими захватами
    24–40 м. Гідростатичний привід усіх чотирьох коліс, дорожній просвіт 1,25 м та регульована
    колія 1,80–2,25 м дозволяють в'їзд у вищі травостої. Кабіна з
    пневматичною підвіскою, автоматичне керування BoomGuide ProActive та циркуляція iXflow-Air.
    Ідеальні для великих господарств та підрядників з високими показниками внесення.
  5000-m: >-
    Kverneland 5000 M — задні навісні дискові косарки з робочими захватами
    2,4–3,2 м (моделі 5087 M / 5095 M / 53100 M). Міцний косильний брус
    з 6–8 дисками, ProLine геометрія ножів для чистого зрізу та простої заміни.
    Підвісна система QuattroLink гарантує ідеальне копіювання рельєфу навіть на схилах.
    Опціональні кондиціонери з пальцевим або вальцевим ротором прискорюють
    в'янення скошеного.
  51000-mt: >-
    Kverneland 51000 MT — фронтально навісна дискова косарка для комбінації
    із задньою метеликовою косаркою 53100 MT та загальним захватом до 9 м. Pull-type
    підвіс гарантує ідеальне копіювання рельєфу навіть у поворотах, ProtectionDrive
    захищає коробку передач при наїзді на перешкоду. Придатна для підрядників
    та великих господарств з інтенсивною заготівлею кормів.
