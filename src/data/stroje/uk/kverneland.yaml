# UK переклад (описи/поля) на cs структуру. AI draft+редактор, review потрібен.

country: "Норвегія"
description: >-
  Норвезький виробник сільськогосподарської техніки, заснований 1879 року в Квернеланді (Єрен), з 2012 року частина японської групи Kubota Corporation. Традиційно знаний як „king of plows" — класичні плуги 150 / 2300 / ED / EG, semi-mounted PB100 / 6300 та їхні корпуси з запатентованої сталі Kverneland є світовим еталоном оранки. Додатково дискові лущильники Qualidisc Pro/Farmer, лапові Enduro / CTC / Turbo, ротаційні борони NG-S/H, котки Actiroll та точні сівалки Optima (точні), e-drill / u-drill / Accord (пневматичні) та TS-Evo (механічні). Для внесення добрив розкидачі Exacta CL / TL / HL з ексклюзивною технологією GEOSPREAD для section control до 1 м ділянка за ділянкою. Захист рослин: навісні iXter B/A, причіпні iXtrack T3/T4/T6 та самохідні iXdrive 4180–5240. Kverneland Group об'єднує також сестринські бренди Vicon, Roc та Kubota Implements.

categories:
