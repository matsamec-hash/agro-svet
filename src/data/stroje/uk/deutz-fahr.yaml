# UK overlay (описи/поля) на cs структуру. AI draft+editor, потрібен review.

country: "Німеччина / Італія"
description: >-
  Німецький бренд з довгою традицією від 1864 року (Deutz), злиття з Fahr 1969. Частина SDF Group (Same Deutz-Fahr) з італійською складовою. Трактори виробляються у Лауїнгені (Німеччина) та Тревільйо (Італія). Виразне зелене забарвлення. Сильна позиція серій 5G та 6G у ЧР, флагман — 9 Series.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"

series:
  06-series: >-
    Знакова серія зелених тракторів Deutz кінця 60-х та 70-х років — найвагоміший комерційний успіх бренду з понад 600 000 виготовлених одиниць у всьому світі. Уся серія використовувала дизельні двигуни Deutz F3L / F4L / F6L / F8L / F10L (513 та 413) з повітряним охолодженням, що робило трактори незалежними від охолоджувальної рідини — перевага в регіонах з екстремальним кліматом. У ЧССР та країнах РЕВ їх рясно імпортували як преміальну альтернативу Zetor, популярні за просте обслуговування та надійність. Моделі D 4006, D 4506, D 5206, D 6206, D 6806, D 7206, D 7506, D 8006, D 9006, D 10006 та флагманський D 13006 охоплювали потужність від 40 до 160 к.с.
  dx: >-
    Історична класика Deutz-Fahr з двигунами Deutz F3L / F4L / F6L 912 та 913 повітряного охолодження. Знакова серія, поділена на класи DX 3 (компактний 3-циліндровий), DX 4 (4-циліндровий), DX 6 (6-циліндровий) та флагманські DX 7/8. У 1983 році модернізація з вищою потужністю.
  agrostar: >-
    Попередник серії Agrotron. Модернізований наступник серії DX з двигунами Deutz повітряного охолодження. Репрезентативна «зірка» 90-х років з характерним дизайном та відкритою кабіною StarCab.
  agroxtra: >-
    Перехідна серія між AgroStar та Agrotron. Двигун Deutz 6-циліндровий повітряного охолодження (BF6L).
  agrotron-legacy: >-
    Знакове покоління Agrotron — Tractor of the Year 1996. **MK1** (1995–1997) мала революційну засклену кабіну та двигун Deutz з проблемною трансмісією ZF Eccom. **MK2** (1997–2000) усунула проблеми з надійністю. **MK3** (2000–2003) принесла моделі 80–230 та у **2001 році перший Agrotron TTV** з CVT (безступінчаста варіаторна).
  agroplus: >-
    Компактні утилітарні трактори на базі техніки SAME. Перше покоління 60/70/80 з двигунами Deutz повітряного охолодження (1996–2004), друге покоління 75/85/95/100 з турбодвигунами водяного охолодження. Agroplus 100 був першим 6-циліндровим у компактному класі. Варіанти S (спеціальні вузькі) для виноградарства та садівництва, F Keyline для вузьких робіт.
  agrofarm: >-
    Початкова утилітарна серія для менших господарств. Перше покоління 85/95/100 та 410/420/430 (2008–2013) з двигунами Deutz Tier 3, досконаліший варіант TTV з CVT-трансмісією. З 2018 року G-series (85/100/115) із сучасними двигунами SDF та емісіями Stage V.
  agrotron-m: >-
    Преміальна середньовелика серія. M410/M420 — 4-циліндрові, M600–M650 — 6-циліндрові з двигунами Deutz TCD 2012 / TCD 2013 та впорскуванням DCR (Deutz Common Rail). Доступні також у варіанті Profiline.
  agrotron-k: >-
    Наступник найменших Agrotron MK3. 4-циліндрові трактори з електронно керованими двигунами Deutz водяного охолодження. Версія Profiline з автоматичним powershift, гідравлікою load-sensing та автоматизацією headland management.
  5g: >-
    Утилітарна серія для малих та середніх господарств. Двигун Deutz TCD 3.6 / 4.1 л 4-циліндровий, трансмісія Powershift 60/60 (5 ступенів x 4 групи x 3 реверс).
  6g: >-
    Універсальна середня серія. Двигун Deutz TCD 4.1 л / 6.1 л, трансмісія Powershift 6x6 або RCShift 50/50 з реверсуванням, опціональна CVT (варіант TTV).
  7: >-
    Преміальна row-crop серія. Двигун Deutz TCD 6.1 л, трансмісія Powershift або CVT (TTV). Дизайн Giugiaro (італійський).
  8: >-
    Нове покоління після тривалої відсутності у цьому класі. Двигун Deutz TCD 9.0 л, трансмісія TTV CVT. Нова кабіна MaxiView.
  9: >-
    Флагманська row-crop серія. Двигун Deutz TCD 7.8 л, трансмісія CVT (TTV). Дизайн Giugiaro. Кабіна MaxiVision 4 з панорамним заскленим дахом.
  9-warrior: >-
    Спеціальна редакція Warrior флагманської серії 9. LED-освітлювальний пакет 4-го покоління, комфортне сидіння Evolution Active, автоматичний кондиціонер, підніжка DEUTZ-FAHR у чорному кольорі. Доступна також у класичному зеленому кольорі.
  6c: >-
    Компактна 4-циліндрова серія 6 Series з двигунами Stage V та кабіною TopVision. Три варіанти трансмісії: Powershift 3-ступеневий, RVshift full-powershift 20F/16R або CVT TTV. Гідравліка load-sensing 120 л/хв, вантажопідйомність заднього підіймача 7 000 кг.
  5d: >-
    Початкова серія з двигуном FARMotion 35 (3-циліндровий) відповідно до емісій Stage V. Електронний common-rail 2 000 бар, рециркуляція відпрацьованих газів, інтеркулер та DOC. Дві механічні 5-швидкісні трансмісії (15+15 або 30+15), макс. 40 км/год при 1 870 об/хв.
  m-series-old: >-
    Старіше покоління класичних комбайнів до модернізації на Topliner. Дизелі Deutz F5L / F6L 912 та 913 повітряного охолодження. Моделі M1080, M2385, M2480, M2580, M2680, M2685, M2780 та M34 / M36 для великих господарств.
  starliner: >-
    Середні класичні комбайни Starliner. Класичні 5-клавішні соломотряси з прямим ремінним приводом. Паралельне покоління до Topliner для нижчого класу потужності.
  htc-old: >-
    Великі класичні комбайни з системою APS (Advanced Propulsion System) — подвійний прискорювальний барабан та довгі соломотряси. Серед моделей 5690 HTS та 6090 HTS найпотужнішим був 7545 RTS з роторною сепарацією.
  topliner: >-
    Легендарні класичні комбайни. У 90-х роках домінантні на центральноєвропейському ринку.
  c-series-old: >-
    Середні та великі класичні комбайни. Двигун MTU/Deutz, роторний сепаратор.
  c-series-new: >-
    Нове покоління комбайнів. Двигун Deutz TCD 6.1 л та 12.0 л, гібридна система у флагманського C9000 (APS + ротор).
