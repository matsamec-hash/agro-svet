# UK переклад (описи/поля) на cs структуру. AI draft+редактор, review потрібен.

country: "Німеччина"
description: >-
  Німецький виробник сільськогосподарської техніки для обробітку ґрунту та сівби. Класичні навісні плуги Juwel та Diamant, лущильники Rubin, культиватор Karat, сівалки Solitair.

categories:
  hnojeni: "Внесення добрив"
  seti: "Сівба та садіння"
  zpracovani-pudy: "Обробіток ґрунту"
  ochrana-rostlin: "Обприскувачі"

series:
  polaris: >-
    Polaris — навісні розкидачі мінеральних добрив Lemken з подвійним диском для максимальної точності та ефективності внесення.
  spica: >-
    Spica — прості та практичні розкидачі мінеральних добрив Lemken для менших та середніх ферм.
  tauri: >-
    Tauri — потужні розкидачі мінеральних добрив Lemken з великим робочим захватом та високою дальністю.
  saphir: >-
    Saphir — механічні сівалки Lemken для точного заробляння насіння, придатні як для окремої сівби, так і в комбінації з ротаційними боронами.
  solitair-mr: >-
    Solitair MR — навісні стаціонарні пневматичні сівалки Lemken для малих та середніх робочих захватів у комбінації з активними знаряддями.
  solitair: >-
    Solitair — пневматичні універсальні сівалки Lemken з великими робочими захватами, придатні як для окремої сівби, так і для комбінацій з активним знаряддям.
  solitair-combinations: >-
    Solitair DT/PT — посівні комбінації Lemken, що поєднують підготовку насіннєвого ложа та сівбу в одну операцію для максимальної продуктивності.
  solitair-12-sw: >-
    Solitair 12 SW — посівний візок Lemken з великим бункером для насіння, призначений для великих ферм та підрядних послуг.
  solitair-nt: >-
    Solitair NT — пневматична сівалка Lemken для прямого посіву (no-till) у необроблений ґрунт.
  faya-mf: >-
    Faya MF — точна сівалка Lemken для сівби кукурудзи, ріпаку та інших широкорядних культур.
  juwel: >-
    Juwel — навісні оборотні плуги Lemken середнього класу із системою TurnControl Pro для ефективної роботи в різних умовах.
  diamant: >-
    Diamant — напівнавісні оборотні плуги Lemken для великих тракторів з високою робочою продуктивністю та новою системою налаштування.
  titan: >-
    Titan — напівнавісні оборотні плуги Lemken найвищого класу з високою робочою продуктивністю для найбільших тракторів.
  plough-equipment: >-
    Приладдя до плугів Lemken — колеса, система налаштування OptiQuick, дискові ножі, корпуси плуга, передплужники та обладнання для оранки onland.
  optistone: >-
    OptiStone — гідравлічний камінний запобіжник Lemken для безпроблемної оранки на кам'янистому ґрунті.
  rubin: >-
    Rubin — компактні дискові лущильники Lemken для інтенсивного мілкого обробітку ґрунту з високою робочою продуктивністю та ретельним перемішуванням рослинних решток.
  heliodor-slurrykit: >-
    Heliodor SlurryKit — комплект Lemken для заробляння рідкого гною в ґрунт дисковим лущильником за одну операцію.
  karat-koralin-kristall: >-
    Karat, Koralin та Kristall — лапові лущильники та культиватори Lemken для мілкого та середньоглибокого обробітку ґрунту з акцентом на збереження вологи.
  onyx: >-
    Onyx — глибокорозпушувач Lemken для розпушування ущільнених шарів підорного горизонту без перевертання ґрунтового профілю.
  gigant: >-
    Gigant — системний носій Lemken для гнучкого використання різних робочих модулів з високою продуктивністю та низькою витратою.
  zirkon: >-
    Zirkon — ротаційні борони Lemken для підготовки насіннєвого ложа, придатні для самостійного використання та в комбінації із сівалками Solitair та Saphir.
  system-kompaktor-korund: >-
    System-Kompaktor та Korund — пасивні компактомати Lemken для підготовки насіннєвого ложа з універсальним складом робочих елементів.
  variopack-flexpack: >-
    VarioPack та FlexPack — ущільнювачі Lemken для ущільнення зораного ґрунту за плугом за одну операцію з оранкою.
  rollers: >-
    Котки Lemken — слідові котки для надійного ущільнення ґрунту в будь-яких умовах як частина підготовки насіннєвого ложа.
  sirius: >-
    Sirius — причіпні польові обприскувачі Lemken для надійного внесення засобів захисту рослин. Модульна конструкція з об'ємом бака 2 600 – 3 800 л, штанги 15 – 30 м, гідропневматично підресорена рама для плавного ходу при високих швидкостях та точного розподілу робочої рідини.
  vega: >-
    Vega — потужний причіпний польовий обприскувач Lemken вищого класу з баком 4 600 – 6 200 л та штангами до 36 м. Керування ISOBUS, посекційне керування, автоматичне ведення рами HeightControl та точне індивідуальне керування форсунками для змінного внесення засобів захисту рослин на великих полях.
