# UK overlay (описи/поля) на cs структуру. AI draft+editor, review потрібен.

country: "Австрія"
description: >-
  Австрійський сімейний виробник із широким портфоліом машин для обробітку ґрунту (плуги Servo, Terradisc, Synkro, Lion), сівби (Aerosem, Terrasem, Vitasem) та насамперед заготівлі кормів (косарки Novacat, валкоутворювачі Top, ворушилки Hit, прес-підбирачі Impress, самозавантажувальні візки Jumbo та Faro). Штаб-квартира в Гріскірхені, виробничі заводи в Австрії, ЧР (Водняни), Німеччині та Польщі.

categories:
  seti: "Сівба та садіння"
  sklizen-picnin: "Заготівля кормів та соломи"
  zpracovani-pudy: "Обробіток ґрунту"

series:
  aerosem: >-
    AEROSEM — це пневматичні сівалки Pöttinger, призначені для застосування в комбінації з ротаційною бороною (Lion) або окремо. Вирізняються центральним розподільником, технологією IDS для вимкнення технологічних рядків та унікальною функцією PCS (Precision Combi Seeding) для сівби кукурудзи в рамках універсальної сівалки. Цільовою групою є середні та великі підприємства, яким потрібна універсальна машина як для зернових, так і для просапних культур.
  terrasem: >-
    TERRASEM — це флагманський ряд посівних комбінацій Pöttinger з інтегрованим коротким дисковим лущильником, ущільнювальними шинами та лапами DUAL DISC. Машина за один прохід виконує неглибокий обробіток, вирівнювання, ущільнення та сівбу, чим заощаджує час і витрати. Причіпні версії C та V призначені для великих підприємств та професійних агрофірм з акцентом на продуктивність та універсальність (зернові, ріпак, кукурудза із системою висіву ISOBUS).
  vitasem: >-
    VITASEM — це класичні механічні сівалки Pöttinger із зубчастим висівним апаратом та можливістю агрегатування з ротаційною бороною Lion (варіант M). Надійна технологія для малих та середніх ферм, яким потрібне просте керування, низька закупівельна ціна та універсальне застосування для зернових і дрібнонасіннєвих культур. Захвати 2,5–4 м покривають потреби переважної більшості сімейних ферм.
  eurocat: >-
    EUROCAT були барабанними косарками Pöttinger, призначеними для гірських районів та малих ферм із легкими тракторами. Барабанна конструкція протистояла камінню та нерівностям краще, ніж дискові косарки, проте мала вище споживання енергії. Ряд був поступово замінений сучасними дисковими машинами NOVACAT та NOVADISC, які пропонують меншу масу та кращу якість зрізу. Машини досі в експлуатації на тисячах гірських ферм в Австрії та Баварії.
  hit: >-
    HIT (HEUTEDDER) — це ворушилки сіна Pöttinger у широкому спектрі захватів від 4,5 м (4 ротори) до 12,7 м (12 роторів). Ключові технології включають систему DYNATECH з аеродинамічною формою роторів для дбайливого ворушіння та LIFTMATIC для плавного підіймання роторів на розворотній смузі без контакту з дерниною. Метою є максимальна якість корму з мінімальними втратами листя у конюшини та люцерни.
  impress: >-
    IMPRESS — це перше покоління рулонних прес-підбирачів Pöttinger, представлене у 2017 році, спроектоване повністю з нуля. Ключовою інновацією є технологія LIFTUP з ротором у верхньому положенні (прес відкривається догори), завдяки якій прес має найкоротший шлях матеріалу та високу пропускну здатність. Доступні варіанти F (fix-chamber 125 см), V (варіабельний 155/185 см) та комбінації з обмотувачем (FC PRO, VC PRO). Цільовою групою є вимогливі підприємства та сервіси, яким потрібна висока продуктивність та найвища щільність тюка.
  jumbo: >-
    JUMBO — це флагманський ряд самозавантажувальних візків Pöttinger з найбільшими об'ємами в портфоліо (38–50 м³ DIN). Машини призначені для великих підприємств та сервісів, яким потрібна максимальна продуктивність під час заготівлі кормів. Ключові властивості: короткий шлях культури, ріжучий апарат з 45 ножами (довжина різу 4 см), автоматичне заточування, тривісні мости з примусовим керуванням та гідравлічна підвіска. Модернізація 2022 принесла нове HMI та інтеграцію із секційним керуванням ISOBUS.
  faro: >-
    FARO — це середні самозавантажувальні візки Pöttinger, призначені для середніх підприємств, яким не потрібна місткість флагманського ряду JUMBO. Об'єм 25–35 м³ DIN, ріжучий апарат з 31 ножем, двовісні мости. Вигідніша за ціною альтернатива з нижчими вимогами до трактора (від 100 к.с.). Варіант COMBILINE дозволяє використання як самозавантажувальний, так і як транспортний візок для січки з кормозбирального комбайна.
  novacat: >-
    NOVACAT — це ключовий ряд дискових косарок Pöttinger, що охоплює весь спектр від малих навісних машин 2,6 м до косильних комбінацій 10 м з передньою та парою задніх косарок. Ключові технології: привід Y DRIVE з простором для перемішування корму, гідравлічне розвантаження (Hydraulic Compensation), кондиціонер ED (пальці) або RC (вальцьовий) та система протиколізійного захисту NONSTOP LIFT. Флагманська модель A10 пропонує варіабельний захват 9,52–10,02 м з автоматичним контролем перекриття.
  novadisc: >-
    NOVADISC — це легкі дискові косарки Pöttinger без кондиціонера, призначені для гірських районів, малих ферм та конярів, які надають перевагу пров'яленню корму у природному валку. Низька маса (250–500 кг) дозволяє застосування навіть на тракторах від 40 к.с. Захвати 2,2–3,5 м, 4–7 дисків. Доступна за ціною альтернатива NOVACAT для екстенсивного господарювання.
  top: >-
    TOP — це найширший ряд валкоутворювачів Pöttinger, що включає однороторні (3,4–4,6 м), двороторні з боковим укладанням (6,8–9,5 м), чотирироторні з центральним укладанням (8,8–12,5 м) та один центральний валкоутворювач для максимального захвату. Ключові технології: TOPTECH PLUS для коробки передач у масляній ванні, копіювальне колесо MULTITAST для дбайливого копіювання рельєфу та гідравлічне складання в транспортне положення. Широке покриття потреб від малих ферм до професійних підприємств.
  fox: >-
    FOX — це початковий ряд компактоматів Pöttinger, призначений для малих та середніх ферм із тракторами 80–130 к.с. Комбінація передніх вирівнювальних планок, двох рядів дисків та заднього вальця забезпечує підготовку посівного ложа за один прохід. Захват 3 м, навісне виконання. Привабливе за ціною рішення для ферм, яким не потрібні широкозахватні машини TERRADISC або TERRIA.
  lion: >-
    LION — це ряд міцних ротаційних борін Pöttinger для складної підготовки посівного ложа, насамперед після оранки, на важких ґрунтах та в комбінації із сівалками AEROSEM або VITASEM. Захвати 2,5–6 м, коробки передач для потужностей до 360 к.с. Версії CLASSIC, MASTER та SUPERIOR відрізняються міцністю та максимальною допустимою потужністю трактора. Ключові властивості: швидкозмінні ножі QUICKFIT, інтегровані передні вальці та сумісність із 3-точковою системою сівалок.
  servo: >-
    SERVO — це флагманський ряд оборотних плугів Pöttinger, який давно визнаний одним із найякісніших плугів на ринку. Асортимент включає навісні плуги (3–6 корпусів), напівнавісні (5–9 корпусів) та причіпні (до 14 корпусів). Ключові технології: TRACTION CONTROL для автоматичного регулювання притискання, SERVOMATIC plus для простого налаштування захвату та нахилу, гідравлічний запобіжник проти перевантаження NONSTOP та універсальні полицеві корпуси для різних типів ґрунтів. Покоління SERVO 3000/4000 (2020+) принесло 50 % приріст жорсткості рами.
  synkro: >-
    SYNKRO — це багаторядні лапові культиватори Pöttinger для неглибокого лущення та глибокого розпушування до 30 см. Доступні 2-, 3- та 4-рядні варіанти із захватами 2,5–6 м (навісні) та до 8 м (причіпні). Ключові властивості: гідравлічний запобіжник проти перевантаження NONSTOP, широкий вибір лап (вузькі/широкі/долотоподібні) та задній валець (трубчастий, пальцевий, гумовий). Універсальна машина для всього циклу обробітку ґрунту між збиранням та сівбою.
  terradisc: >-
    TERRADISC — це ряд коротких дискових лущильників Pöttinger для швидкого та якісного неглибокого обробітку стерні (5–15 см). Великі диски (510 або 580 мм) з індивідуальним кріпленням у гумових сайлентблоках забезпечують добре копіювання рельєфу навіть на кам'янистих ґрунтах. Захвати 3–6 м (навісні, складані, причіпні). Флагманська машина для середніх та великих підприємств для ліквідації стерні, загортання органічних добрив та підготовки до сівби озимих.
  terria: >-
    TERRIA — це новий ряд глибоких лапових культиваторів Pöttinger, представлений у 2020 році, призначений для глибокого обробітку ґрунту 5–35 см. Чотирирядна конструкція з великою відстанню між рядами (95 см) забезпечує відмінний прохід органічної маси та соломи. Міцна конструкція зі швидкозмінними лапами та широким спектром задніх вальців. Цільовою групою є великі підприємства та професійні аграрії, які надають перевагу безорним та мінімізаційним технологіям.
