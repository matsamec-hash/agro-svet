# UK переклад (описи/поля) на cs структуру. AI чернетка + редактор, потрібна перевірка.

country: "Японія"
description: >-
  Японський виробник з багатою традицією. Сильна позиція в сегменті компактних і середніх тракторів, історично відомий для садів, виноградників та комунальних служб. В останні роки розширюється також у клас row-crop (ряд M понад 130 коней). Комбайни під маркою Kubota є мінорними (ряд DC), переважно для японського/азійського ринку.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"

series:
  b: >-
    Компактні трактори до 30 коней для садиб, садів, комунальних служб і хобі-ферм. Двигун Kubota 3-циліндровий дизель, трансмісія HST або ступінчаста. Актуальний модельний ряд B01 (B2301, B2601) продовжує історичні B7500/B2920/B3350.
  bx: >-
    Субкомпактні трактори для садиб, комунальних служб і хобі-ферм. Двигун Kubota 3-циліндровий дизель, гідростатична трансмісія (HST).
  l: >-
    Компактний утилітарний клас 20–60 коней. Двигун Kubota 3-циліндровий, трансмісія HST або синхронізована.
  lx: >-
    Компактні утилітарні трактори 24–30 коней. Початковий клас для хобі-фермерів і комунального обслуговування — до 30 к.с. Двигун Kubota 3-циліндровий дизель, гідростатична трансмісія HST. Замінили старіші компактні моделі L у сегменті до 30 коней.
  l02: >-
    Найновіше покоління компактних тракторів ряду L, що відповідає екологічній нормі Stage V. Модернізована кабіна, підтримка ISOBUS, потужність 38–62 коней. Продається паралельно з LX (LX = простіший початковий клас, L02 = повністю оснащений преміальний компактний клас).
  sta: >-
    Малотрактори компактного класу з дизельним 3-циліндровим двигуном. Призначені для комунальних служб, садиб і менших хобі-ферм. Привід 4x4 MFWD, синхронізована трансмісія та рама ROPS.
  me: >-
    Утилітарний ряд, призначений насамперед для японського та азійського ринку з експортом також до Європи. Підходить для садів, виноградників і польових робіт. Версія Narrow DTN зі звуженою колією для спеціалізованого садівничого застосування.
  mx: >-
    Універсальний середній фермерський трактор — між рядами B/L (компактні) та M (великі). Двигун Kubota Stage V, потужність 55–63 коней. Замінює старіший утилітарний ряд M5040/M5640/M6040.
  m60-legacy: >-
    Старіший утилітарний клас 60–100 коней. Перше покоління M6040/M7040/M8540/M9540 (2007–2013) з двигуном V3300/V3800, згодом замінене сучаснішими M6060/M7060/M8560/M9960 з Common Rail та емісіями Tier IV.
  mgx: >-
    Так званий «M Grand X» — вищий утилітарний клас з 8-ступінчастою трансмісією Powershift та просторою кабіною. Двигун V3800 (100/110 HP) і V6108 (126/135 HP). Покоління, позначені MGX, MGX-II, MGX-III і MGX-IV з поступовими інноваціями (Stage IIIB → Stage V, підвіска передньої осі FSS на версії S).
  m4002: >-
    Доступний за ціною утилітарний клас. Двигун Kubota V3307 4-циліндровий 3,3 л.
  m5: >-
    Популярний утилітарний ряд 95–115 коней. Двигун Kubota V3800 4-циліндровий турбо, трансмісія Speed-Shift 36/36. Кабіна Premium.
  m6: >-
    Середній преміальний ряд. Двигун Kubota V6108 4-циліндровий 6,1 л, трансмісія Powershift 24/24, опційна CVT (ряд MGX).
  m5002: >-
    Модернізація популярного ряду M5, що відповідає екологічній нормі Stage V. Двигун Kubota V3800 4-циліндровий турбо 3,8 л, трансмісія Speed-Shift 36/36. Доступний також як M5002 Narrow для садів і виноградників.
  m6002: >-
    Наступник початкового ряду M6, представлений на виставці FIMA 2020 у Сарагосі. Двигун Kubota V6108-TIEF5 4-циліндровий 6,1 л з функцією boost, трансмісія 24/24 з електронним перемиканням трьох груп та 8 load-shift ступенями. Колісна база 2 690 мм, система Bi-speed для зменшення радіуса повороту.
  m7: >-
    Флагманський ряд row-crop — перша Kubota в категорії понад 150 к. Двигун Kubota V6108 6,1 л common-rail, трансмісія Powershift 24/24 або KVT (CVT). Виробляється у Б'єрні, Франція.
  m7002: >-
    Покоління флагманського ряду M7, що відповідає екологічній нормі Stage V. Двигун Kubota V6108 TIER V 6,1 л з оптимізованою характеристикою потужності. Нова 6-ступінчаста трансмісія Powershift 30F/15R, за потреби 54F/27R з повзучою редукцією. Наступник M7-1/M7001, змінений поколінням M7-4 (2023+).
  m8: >-
    Найбільший сільськогосподарський трактор в історії Kubota. Результат співпраці з канадською фірмою Buhler Industries (виробник Versatile), складання у Вінніпезі. Двигун Cummins B6.7 6-циліндровий Tier 4 Final без EGR (SCR + DPF), опційний Semi-Powershift 30x15 або Variable Transmission (CVT).
  mk: >-
    Вузькі варіанти для виноградників і садів. Двигун Kubota 4-циліндровий 3,8 л, ширина від 1,2 м.
  sr: >-
    Ряд компактних комбайнів переважно для японського та азійського ринку, призначений насамперед для збирання рису, пшениці та ячменю. На європейському ринку не зустрічаються, імпорт відбувається лише принагідно через японських торговців вживаними машинами.
  dc: >-
    Менші компактні комбайни переважно для азійських ринків, в ЧР мінорні. Підходять для збирання рису, пшениці, сої.
