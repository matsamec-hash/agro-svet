# UK переклад (описи/поля) на cs структуру. AI чернетка + редактор, потрібна перевірка.

country: "Німеччина"
description: >-
  Німецький сімейний виробник зі Шпелле (Нижня Саксонія) від 1906 року, світовий спеціаліст із заготівлі кормів і соломи. Флагманські продукти: косарки EasyCut і самохідні BiG M, рулонні прес-підбирачі Comprima, тюкові BiG Pack (до 120×130 см) і самохідні косарки-подрібнювачі BiG X потужністю понад 1 100 коней. Додатково валкоутворювачі Swadro, ворушилки Vendro і самозавантажувальні візки ZX/RX/MX.

categories:
  zaci-stroje: "Косарки"
  obracece: "Ворушилки"
  shrnovace: "Валкоутворювачі"
  lisy-valcove: "Рулонні прес-підбирачі"
  lisy-hranolove: "Тюкові прес-підбирачі"
  rezacky-samojizdne: "Самохідні косарки-подрібнювачі"
  samosberaci-vozy: "Самозавантажувальні візки"
  navesy-valnik: "Платформні напівпричепи"

series:
  easycut-f: >-
    EasyCut F — фронтально навісні дискові косарки для комбінації з метеликовою
    задньою машиною. Захват 2,80–4,00 м, доступні версії з пальцевим (CV) або
    вальцевим (CR) кондиціонером і збиральними транспортерами (Collect). Нова
    SafeCut INSIDE захищає кожен диск окремим запобіжником від наїзду на перешкоду.
  easycut-r: >-
    EasyCut R — задньо навісні дискові косарки з робочим захватом 2,40–3,60 м.
    DuoGrip — подвійне центральне підвішування забезпечує ідеальне копіювання рельєфу, гладка
    жниварка з великими ковзними тарілками. Версії CV (пальцевий кондиціонер) і CR
    (вальцевий кондиціонер) призначені для інтенсивного виробництва сіна та сінажу.
  easycut-b: >-
    EasyCut B — причіпні бічні та метеликові косарні комбінації для середніх і великих
    підприємств. Захват від 7,3 м (B 750) до 10,1 м (B 1000) у метеликовому розташуванні,
    моделі Collect додатково мають поперечні транспортери для формування одного великого валка.
    Гідравлічне розвантаження та централізоване налаштування тиску належать до стандартного оснащення.
  big-m: >-
    BiG M — самохідна косарна машина 4×4 (чотири охолоджувані турбінами гідромотори),
    унікальна концепція у світі заготівлі кормів. Три косарні вузли із захватом 13,2 м,
    вальцевий або пальцевий кондиціонер, потужність Mercedes-Benz 449 hp (BiG M 450)
    і 530 hp (BiG M 500). Площинна продуктивність понад 5 га/год, ідеально для великих підприємств
    і біогазових станцій.
  vendro: >-
    Vendro — покоління ворушилок з робочим захватом 4,7–13,1 м, доступні як
    навісні (Vendro 470/560/680/790), так і причіпні (Vendro 820, 1020, 1120). Ротори OptiTurn
    з асиметричними пальцями забезпечують дбайливе ворушіння з мінімумом втрат листа,
    гідравлічне складання при граничному розкиданні захищає краї поля.
  swadro-s: >-
    Swadro S — однороторні валкоутворювачі з робочим захватом 3,8–4,6 м для малих
    і середніх підприємств. Безобслуговувальна трансмісія Jet Effect, триточкова навіска
    і 3D копіювання рельєфу завдяки тандемним шасі. Легка та маневрена конструкція,
    придатна також для схилів.
  swadro-tc: >-
    Swadro TC — двороторні причіпні валкоутворювачі з бічним (TC 680/760) або
    центральним (TC 880/930/1250) валком. Трансмісія DuraMax в олійній ванні,
    плавне гідравлічне налаштування ширини валка та транспортна висота менше 4 м.
    TC 1250 досягає захвату до 12,5 м і слугує для великомісткісної заготівлі.
  swadro-ts: >-
    Swadro TS — середнього розміру однороторні валкоутворювачі з тандемною віссю
    і центральним валком. Робочий захват 6,2–7,4 м, вирівнювальний пристрій ротора
    OptiTurf забезпечує постійну висоту пальців навіть на нерівному рельєфі.
  bellima: >-
    Bellima — початковий ряд прес-підбирачів із фіксованою камерою з діаметром тюка 1,25 м,
    ланцюгова камера з 17 сталевими планками та підбирач 1,85 м. Зорієнтований на малі
    та середні ферми, де очікується проста експлуатація без електроніки та заготівля
    соломи чи сіна з менших площ.
  fortima: >-
    Fortima — рулонні прес-підбирачі середнього класу з фіксованою (F) і змінною (V) камерою.
    Ланцюгова камера з планками для твердих тюків із сіном чи соломою, ріжучий ротор
    MultiCut з 17 ножами та інтегрований скидач для легкого від'єднання тюка. Підбирач
    EasyFlow без кулачків забезпечує плавний відбір навіть у важких валках.
  comprima: >-
    Comprima — флагманський ряд рулонних прес-підбирачів із запатентованою ремінною камерою
    NovoGrip (ламелеві ремені з поліуретановими сегментами), що формує тюк
    уже від діаметра 0,5 м. Моделі V 150/180 XC зі змінною камерою (1,25–1,80 м),
    F 125/155 XC з фіксованою камерою. Версії XC мають ріжучий ротор 17 ножів, інтегроване
    обмотування сіткою або плівкою та великий підбирач 2,15 м.
  varipack: >-
    VariPack — нове покоління рулонних прес-підбирачів зі змінною камерою (представлене 2020), що замінює
    старіші моделі Comprima V у сегменті класичних ланцюгових камер. Діаметр тюка
    1,00–1,65 м (V 165) або 1,80 м (V 190), ріжучий ротор XCut з до 26 ножами (XC),
    максимальна пропускна здатність понад 60 т/год. Орієнтований на професійних підрядників і великі
    ферми, що пресують солому й сіно.
  ultima: >-
    Ultima — світовий унікальний non-stop прес-обмотувач із передкамерою, що плавно
    переймає корм під час викидання готового тюка — трактору не потрібно зупинятися.
    Моделі CF 155 XC (змінний діаметр) і F 155 XC (фіксована камера 1,55 м), підбирач
    2,35 м, ріжучий ротор 26 ножів. Продуктивність на 25 % вища, ніж у класичного прес-обмотувача,
    призначений для вимогливої комерційної заготівлі сінажу.
  big-pack: >-
    BiG Pack — флагманський ряд тюкових прес-підбирачів високого тиску Krone, доступний
    у розмірах каналу 80×70, 90×80, 90×120, 120×70, 120×90 і унікальний BiG Pack
    4×4 (120×125 см). Версія HDP (High Density Press) підвищує щільність тюка
    на 25 %, VC (VariCut) додає ріжучий ротор 26 ножів, версія XC до 51 ножа.
    MultiBale виробляє 2–9 менших тюків в одному каналі для утримання сільськогосподарських
    тварин. Професійні підрядники та великі підприємства.
  big-x: >-
    BiG X — флагманський ряд самохідних косарок-подрібнювачів Krone з двигунами MTU/Liebherr
    12,8–24,2 л і потужністю від 490 до 1 156 коней (BiG X 1180 тримає світовий рекорд).
    Ріжучий барабан MaxFlow (28/36/40 ножів, ширина 800 мм), 16 ножів VariStream з плавно
    змінюваною довжиною різання. Змінна викидна турбіна StreamControl і подрібнювач зерна OptiMaize
    для кукурудзяного силосу. Адаптери: EasyCollect (кукурудза 6–12-рядна)
    і XCollect (з дисковою косарною системою), XDisc 620 (прямий збір зернових).
  mx: >-
    MX — комбіновані збиральні/дозувальні візки об'ємом 32–40 м³ (DIN, нестиснені).
    Пресувальний ротор PowerLoad з 41 ножем для короткого різання 37 мм, гідравлічно складані
    борти GD (Grass Dosing) для легкого розвантаження. Для середніх підприємств, що поєднують
    заготівлю сінажу та роздавання корму безпосередньо в годівницю.
  rx: >-
    RX — потужні самозавантажувальні візки нового покоління (представлені 2020) об'ємом
    36–49 м³. Підбирач EasyFlow Pro 2,35 м без кулачків, ріжучий ротор PowerCut з 53
    ножами (коротке різання 37 мм). Система PowerLoad з активним подавальним ротором,
    система зважування та ISOBUS-термінал у базовому оснащенні.
  zx: >-
    ZX — флагманські двовісні самозавантажувальні візки з великою вантажопідйомністю для професійної
    заготівлі кормів і біогазових станцій. Система рухомого борта PowerOff розвантажує
    візок за 30 с, алюмінієві стінки знижують власну масу. Гідравлічно підресорений
    підбирач 2,12 м і ріжучий ротор 40 ножів для короткої подрібненої маси.
  tx: >-
    TX — сільськогосподарські напівпричепи платформного типу для перевезення зібраних кормів
    і соломи між полем і силосною траншеєю чи сінником. Гідравлічно складаний борт,
    сталева конструкція та повітряні гальма. Об'єм 46–56 м³ залежно від моделі.
