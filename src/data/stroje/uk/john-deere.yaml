# UK переклад (описи/поля) на cs структуру. AI чернетка + редактор, потрібна перевірка.

country: "США"
description: >-
  Найбільший виробник сільськогосподарської техніки у світі. Американська компанія із зеленими тракторами та жовтою зіркою домінує на ринку Північної Америки, Європи та Азії.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"
  rezacky: "Самохідні косарки-подрібнювачі"
  postrikovace: "Самохідні обприскувачі"

series:
  new-generation-10-series: >-
    Переломне покоління, що завершило еру двоциліндрових двигунів John Deere («Johnny Popper»). Прем'єра 30 серпня 1960 року в Далласі («Deere Day in Dallas») представила цілком нові багатоциліндрові дизельні двигуни — рядні чотирициліндрові й шестициліндрові, нову трансмісію Synchro-Range і сучасну гідравліку. Величезну модернізацію супроводжувало перенесення виробництва до Ватерлоо (Айова) і Дюб'юка. New Generation заклала основу всіх наступних рядів і визначила John Deere як технологічного лідера в сільському господарстві.
  20-series-1963: >-
    Покращене покоління 10 Series. Ключова модель 4020 (1963–1972) стала одним із найпродаваніших тракторів в історії John Deere — вироблено понад 184 000 одиниць. Мала опційну трансмісію Power Shift (8 швидкостей під навантаженням), шестициліндровий двигун 6,6 L і пізніше культову кабіну «hex-shaped» (1972). У 1965 році завод Мангайм (Німеччина) розпочав виробництво ряду 20 для європейського ринку — перше європейське виробництво John Deere.
  30-series-sound-gard: >-
    Покоління, що визначило комфорт у сільському господарстві. У вересні 1972 року John Deere представив революційну кабіну **Sound-Gard** — першу інтегровану звукоізольовану кабіну в сільськогосподарській техніці з кондиціонером, опаленням і гасінням вібрацій (макс. 80 дБ(A) всередині). Прозвана «Generation II». Моделі 4030/4230/4430/4630 замінили успішні ряди 4020/4320/4520/4620 і встановили нові стандарти ергономіки для всієї галузі.
  40-series-iron-horse: >-
    Модернізація кабіни Sound-Gard (Sound-Gard II). Моделі 4040/4240/4440/4640/4840 принесли економніші двигуни, покращену гідравліку та міцніші трансмісії. Культовий **4440** потужністю 130 к став найпродаванішою моделлю десятиліття — вироблено понад 95 000 одиниць. Додався найпотужніший 4840 (180 к) як флагман.
  50-series-1982: >-
    Продовження успішного покоління з акцентом на економію пального та покращену трансмісію **Quad-Range** (16 швидкостей). Двигуни з електронним регулюванням обертів, новий дисплей у кабіні та гідравліка з вищою витратою. Моделі 4050/4250/4450/4650/4850 покривали 105–193 коней.
  55-series-1988: >-
    Останнє «чисте» row-crop покоління перед поділом на ряди 7000 (row-crop) і 8000 (флагманські). Моделі 4055/4255/4455/4555/4755/4955 принесли електронно керовані гідравлічні підіймачі, покращений монітор PerformanceMonitor і сучасний вигляд кабіни. Топовий **4955** (200 к) був найпотужнішим row-crop John Deere свого часу.
  5000: >-
    Перші утилітарні трактори для європейського ринку, виготовлені в Мангаймі. Потужності 40–75 к, проста концепція, призначена для менших господарств і комунального застосування.
  5010-5020-5030: >-
    Поступово покращувані покоління утилітарних тракторів. Двигуни PowerTech, повністю синхронізована трансмісія SyncShuttle 9x3.
  5m: >-
    Сучасний утилітарний ряд з двигуном PowerTech та електронно керованою гідравлікою. Варіанти для фермерів, садівників і міських служб.
  5r: >-
    Преміальний утилітарний ряд з технологіями вищих класів — CommandArm, трансмісія IVT, повна кабінна підключеність.
  6000: >-
    Переломний ряд середніх тракторів, виготовлений у Мангаймі. Кабіна **OOS** (Open Operator Station) з панорамним оглядом, двигун PowerTech 4045 (4-циліндровий, 4,5 L) для 6100–6400 і 6076 (6-циліндровий, 7,6 L) для 6500–6900, трансмісія **PowrQuad 16/16**, опційна **Triple-Link Suspension** передньої осі.
  6010: >-
    Наступник ряду 6000, двигуни PowerTech, трансмісія PowrQuad Plus 16x16. Розширений вибір від 80 до 150 коней.
  6020: >-
    Цілком нова платформа. Кабіна ComfortGard, двигун PowerTech Plus з common-rail, опційна трансмісія AutoQuad Plus і гідравліка з виявленням навантаження (load sensing).
  6030-premium: >-
    Преміальний ряд з технологією AutoPowr (CVT), повна підвіска передньої осі TLS, кабіна Premium та інтеграція з GreenStar 2.
  6m: >-
    Універсальний ряд для змішаних господарств. Двигун PowerTech 4,5 / 6,8 L, трансмісія AutoQuad або CommandQuad, екологічна норма Stage V (2019+).
  6r: >-
    Преміальний всебічний ряд. Двигун PowerTech PSS/PVS, трансмісія AutoPowr IVT або CommandPro, повна підвіска TLS Plus, кабіна CommandView III, дисплеї Gen 4.
  6r-gen3: >-
    Третє покоління преміального ряду 6R, виготовлене в Мангаймі. Двигун PowerTech 4,5 L (4-циліндровий) і 6,8 L (6-циліндровий) Stage V зі SCR і DPF, трансмісія AutoPowr (CVT) або CommandQuad Plus, кабіна CommandView 4 з 12,8" дисплеєм G5, повна підключеність JDLink і підтримка автономних функцій AutoTrac і AutoPath. Модельне позначення 6R 110 / 120 / 130 / 140 / 150 / 165 / 185 / 195 / 215 / 230 / 250.
  7000: >-
    Перше покоління row-crop тракторів понад 150 коней, виготовлене у Ватерлоо. Основа для всіх наступних рядів 7R.
  7010: >-
    Row-crop трактори другого покоління, двигун PowerTech 6,8 L, трансмісія PowrQuad Plus або AutoQuad.
  7020: >-
    Двигун PowerTech Plus з електронним упорскуванням. Опційна трансмісія AutoPowr IVT (безступінчаста варіаторна) — перша в цьому класі у John Deere.
  7030: >-
    Екологічна норма Tier 3, двигун PowerTech Plus 6,8 L з 24-клапанною головкою. Кабіна Premium з вентиляцією, кондиціонером та електронно керованим сидінням.
  7r: >-
    Флагманський row-crop ряд середнього розміру. Двигун PowerTech PSS 6,8/9,0 L, трансмісія e23 PowerShift або AutoPowr IVT, кабіна CommandView III, AutoTrac, AutoPath.
  7r-gen3: >-
    Актуальне покоління 7R з двигуном PowerTech PSS 9,0 L (6-циліндровий, Stage V), трансмісією e23 PowerShift (23 швидкості) або AutoPowr IVT, кабіною CommandView 4 з 10" дисплеєм CommandCenter і 12,8" Gen 4 Extended. Повна підтримка AutoPath, AutoTrac SF7000 і JDLink. Модельний ряд 7R 230 до 7R 350 із кроком 60 коней.
  8000: >-
    Легендарна «велика зелена». Перший row-crop понад 200 коней із сучасною кабіною, електронно керованою гідравлікою та PowerShift 16/4.
  8010: >-
    Двигун PowerTech 8,1 L, трансмісія PowerShift 16/4, кабіна ComfortGard Plus.
  8020: >-
    Нове покоління з двигуном PowerTech Plus, опційна трансмісія IVT AutoPowr, активна підвіска передньої осі ILS.
  8030: >-
    Екологічна норма Tier 3 (PowerTech Plus 9,0 L), автоматичне керування **AutoTrac**, дисплей GreenStar 2 1800/2630, кабіна CommandView, підвіска передньої осі TLS Plus, гусенична версія 8030T (8130T/8230T/8330T/8430T/8530T).
  8r-gen1: >-
    Перше покоління 8R з опційним гусеничним шасі 8RT. Двигун PowerTech PSS 9,0 L, трансмісія e23 PowerShift або AutoPowr IVT, кабіна CommandView II/III.
  8r-gen2: >-
    Цілком нова платформа, двигун PowerTech PSS 9,0 L, трансмісія e23 / IVT / DirectDrive, кабіна CommandView 4, гусеничні версії 8RT і колісні 8R. AutoPath і автономне керування (CES 2022).
  8rx-4track: >-
    Переломний гусеничний варіант ряду 8R — перший **чотиригусеничний (four-track)** сільськогосподарський трактор у сегменті середнього розміру. Кожне колесо замінює окрема гумова гусениця, що забезпечує мінімальний тиск на ґрунт, високу тягу та комфорт, порівнянний із колісним трактором. Спільний двигун PowerTech PSS 9,0 L і кабіна CommandView 4 з рядом 8R, трансмісія e23 або IVT.
  9000: >-
    Шарнірні трактори 4WD для великих господарств. Двигун PowerTech 12,5 L і PowerShift 12/3.
  9020: >-
    Двигун PowerTech 12,5 L, опційне гусеничне шасі 9000T, Greenstar 2.
  9030: >-
    Двигун PowerTech Plus 13,5 L, AutoTrac Universal, GreenStar 3.
  9r-gen1: >-
    Перше покоління позначення 9R. Двигун Cummins QSX 15,0 L, гусеничні версії 9RT (дві гумові гусениці) і 9RX (чотири гумові гусениці).
  9r-gen2: >-
    Покоління з двигуном JD 13,6 L і 18,0 L, кабіна нового покоління, e18 PowerShift, автономне керування, гусеничні версії 9RX із п'ятьма варіантами потужності.
  9rx: >-
    Перше покоління промислово першого **шарнірного чотиригусеничного** трактора — представлене у 2015 році як окрема гусенична версія ряду 9R. Чотири незалежні гумові гусениці забезпечують плавний розподіл маси, мінімальне ущільнення ґрунту й тягу, порівнянну з найважчими колісними 9R. Двигун Cummins QSX 15,0 L, 18-ступінчастий PowerShift e18. Із 2022 року 9RX інтегрувався в новий ряд Gen2.
  cts: >-
    Гібридна технологія CTS (Cylinder Tine Separator) — поєднання конвенційного барабана й двох роторів. Наступник ряду 9000/9500/9600.
  9000-kombajn: >-
    Конвенційний барабан-соломотряс, типовий американський важкий ряд.
  wts: >-
    Європейське покоління комбайнів, конвенційна система сепарації з покращеними соломотрясами та ротаційним досепаратором.
  9000-sts: >-
    Революційна однороторна технологія STS (Single Tine Separator). Від 9660 STS до 9880i STS.
  s-series: >-
    Преміальний ряд однороторних комбайнів. Двигун JD PowerTech / Cummins 13,5 L, гідростатичний привід, ActiveYield, автоматика HarvestSmart, дисплей Gen 4.
  t-series: >-
    Європейський конвенційний комбайн із соломотрясами (Walker). Двигун JD PowerTech 6,8/9,0/13,5 L, трансмісія ProDrive, п'ятиклавішний соломотряс.
  w-series: >-
    Економічний європейський ряд з конвенційною сепарацією, 4 до 5 соломотрясами, двигун JD PowerTech 6,8 L.
  x-series: >-
    Революційна двороторна система Dual Separator. Найбільша пропускна здатність і найнижчі втрати в класі. Двигун JD PowerTech 13,6 L, AutoMaintain, HarvestVision.
  6000-rezacky: >-
    Перші сучасні самохідні косарки-подрібнювачі John Deere, виготовлені у Цвайбрюкені (Німеччина). Після придбання німецької фірми Hesston/Heesemann і ноу-хау щодо кормів. Двигуни PowerTech 8,1–12,5 L, механічний привід вальців, класичний металевий викидач.
  7000-rezacky: >-
    Модернізація з електронним керуванням жниварки, автоматичне налаштування довжини різання AutoLOC і покращена система KernelStar для подрібнення зерен кукурудзи. Двигун PowerTech Tier 3, кабіна ComfortGard.
  7050-rezacky: >-
    Покоління 7050 принесло AutoLOC II, датчик HarvestLab NIR для аналізу сухої речовини й поживних речовин у реальному часі та інтеграцію з GreenStar 2. Двигуни Tier 3, потужності 360 до 625 коней.
  8000-rezacky: >-
    Покоління 8000 принесло цілком новий прохід машини — жниварка на 25 % більша, нова система KernelStar 2 (подрібнювач зерна), HarvestLab 3000 та інтеграція з JDLink. Двигун JD PowerTech 9,0 / 13,5 / 19,0 L Tier 4.
  9000-rezacky: >-
    Флагманський ряд самохідних косарок-подрібнювачів. **9900** з двигуном 24,2 L Liebherr і потужністю понад 1 000 коней є найпотужнішою самохідною косаркою-подрібнювачем у світі. AutoLOC III, KernelStar 3, HarvestLab 3000, повністю інтегрований AutoTrac, камерні системи та JDLink Connect.
  4730-postrikovace: >-
    Перше сучасне покоління самохідних обприскувачів John Deere для європейського ринку. Виготовлені у Ватерлоо (США) та в Горсті (Нідерланди). Двигун PowerTech, чотири колеса з незалежним приводом (HydroHandle), бак 1 500–4 540 л. Моделі 4730/4830/4930 забезпечили діапазон потужності від 200 до 360 коней.
  r-series-postrikovace: >-
    Актуальне покоління самохідних обприскувачів. Моделі R4030/R4040i/R4045i та американський ряд R4044/R4060/R4150. Двигун JD PowerTech, BoomTrac Pro (автоматичне регулювання висоти штанг), індивідуальне перемикання форсунок (ExactApply, See & Spray), AutoTrac, інтеграція з Operations Center.

models:
  john-deere-5010: >-
    Перший John Deere, що офіційно перевищив 100 коней. Великий польовий трактор, призначений для західних рівнин США.
  john-deere-4020: >-
    Ікона американської сільськогосподарської механізації 60-х років. Трансмісія Power Shift з 8 швидкостями під навантаженням була революційною. Один із найцінніших колекційних тракторів John Deere.
  john-deere-4430: >-
    Бестселер ери Sound-Gard. Трансмісія Quad-Range або Power Shift, турбодвигун 125 к. Вироблено понад 95 000 одиниць.
  john-deere-4440: >-
    Найкультовіший John Deere 70-х і 80-х років. Power Shift, Sound-Gard II, турбо 7,6 L. Синонім надійності.
  john-deere-8r-410: >-
    Флагманська модель. Кабіна CommandView 4, AutoPath, гідравліка 435 л/хв, задня навіска 12 000 кг. IVT Boost до 428 к.
  john-deere-8rx-410: >-
    Флагманська чотиригусенична модель. Той самий двигун, що й 8R 410, чотири гумові гусениці для максимального зчеплення та мінімального ущільнення ґрунту.
  john-deere-fh-7950: >-
    Найпотужніша самохідна косарка-подрібнювач свого часу — понад 800 коней із двигуна 19,0 L.
  john-deere-fh-9900: >-
    Флагманська самохідна косарка-подрібнювач. Двигун V12 24,2 L Liebherr, захват до 12 рядків, пропускна здатність понад 400 т/год зеленої маси. Символ сили в європейському сільському господарстві.
  john-deere-4730: >-
    Бак 3 000 л, штанги 24/27/28 м.
  john-deere-4830: >-
    Бак 3 800 л, штанги 27/30 м.
  john-deere-4930: >-
    Бак 4 540 л, штанги 36 м.
  john-deere-4940: >-
    Tier 4 Final. Бак 4 540 л.
  john-deere-r4030: >-
    Бак 3 000 л, штанги 24–28 м.
  john-deere-r4040i: >-
    Бак 4 000 л, штанги 27–36 м, ізольована система.
  john-deere-r4045i: >-
    Бак 4 500 л, штанги 30–40 м, ExactApply.
  john-deere-r4150i: >-
    Флагманська модель. Бак 5 700 л, штанги 36–40 м, See & Spray Premium.
