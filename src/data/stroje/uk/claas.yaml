# UK overlay (описи/поля) на cs структуру. AI draft+editor, потрібен review.

country: "Німеччина"
description: >-
  Німецька родинна фірма, заснована у 1913 році братами Клаас. Світовий лідер у комбайнах (серія Lexion) та самохідних кормозбиральних комбайнах Jaguar. Трактори CLAAS продовжують спадщину французького Renault Agriculture (придбання 2003). Штаб-квартира у Харзевінкелі.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"
  sklizen-picnin: "Самохідні кормозбиральні комбайни"

series:
  ares: >-
    Після придбання Renault Agriculture (2003) продовжена серія, успадкована від французького виробника. Двигун John Deere 4- та 6-циліндровий.
  atles: >-
    Великий флагманський ряд до появи Axion. Двигун DPS 6-циліндровий 7,4 л.
  celtis: >-
    Доступна за ціною початкова серія, успадкована від Renault. Двигун Perkins 4-циліндровий.
  elios: >-
    Компактна утилітарна серія. Двигун FPT 4-циліндровий, проста механічна трансмісія.
  atos: >-
    Утилітарний трактор з трансмісією Revershift та гідравлікою Power Shuttle.
  nexos: >-
    Вузька спеціалізована серія для садів та виноградників. Двигун FPT NEF 4-циліндровий.
  arion-gen1: >-
    Універсальна преміальна серія для змішаних господарств. Двигун DPS Perkins, трансмісія QuadriShift або HexaShift.
  arion-gen2: >-
    Модернізована серія. Двигун FPT/DPS, трансмісія HexaShift або CMATIC (CVT). Кабіна PANORAMIC з панорамним заскленим дахом для фронтального навантажувача.
  axion-800-900: >-
    Флагманська велика серія, що виробляється у Ле-Мані (Франція). Двигун FPT NEF 6,7 л (Axion 800) та FPT Cursor 9 8,7 л (Axion 900). Трансмісія CMATIC (ZF Eccom CVT), джойстик CMOTION, термінал CEBIS Touch. Axion 960 = 445 к.с., флагманська модель трактора CLAAS (Stage V). Axion 940 був Tractor of the Year 2014.
  xerion: >-
    Системний трактор з реверсним керуванням (поворотна кабіна Trac VC) та 4 однаково великими колесами. Двигун **Mercedes-Benz** (OM906 / OM471 / OM473 6-циліндровий, 7,7–12,8 л залежно від моделі), трансмісія **HM4** гідромеханічна 4-режимна CVT (опціонально ZF Eccom). Виробляється у Харзевінкелі. Варіанти **Trac** (стандартний) та **Saddle Trac** (стаціонарно розміщена кабіна для навісних машин, наприклад для рідкого гною). **Xerion 5000** був Tractor of the Year 2014.
  dominator: >-
    Легендарні класичні комбайни, які вивели CLAAS у лідери. У ЧР ще звичайно зустрічаються у менших господарствах.
  mega: >-
    Середній клас класичних комбайнів. Двигун Mercedes-Benz 6-циліндровий. Технологія APS для вищої пропускної здатності.
  avero: >-
    Доступна за ціною початкова серія для менших господарств. Двигун John Deere 4-циліндровий.
  tucano: >-
    Середній клас. Класичні варіанти Tucano 300–500 або роторні гібридні серії 400 з одним ротором APS HYBRID.
  lexion-400-500-600-700: >-
    Флагманська серія CLAAS, представлена у 1995 році моделлю Lexion 480 — перший **APS HYBRID** (APS pre-separator + 1 поздовжній ротор ROTO PLUS) у Європі. Двигун Mercedes-Benz (OM906/OM471/OM473) або Caterpillar (ринок США, спільне підприємство з 1999). Вироблялися у Харзевінкелі (Німеччина) та Омасі (Небраска, США).
  lexion-5000-8000: >-
    Цілком нова платформа, представлена у 2019 році. Дизайн Volker Groth (ex-BMW), APS Synflow Walker (5000 — класичний з 6 соломотрясами) або APS Synflow Hybrid (6000–8000 — 1 поздовжній ротор ROTO PLUS діаметром 600 мм). Cemos Auto Threshing / Cleaning / Separation, FieldScanner, двигун Mercedes-Benz OM471 / OM473 (Stage V). Lexion 8900 з 790 к.с. належить до найпотужніших комбайнів світу.
  trion: >-
    Наступник Tucano. Цілком нова платформа між Tucano та Lexion. Варіанти APS / APS HYBRID, Trion Montana з вирівнюванням схилів до 18 %.
  jaguar-700: >-
    Перше покоління самохідних кормозбиральних комбайнів Jaguar — представлене у 1973 році моделями Jaguar 60 SF, 70 SF та 80 SF. Знакові машини для збирання кукурудзяного силосу та трав'яних кормів у 70-х та 80-х роках. Двигун Mercedes-Benz 6-циліндровий, механічна 4-ступенева трансмісія. Пізніші моделі 685/690/695 SL принесли автоматизацію та вищу потужність. У ЧССР, а пізніше у ЧР — одні з перших імпортованих сучасних кормозбиральних комбайнів.
  jaguar-800: >-
    Модернізоване покоління з цифровою регуляцією та ширшим різальним барабаном (V-MAX). Двигун Mercedes-Benz OM441/OM442 6/8-циліндровий, автоматичне заточування ножів. Моделі 820/840/860/880/890/900 у діапазоні потужності 286–605 к.с. Друге за продажами покоління Jaguar у ЧР (після 900).
  jaguar-900-modern: >-
    Сучасне покоління з технологією **Dynamic Power** (змінна потужність двигуна залежно від навантаження) та Auto Fill (автоматичне наповнення причепа). Двигун Mercedes-Benz OM502 V8, пізніше MAN V12 (980). Моделі 930/940/950/960/970/980/990, потужність 360–884 к.с. Флагманський Jaguar 980 довго утримував титул найпотужнішого кормозбирального комбайна світу.
  jaguar-current: >-
    Сучасне покоління Stage V. Три класи потужності: **Jaguar 800** (початковий, 408–490 к.с.), **Jaguar 900** (основний, 503–925 к.с.) та флагманський **Jaguar 1000** (представлений 2023, 925 к.с., найпотужніший самохідний кормозбиральний комбайн світу). Двигун MAN V12 24,2 л (1000), Mercedes-Benz OM471/OM473 (900). CEMOS Auto Performance, консерваційна система Shredlage, Auto Fill 3D. У ЧР домінантна машина для збирання кукурудзяного силосу.

models:
  claas-lexion-8700: >-
    CLAAS Lexion 8700 — гібридний комбайн вищого класу потужністю 625 к.с. (460 кВт) та бункером для зерна 13 500 л. Належить до покоління Lexion 8000 (з 2019 року) з молотильною системою APS SYNFLOW HYBRID. Lexion 8700 націлений на великі зерновиробничі господарства з високими денними продуктивностями; нижчою альтернативою є Lexion 8600, потужнішою моделлю — Lexion 8800.
