# UK переклад (описи/поля) на cs структуру. AI draft+редактор, review потрібен.

country: "Італія / США"
description: >-
  Італійсько-американська марка під концерном CNH Industrial (разом з Case IH). Трактори виробляються в Базелі та Санкт-Валентині, комбайни в Зеделгемі (Бельгія). Характерний синій колір та серії Ford-based з 90-х років. Сьогодні охоплюють серії від T4 (40 к.с.) до T9 (700+ к.с.), комбайни CR домінують у класі роторних комбайнів.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"

series:
  40-series: >-
    Перше покоління після злиття Ford Tractors + New Holland (1991). Двигун Ford/Genesis 7,5 л, привід 4WD, механічна коробка передач 16/9.
  60-series: >-
    Наступник 40 Series з покращеною гідравлікою та коробкою передач ElectroShift. Двигун Genesis з інтеркулером.
  ts: >-
    Компактніша утилітарна серія. Чотирициліндрові версії (TS90/100/110) мали двигун 5 000 см³, шестициліндрові (TS115) атмосферний двигун 7 480 см³ — TS115 був дуже популярним на чеському ринку. Коробка передач Synchro Shuttle або Electro Command 16/16, подвійно редукована задня вісь із планетарними передачами, блокування диференціала Electrolok та багатодискові мокрі гальма.
  ts-a: >-
    П'ять цілком нових моделей з кабіною Horizon (без четвертої стійки). Двигун з Common Rail впорскуванням, турбо та інтеркулером, потужність 101–136 к.с., з функцією Power Management до 168 к.с. (TS135A). У 2006 році додалися варіанти TS-A Plus та TS-A Delta. Передня вісь SuperSteer або підресорена Terraglide.
  tm: >-
    Більша row-crop серія з п'ятьма моделями 116–168 к.с. (ISO). Двигуни Ford turbo, коробка передач Electroshift 16/16, підресорене повітрям сидіння, гідравліка Bosch EHR, підресорена передня вісь Terraglide та підресорення кабіни Comfort Ride. Опціональна вісь SuperSteer з кутом повороту 65° скоротила радіус повороту на ~3 м. Моделі TM175 та TM190 DT (2002–2007) мали коробку передач Powershift 18/6 або 19/6, гідравлічний генератор 120 л/хв, PowerBoost +46 к.с. та електронно кероване насос Bosch VP44.
  tl: >-
    Доступна за ціною утилітарна серія. Двигун 4-циліндровий 4,5 л, коробка передач Synchro Shuttle 12/12.
  tg: >-
    Топова row-crop серія, що вироблялася на заводі в Расіні (США), замінила дві найпотужніші моделі NH 70A. Шестициліндровий двигун Cummins 8,3 л з чотирма клапанами на циліндр (TG255/285) при 2 200 об./хв, коробка передач Ultra Command Powershift 18/4. Гідравліка MegaFlow з потоком до 257 л/хв — одна з найпотужніших у сегменті свого часу. Попередник серії T8.
  t4: >-
    Утилітарна серія для менших господарств, садів та виноградників. Двигун Iveco F5C 3,4 л, коробка передач Dual Command / Electro Command, викиди Tier 4B / Stage V.
  t5: >-
    Універсальна серія для тваринницького та рослинницького виробництва. Двигун FPT NEF 4,5 л, коробка передач Dual/Electro Command 24/24. У 2024 році було представлено третє покоління T5 DynamicCommand з потужністю до 140 к.с.
  t6: >-
    Найбільш продавана серія. Двигун FPT NEF 6,7 л, коробка передач Electro Command (16/16) або Auto Command CVT (безступінчаста). Метановий варіант T6 Methane Power з 2020 року — перший серійний трактор на біометан.
  t7: >-
    Преміальна row-crop серія, що замінює TM. Попередник T7000 PowerCommand був представлений у 2007 році; у 2009 році додався варіант T7000 Auto Command з безступінчастою коробкою передач (CVT), яка продовжила T7500, що вироблявся в австрійському Санкт-Валентині (початкове позначення TVT). Топова версія мала 18-ступінчасту коробку передач Power Command — за три роки було вироблено понад 23 000 одиниць. Сучасний T7 має двигун FPT NEF 6,7 л (T7.170–T7.245) або FPT Cursor 9 (T7.260+), коробку передач Range Command 18/6 або Auto Command CVT та кабіну класу SideWinder II з джойстиком.
  t8: >-
    Флагманська row-crop серія. Попередник T8000 (представлений 2006) мав двигун 8 268 см³ з 24 клапанами та впорскуванням Common Rail; варіант T8050 отримав 9-літровий двигун 325 к.с. та 19-ступінчасту коробку передач, що дозволяє 40 км/год при нижчих обертах. Сучасний T8 має двигун FPT Cursor 9 8,7 л, коробку передач Ultra Command 18/4 або Auto Command CVT, монітор IntelliView, IntelliSense та гусеничні версії T8 SmartTrax.
  t9: >-
    Шарнірні 4WD трактори для великих господарств та американського ринку. Двигун FPT Cursor 13 (12,9 л) або Cursor 16 (16 л), коробка передач 16/4 PowerShift. Гусеничні варіанти SmartTrax.
  tx: >-
    Конвенційні комбайни з клавішами соломотряса. Двигун NH/FPT 6-циліндровий 7,5 л, 5 клавіш соломотряса, роторний досепаратор.
  cx: >-
    Конвенційна флагманська серія (барабан + 5 клавіш соломотряса). У Зеделгемі з 2002 року, неодноразово модернізована. CX7 / CX8 / CX8.91 — найбільші в категорії конвенційних комбайнів.
  cr: >-
    Двороторна флагманська серія. Революційна конструкція Twin Rotor — два поздовжні ротори зі змінним балансуванням. CR11 (представлена 2023) тримає світовий рекорд денної продуктивності.

models:
  new-holland-cr11: >-
    Флагманська модель CR11 замінює CR10.90. Двигун Cursor 16 з робочим об'ємом 16 л, оптимізація IntelliSense AI, бункер до 20 000 л. Тримає світовий рекорд зі збирання кукурудзи.
