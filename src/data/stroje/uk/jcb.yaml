# UK переклад (описи/поля) на cs структуру. AI чернетка + редактор, потрібна перевірка.

country: "Велика Британія"
description: >-
  Британський сімейний виробник будівельної та сільськогосподарської техніки, заснований Джозефом Сирилом Бемфордом. Для сільського господарства виробляє культові телескопічні навантажувачі Loadall (від компактних 525-60 до heavy-duty 560-80), компактні pivot-steer навантажувачі TM Telemaster, компактні колісні навантажувачі ряду 400 та унікальні швидкісні трактори Fastrac з підресореним шасі та дорожньою швидкістю 70 км/год.

categories:
  manipulace: "Маніпуляція та навантаження"
  traktory: "Трактори"

series:
  compact-wheel-loader: >-
    Компактні колісні навантажувачі JCB ряду 400 для роботи на подвір'ї, у кормовому коридорі та у вузьких просторах ферми. Пропонують відмінний огляд через низький капот, малий радіус повороту та шарнірну раму для маневрування у тісних просторах. Моделі від 2,6 т (403) до 10,3 т (417) покривають господарства всіх розмірів.
  loadall-525: >-
    Найкомпактніший Loadall — телескопічний навантажувач шириною лише 1,84 м і висотою 1,9 м, ідеальний для низьких ферм і вузьких проходів. Вантажопідйомність 2,5 т і виліт 6 м покривають звичайну маніпуляцію з тюками, палетами та кормом. Характерний 360° огляд із кабіни CommandPlus завдяки низькій стрілі ліворуч від водія.
  loadall-527: >-
    Компактний Loadall для середніх господарств — вища вантажопідйомність 2,7 т порівняно з моделлю 525 при збереженні компактних розмірів і відмінного огляду. Виліт 5,8 м і низька транспортна висота роблять 527-58 улюбленою машиною для роботи у старіших фермах і будівлях з низькими проїздами.
  loadall-532: >-
    Середній Loadall з вантажопідйомністю 3,2 т — найпродаваніший розмір у межах ряду, доступний у двох довжинах стріли (6 м і 7 м). Підходить для більшості звичайних сільськогосподарських операцій: тюки, корм, навантаження гною, палетизація. Доступний у комплектаціях Agri, Agri Plus, Agri Super, Agri Pro і Agri Xtra залежно від вимог до трансмісії та комфорту.
  loadall-536: >-
    Середнього розміру Loadall з вантажопідйомністю 3,6 т — улюблений на середніх і більших господарствах за вищу підіймальну здатність при збереженні середніх розмірів. Доступний зі стрілою 6 м і 7 м та у різних комплектаціях від базової Agri до Agri Pro з трансмісією DualTech VT.
  loadall-538: >-
    Compact Loadall з найвищою вантажопідйомністю в ряду 3,8 т при збереженні компактних розмірів (ширина менше 2,3 м). Доступний зі стрілою 6 м і 7 м; комплектація Agri Plus додає комфортнішу кабіну та гідравлічні функції. Улюблений розмір для молочних ферм із кормороздавачем.
  loadall-542: >-
    Heavy-duty Loadall з вантажопідйомністю 4,2 т і вильотом 7 м — перехід у важкий клас. Доступний у найвищих комплектаціях Agri Pro (трансмісія DualTech VT), Agri Super (гідростатична) та Agri Xtra (powershift) для застосування від звичайних господарств до транспортних підрядників.
  loadall-550: >-
    Heavy-duty Loadall з вантажопідйомністю 5 т і вильотом 8,1 м — призначений для великих господарств, кооперативів та підрядників. Здатний штабелювати тюки до 8 ярусів і завантажувати навіть найвищі силосні візки. Доступний у комплектаціях Agri Pro (DualTech VT) та Agri Super (гідростатична).
  loadall-555: >-
    Heavy-duty Loadall з надзвичайно довгою стрілою 9,5 м і вантажопідйомністю 5,5 т — спеціально для високих силосних ям, високого штабелювання тюків і завантаження у високі бункери. Найбільший виліт у ряду Loadall.
  loadall-560: >-
    Топовий Loadall з вантажопідйомністю 6 т і вильотом 8,1 м — найбільший і найпотужніший аграрний телескоп у пропозиції JCB. Призначений для найважчих застосувань: завантаження причепів із зерном, маніпуляція з важкими тюками біомаси та підрядні операції. Доступний виключно в комплектації Agri Pro з трансмісією DualTech VT.
  loadall-tm: >-
    Telemaster — шарнірні (pivot-steer) телескопічні навантажувачі JCB, гібрид між колісним навантажувачем і телескопом. Шарнірне керування пропонує екстремальну маневреність у тісних фермах, телескопічна стріла додає виліт у висоту. Ідеальний для молочних ферм із вузькими кормовими проходами. Моделі TM 220, TM 320 і TM 420 покривають вантажопідйомності від 2,1 до 4,1 т.
  fastrac-2000: >-
    Друге покоління новаторських швидкісних тракторів JCB Fastrac з центрально розташованою кабіною, передньою та задньою підвіскою і гальмами ABS — концепція, що нагадує радше вантажний автомобіль, ніж класичний трактор. Дорожня швидкість 75 км/год докорінно змінила логістику господарств, адже машина впоралася з польовою роботою та дорожнім перевезенням такою ж швидкістю, як вантажівка. Моделі 2115, 2125, 2135 і 2155 (пізніше 2150 і 2170) з 6-циліндровими двигунами Cummins потужністю 115–170 hp. Попередник сьогоднішнього ряду Fastrac 4000/8000.
  fastrac-4000: >-
    Середньопотужний ряд швидкісних тракторів Fastrac (160–235 hp) з повністю підресореним шасі (передня та задня пневматична підвіска), 4-колісним керуванням і дорожньою швидкістю 60 км/год. Симетрична конструкція з кабіною посередині пропонує розподіл маси 50/50, подвійні гальма та flatbed за кабіною для навісного знаряддя. Унікум на ринку — єдиний трактор, придатний також для дорожнього перевезення зі швидкістю легкового автомобіля.
  fastrac-8000: >-
    Флагманський ряд Fastrac з потужностями 290–348 hp і рекордною дорожньою швидкістю 70 км/год — найшвидший серійний трактор у світі. Трансмісія CVT, повна підвіска та вантажопідйомність 18 т для навісного знаряддя роблять модель 8000 ідеальною машиною для підрядників, поєднання польових робіт і транспортування силосної маси на великі відстані. Лімітована едиція Iconic відзначає історію Fastrac.

models:
  403-agri: >-
    Найменший колісний навантажувач JCB для малих ферм і тісних подвір'їв, споряджена маса 2,6 т, ідеальний для маніпуляції з тюками та кормом.
  406-agri: >-
    Середній клас компактних навантажувачів, маса 5,2 т, придатний для середніх сімейних ферм та кормової логістики.
  407-agri: >-
    Потужніший варіант компактного навантажувача для вимогливіших робіт на подвір'ї та маніпуляції з об'ємними тюками.
  411-agri: >-
    Більший колісний навантажувач для великих ферм і кооперативів, маса 9,1 т, вища підіймальна сила для силосних робіт і навантаження причепів.
  417-agri: >-
    Топовий колісний навантажувач ряду 400, споряджена маса 10,3 т, призначений для найважчих операцій на подвір'ї та силосних траншеях.
  525-60-agri: >-
    Базова сільськогосподарська версія найменшого Loadall — вантажопідйомність 2,5 т, макс. висота 6 м, двигун 75 hp.
  527-58-agri: >-
    Компактний сільськогосподарський телескопічний навантажувач з вантажопідйомністю 2,7 т і вильотом 5,8 м, відмінний для роботи в кормових проходах і старіших стайнях.
  532-60-agri: >-
    Базова комплектація з вантажопідйомністю 3,2 т і вильотом 6 м, механічна гідростатична трансмісія.
  532-70-agri: >-
    Версія з довшою стрілою 7 м для навантаження вищих причепів і штабелювання тюків на більшу висоту.
  536-60-agri: >-
    Середнього розміру телескопічний навантажувач з вантажопідйомністю 3,6 т і вильотом 6 м, гідростатична трансмісія для плавного навантаження.
  536-70-agri: >-
    Довша стріла 7 м для навантаження напівпричепів і маніпуляції у вищих штабелях.
  538-60-agri: >-
    Компактний Loadall з високою вантажопідйомністю 3,8 т, виліт 6 м, придатний для низьких стаєнь.
  538-70-agri: >-
    Версія з довшою стрілою 7 м, поєднання високої вантажопідйомності та доброго вильоту для кормових робіт.
  542-70-agri-pro: >-
    Найвища комплектація із запатентованою трансмісією DualTech VT, що поєднує гідростат і powershift, оптимальна для суміші навантаження й транспортування.
  542-70-agri-super: >-
    Гідростатична трансмісія для плавного керування під час навантаження, придатна для переважання маніпуляційних робіт.
  542-70-agri-xtra: >-
    Трансмісія powershift для максимальної транспортної ефективності та буксирування напівпричепів на довші відстані.
  550-80-agri-pro: >-
    Найвища комплектація з трансмісією DualTech VT для суміші навантаження та швидких поїздок між робочими ділянками.
  550-80-agri-super: >-
    Гідростатична трансмісія, ідеальна для переважання маніпуляційних робіт із вищою точністю.
  555-95-agri-pro: >-
    Loadall з найдовшою стрілою 9,5 м, вантажопідйомність 5,5 т, призначений для високого штабелювання та навантаження високих силосів.
  560-80-agri-pro: >-
    Топовий Loadall з вантажопідйомністю 6 т і вильотом 8,1 м, трансмісія DualTech VT, двигун 173 hp — флагман сільськогосподарських телескопів JCB.
  tm-220-agri: >-
    Найкомпактніший Telemaster, шарнірне керування, вантажопідйомність 2,1 т — ідеальний для малих стаєнь і кормових проходів.
  tm-320-agri: >-
    Середнього розміру Telemaster з вантажопідйомністю 3,2 т, поєднання маневреності колісного навантажувача та вильоту телескопа.
  tm-420-agri: >-
    Найбільший Telemaster з вантажопідйомністю 4,1 т, придатний для великих молочних ферм із важким кормороздавачем і великими тюками.
  fastrac-2115: >-
    Початкова модель другого покоління Fastrac, двигун Cummins 6-циліндровий 115 hp, повністю підресорене шасі та дорожня швидкість 75 км/год.
  fastrac-2125: >-
    Середньопотужна версія ряду 2000 з двигуном Cummins 125 hp, улюблена у підрядників за поєднання польових робіт і дорожнього перевезення.
  fastrac-2135: >-
    Вищий середній клас, двигун Cummins 6-циліндровий 135 hp, повна підвіска та 4-колісне керування.
  fastrac-2150: >-
    Пізніший варіант із вищою потужністю 150 hp, призначений для вимогливіших транспортних операцій і буксирування більших напівпричепів.
  fastrac-2155: >-
    Топова модель початкового покоління ряду 2000, двигун Cummins 6-циліндровий 155 hp з турбо.
  fastrac-2170: >-
    Топова модель ряду 2000, двигун Cummins 6-циліндровий 170 hp — найпотужніший Fastrac другого покоління, передвісник пізнішого ряду 4000.
  fastrac-4160: >-
    Базова модель Fastrac 4000, 160 hp, повністю підресорене шасі, дорожня швидкість 60 км/год.
  fastrac-4190: >-
    Середня модель Fastrac 4000 з потужністю 190 hp для буксирування більших напівпричепів і знаряддя.
  fastrac-4220: >-
    Топовий Fastrac 4000, 220 hp, нова кабіна ICON з панорамним оглядом, 60 км/год.
  fastrac-8290: >-
    Базова модель ряду 8000 з потужністю 290 hp і трансмісією CVT, дорожня швидкість 70 км/год.
  fastrac-8330: >-
    Флагман Fastrac з потужністю 330 hp, CVT, 70 км/год — найпотужніший і найшвидший серійний трактор на ринку.
  fastrac-iconic: >-
    Лімітована едиція Fastrac 8330 з ексклюзивним оснащенням і дизайном, що відзначає історію ряду Fastrac від його появи у 1991 році.
