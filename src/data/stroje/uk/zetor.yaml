# UK overlay (описи/поля) на cs структуру. AI draft+editor, review потрібен.

country: "Чехія"
description: >-
  Традиційний чеський виробник тракторів з Брно, заснований у 1946 році зі Збройовки Брно (спочатку авіаційні двигуни Aero/Avia). Назва **Z**brojovka + трак**TOR**. Визначальний ряд **UR I** (1962+) став хребтом чеського та східноєвропейського сільського господарства. Сучасні ряди **Major, Proxima, Forterra, Crystal HD** охоплюють 53–170 к.с. З 2018 року співпраця з John Deere. Власник: HTC Investments. Експорт до понад 60 країн.

categories:
  traktory: "Трактори"

series:
  z-25: >-
    Перший трактор Zetor, представлений **1946** року в Брно. Виник у приміщеннях **Збройовки Брно** (довоєнні авіаційні двигуни Aero/Avia) та визначив **систему Zetor** — просте керування, доступний сервіс, єдина паливна система для всього ряду. Версія **Z 25K** (1950, конструктивно доопрацьована) принесла кращу кабіну, **Z 25A** (1952) отримав гідравлічну триточкову навіску. Загалом виготовлено понад **158 500 одиниць** — визначальний трактор повоєнного чехословацького сільського господарства.
  ur-i: >-
    Культовий уніфікований ряд, представлений **1962** року моделями 4011/5511/6711 — хребет чеського та східноєвропейського сільського господарства. Початкове покоління (1962–1979) мало відкриту кабіну та двигуни Zetor 4001/5001 (4-циліндрові); **модернізація 1980** принесла нову закриту кабіну, нові двигуни Zetor 5201/7201 (3-циліндрові) та моделі 5211/7211/7745, що вироблялися аж до **1998**. Коробка передач 10/2, проста конструкція, легендарна незнищенність.
  ur-ii: >-
    Більший і потужніший уніфікований ряд, представлений **1968** року моделлю **Crystal 8011** — перший шестициліндровий Zetor. **Crystal 12011** (1972) додав турбо та здобув культовий статус у вигляді **лісової версії** для вивезення деревини. Для середніх та більших ферм. Двигуни Zetor 7401 (4-циліндровий) та 8001/8101 (6-циліндрові), коробка передач 10/2 або 16/8 з повзучою передачею. Модернізація 1986 принесла нову кабіну (8111/9111/10111).
  super: >-
    Модернізація UR II з новою кабіною та двигуном Zetor Z 1505. Проміжна ланка до ряду Forterra.
  forterra: >-
    Флагманський ряд — сучасна кабіна Horizon II, повністю синхронізована коробка передач 24/18 з реверсором та 4WD. Двигун Zetor Z 1505/1605 з турбо та проміжним охолоджувачем.
  forterra-hsx-hd-cl: >-
    Модернізація Forterra з новим капотом, дисплеєм та двигуном Zetor Stage IV / V. Варіанти HSX (power shift), HD (преміум), CL (класична).
  proxima-gen1: >-
    Наступник ряду Super. Доступний за ціною трактор для менших ферм. Двигун Z 1205, синхронізована коробка передач 10/10 або 20/20 з реверсором.
  proxima-cl-gp-hs: >-
    Актуальне покоління Proxima в кількох варіантах — CL (classic), GP (general purpose), HS (high spec), Power та Plus. Двигун Zetor 1204 / 1605 Stage V.
  crystal: >-
    Повернення легендарної назви Crystal (оригінальний Crystal 8011/12011 у 70-х–80-х роках). Найпотужніший сучасний Zetor — 150–170 коней, двигун **Deutz TCD 6.1** (6-циліндровий), коробка передач ZF 16/16 з PowerShift, підресорена передня вісь.
  major: >-
    Найменший ряд Zetor — утилітарний трактор для комунальних цілей, садів та дрібного господарства. Двигун **Iveco F5C** (4-циліндровий, 3,2 л), коробка передач 12/12 синхронізована. Варіанти **CL** (Comfort Line) та **HT** (High Tech) додані 2018.
  utilix-compax: >-
    Компактні трактори 25–55 к.с. для комунального та спеціалізованого застосування. OEM-ребрендинг (Utilix HT від TYM Корея, Compax від TAFE Індія), що продавався під маркою Zetor. Виробництво припинено 2020 — цей клас залишається в портфоліо непредставленим (Major починається з 53 к.с.).

models:
  zetor-25: >-
    Найперший серійний Zetor. Вироблявся у 1946–1949 роках (бл. 43 тис. од.).
  zetor-25k: >-
    Конструктивно доопрацьована версія — покращена кабіна та кріплення навісного обладнання.
  zetor-25a: >-
    Найдосконаліший Z 25 — гідравлічна триточкова навіска, модернізована гідравліка. Вироблявся паралельно з UR I аж до 1968 року.
  zetor-4011: >-
    Перша модель UR I — початковий клас. Визначив ряд разом з 5511 та 6711.
  zetor-5511: >-
    Середній за розміром UR I. Найпопулярніша модель 60-х років у ЧССР.
  zetor-6711: >-
    Вищий середній клас UR I. Доповнений у 1966 році як реакція на зростання господарств.
  zetor-7011: >-
    Вершина початкового UR I. Замінений у 1980 році модернізованим 7211.
  zetor-7245-horal: >-
    Спеціальна гірська версія з підвищеною стійкістю.
  zetor-crystal-8011: >-
    Найперший шестициліндровий Zetor. Відкрив еру UR II та пізніше передав назву Crystal сучасному ряду HD (2014+).
  zetor-crystal-10011: >-
    Проміжна ланка між 8011 та 12011. 6-циліндровий атмосферний.
  zetor-crystal-12011: >-
    Вершинний Zetor 70-х років. Лісова версія (Lesní 12011) із захисним каркасом та лебідкою була іконою чехословацьких лісів — використовувалася для вивезення деревини й у 21 столітті.
  zetor-16245: >-
    Найпотужніша модель UR II, 6-циліндровий турбо.
  zetor-proxima-power-120: >-
    Zetor Proxima Power 120 нового покоління (2024+) — новий двигун, кабіна, цифровий дисплей. Натхнення італійським дизайном SDF (Same Deutz-Fahr).
