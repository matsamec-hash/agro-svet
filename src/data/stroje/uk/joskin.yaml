# UK переклад (описи/поля) на cs структуру. AI чернетка + редактор, потрібна перевірка.

country: "Бельгія"
description: >-
  Бельгійський спеціаліст із цистерн для рідкого гною та сільськогосподарських напівпричепів. Цистерни Modulo 2, Quadra, Komfort 2, Volumetra, X-Trem, Cargo і EuroLiner, напівпричепи Trans-CAP, Trans-KTP, Trans-SPACE, Trans-EX і Drakkar, аплікатори Pendislide, Pendiwing, Solodisc і Multitwist та розкидачі органічних добрив Tornado3, Ferti-CAP і Siroko.

categories:
  doprava: "Транспортування"
  hnojeni: "Внесення добрив"

series:
  drakkar: >-
    Drakkar — великомісткісний напівпричіп із рухомою підлогою для силосу, сінажу, зерна та тріски. Міцне шасі з тандемною або тридемною віссю витримує до 38 м³ об'єму та 30 т корисної маси. Гідравлічно приводний ланцюговий транспортер дозволяє швидке й дбайливе розвантаження без підіймання кузова, що ідеально для низьких ангарів та біогазових станцій. Пневматично підресорені осі та гідравлічне керування забезпечують стабільність навіть на високих швидкостях.
  trans-cap: >-
    Trans-CAP — тристоронній самоскидний напівпричіп середнього класу для універсального фермерського застосування. Гідравлічно кероване перекидання на три боки дозволяє зручно розвантажувати у вузьких просторах. Кузов виготовлений з високоміцної сталі HARDOX і пристосований для перевезення зерна, буряка, картоплі та органічних добрив. Пневматично гальмовані осі та комерційні шини забезпечують безпечне перевезення дорогою.
  trans-ktp: >-
    Trans-KTP — heavy-duty задній самоскид, призначений для найважчих транспортних завдань у сільському господарстві та будівництві. Міцний моноблоковий кузов із 6-мм листа HARDOX витримує каміння, щебінь і мерзлу землю. Тридемна вісь із самокерованою останньою віссю знижує знос шин і підвищує маневреність. Гідравлічний задній борт з автоматичним відкриванням прискорює розвантаження.
  trans-space: >-
    Trans-SPACE — великомісткісний напівпричіп із рухомою передньою стінкою для максимального використання вантажного простору. Конструкція з рівною підлогою та гладкими алюмінієвими бортами мінімізує залишки вантажу й полегшує очищення. Гідравлічно приводна передня стінка поступово виштовхує вантаж назовні, що дбайливо як до матеріалу, так і до самої машини. Ідеальний для силосу, сінажу, картоплі або цукрового буряка.
  trans-ex: >-
    Trans-EX — економічний самоскидний напівпричіп початкового класу для малих і середніх господарств. Одновісний або тандемний варіант оптимізований під низькі закупівельні витрати зі збереженням якості Joskin. Гідравлічне перекидання назад або на три боки покриває звичайні транспортні завдання. Борти кузова легко знімаються для перебудови на платформний напівпричіп.
  euroliner: >-
    EuroLiner — далекомагістральний напівпричіп із рухомою підлогою, призначений для дорожнього перевезення силосу та тріски між фермами й біогазовими станціями. Аеродинамічна алюмінієва надбудова знижує масу та витрату пального. Тридемна вісь з пневмопідвіскою дозволяє легальне дорожнє перевезення зі швидкістю до 60 км/год. Рухома підлога з повільним темпом розвантаження береже підлогу й ланцюги.
  cargo: >-
    Cargo — компактна цистерна для рідкого гною для малих і середніх господарств з об'ємом 2 700 до 7 100 літрів. Одновісна конструкція з низьким центром ваги дозволяє працювати на схилах. Стандартним оснащенням є відцентровий насос Joskin та самовсмоктувальна система для швидкого наповнення. Цистерна сумісна з усім рядом аплікаторів Joskin, зокрема Pendislide та Solodisc.
  ferti-cap: >-
    Ferti-CAP — компактний розкидач органічних добрив з вертикальними роторами для рівномірного розподілу гною, компосту або дигестату. Міцна підлога з HARDOX 450 витримує абразивні матеріали. Гідравлічно регульована швидкість транспортного ланцюга дозволяє точне дозування в кг/га. Робоча ширина 6–12 м ідеальна для малих і середніх господарств.
  komfort-2: >-
    Komfort 2 — цистерна для рідкого гною середнього класу з акцентом на комфорт оператора та просте обслуговування. Централізована гідравлічна панель об'єднує всі органи керування в одному місці. Пневматичні гальма та хитне дишло з повітряною підвіскою гасять удари під час польової роботи. Стандартне оснащення містить вакуумний насос Battioni або відцентровий насос Joskin.
  modulo-2: >-
    Modulo 2 — флагманська цистерна Joskin для рідкого гною з модульною конструкцією, що покриває об'єми від 4 500 до 18 000 літрів. Оцинкований сталевий бак товщиною 6 мм витримує корозію та найагресивніший гній упродовж десятиліть. Тандемна або тридемна вісь з пневматичною підвіскою дозволяє швидке дорожнє перевезення. Широке портфоліо аплікаторів (Pendislide, Pendiwing, Solodisc, Multitwist) робить її універсальним рішенням для кожної ферми.
  pendislide: >-
    Pendislide — причіпний шланговий аплікатор рідкого гною для точного внесення безпосередньо до землі між рослинами. Сталеві полозки на кінці кожного шланга розсувають посів і кладуть гній прямо на поверхню ґрунту, тим самим мінімізуючи втрати аміаку. Гідравлічно складані рамена забезпечують компактні транспортні розміри. Підходить для кукурудзи, зернових та постійних травостоїв.
  pendiwing: >-
    Pendiwing — гнучкий шланговий аплікатор з телескопічно регульованими раменами для вузькорядних і широкорядних культур. Запатентована система TerraFlex автоматично копіює нерівності рельєфу для рівномірного внесення. Пульсатор забезпечує постійну витрату в усіх шлангах без засмічення. Ідеальний для вузьких ланів, садів і нерівних ділянок.
  quadra: >-
    Quadra — heavy-duty чотиривісна цистерна для рідкого гною для найбільших господарств та сервісних кооперативів. Сталевий бак об'ємом до 28 000 літрів спирається на чотири керовані осі для мінімального ущільнення ґрунту. Дві пари керованих осей (передні та задні) дозволяють маневрувати навіть із повністю завантаженою машиною. Стандартно оснащена турбінним заправним раменом з витратою до 12 000 л/хв.
  siroko: >-
    Siroko — універсальний розкидач органічних добрив з горизонтальними роторами для робочої ширини до 18 м. Гідравлічно регульована швидкість транспортного ланцюга дозволяє точне дозування від 5 до 60 т/га. Міцна конструкція з HARDOX 450 впорається з гноєм, компостом, пташиним послідом та дигестатом. Опційний термінал ISOBUS дозволяє GPS section control для економії добрив.
  solodisc: >-
    Solodisc — дисковий аплікатор рідкого гною з ін'єкційними дисками, які неглибоко заробляють гній у ґрунт, тим самим суттєво знижуючи викиди аміаку. Кожен диск незалежно підресорений пружиною для копіювання рельєфу. Гідравлічно складані рамена дозволяють транспортну ширину менше 3 м. Ідеальний для стерні, лущення та внесення відповідно до нітратної директиви ЄС.
  multitwist: >-
    Multitwist — ротаційний розподільник для шлангових аплікаторів рідкого гною, що забезпечує рівномірну витрату між усіма шлангами. Запатентована система з обертовим ножем ріже тверді частинки й запобігає засміченню. Міцна чавунна конструкція має сервісні інтервали понад 5 000 гектарів. Сумісний з усіма цистернами Joskin Modulo 2, Komfort 2 і Volumetra.
  tornado3: >-
    Tornado3 — третє покоління флагманського розкидача органічних добрив з вертикальними або горизонтальними роторами на вибір. Максимальне корисне навантаження 24 тонни та робоча ширина до 24 м роблять Tornado3 найпродуктивнішою машиною у своєму класі. Гідравлічний кузов з рухомою підлогою виготовлений із 8-мм листа HARDOX. ISOBUS з автоматичним GPS section control дозволяє точне внесення зі змінними дозами за агрономічною картою.
  volumetra: >-
    Volumetra — великомісткісна цистерна для рідкого гною з об'ємами від 12 000 до 30 000 літрів, призначена для великих сільгосппідприємств та сервісних кооперативів. Тридемна вісь з пневматичною підвіскою та всі керовані осі забезпечують маневреність навіть із повним баком. Стандартне оснащення містить турбінне заправне рамено з пам'яттю останнього положення. Оцинкований сталевий бак товщиною 6 мм витримує найагресивніший гній та дигестат упродовж десятиліть.
  x-trem: >-
    X-Trem — найпродуктивніша цистерна в портфоліо Joskin для найвимогливіших застосувань на великих фермах та в сервісних кооперативах. Екстремальні об'єми понад 30 000 літрів у поєднанні з heavy-duty чотиривісним шасі дозволяють вносити 200 га за день. Запатентована система TridemAxle з незалежним керуванням усіх трьох осей мінімізує сліди у полі. Опційні GPS auto-steering і section control для повністю автоматичного внесення.
