# UK overlay (описи/поля) на cs структуру. AI draft+editor, потрібен review.

country: "Німеччина"
description: >-
  Німецький спеціаліст (штаб-квартира Hasbergen-Gaste) з розкидачів мінеральних добрив (серії ZA-V, ZA-TS, ZG-TS), обприскувачів (UF, UX, самохідна Pantera), сівалок (Cataya, Centaya, Cirrus, Precea, Primera DMC) та обробітку ґрунту (дискові лущильники Catros/Catros XL, лапові Cenius/Cenio, глибокорозпушувач Cobra, ротаційні борони KE/KG/KX). Відомий технологіями ArgusTwin (розкидачі) та SmartSprayer (обприскувачі).

categories:
  hnojeni: "Удобрення"
  ochrana-rostlin: "Захист рослин"
  seti: "Сівба та садіння"
  zpracovani-pudy: "Обробіток ґрунту"

series:
  za-v: >-
    ZA-V — навісний дисковий розкидач мінеральних добрив для середніх і більших ферм.
    Робоча ширина 10–36 м, об'єм бункера 1 400–4 200 л залежно від надбудови. Вагова
    регуляція дози системою AMADOS+, граничне внесення BorderTS. Вигідне співвідношення
    ціна/продуктивність, ідеальний для ферм 100–500 га. Зважування та посекційне внесення опціонально.
  za-ts: >-
    ZA-TS — флагман навісних розкидачів для точного внесення. Робоча
    ширина до 54 м, об'єм 1 400–4 200 л. Система ArgusTwin безперервно контролює кут
    падіння добрива чотирма радарами та коригує положення лопаток для однорідного внесення.
    AutoTS дозволяє автоматичне граничне та поворотне внесення без заміни лопаток.
    Підходить для змінного внесення за GPS-картами.
  za-m: >-
    ZA-M — початкова серія навісних розкидачів з робочою шириною 10–36 м та об'ємом
    1 000–3 000 л. Проста конструкція з механічним або гідравлічним керуванням
    заслінок. Підходить для менших ферм та комунального застосування (удобрення парків, сіль
    взимку). Найдоступніша за ціною модель у портфелі.
  zg-ts: >-
    ZG-TS — причіпний широкозахватний розкидач для найвимогливішої експлуатації. Об'єм
    5 500–10 500 л, робоча ширина до 54 м з ArgusTwin та AutoTS. Гідравлічне
    шасі з підвіскою, посекційне внесення для змінного внесення за GPS.
    Призначений для ферм понад 500 га та агросервісів з удобрення. Можливість ISOBUS Section
    Control у поєднанні з навігацією трактора.
  pantera: >-
    Pantera — самохідний обприскувач з баком 4 500 л та робочою шириною 24–40 м.
    Версія H з гідропневматичним шасі 1,25 м, W з більшим дорожнім просвітом для
    внесення у високорослі культури (кукурудза, соняшник). Двигун Deutz 6-циліндровий
    потужністю 218 к.с. (4503) або 250 к.с. (4504). Гідростатичний привід усіх коліс,
    GPS-навігація та посекційне вимикання AmaSwitch у вартості. Опціонально AmaSelect для
    перемикання форсунок на ходу.
  ux: >-
    UX — причіпний обприскувач для середніх і великих ферм. Об'єм бака 4 200–11 200 л,
    робоча ширина 21–42 м. Версія Super з активним керуванням осі, ContourControl
    для автоматичного копіювання рельєфу штангою. Центр керування SmartCenter
    з індукційним наповненням. Підходить для інтенсивного зерновиробництва та олійних культур.
  uf: >-
    UF — навісний обприскувач з об'ємом бака 1 002–2 002 л та шириною 12–30 м.
    Компактні розміри для малих та середніх ферм або як доповнення до самохідної
    машини. Центр керування DC або TC, сумісний з AmaSelect та AmaSwitch.
    Опціонально передній бак FT 1502 для збільшення місткості до 3 500 л без втрати
    маневреності.
  cataya: >-
    Cataya — навісна механічна сівалка для комбінації з ротаційною бороною KE або
    компактоматом KG. Робоча ширина 3,0–4,0 м, дозувальний механізм з електричним
    приводом (eDrive) для змінної дози за картою. Сошники WS (дискові) або
    RoTeC для борозенної сівби в різних умовах. Версія Special для класичного
    застосування, Super з системою попереднього дозування та вищим комфортом.
  centaya: >-
    Centaya — навісна пневматична сівалка шириною 3,0–4,0 м для комбінації
    з ротаційною бороною KE/KG або з компактоматом KX. Центральне дозування
    з розподільчою головкою, сошники TwinTeC з тиском до 70 кг на сошник для надійного
    укладання у тверду землю. Версія Super з попереднім дозуванням для плавного дозавантаження
    поворотних смуг, ISOBUS стандарт. Centaya 6000-2 Super (варіант 2C) — причіпна
    дворядна версія для великих ферм з шириною 6 м.
  cirrus: >-
    Cirrus — причіпна універсальна посівна комбінація для мульчованої та конвенційної сівби.
    Ширина 3–9 м, дискові сошники TwinTeC зі зниженим тяговим зусиллям та тиском до
    50 кг/сошник. Версія 02 (проста), 2C (два бункери для насіння + добрива
    для внесення добрива під сошник) та 2CC (комбінація плюс мікрогранулят).
    Актуальне покоління 9004-2C та 6004-2C замінило старіші моделі 9003-2.
    ISOBUS, посекційне вимикання, GPS для змінної дози.
  precea: >-
    Precea — точна сівалка нового покоління для кукурудзи, соняшнику, буряку
    та інших широкорядних культур. Ширина 3–6 м, дозувальний механізм
    з вакуумною турбіною, що працює до 15 км/год. Версія 3000-A (навісна), 4500-2
    та 6000-2 (причіпні дворядні), 6000-2CC (з мікрогранулятом) та TCC (з великомісткісним
    бункером для добрива). FertiSpot для точкового внесення добрива під сошник.
    Замінює старі серії ED та EDX.
  primera-dmc: >-
    Primera DMC — причіпна сівалка, спеціаліст з прямої сівби (no-till)
    у мульчу та стерню. Ширина 6–9 м, лапові сошники з тиском до 130 кг
    для проникнення у тверду суху землю. Великомісткісний бункер 4 200–5 000 л,
    ISOBUS стандарт. Затребувана модель в аридних регіонах (південь ЧР, Угорщина)
    та на фермах з ґрунтозахисною агротехнікою.
  catros: >-
    Catros — компактний дисковий лущильник для мілкого обробітку стерні на
    глибину 5–12 см. Ширина 3–12 м, диски 510 мм у X-розташуванні з власним
    кріпленням кожного диска. Безобслуговуваний підшипник, котки опціонально (прутковий, зубчастий,
    гумовий, подвійний). Версія 2TX (причіпна двовісна) та 2TS (причіпна для великих ширин
    з шасі). Підходить для соломи, ріпаку та проміжних культур.
  catros-xl: >-
    Catros XL — версія з більшими дисками 610 мм для глибшого обробітку до 15 см
    та кращого проникнення у тверду землю. Ширина 3–9 м, вищий тиск на диск для різання
    об'ємних післязбиральних решток (кукурудза, соняшник). Рекомендований для
    першого лущення після збирання або зеленого удобрення з об'ємною масою.
  cenius: >-
    Cenius — лаповий лущильник/розпушувач для середніх глибин 5–30 см. Ширина
    3–8 м, триточкова рама з відстанями 28,5 см. Опціонально запобіжне кріплення
    C-Mix Shear (зрізний болт) або Cenius Super (виткова пружина для кам'янистих
    умов). Універсальна машина для лущення, передпосівної підготовки та глибшого
    розпушування. Версія 2TX двовісна причіпна для ширин 4 м і більше.
  cenio: >-
    Cenio — компактний навісний лаповий лущильник, представлений у 2022 році як початкова
    модель під Cenius. Ширина 3–4 м, чотирирядна рама з лапами для мілкого лущення
    5–15 см. Версія Special з жорсткими лапами, Super з пружинним кріпленням
    C-Mix Pro для кам'янистих ґрунтів. Підходить для малих та середніх ферм.
  ceus: >-
    Ceus — комбінований розпушувач, що поєднує два ряди дисків і три ряди лап
    для глибини 10–30 см за один прохід. Ширина 4–7 м, причіпна двовісна
    конструкція. Економить проходи: замінює окреме лущення та глибоке
    розпушування. Підходить як альтернатива плугу за безвідвальних систем.
  cobra: >-
    Cobra — глибокорозпушувач для розпушення ущільненого підорного шару на глибину до 40 см.
    Робоча ширина 3 м, сім вузьких лап з низьким тяговим опором. Зберігає
    структуру поверхні — розпушує глибокий шар, але не змішує горизонти.
    Рекомендований для тривало безвідвальних ґрунтів або після збирання цукрового буряку.
  kg: >-
    KG — потужна ротаційна борона для потужних тракторів 130–360 к.с. Ширина 3,0–6,0 м,
    шестигранний редуктор, ротори зі швидкознімними наконечниками QuickChange. Версія
    2 (KG 4001-2, KG 6001-2) складні для великих ширин. Ідеальний партнер
    для Centaya/Cataya за комбінованої сівби.
  ke: >-
    KE — ротаційна борона для середнього класу потужності (до 200 к.с.). Ширина 3,0–4,0 м,
    класичне рішення для комбінації з сівалкою Cataya або Centaya. Версія
    Special із засувним редуктором, Super з плаваючим кріпленням та інтегрованим
    котком. Позначення 190 означає редуктор для 190 к.с.
  kx: >-
    KX — ротаційна борона для середнього класу, компактніша версія за KG. Робоча
    ширина 3,0 м, потужність трактора до 190 к.с. Легша конструкція, підходить для
    ферм з тракторами 100–180 к.с. як комбінація з сівалкою.
