# UK переклад (описи/поля) на cs структуру. AI draft+редактор, review потрібен.

country: "Канада / США"
description: >-
  Традиційна канадсько-американська марка, що виникла у 1953 році внаслідок злиття Massey-Harris (Канада, 1847) та Ferguson (Велика Британія, 1933). З 1994 року частина концерну AGCO. Трактори виробляються в Бове (Франція), комбайни в Бреганце (Італія) та Гесстоні (США). Відома трикутним логотипом та нумерацією серій (3000, 4700, 5M, 5S, 6S, 7S, 8S, 9S). Ключова інновація **Ferguson System** (3-точкова навіска, 1933) вплинула на всі сучасні трактори.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"

series:
  100: >-
    Найбільш культова серія Massey Ferguson та ключова віха марки для Західної Європи. Моделі **135, 148, 165, 175, 178, 185, 188** та інші (130, 230, 235) представили сучасний промисловий дизайн фірми Roberts & Sons кінця 50-х років, гідравлічну **Ferguson System** та надійні двигуни Perkins. У 60-х та 70-х роках ці MF масово застосовувалися в сільськогосподарських кооперативах (JRD) у ЧССР і донині становлять ключовий сегмент ринку ретротехніки. Лише моделі MF 135 було вироблено понад **350 000 одиниць** — належить до найбільш продаваних тракторів в історії.
  500: >-
    Класична утилітарна серія 70-х та 80-х років. Вироблялася в Ковентрі (Велика Британія). Двигун Perkins 4-циліндровий, механічна коробка передач Multi-Power.
  1000: >-
    Великі row-crop трактори, що вироблялися в Детройті для північноамериканського ринку. Двигуни Perkins 6-циліндрові та V8 Perkins (у найпотужніших версіях).
  200: >-
    Тривало успішна утилітарна серія. Двигуни Perkins 3- та 4-циліндрові. Замінила серію 100 і пізніше була замінена серією 300 Series.
  300: >-
    Наступник 200 Series. Повна переробка кабіни, двигуни Perkins 4- та 6-циліндрові. Вироблялася в Ковентрі та Бове. Понад 3600/3610 поступово перейшов у 3000 Series.
  3000: >-
    Довга серія середніх та потужніших тракторів. Двигун Perkins 4- та 6-циліндровий, коробка передач Speedshift.
  4200: >-
    Комплексна утилітарна серія для малих та середніх ферм. Двигун Perkins 1000 Series, 3- та 4-циліндровий з турбо у вищих варіантах. Синхронізована коробка передач 12/12.
  4300: >-
    Модернізована утилітарна серія. Двигун Perkins 900 та 1000 Series, коробка передач Speedshift з електрогідравлічним реверсом. Кабіна з низьким рівнем шуму.
  5400: >-
    Універсальна середня серія. Двигун Perkins 1100 4- та 6-циліндровий, коробка передач Dyna-4 та Dyna-6 Powershift. Кабіна Tech-Platform.
  5600: >-
    Компактна універсальна серія. Коротка база у 3-циліндрових моделей (5608–5610) та довга база у 4-циліндрових (5611–5613). Двигун AGCO Power, коробка передач Dyna-4.
  6100-6200: >-
    Середній row-crop. 6100 (1995–1999) замінив 3000 Series, 6200 (1999–2002) як еволюція. Двигун Perkins 1000 Series 4- та 6-циліндровий, коробка передач Dynashift 32/32.
  3700: >-
    Вузька утилітарна серія для садів та комунального використання. Двигун AGCO Power 3-циліндровий 3,3 л.
  4700: >-
    Утилітарна серія. Двигун AGCO Power 4-циліндровий 4,4 л, синхронізована коробка передач 12/12.
  5700: >-
    Універсальна середня серія. Двигун AGCO Power 4-циліндровий 4,4 л та 4,9 л, коробка передач Dyna-4.
  6700: >-
    Преміальна універсальна серія. Двигун AGCO Power 4,9 л або 6,6 л, коробка передач Dyna-4 або Dyna-6 Powershift, опціональна Dyna-VT (CVT). Замінена серією MF 6S у 2022 році.
  7700: >-
    Row-crop з двигуном AGCO Power 7,4 л. Варіанти S (механічна), Dyna-6 Powershift та Dyna-VT (CVT). Замінена серією MF 7S у 2022 році.
  8700: >-
    Флагманський row-crop. Двигун AGCO Power 8,4 л, коробка передач Dyna-VT CVT, кабіна MF 8700 S з панорамним заскленим дахом. Замінена серією MF 9S у 2024 році.
  5s: >-
    Нова утилітарна серія з двигуном AGCO Power 4,4 л 4-циліндровий, коробкою передач Dyna-4 Powershift та кабіною Visio, розробленою для максимальної видимості. Red Dot Design Award 2022.
  6s: >-
    Середня потужна серія з двигуном AGCO Power 4,9 л 4-циліндровий (найвища потужність з 4-циліндрового на ринку). Коробка передач Dyna-6 або Dyna-VT (CVT).
  7s: >-
    Наступник 7700 S. Двигун AGCO Power 6,6 л 6-циліндровий, коробка передач Dyna-6 або Dyna-VT (CVT). EPM (Engine Power Management) +30 к.с.
  8s: >-
    Преміальний row-crop. Двигун AGCO Power 7,4 л 6-циліндровий, коробка передач Dyna-VT (CVT) з Dynamic Tractor Management. Кабіна Protect-U з ізольованою конструкцією.
  9s: >-
    Флагманська row-crop серія, наступник 8700 S. Двигун AGCO Power 8,4 л 6-циліндровий, коробка передач Dyna-VT (CVT). Кабіна Protect-U. Дебютувала на Farm Progress Show 2024. Шість моделей 285–425 к.с.
  5m: >-
    Актуальний Massey Ferguson MF 5M — дані синхронізовані з masseyferguson.com.
  6400: >-
    Середня row-crop серія з двигуном Perkins / AGCO Power 4,4 л 4-циліндровий. Перші **Dyna-VT** (CVT) у своєму класі в моделях із суфіксом „VT", варіанти Dyna-6 Powershift та Dyna-4. Замінена серією MF 6600 та згодом 6700.
  6600: >-
    Проміжне покоління між 6400 та 6700. Двигун AGCO Power 4,9 л 4-циліндровий та 6,6 л 6-циліндровий, коробка передач Dyna-4, Dyna-6 або Dyna-VT (CVT). Викиди Stage IIIB / Tier 4i.
  7400: >-
    Преміальний row-crop з двигуном Perkins / Sisu / AGCO Power 6,6 л та 7,4 л 6-циліндровий, коробка передач Dyna-6 Powershift або Dyna-VT (CVT) — покоління з найширшим діапазоном потужності для центральноєвропейських ферм. Замінена серією 7600 / 7700.
  7600: >-
    Модернізація 7400 Series з двигуном AGCO Power 6,6 л та 7,4 л 6-циліндровий, що відповідає Stage IIIB. Коробка передач Dyna-6 або Dyna-VT (CVT). Попередник 7700 Series.
  8000: >-
    Флагманська серія великих row-crop тракторів 80-х та 90-х років. Двигун Perkins / Sisu 6-циліндровий, механічна коробка передач Powershift. Потужність **145–210 к.с.**. Попередник серії 8100/8200/8400.
  8100: >-
    Модернізація серії 8000 з новою кабіною, двигуном Perkins 6-циліндровий та коробкою передач Dynashift 32/32 (Powershift). Потужність **160–230 к.с.**.
  8200: >-
    Чергове покоління великих тракторів з оновленим двигуном Perkins 6-циліндровий, коробкою передач Dynashift Plus та інтегрованим електронним регулюванням підіймального механізму. Потужність **160–260 к.с.**.
  8400: >-
    Ключова серія — **перше серійне застосування Dyna-VT (CVT)** у Massey Ferguson. Двигун Sisu 8,4 л 6-циліндровий, кабіна Tech-Platform. Ця серія впровадила безступінчасті коробки передач у мейнстрім MF та передвістила серії 8600 та 8700.
  8600: >-
    Флагманський row-crop перед 8700. Двигун AGCO Sisu Power 8,4 л 6-циліндровий з технологією e3 SCR (селективне каталітичне відновлення — прем'єра в сегменті великих тракторів). Коробка передач Dyna-VT. Потужність **270–370 к.с.**.
  30-series-old: >-
    Історична серія конвенційних комбайнів Dronningborg/MF. Класичний клавішний молотильний апарат, двигун Perkins/Sisu 6-циліндровий.
  cerea: >-
    Вищий клас конвенційних комбайнів, що вироблялися в Дроннінгборзі (Данія). Ротор APS та 5 клавіш соломотряса. Двигун SisuDiesel 6-циліндровий.
  activa: >-
    Середні конвенційні комбайни. Двигун AGCO Sisu Power 6-циліндровий 6,6 л, 5 клавіш соломотряса.
  beta: >-
    Вищий клас конвенційних комбайнів. Ротор APS Plus.
  delta: >-
    Гібридна система APS + ротор. Двигун AGCO Power 7,4 л.
  ideal-mf: >-
    Спільна платформа з Fendt IDEAL. Варіанти 7, 8, 9 під маркою MF для мережі AGCO.
  activa-s: >-
    Модернізація серії Activa з 5 клавішами соломотряса. Двигун AGCO Power 6,6 л 6-циліндровий, молотильний барабан Power Flow, подрібнення соломи V-Inox. Вхідний клас конвенційних комбайнів MF для середніх ферм. Моделі 7340 S, 7344 S, 7345 S.
  beta-s: >-
    Вищий клас конвенційних комбайнів з 5 клавішами соломотряса та системою APS (Accelerated Pre-Separation). Двигун AGCO Power 7,4 л 6-циліндровий, більший бункер для зерна та вища пропускна здатність ніж Activa S.
  delta-s: >-
    Преміальні гібридні комбайни — комбінація ротора APS та соломотряса. Двигун AGCO Power 9,8 л 6-циліндровий, коробка передач ParaLevel у схилових варіантах. Найвищий клас у конвенційній програмі MF до появи IDEAL.

models:
  massey-ferguson-130: >-
    Лише британський ринок. Найменший з 100 Series.
  massey-ferguson-135: >-
    Вхідна модель та бестселер серії — вироблено понад 350 000 одиниць. У ЧССР один з найпоширеніших західних тракторів у JRD.
  massey-ferguson-165: >-
    Середній клас серії. 4-циліндровий Perkins, популярний для оранки та транспортування.
  massey-ferguson-188: >-
    Вершина серії 100 — 4-циліндровий Perkins 4,1 л.
