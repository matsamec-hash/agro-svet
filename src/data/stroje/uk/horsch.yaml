# UK переклад (описи/поля) на cs структуру. AI чернетка + редактор, потрібна перевірка.

country: "Німеччина"
description: >-
  Німецький піонер технологій no-till і minimum-till зі штаб-квартирою у Швандорфі (Баварія). Пневматичні сівалки Pronto і Sprinter, точні сівалки Maestro, no-till дискова сівалка Avatar, глибокорозпушувачі Tiger, лаповий лущильник Terrano, дискові лущильники Joker і обприскувачі Leeb (причіпні та самохідні PT/VL).

categories:
  ochrana-rostlin: "Захист рослин"
  seti: "Сівба і садіння"
  zpracovani-pudy: "Обробіток ґрунту"

series:
  leeb-ax: >-
    Leeb AX — причіпний обприскувач для середніх господарств, що продовжує попередній ряд Leeb LT (4 000 і 6 000 л). Пропонує штангу BoomControl з активним демпфуванням, точне регулювання окремих форсунок (PrecisionSpray) та ISOBUS-термінал SmartTouch. Компроміс між ціною та найвищим рівнем внесення, типовим для Horsch.
  leeb-gs: >-
    Leeb GS — причіпний обприскувач великої місткості (6 000 і 8 000 л) для великих площ. Серійний BoomControl Pro з ультразвуковими датчиками утримує штангу на висоті 30–50 см над посівом навіть при швидкості понад 15 км/год. Внутрішня циркуляція CCS Pro дозволяє швидко переходити між препаратами без забруднення. Штанга шириною до 42 м.
  leeb-pt: >-
    Leeb PT — самохідний обприскувач для великих господарств та послуг із внесення. Бак 6 000 або 8 000 л, робоча ширина 24–42 м. Гідропневматична підвіска штанги та осі, плавне регулювання кліренсу та трансмісія HydroDrive. Флагман сегмента самохідних обприскувачів Horsch.
  leeb-vl: >-
    Leeb VL — самохідний обприскувач з підвищеним кліренсом (до 165 см), призначений для внесення у високорослих культурах, як-от кукурудза, соняшник і картопля. Бак 5 000 або 6 000 л, гідравлічно регульована колія коліс 1,80–2,25 м. Конфігурація між PT та обприскувачем типу high-clearance.
  avatar: >-
    Avatar — причіпна пневматична сівалка для прямого посіву (no-till) у необроблений ґрунт і покривні культури. Дисковий висівний сошник SingleDisc із притиском до 350 кг впорається навіть із твердою стернею. Виконання SD рядкове з двома баками, SL — з великомісткісним баком для добрив (варіант solo або duo). Робоча ширина 6, 8, 10 і 12 м.
  express: >-
    Express — посівний агрегат з активною ротаційною бороною (KR) або турбодисковим розпушувачем (TD). Навісне виконання 3, 3,5 і 4 м для традиційної підготовки посівного ложа за один прохід із трактором середнього класу к.с. Сошники TurboDisc 2.0 забезпечують точне укладання насіння.
  focus: >-
    Focus TD — причіпний посівний агрегат з інтегрованим глибокорозпушувачем (TerraGrip), сошниками для добрив і висівними сошниками TurboDisc 2.0. Strip-till за одну операцію: розпушує, вносить добриво під насіння і сіє. Робоча ширина 4 і 6 м, варіант Focus з баком PPF для добрив.
  maestro: >-
    Maestro — точна сівалка для кукурудзи, соняшнику, буряка і сої з електричним висівним апаратом AirVac (CV/CX) або AirSpeed (SV/SX) до 15 км/год. CV/SV — класичні з центральним баком для добрив, CX/SX мають індивідуальні бункери. RV — причіпне виконання з великим центральним баком PPF. Ширина 6–24 м, рядки 45/50/70/75/80 см.
  pronto: >-
    Pronto DC — флагманський ряд пневматичних універсальних сівалок Horsch. Серійне поєднання передньої шини, дискового розпушувача, котка-пакера та сошників TurboDisc 2.0 дозволяє висівати у мульчу та підготовлений оранкою ґрунт за один прохід. Навісні 3 м та причіпні версії до 9 м обробляють від 5 до 18 га за годину.
  serto: >-
    Serto SC — причіпна пневматична сівалка короткої будови з дворядним розташуванням сошників TurboDisc з індивідуальним притиском 5–120 кг. Підходить для високих швидкостей посіву у мульчу та оранку з високою часткою решток. Робоча ширина 10 і 12 м.
  sprinter: >-
    Sprinter ST/NT — пневматична сівалка з пружними лаповими сошниками типу tine seeder для посіву у недоторкану стерню, неглибоко оброблений ґрунт або покривні культури. ST має жорстку раму 6 м, NT — складану раму до 12 м з робочою швидкістю понад 12 км/год. Підходить для посушливих регіонів та простої технології no-till.
  versa: >-
    Versa KR — навісний пневматичний посівний агрегат з активними ротаційними боронами для малих і середніх господарств. Універсальне застосування в різних ґрунтових умовах без потреби підготовки посівного ложа окремою машиною. Робоча ширина 3 і 4 м.
  cruiser: >-
    Cruiser SL/XL — лаповий лущильник для дрібного обробітку 3–15 см з вузькими лапами у 5–6 рядах з міжряддям 15 см. SL — навісне виконання 5 і 6 м, XL — причіпне до 12 м. Підходить для швидкого інтенсивного лущення після збирання та прискорення розкладання рослинних решток.
  finer: >-
    Finer SL — компактомат для підготовки дрібного посівного ложа з поєднанням пружинних і лапових вирівнювачів та котка-пакера. Навісне виконання з робочою шириною 6 м, глибина 2–10 см. Слугує переважно для весняної підготовки перед посівом цукрового буряка та кукурудзи.
  joker: >-
    Joker CT/RT/HT — компактний дисковий лущильник з дисками 52 см у X-розташуванні для дрібного обробітку 3–12 см. CT — навісне 3–6 м з жорсткою рамою, RT — причіпне 4–12 м з шинним пакером, HT — причіпне 8–12 м з великомісткісними шинами для вищої швидкості (до 18 км/год). Ідеальний для інтенсивного лущення після збирання зернових.
  terrano: >-
    Terrano FX/GX/MT — флагманський ряд лапових лущильників Horsch для середньоглибокого обробітку 5–30 см. FX (3 і 4 м, навісне), GX (5 і 6 м, причіпне напівнавісне) і MT (5–8 м, причіпне зі швидкою системою TerraGrip). Універсальна машина для лущення, глибшого розпушування та підготовки перед посівом.
  tiger: >-
    Tiger MT/AS/LT — глибокорозпушувач для інтенсивного обробітку на глибину до 35 см. MT (4 і 6 м) має лапи TerraGrip для максимальної прохідності органічної маси, AS (комбінований 4–8 м) додає диски та пакер для повної підготовки ложа за один прохід, LT (10 і 12 м) — великомісткісне причіпне виконання для найбільших господарств. Замінює плуг у системах minimum-till.
