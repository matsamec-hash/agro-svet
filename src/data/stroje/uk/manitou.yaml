# UK переклад (описи/поля) на cs структуру. AI draft+редактор, review потрібен.

country: "Франція"
description: >-
  Французький лідер у телескопічних навантажувачах та навантажувачах для сільського господарства. Флагманська серія MLT NewAg (heavy-duty телескопи 6–10 м, вантажопідйомність 2,5–6 т) з преміальною кабіною, телематикою EasyManager та двигунами Stage V 75–160 к.с. Компактна серія MT-X для малих ферм, шарнірні MLA-T для стайні, фронтальні навантажувачі MAC та з бортовим поворотом R/RT для універсального застосування.

categories:
  manipulace: "Маніпуляція та навантаження"

series:
  mlt-625: >-
    MLT 625 — вхідний heavy-duty телескопічний навантажувач серії NewAg. Макс. висота 6,1 м, вантажопідйомність 2,5 т.
    Двигун Stage V 75 к.с., гідростатична коробка передач, кабіна NewAg з панорамним оглядом.
    Придатний для малих та середніх ферм для маніпуляції з тюками соломи, кормів та палетизованого товару.
  mlt-730: >-
    MLT 730 — компактний heavy-duty телескопічний навантажувач NewAg з вильотом 7 м та вантажопідйомністю 3 т.
    Доступний у виконанні 115 к.с. (D — direct drive) та 130 к.с. (PS+ — powershift). Кабіна NewAg,
    джойстик JSM, телематика EasyManager. Універсальна машина для середніх ферм та кооперативів.
  mlt-737: >-
    MLT 737 — heavy-duty телескоп NewAg з вильотом 7 м та вищою вантажопідйомністю 3,7 т для складнішої
    маніпуляції з об'ємними тюками та гноєм. Двигун Stage V 130 к.с., коробка передач PS+ powershift,
    кабіна NewAg. Популярна машина на великих фермах з молочним виробництвом.
  mlt-840: >-
    MLT 840 — heavy-duty телескопічний навантажувач NewAg для великих ферм. Макс. висота 7,55 м,
    вантажопідйомність 4 т, двигун 145 к.с. Stage V з PS+ powershift. Кабіна NewAg з пневматичним сидінням,
    телематика EasyManager, придатний для складного цілоденного застосування та кормових дворів.
  mlt-940: >-
    MLT 940 — топовий heavy-duty телескоп серії NewAg з вильотом 9 м та вантажопідйомністю 4 т.
    Vario гідростатична коробка передач V+, двигун 140 к.с. Stage V, преміальна кабіна NewAg. Ідеальний для
    штабелювання великих тюків, наповнення жолобів та маніпуляції на великих складах.
  mlt-961: >-
    MLT 961 — надважкий телескоп NewAg з вантажопідйомністю 6 т та вильотом 9 м, призначений для найскладнішого
    застосування. Двигун 145 к.с. Stage V з коробкою передач Vario+, посилений підіймальний механізм. Штабелювання
    об'ємних тюків, маніпуляція з важкими палетами на біогазових станціях та компостних майданчиках.
  mlt-1041: >-
    MLT 1041 — флагманський heavy-duty телескопічний навантажувач NewAg з рекордним вильотом 9,65 м
    та вантажопідйомністю 4,1 т. Двигун 145 к.с. Stage V, PS+ powershift, преміальна кабіна NewAg. Для великих
    господарств, де треба дістати до найвищих поверхів штабелів та силосів.
  mt-x-420: >-
    MT-X 420 — компактний телескопічний навантажувач для малих ферм та обмежених просторів.
    Макс. висота 4,3 м, вантажопідйомність 2 т, ширина менше 1,8 м для проїзду низькими стайнями. Двигун 75 к.с.,
    гідростатична коробка передач, просте обслуговування для щоденної роботи на дворі.
  mt-x-625: >-
    MT-X 625 — компактний телескоп з вильотом 6 м та вантажопідйомністю 2,5 т, придатний для середніх ферм
    з акцентом на маневреність. Двигун 75 к.с. Stage V, гідростатична коробка передач,
    повнокермне керування з режимами синхронного та крабового руху.
  mt-x-730: >-
    MT-X 730 — топ-модель компактної серії MT-X з вильотом 7 м та вантажопідйомністю 3 т. Двигун 75 к.с. Stage V,
    гідростатичний привід, компактні розміри для низьких стайнів та вузьких проходів.
    Ідеальна комбінація вильоту та маневреності для середніх ферм.
  mac-50: >-
    MAC 50 — компактний колісний фронтальний навантажувач для сільського господарства з вантажопідйомністю 5 т та висотою вивантаження
    понад 3 м. Двигун Stage V, гідростатична коробка передач, кабіна з панорамним оглядом.
    Придатний для навантаження гною, кормів та сипких матеріалів на дворі.
  mac-60: >-
    MAC 60 — більший варіант компактного колісного навантажувача MAC з вантажопідйомністю 6 т. Вища висота
    вивантаження та більший об'єм ковша, двигун Stage V з гідростатичною коробкою передач. Для середніх та великих
    ферм з регулярною маніпуляцією з об'ємними матеріалами.
  mla-t-516: >-
    MLA-T 516 — шарнірний телескопічний навантажувач для сільського господарства з вантажопідйомністю 1,6 т та вильотом 5 м.
    Поєднує переваги фронтального навантажувача (маневреність, короткий радіус повороту) з телескопічним
    висуванням. Двигун Stage V, гідростатичний привід, ідеальний для роботи у вузьких стайнях.
  mla-t-533: >-
    MLA-T 533 — топовий шарнірний телескопічний навантажувач з вантажопідйомністю 3,3 т та вильотом 5 м. Варіанти
    PS+ (powershift) та V+ (Vario гідростат) з двигуном 130 або 145 к.с. Stage V. Кабіна з джойстиком
    JSM, телематика EasyManager. Придатний для великих стайнів та кормових дворів.
  rr-13: >-
    RR 13 — компактний навантажувач з бортовим поворотом з вантажопідйомністю 1,3 т для роботи у вузьких просторах стайнів
    та господарських будівель. Двигун Stage V, вертикальний підйом, широкий вибір адаптерів
    (ковші, вила, щітки). Ідеальний для щоденного догляду та маніпуляції з кормами.
  rr-16: >-
    RR 16 — середній навантажувач з бортовим поворотом з вантажопідйомністю 1,6 т та вертикальним підйомом.
    Двигун Stage V, міцна конструкція, сумісність з усім спектром адаптерів Manitou.
    Придатний для середніх ферм з щоденною маніпуляцією з об'ємними матеріалами.
  rr-18: >-
    RR 18 — топовий навантажувач з бортовим поворотом серії RR з вантажопідйомністю 1,8 т. Вища потужність двигуна, міцна рама
    та вертикальний підйом для максимального вильоту. Для великих ферм та універсального застосування з важкими
    адаптерами (щітки, снігові відвали, вила для тюків).
  mrt: >-
    MRT (Manitou Roto) — флагманська серія поворотних телескопічних навантажувачів з поворотною на 360° вежею,
    вперше представлена у 1981 році. Унікальна комбінація телескопа та мобільного крана: виліт до понад
    30 м у топових моделях, вантажопідйомність 4,5–7 т, повне обертання навантажувальної стріли без потреби
    переміщувати машину. Сучасне покоління MRT-X / MRT Vision+ пропонує розширену стабілізацію,
    телематику Manitou EasyManager, повністю поворотну кабіну та двигуни Stage V. Професійна машина,
    яка використовується насамперед у будівництві, на великих складах та для спеціальних маніпуляційних
    завдань у сільському господарстві — альтернатива мобільному крану для зон з обмеженим простором.

