  mrt-2150: >-
    Універсальне професійне Roto з вильотом 21 м та вантажопідйомністю 5 т, двигун 145 к.с. Stage V, преміальна кабіна Vision+.
  mrt-2470: >-
    Heavy-duty поворотний телескоп з рекордною вантажопідйомністю 7 т та вильотом 24 м, двигун 170 к.с. — для найскладніших будівельних та промислових застосувань.
  mrt-3050: >-
    Флагманська модель поворотної серії з вильотом 30 м та вантажопідйомністю 5 т — альтернатива мобільному крану для будівництва та спеціальних маніпуляційних завдань.
  mrt-3060: >-
    Топовий MRT з вильотом 30 м та вищою вантажопідйомністю 6 т — топова комбінація вильоту та вантажопідйомності в сегменті поворотних телескопів.
