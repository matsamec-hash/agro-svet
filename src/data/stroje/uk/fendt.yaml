# UK overlay (описи/поля) на cs структуру. AI draft+editor, потрібен review.

country: "Німеччина"
description: >-
  Преміальний німецький бренд тракторів, відомий CVT-трансмісією Vario. Належить концерну AGCO з 1997 року. Технологія Vario (безступінчаста трансмісія) дебютувала у 1995 році і сьогодні охоплює всю лінійку — від малих 200 Vario до флагманського 1000 Vario. Комбайни IDEAL належать до найдосконаліших у світі.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"

series:
  dieselross: >-
    Початковий трактор Fendt — Герман Фендт побудував перший «diesel horse» у майстерні свого батька у 1928 році зі стаціонарного двигуна та старої косарки. У 1937 році фірму внесли до торгового реєстру як Xaver Fendt & Co. і розпочали серійне виробництво. Одноциліндровий дизель Deutz повітряного охолодження визначив німецький сільський трактор — простий, надійний, розрахований на малі ферми. Серія Dieselross охоплювала від 6 коней (F6) до 40 коней (F40) і завершилася у 1958 році, коли її замінили серії Favorit, Farmer та Fix.
  favorit-classic: >-
    Легендарна серія, що визначила преміальну позицію Fendt. Favorit 1 з 1958 року був першою моделлю з новоспроєктованою трансмісією, Favorit 4 був першим 6-циліндровим бренду, а Favorit 600 LS приніс у 1979 році гідродинамічну Turbomatik (керований розгін через гідравлічне зчеплення) разом з повністю синхронізованою трансмісією TriPower. Флагманський Favorit 626 LS Turbomatik з 252 кіньми та двигуном MAN D2566 був багато років найпотужнішим трактором бренду — виготовлено лише 66 одиниць. Ця серія є прямим попередником Favorit 500/700/800/900 з 90-х років і стоїть біля витоків преміальної репутації Fendt.
  farmer-100-200: >-
    Наступник серії Dieselross у малому та середньому класі. Класичний Farmer з механічною синхронізованою трансмісією, рясно імпортований до тодішнього ЧССР та країн РЕВ після політичного послаблення 60-х років. У 1978 році на DLG була представлена серія 100 у виконаннях S та LSA з дещо підвищеною потужністю та кабіною Edition. Двигун MWM AKD або Deutz F3L912 повітряного охолодження був типовий надійністю та низькою вимогливістю до обслуговування. Серія 200 була пізніше замінена спеціалізованою компактною серією для виноградників та садів (1987+).
  farmer-300-400-lsa: >-
    Середній та більший клас Farmer з механічною трансмісією. Двигун MWM/Deutz, синхронізована трансмісія 21/6 або 24/8. Надійна концепція, донині популярна у дрібному та садівничому господарстві.
  xylon: >-
    Особливість Fendt — універсальний системний трактор з центральною кабіною, реверсним керуванням та трьома навісками (передня, центральна, задня). Для комунального та спеціалізованого застосування.
  favorit-500-c: >-
    Механічна трансмісія 44/44 TurboMatik, до появи технології Vario. Двигун MWM 6-циліндровий 6,2 л.
  favorit-500-vario: >-
    **Історична віха** — перший серійно вироблюваний трактор у світі з безступінчастою варіаторною трансмісією (CVT). Трансмісія ML70 Vario працює без передач, з необмежено плавною зміною швидкості від 0 до 40 км/год. Прорив у конструкції тракторів.
  favorit-700-vario: >-
    Флагманська серія після Favorit 500/600. Двигун MAN 6-циліндровий 6,9 л, трансмісія ML85 Vario з плавною зміною 0–50 км/год.
  favorit-800-vario: >-
    Велика преміальна серія. Двигун MAN 6-циліндровий 7,1 л, трансмісія ML100 Vario.
  favorit-900-vario: >-
    Флагманська серія для великих ферм. Двигун MAN 6-циліндровий 10,5 л, трансмісія ML150 Vario. Перший трактор з Vario понад 200 к.с.
  200-vario: >-
    Найменший Fendt — покоління Gen3, виведене у продаж з кінця січня 2021 (замовлення з жовтня 2020), повністю замінило початкову серію 2009 року. Варіанти для садів, виноградників та комунального застосування (виконання V/F/P). Компактна кабіна з керуванням FendtONE як стандартом, трансмісія Vario, двигун AGCO Power 3-циліндровий 3,3 л Stage V.
  300-vario-gen1: >-
    Утилітарна серія Vario. Двигун Deutz 4-циліндровий 4,0 л турбо з інтеркулером, трансмісія ML75 Vario, кабіна Visio Plus.
  300-vario-gen2: >-
    Покоління S4 з новою кабіною Visio Cab, дисплеєм VarioTerminal 7" та двигуном Tier 4 AGCO Power 4,4 л.
  500-vario-gen1: >-
    Середня серія. Двигун Deutz 4-циліндровий 4,0 л, трансмісія ML90 Vario.
  500-vario-s4: >-
    Покоління S4/Gen3. Двигун Deutz 4-циліндровий 4,0 л Stage IV/V, кабіна Visio Cab, дисплей 7", FendtONE farmer terminal з 2021.
  700-vario-gen1: >-
    Найбільш продавана преміальна серія у Європі. Двигун Deutz 6-циліндровий 6,1 л, трансмісія ML120 Vario. Знакове компонування.
  700-vario-s4: >-
    Покоління S4 та Gen6. Двигун Deutz 6-циліндровий 6,1 л Stage IV/V, кабіна VisioPlus, дисплей VarioGuide + TI Headland. Рекордні продажі у CZ та SK.
  700-vario-gen7: >-
    Цілком нова платформа. Двигун AGCO Power 7,5 л Core75 із системою eHybrid (48V генератор), трансмісія Vario TA 150, кабіна FendtONE, динамічна керована вісь VarioDrive. Потужність до 303 к.с., цілком нова дизайнова лінія.
  800-vario-gen1: >-
    Велика серія row-crop. Двигун Deutz 6-циліндровий 7,8 л, трансмісія ML130 Vario.
  800-vario-s4: >-
    Покоління Gen5/Gen6. Двигун **Deutz TCD 6.1 л** (6-циліндровий, 6,06 л) Stage V, кабіна ProfiPlus, ConceptCab. Актуальний склад: 826/829/832 Vario.
  900-vario-gen2: >-
    2-ге покоління серії 900. Двигун MAN 6-циліндровий 9,0 л, трансмісія ML260 Vario, гідравліка 220 л/хв, передня підвіска.
  900-vario-gen3: >-
    Цілком нове покоління — MAN D3876 6-циліндровий 9,0 л, VarioDrive, FendtONE, повна цифровізація. Найпотужніший 942 з 415 к.с. — найвищий Vario у конвенційному колісному тракторі.
  1000-vario: >-
    Найбільший Fendt — цілком нова платформа. Двигун MAN D4276 6-циліндровий 12,4 л, привід VarioDrive з електронно керованими осями, трансмісія TA300 Vario. Маса 14 т, найпотужніший колісний трактор у стандартній конфігурації.
  1100-vario-mt: >-
    Гусеничний трактор — флагман Fendt. Двигун MAN, гумові гусениці MTrack, трансмісія VarioDrive. Для великого сільськогосподарського та будівельного застосування.
  600-vario: >-
    Актуальний Fendt 600 Vario — дані синхронізовані з api.fendt.com.
  900-vario-mt: >-
    Актуальний Fendt 900 Vario MT — дані синхронізовані з api.fendt.com.
  1000-vario-gen4: >-
    Актуальний Fendt 1000 Vario Gen4 — дані синхронізовані з api.fendt.com.
  c-series: >-
    Економічна серія класичних комбайнів, перейнята від Laverda (AGCO). Підходить для середніх ферм. Двигун AGCO Power 6,6 л.
  l-series: >-
    Класичні комбайни Laverda з маркуванням Fendt. 6-соломотрясна система, роторний досепаратор. Двигун AGCO SISU Power 7,4 л.
  ideal: >-
    Революційна платформа, що розроблялася 7 років спільно AGCO + MIT. Два 600 мм ротори HARVEST CORE, оптимізація IDEALharvest за допомогою штучного інтелекту, вуглецеві конструкції. Варіанти 7, 8, 9, 10 залежно від потужності. Гусеничні версії -T для менш ущільненого ґрунту.
  corus-500: >-
    Актуальний Fendt CORUS 500 — дані синхронізовані з api.fendt.com.

models:
  fendt-dieselross-f6: >-
    Перший серійний Fendt — одноциліндровик 6 к.с. заклав основу всього бренду.
  fendt-dieselross-f18: >-
    F18 був першим Fendt з незалежним валом відбору потужності (PTO).
  fendt-dieselross-g25: >-
    Воєнний варіант на деревному газі — під час війни діяла заборона конструювання рідкопаливних тракторів, виготовлено 1 497 одиниць.
  fendt-farmer-1: >-
    Перший Fendt з прямим впорскуванням дизпалива — прорив в ефективності малих дизелів.
  fendt-favorit-4: >-
    Перший 6-циліндровий Fendt.
  fendt-favorit-615-lsa: >-
    Гідродинамічне зчеплення Turbomatik для керованого плавного розгону.
  fendt-favorit-626-lsa: >-
    Тоді найпотужніший Fendt — виготовлено лише 66 одиниць.
  fendt-farmer-104-lsa: >-
    LSA = LS з приводом усіх коліс (Allrad).
  fendt-farmer-200: >-
    Компактні розміри для малих господарств та садівничого застосування.
