# UK overlay (описи/поля) на cs структуру. AI draft+editor, потрібен review.

country: "США / Велика Британія"
description: >-
  Американський бренд з корінням у Case Corporation (1842) та International Harvester (1902), об'єднаних у 1985 році. У складі концерну CNH Industrial. Характерний червоний колір та флагманська серія Magnum, що цінується за надійність та CVT-трансмісії. Комбайни Axial-Flow утримують першість в однороторній конструкції з 1977 року.

categories:
  traktory: "Трактори"
  kombajny: "Комбайни"

series:
  7100-magnum: >-
    Легендарне перше покоління Magnum — перший трактор бренду Case IH після об'єднання. Двигун Case 5,9 л турбо, трансмісія Powershift 18/2.
  8900-magnum: >-
    Коротке покоління між 7000 та MX. Двигун Case 8,3 л з вищою потужністю.
  mx-maxxum: >-
    Початкова серія MX Maxxum (попередник MXM та сучасного Maxxum). Середній утилітарний трактор, що вироблявся у Донкастері (Велика Британія) та Расіні (США). Двигун Case 4- та 6-циліндровий, трансмісія 16/12 Synchro. Моделі 80–150 к.с.
  mx-magnum: >-
    Нове покоління Magnum з позначенням MX. Двигун Case 8,3 л common-rail, трансмісія 18/4 PowerShift або 8/2 ClutchPak.
  cvx: >-
    Перша серія Case IH з безступінчастою CVT-трансмісією — технологія, перейнята після придбання Steyr (1996). Вироблялася у Санкт-Валентині (Австрія). Двигун Sisu/Iveco 6-циліндровий, трансмісія **Steyr S-Matic CVT**. Початкове покоління CVX 130/150/170 (1999), модернізація CVX 1135/1145/1155/1170/1190/1195 (2003+). Попередник Puma CVX та Maxxum CVX.
  mxm: >-
    Універсальна серія, що продовжила MX Maxxum, попередник Puma. Вироблялася у Базілдоні (Велика Британія) у співпраці з New Holland (споріднена модель TM). Двигун Iveco/NEF 6-циліндровий, трансмісія Range Command 18/6 або Power Command 19/6. Моделі 110–180 к.с.
  cs-series: >-
    Утилітарний клас із заводу **Санкт-Валентин (Австрія)** — колишня фабрика Steyr. Двигун **Sisu/Steyr 4-циліндровий 4,5 л** (спільний зі Steyr Profi/Profi Plus), трансмісія Synchro-Shuttle 16/8. Попередник Maxxum та Vestrum.
  cx-series: >-
    Утилітарні трактори для малих та середніх господарств. Двигун Case 4-циліндровий, гідравліка 80 л/хв.
  farmall: >-
    Утилітарна серія, що продовжила славне ім'я Farmall з 70-х років IH. Двигун FPT 3- до 4-циліндрового, трансмісія механічна або ActiveDrive. Локально вироблялася в Італії та Туреччині.
  maxxum: >-
    Середня серія для змішаних господарств. Двигун FPT NEF 6,7 л, трансмісія 16/16 Electro Command або ActiveDrive 8 (нова версія з подвійним зчепленням), опціональна CVT (CVXDrive).
  puma: >-
    Преміальна універсальна серія. Двигун FPT NEF 6,7 л (до Puma 220), Cursor 9 (Puma 230+), трансмісія Full Powershift 18/6 або CVXDrive (CVT). Кабіна MultiControl armrest.
  magnum: >-
    Флагманська row-crop серія. Двигун FPT Cursor 9 (8,7 л) та Cursor 13 (12,9 л), трансмісія Full Powershift 19/4 або CVXDrive. AFS AccuTurn, гусеничні варіанти Rowtrac.
  optum: >-
    Між Magnum та Puma — компактний row-crop з CVT. Двигун FPT Cursor 9, трансмісія CVXDrive (безступінчаста).
  vestrum: >-
    Компактна середня серія з безступінчастою CVT-трансмісією (CVXDrive). Заповнює прогалину між Maxxum та Puma. Двигун FPT NEF 4-циліндровий 4,5 л Stage V, трансмісія CVXDrive S-Matic. Кабіна MultiControl Armrest, термінал AFS Pro 700.
  steiger: >-
    Шарнірно-зчленовані 4WD трактори для великих господарств, що виробляються у Фарго (Північна Дакота, США). Придбання Steiger Tractor Co. відбулося у **1986** році (заснована 1957 у Ред-Лейк-Фоллс, Міннесота). Сучасні варіанти: **колісний Steiger** (класична рама) та **Quadtrac** (4 трикутні гумові гусениці, представлений у 1996 році як STX375 Quadtrac). Двигун FPT Cursor 13 (12,9 л) та Cursor 16 (16 л) в актуальних моделях.
  quadtrac: >-
    Перший шарнірно-зчленований трактор у світі з 4 незалежними гумовими гусеницями (4-track). Представлений у 1996 році як Steiger STX 4-Track, з 2006 року повністю під брендом Case IH Quadtrac. Виробляється у Фарго (Північна Дакота, США). Спеціально призначений для масштабної оранки та культивації з низьким тиском на ґрунт (контактна площа в 4 рази більша, ніж у коліс). Двигун FPT Cursor 13 (12,9 л) та Cursor 16 (16 л), трансмісія Full Powershift 16/2. У ЧР застосовується на великих фермах для глибокого обробітку ґрунту. Сучасні моделі: Quadtrac 470, 500, 540, 580, 620 та флагманський **Quadtrac 715** (2024) — найпотужніший трактор Case IH.
  axial-flow-16-21-series: >-
    Легендарна однороторна конструкція — Case IH винайшов аксіальну молотильну систему у 1977 році. Серії 1660, 1666, 1680, 1688, 2166, 2188, 2366, 2388 перебували у виробництві понад 20 років і донині у ЧР звичайно продаються на вторинному ринку.
  axial-flow-80-series: >-
    Продовження серії Axial-Flow. Двигун Iveco/FPT 8,3 та 10,3 л, покращена молотильна система.
  axial-flow-130-140-series: >-
    Двигуни FPT Tier 4, AFS Harvest Command, змінний ротор. Серія 140 для вимогливої експлуатації.
  axial-flow-150-250-series: >-
    Найсучасніше покоління. AFS Harvest Command Automation зі штучним інтелектом, двигуни FPT Cursor 9/13 Stage V, повністю автоматичне налаштування молотильної системи залежно від культури. Флагманський 9250 — найпотужніший комбайн Case IH.
