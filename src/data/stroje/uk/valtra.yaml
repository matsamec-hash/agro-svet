# UK overlay (описи/поля) на cs структуру. AI draft+editor, review потрібен.

country: "Фінляндія"
description: >-
  Фінський виробник тракторів з давньою традицією (раніше Valmet). Частина концерну AGCO з 2004 року. Відомий міцною конструкцією для північних умов, реверсивною системою TwinTrac (кабіна з поворотним сидінням для роботи назад) та персоналізацією — кожен трактор виготовляється на замовлення відповідно до вимог клієнта. Комбайни не виробляє.

categories:
  traktory: "Трактори"

series:
  valmet-6000-8000: >-
    Останнє покоління під маркою Valmet перед перейменуванням на Valtra (2001). Двигун Valmet 4- та 6-циліндровий, коробка передач синхронізована 30/30. Популярні в ЧР завдяки простоті та доступності.
  hitech: >-
    Перше покоління під маркою Valtra (з 2001). Двигун Sisu Power 4- та 6-циліндровий, коробка передач HiShift з електронним перемиканням 40/40. Доступна реверсивна система TwinTrac.
  direct-legacy: >-
    Перша Valtra з безступінчастою варіаторною коробкою передач (CVT). Революційна технологія для виробника, історично заснованого на механічних коробках передач.
  n-gen1: >-
    Новий універсальний ряд. Двигун AGCO Power 4-циліндровий, коробка передач HiTech 5 / Versu Powershift 36/36 / Direct CVT. Кабіна розроблена у співпраці з промисловим дизайнером.
  n-gen2: >-
    Третє покоління N (Valtra маркетингово позначає його як 4-те покоління). Двигун AGCO Power 4,4 л (4-циліндровий) або 4,9 л (4-циліндровий), Stage IV/V. Версії Active (механічна), Versu (Powershift) та Direct (CVT). Кабіна з дахом SkyView для фронтального навантажувача. Моделі із суфіксом -4 (N104, N114, …, N174).
  n-gen3: >-
    Четверте покоління ряду N (Valtra Unlimited). Двигун AGCO Power 4,9 л Stage V, коробка передач Active / Versu (Powershift) / Direct (CVT). Кабіна SmartTouch 3 з 9" дисплеєм, підлокітник з OLED-кнопками. Моделі без суфікса -4 (перейменування на N135/N155/N175/N195).
  t-gen1: >-
    Флагманський ряд row-crop. Двигун Sisu/AGCO Power 6-циліндровий 6,6 л та 7,4 л. Версії HiTech, HiTech 5, Versu (Powershift) та Direct (CVT).
  t-gen2: >-
    4-те та 5-те покоління. Двигун AGCO Power 6-циліндровий 7,4 л, коробка передач HiTech 5, Active, Versu (Powershift 5x5), Direct (CVT). Кабіна SmartTouch (2015+) — інтегрований 9" дисплей та джойстик з OLED-символами.
  s-gen1: >-
    Перше покоління S Series. Двигун AGCO Power 8,4 л, коробка передач Direct CVT, кабіна TwinTrac (реверсивна).
  s-gen5: >-
    5-те покоління. Двигун AGCO Power 8,4 л Stage V, коробка передач AGCO PowerSplit CVT. Кабіна SmartTouch.
  a-series: >-
    Утилітарний ряд для менших господарств та комунальної сфери. Двигун AGCO Power 3,3 л та 4,4 л, коробка передач Mechanical / HiTech, реверсор Power Shuttle.
  g-series: >-
    Середній клас між A та N. Двигун AGCO Power 4,4 л Stage V, компактні розміри з сучасною кабіною SmartTouch (опціонально) або Classic.
  q-series: >-
    Найновіший ряд між T та S, представлений у 2022 році (FIMA Zaragoza). Двигун **AGCO Power CORE66 6,6 л** (НЕ 7,4 л як T-series) Stage V, коробка передач PowerSplit CVT, кабіна SmartTouch 3 з реверсивним керуванням TwinTrac як опція, Valtra SmartControl, режим EcoPower для меншого споживання.
