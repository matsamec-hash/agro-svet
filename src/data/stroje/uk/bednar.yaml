# UK overlay (описи/поля) на cs структуру. AI draft+editor, потрібен review.

country: "Чехія"
description: >-
  BEDNAR FMT — чеський виробник преміальних машин для обробітку ґрунту, сівби та внесення добрив, заснований у 1997 році в Рихнові-над-Кнєжноу. Фірма виробляє надійні машини для великих господарств з акцентом на робочу ширину 3–18 м та високу продуктивність на гектар. Флагманські серії становлять глибокорозпушувачі TERRALAND, компактомати SWIFTER, дискові лущильники ATLAS та універсальні сівалки OMEGA. Bednar постачає більш ніж до 40 країн світу і належить до найвагоміших чеських брендів сільськогосподарської техніки.

categories:
  seti: "Сівба та садіння"
  zpracovani-pudy: "Обробіток ґрунту"

series:
  omega: >-
    OMEGA — флагманська універсальна пневматична сівалка BEDNAR для технологій min-till, mulch-till
    та конвенційних. Робоча ширина 3–9 м, дводискові посівні сошники CrossBoard Heavy
    та центральний бункер 3 000–5 000 л. Моделі OO (причіпна) та OF (з передніми лапами) дозволяють
    сівбу у мульчу, солому та компактну стерню. Машина популярна серед великих ферм
    у Чеській Республіці та у Східній Європі.
  ferox: >-
    FEROX — швидкісна пневматична сівалка BEDNAR, оптимізована для високих робочих
    швидкостей до 18 км/год. Коротка робоча довжина, агресивна дискова секція та точне дозування
    забезпечують високу продуктивність на гектар на великих полях. Ширина 4–6 м, ідеальна для
    комбінації з попереднім обробітком ґрунту.
  corsa: >-
    CORSA — точна сівалка BEDNAR для сівби кукурудзи, соняшнику, буряку та сої. Пневматична
    сингуляція, електричний привід висівних апаратів та секція з індивідуальним контролем притиску.
    Ширина від 4,5 м за міжрядної відстані 70 см, призначена для точного землеробства
    з ISOBUS-терміналом.
  combo: >-
    COMBO LO — комбінована сівалка BEDNAR, що поєднує попередній обробіток ґрунту з точним
    висівом за один прохід. Дискова секція, компактоматний коток та пневматичний посівний апарат
    дозволяють сівбу в необроблений ґрунт або після лущення. Ширина 4–6 м, підходить для mulch-till
    систем.
  ferti-box: >-
    FERTI-BOX FB — фронтально-навісний бункер для добрив BEDNAR для доповнення сівалок
    функцією внесення мінеральних добрив при сівбі. Об'єм 1 700–3 000 л, пневматичне транспортування
    добрива трубопроводом до посівного апарата ззаду. Дозволяє strip-till удобрення та стартові
    дози для кукурудзи та ріпаку.
  terraland: >-
    TERRALAND — флагманська серія глибокорозпушувачів BEDNAR для глибокого розпушування до 65 см
    без перевертання ґрунту. Надійна рама, краплеподібне долото Active-Mix та задній коток CrossBoard
    забезпечують перемішування рослинних решток та структуру ґрунту. Моделі TN (навісна), TO (причіпна)
    та DO (причіпна з дисковою секцією) охоплюють ширини 3–7 м та потребують трактор 200–500 к.с.
  swifter: >-
    SWIFTER — флагманський компактомат BEDNAR для підготовки посівного ложа за один прохід.
    Комбінація переднього вирівнювача, компактоматної секції, прутової борони та заднього котка забезпечує
    рівний та структурований профіль для сівби. Ширини 6–18 м залежно від моделі (SO навісний,
    SM середній, SN причіпний) належать до найширших у категорії.
  atlas: >-
    ATLAS — серія коротких дискових лущильників BEDNAR для мілкої культивації 5–15 см
    та лущення після збирання. Великі диски 620–660 мм з індивідуальним кріпленням у гумових
    сайлентблоках долають навіть тверду стерню. Ширини 3–15 м залежно від моделі: AO (навісний),
    AN (причіпний середній) та AM (причіпний великий) охоплюють ферми від 200 до 5 000 га.
  fenix: >-
    FENIX — лаповий лущильник BEDNAR для мілкої та середньої культивації 8–25 см. Стрілчасті
    лапи з широким перекриттям забезпечують суцільне підрізання та перемішування рослинних
    решток. Модель FN навісна до 4 м ширини, FO причіпна 4–7 м. Підходить для лущення, весняного
    розпушування та підготовки перед сівбою.
  versatill: >-
    VERSATILL — універсальний лаповий розпушувач BEDNAR для середньої глибини 10–35 см
    зі швидкозмінною системою долот. Завдяки модульній конструкції долає лущення, розпушування
    та підготовку посівного ложа. Ширина 3–6 м, модель VO у навісному та причіпному виконанні.
  kor: >-
    KOR — компактний навісний дисковий лущильник BEDNAR для менших та середніх ферм. Диски 510 мм
    у X-розташуванні забезпечують агресивне різання та перемішування. Ширина 2,5–4 м, підходить для тракторів
    від 100 к.с. Модель KO доступна виключно в навісному виконанні.
  mulchfarmer: >-
    MULCHFARMER — комбінований розпушувач BEDNAR, розроблений для технології mulch-till. Поєднує
    дискову секцію, лапи та коток за один прохід, що дозволяє підготовку ґрунту з високою
    часткою рослинних решток. Ширина 4–6 м, модель MF долає важкі умови після кукурудзи
    та ріпаку.
  strip-master: >-
    STRIP-MASTER — strip-till машина BEDNAR для смугового обробітку ґрунту з внесенням добрива.
    Розпушує лише смугу шириною 20 см з кроком 45–80 см, між смугами зберігає мульчу. Дозволяє
    економію пального, захист ґрунту від ерозії та точне живлення. Модель SM з шириною 3–6 м
    з інтегрованим бункером або під'єднанням до FERTI-BOX.
  row-master: >-
    ROW-MASTER RN — міжрядний культиватор BEDNAR для механічного догляду за кукурудзою, соняшником,
    буряком та соєю. Секція з ножовими лапами та дисками для точного ведення у міжрядді
    45–80 см. Можливість доповнення внесенням рідких добрив або смугового підживлення.
    Ширина 6–12 м.
  galaxy: >-
    GALAXY — серія важких котків BEDNAR для реконсолідації ґрунту після оранки, культивації або
    у весняний період на пшениці. Сегменти Cambridge або Crosskill діаметром 530–630 мм,
    ширини 6–18 м. Модель GO зі складною рамою для широкозахватного застосування.
  presspack: >-
    PRESSPACK — навісний прес-коток BEDNAR за плугом або розпушувачем для негайної
    реконсолідації та закриття профілю. Гумові або сталеві кільця діаметром 700–900 мм
    з високою масою для глибокої дії. Модель PP з шириною 3–6 м, монтаж на задню
    триточкову навіску або безпосередньо на знаряддя.
  presser: >-
    PRESSER PE — причіпний прес-коток BEDNAR за плугом для безперервної реконсолідації орного шару
    під час оранки. Усуває другий прохід з котком та дозволяє пряму послідовність до сівби.
    Ширини відповідають розміру плуга, модель PE для 5–9-корпусних плугів.
