# UK переклад (описи/поля) на cs структуру. AI draft+редактор, review потрібен.

country: "Франція"
description: >-
  Французький виробник із найширшим портфоліо сільськогосподарської техніки — плуги Master та Vari-Master, сівалки Espro та Venta, обприскувачі Altis/Metris/Oceanis, розкидачі Axis та Aero, прес-підбирачі VB/LSB, косарки GMD, кормозмішувачі Euromix та Profile.

categories:
  hnojeni: "Внесення добрив"
  komunal-les: "Комунальна та лісова техніка"
  ochrana-rostlin: "Захист рослин"
  seti: "Сівба та садіння"
  sklizen-picnin: "Заготівля кормів і соломи"
  staj-chov: "Стайня та тваринництво"
  zpracovani-pudy: "Обробіток ґрунту"

series:
  aero: >-
    Пневматичні розкидачі мінеральних добрив із розподільною штангою із захватом до 27 м.
    Aero використовує повітряний розподіл замість відцентрових дисків, що гарантує надзвичайну
    точність дозування навіть для промислових добрив. Придатні для tram-line внесення
    та посекційного відключення. Причіпні виконання з об'ємом понад 3 м³.
  axis: >-
    Флагманська серія навісних відцентрових розкидачів з електронною системою EMC,
    яка безперервно вимірює момент кожного диска та коригує дозу в реальному часі.
    Захвати 12–50 м, ємність бункера 1 000–4 500 л. Версія H з безперервним зважуванням
    для найвищої точності на змінному рельєфі та схилах.
  msp: >-
    Універсальні розкидачі органічних добрив з вертикальними барабанами або дисками.
    Конструкція з низько розташованим центром ваги та гідравлічним заднім шибером
    забезпечує рівномірне внесення підстилкового гною, компосту й дигестату.
    Моделі з об'ємом кузова 8–24 м³, сумісні з ISOBUS.
  pul: >-
    Навісні та причіпні цистерни для рідкого гною з об'ємом 7–28 м³. Стандартним є вакуумне
    наповнення та можливість комбінації з аплікаторами (шлангові, дискові, slot-інжектор).
    Сумісні з ISOBUS та посекційним відключенням для точного внесення на ділянках
    у захисних зонах.
  bp: >-
    Універсальні мульчувачі для догляду за газонами, узбіччями та стернею.
    Захвати 1,8–3,2 м із плаваючим шарніром для копіювання нерівностей.
    Реверсивні варіанти BPR дозволяють як передній, так і задній монтаж і придатні
    для застосування з комунальною технікою.
  tbe: >-
    Стрілові мульчувачі для догляду за канавами, узбіччями та живоплотами.
    Гідравлічна стріла з вильотом 5–8 м та хитним мульчувальним адаптером.
    Стандартно пропорційне джойстикове керування та безпекова float-система
    проти ударів.
  altis: >-
    Навісні польові обприскувачі з баком 1 000–1 800 л та захватом штанг 18–28 м.
    Гідравлічно керовані сталеві штанги з підвіскою та посекційним відключенням.
    Придатні для середніх господарств та комбінації з переднім баком
    для збільшення ємності.
  deltis: >-
    Компактні навісні обприскувачі для менших та середніх господарств. Бак 600–1 300 л,
    штанги 12–24 м з ручним або гідравлічним розкладанням. Стандартно комп'ютер
    DPAE для точного дозування залежно від швидкості.
  lexis: >-
    Компактний причіпний обприскувач початкового класу з баком 2 400–3 000 л та штангами
    18–24 м. Одновісне шасі, механічно кероване дишло та просте обслуговування.
    Придатний для середніх господарств, що шукають першу причіпну машину.
  metris: >-
    Причіпний обприскувач середнього класу з об'ємом бака 3 200–4 100 л та штангами
    18–30 м. Оснащений системою стабілізації штанг Equilibra та активним посекційним
    керуванням. ISOBUS з картографічним внесенням та можливістю Auto-Section.
  oceanis: >-
    Флагманська серія причіпних обприскувачів з баком 4 600–7 700 л та алюмінієвими
    штангами до 44 м. Пневматична підвіска, керована вісь та стабілізація штанг
    Equilibra+. Повністю ISOBUS, сумісні з GPS-секційним керуванням та форсунками PWM.
  espro: >-
    Причіпні дискові посівні комбінації для мінімалізаційної та конвенційної технології.
    Дворядні диски з регульованим кутом, котки TF з ущільнювальним ефектом
    та паралелограм висівних сошників. Захвати 3–8 м, одно- або двокамерні
    бункери для сівби сумішей та проміжних культур.
  maxima: >-
    Точні сівалки для просапних культур — кукурудзи, соняшнику, ріпаку
    та цукрового буряку. Електричний привід висівного апарата з індивідуальним відключенням
    рядків та одиничним відбором зерен. Захват 4–18 рядків, керування через ISOBUS-
    термінал CCI.
  sitera: >-
    Механічні сівалки для комбінації з ротаційною бороною HR. Сошниковий висівний
    апарат Suprapack або дисковий CD для різних ґрунтових умов. Гідравлічне
    переведення в транспортне положення та можливість підживлення. Захват 3–4 м.
  venta: >-
    Пневматичні сівалки для комбінації з активним знаряддям. Централізоване
    дозування з електричним приводом, пневматичний розподіл до сошників та великий
    бункер до 1 500 л. Придатні для інтенсивних господарств з комбінацією
    ротаційної борони та сівалки за один прохід.
  fc: >-
    Косарки з кондиціонером (сталевими пальцями або вальцями) для прискорення
    висихання кормів. Захвати 2,4–13,4 м у навісному, фронтальному та triple-виконанні.
    Несиметричний привід Optidisc та гідропневматичне розвантаження Lift-Control
    для дбайливого застосування на нерівному рельєфі.
  ga: >-
    Валкоутворювачі кормів з одним, двома або чотирма роторами. Захвати 3,2–15 м,
    кероване шасі MASTER DRIVE GIII для надзвичайної довговічності та 3D-хитання
    роторів, що копіюють рельєф. Моделі 9531/15131 є флагманською серією для великих
    господарств та професійної заготівлі сінажу.
  gf: >-
    Ворушилки кормів із захватами 4,5–17 м та 4–14 роторами. Гідравлічне регулювання кута
    розкидання для різних типів культур та дбайливе ворушіння навіть молодого корму.
    Хитна головка digihead для стабільності на схилах та нічного транспортування
    у складеному положенні.
  gmd: >-
    Дискові косарки без кондиціонера для навісного та причіпного застосування.
    Косильний брус Optidisc Elite з великим міжосьовим інтервалом дисків для плавного відкидання
    матеріалу. Захвати 1,7–9,5 м, навісні та triple-варіанти з автоматичним
    обходом перешкод (NSH).
  lsb: >-
    Тюкові прес-підбирачі середнього класу з камерою 80×70 або 80×90 см. Підбирач шириною
    2,3 м та інтегрований ріжучий апарат до 23 ножів. Придатні для соломи, сіна
    та сінажу з високою щільністю тюка та низькими експлуатаційними витратами.
  merge-maxx: >-
    Стрічковий валкоутворювач (merger) з підбирачем та транспортною стрічкою замість роторів.
    Дбайливе поводження з кормом без забруднення ґрунтом — ідеально для якісного
    сінажу та насіннєвих травостоїв. Захват 9,5 м з можливістю валкування праворуч,
    ліворуч та на обидва боки.
  profile-fs: >-
    Самозавантажувальний підбирач-візок із великомісткою вантажною камерою 36–58 м³ DIN.
    Підбирач шириною 2 м та ножовий ротор з 35–46 ножами для короткого нарізання кормів.
    Тандемна вісь із підвіскою та гідравлічна вивантажувальна підлога.
  rw: >-
    Причіпні обмотувачі тюків для круглих та прямокутних тюків. Подвійні попередньо натяжні
    вузли 500/750 мм та гідравлічне скидання тюка в положення для плавної
    роботи з навантажувачем. Моделі RW 1410/1610 належать до найбільш продаваних
    у Європі.
  vb: >-
    Рулонні прес-підбирачі зі змінною камерою для тюків діаметром 0,8–1,85 м.
    Новий ротор Integral для високої продуктивності навіть у вологому матеріалі, ріжучий апарат
    OptiCut з 14, 23 або 25 ножами. Варіанти VBP поєднують прес з обмотувачем
    за один прохід.
  euromix: >-
    Горизонтальні кормозмішувальні візки з 2–4 шнеками/лопатками та об'ємом 8–24 м³.
    Делікатна змішувальна дія, придатна для змішування TMR із часткою довгостеблових кормів
    та сіна. Стандартно програмоване зважування з пам'яттю рецептур.
  primor: >-
    Машини для розпушування та видування соломи у стайні — bale shredder. Бічний
    викид до 18 м, поворотний комин для видування соломи у глибокі стайні.
    Моделі від 1,3 до 5,7 м³ з підбирачем для великих тюків 120×120 см.
  profile-mixer: >-
    Вертикальні кормозмішувальні візки з одним або двома шнеками та об'ємом
    12–46 м³. Шнек з гострими ножами для швидкого подрібнення великих тюків
    та сінажу. Версія Plus додає програмоване зважування, інтерфейс ISOBUS
    та режим eco-drive.
  spv: >-
    Самохідні змішувальні візки з інтегрованою завантажувальною фрезерною стрілою
    та об'ємом 12–27 м³. Гідростатичний привід, кабіна з оглядом 360°
    та можливість конфігурації приводу 4×4 або 4×4×4 з керованою задньою віссю.
    Придатні для великих ферм з щоденним годуванням 200+ голів.
  tks: >-
    Автоматична система годівлі на базі роботизованого візка на стельовій рейці
    стайні. Завантажується бункером TMR та програмовано об'їжджає кормовий стіл
    у заданий час. Знижує витрати на працю та стабілізує добову
    норму — придатна для молочних ферм з автоматичною доїльною стайнею.
  cultimer: >-
    Лаповий лущильник з 2–4 рядами стояків та гідравлічним захистом
    Non-Stop. Захвати 3–6 м у навісному та 6–10 м у причіпному виконанні.
    Змінні лапи дозволяють адаптацію від мілкого лущення 5 см
    до глибокого розпушування 35 см.
  discover-xm2: >-
    Короткий дисковий лущильник для мілкого лущення та вирівнювання поверхні.
    Диски 510 мм з незалежним підвішуванням та гідравлічним захистом.
    Придатний для високопродуктивних господарств з тракторами 150+ к.с. та робочою
    швидкістю 12–15 км/год. Захвати 3–6 м.
  hr: >-
    Ротаційні борони з активними ротаційними елементами для якісної підготовки посівного
    ложа. Захвати 3–8 м, навісні та складані варіанти з фіксованою швидкісною
    коробкою передач або опцією Speedline. Стандартно коток Maxipack
    та можливість комбінації з механічною чи пневматичною сівалкою.
  master: >-
    Оборотні навісні та напівнавісні плуги з 3–8 корпусами. Моделі Master 103/153
    пропонують механічне або гідравлічне регулювання захвату, Vari-Master плавне
    регулювання ширини скиби 30–55 см. Стояки з борної сталі з резервом
    для глибокої оранки до 35 см.
  optimer: >-
    Короткі дискові лущильники, призначені для мілкого лущення після збирання.
    Диски 510 мм з індивідуальним підвішуванням на гумових сайлентблоках.
    Захвати 3–7,5 м у навісному та причіпному виконанні. Гідравлічне регулювання
    глибини з кабіни для адаптації до різних типів ґрунтів.
  prolander: >-
    Лаповий культиватор для мілкого лущення та підготовки посівного ложа.
    Шість рядів стояків з міжстояковим інтервалом 6 см забезпечують рівномірний профіль
    роботи та якісне загортання післязбиральних решток. Захвати 3–7,5 м,
    навісні та причіпні.
