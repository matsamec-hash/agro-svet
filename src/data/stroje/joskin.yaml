description: >
  Belgický specialista na cisterny na kejdu a zemědělské návěsy. Cisterny Modulo 2, Quadra, Komfort 2, Volumetra, X-Trem, Cargo a EuroLiner, návěsy Trans-CAP, Trans-KTP, Trans-SPACE, Trans-EX a Drakkar, aplikátory Pendislide, Pendiwing, Solodisc a Multitwist a rozmetadla statkových hnojiv Tornado3, Ferti-CAP a Siroko.
categories:
  doprava:
    name: Doprava
    series:
      - slug: drakkar
        name: Drakkar
        family: drakkar
        subcategory: navesy-posuvne-dno
        description: |
          Drakkar je velkoobjemový návěs s posuvným dnem pro siláž, senáž, obilí a štěpku. Robustní šasi s tandemovou nebo tridem nápravou zvládne až 38 m³ objemu a 30 t užitné hmotnosti. Hydraulicky poháněný řetězový dopravník umožňuje rychlé a šetrné vyprázdnění bez zvedání korby, což je ideální pro nízké haly a bioplynové stanice. Pneumaticky tlumené nápravy a hydraulické řízení zajišťují stabilitu i při vysokých rychlostech.
        tech_highlights:
          load_capacity_kg: 24000-30000
          tank_capacity_l: 28000-38000
