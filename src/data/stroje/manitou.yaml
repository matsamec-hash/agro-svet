description: >
  Francouzský lídr v teleskopických manipulátorech a nakladačích pro zemědělství. Vlajková řada MLT NewAg
  (heavy-duty teleskopy 6-10 m, nosnost 2,5-6 t) s prémiovou kabinou, EasyManager telematikou a Stage V
  motory 75-160 hp. Compact řada MT-X pro malé farmy, kloubové MLA-T pro stáje, čelní nakladače MAC
  a smykové R/RT pro univerzální nasazení.
