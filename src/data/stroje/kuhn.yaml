slug: kuhn
name: Kuhn
country: Francie
founded: 1828
website: https://www.kuhn.com/
wikipedia: https://cs.wikipedia.org/wiki/Kuhn
wikidata: https://www.wikidata.org/wiki/Q1669214
description: >
  Francouzský výrobce s nejširším portfoliem zemědělské techniky — pluhy Master a Vari-Master, secí stroje Espro a Venta, postřikovače Altis/Metris/Oceanis, rozmetadla Axis a Aero, lisy VB/LSB, žací stroje GMD, krmné vozy Euromix a Profile.
categories:
  hnojeni:
    name: Hnojení
    series:
      - slug: aero
        name: Aero
        family: aero
        subcategory: rozmetadla-mineralni
        description: |
          Pneumatická rozmetadla minerálních hnojiv s rozdělovacím ramenem v záběru až 27 m.
          Aero využívá vzduchový rozvod místo odstředivých kotoučů, což zaručuje extrémní
          přesnost dávkování i u průmyslových hnojiv. Vhodné pro tram-line aplikace
          a sektorové vypínání. Tažená provedení s objemem nad 3 m³.
        models:
          - slug: aero-32-2
            name: Aero 32.2
            tagline: Tažené pneumatické rozmetadlo se záběrem 18–27 m
            url: https://www.kuhn.com/en-int/products/fertilisation/mineral-fertiliser-spreaders/aero-32-2
