        name: AXIS
        family: axis
        subcategory: rozmetadla-mineralni
        description: |
          Vlajková řada nesených odstředivých rozmetadel s elektronickým systémem EMC,
          který kontinuálně měří moment každého kotouče a koriguje dávku v reálném čase.
          Záběry 12–50 m, kapacity zásobníku 1000–4500 l. Verze H s kontinuálním vážením
          pro nejvyšší přesnost při proměnlivém terénu a sklonu.
        models:
          - slug: axis-h-emc-w
            name: AXIS H EMC W
            tagline: Nesené rozmetadlo s vážením, EMC regulací a záběrem až 50 m
            url: https://www.kuhn.com/en-int/products/fertilisation/mineral-fertiliser-spreaders/axis-h-emc-w
          - slug: axis-m-emc
            name: AXIS M EMC
            tagline: Nesené rozmetadlo s EMC regulací průtoku
            url: https://www.kuhn.com/en-int/products/fertilisation/mineral-fertiliser-spreaders/axis-m-emc
          - slug: axent-100-1
            name: AXENT 100.1
            tagline: Tažené velkokapacitní rozmetadlo, zásobník až 9300 l
            url: https://www.kuhn.com/en-int/products/fertilisation/mineral-fertiliser-spreaders/axent-100-1
      - slug: msp
        name: Profile (rozmetadla statková)
        family: msp
        subcategory: rozmetadla-statkova
        description: |
          Univerzální rozmetadla statkových hnojiv s vertikálními bubny nebo talíři.
