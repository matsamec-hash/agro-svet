slug: amazone
name: Amazone
country: Německo
founded: 1883
website: https://amazone.de/
description: >
  Německý specialista (sídlo Hasbergen-Gaste) na rozmetadla minerálních hnojiv (řady ZA-V, ZA-TS, ZG-TS),
  postřikovače (UF, UX, samojízdná Pantera), secí stroje (Cataya, Centaya, Cirrus, Precea, Primera DMC)
  a zpracování půdy (diskové podmítače Catros/Catros XL, radličkové Cenius/Cenio, hlubinný Cobra,
  rotační brány KE/KG/KX). Známý technologiemi ArgusTwin (rozmetadla) a SmartSprayer (postřikovače).
