slug: kubota
name: Kubota
country: Japonsko
founded: 1890
website: https://www.kubota.cz
description: >
  Japonský výrobce s bohatou tradicí. Silná pozice v segmentu kompaktních a středních traktorů,
  historicky známý pro sady, vinice a komunální služby. V posledních letech expanduje i do
  row-crop třídy (M Series nad 130 koní). Kombajny pod Kubota v ČR minoritní (řada DC),
  primárně pro japonský/asijský trh.

