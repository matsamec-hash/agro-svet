slug: zetor
name: Zetor
country: Česká republika
founded: 1946
website: https://www.zetor.cz
description: >
  Tradiční český výrobce traktorů z Brna. Ikona československého zemědělství od roku 1946.
  Modelové řady Major, Proxima, Forterra a Crystal pokrývají traktory od 50 do 170 koní.
  Značka je vyhlášená jednoduchou údržbou, spolehlivostí a dostupnou cenou.

categories:
  traktory:
    name: Traktory

    series:
