slug: zetor
name: Zetor
country: Česká republika
founded: 1946
website: https://www.zetor.cz
wikipedia: https://cs.wikipedia.org/wiki/Zetor
wikidata: https://www.wikidata.org/wiki/Q196868
description: >
  Tradiční český výrobce traktorů z Brna, vzniklý 1946 ze Zbrojovky Brno (původně letecké motory
  Aero/Avia). Jméno **Z**brojovka + trak**TOR**. Definující řada **UR I** (1962+) se stala
  kostrou českého i východoevropského zemědělství. Současné řady **Major, Proxima, Forterra,
  Crystal HD** pokrývají 53–170 k. Od roku 2018 spolupráce s John Deere. Vlastník: HTC
  Investments. Export do více než 60 zemí.

categories:
  traktory:
    name: Traktory

    series:
      # ========== Pre-UR éra (1946–1968) ==========
      - slug: z-25
        name: "Z 25 / 25K / 25A (1946–1968)"
        year_from: 1946
        year_to: 1968
        description: >
          První traktor Zetoru, představený **1946** v Brně. Vznikl na půdě **Zbrojovky Brno**
          (předválečné letecké motory Aero/Avia) a definoval **Zetorský systém** —
          jednoduchá obsluha, dostupné servisování, jeden palivový systém pro celou řadu.
          Verze **Z 25K** (1950, Konstrukčně upravený) přidala lepší kabinu, **Z 25A** (1952)
          dostal hydraulický tříbodový závěs. Celkem vyrobeno přes **158 500 kusů** — definující
          traktor poválečného československého zemědělství.
        models:
          - slug: zetor-25
            name: "Z 25 (1946)"
            year_from: 1946
            year_to: 1949
            power_hp: 25
            power_kw: 18
            engine: "Zetor, 2-válec diesel 2,1 L"
            description: "Vůbec první sériový Zetor. Vyráběn 1946–1949 (cca 43 tis. ks)."
          - slug: zetor-25k
            name: "Z 25K (1950)"
            year_from: 1950
            year_to: 1958
            power_hp: 25
            power_kw: 18
            engine: "Zetor, 2-válec diesel 2,1 L"
            description: "Konstrukčně upravená verze — vylepšená kabina a uchycení nářadí."
          - slug: zetor-25a
            name: "Z 25A (1952)"
            year_from: 1952
            year_to: 1968
            power_hp: 27
            power_kw: 20
            engine: "Zetor, 2-válec diesel 2,1 L"
            description: "Nejvyspělejší Z 25 — hydraulický tříbodový závěs, modernizovaná hydraulika. Vyráběn paralelně s UR I až do 1968."

