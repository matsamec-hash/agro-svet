description: >-
  Pšenice jarní (Triticum aestivum) se vysévá na jaře a sklízí o 2–3 týdny dříve než ozimá.
  Dosahuje nižších výnosů, avšak její zrno má zpravidla vyšší obsah bílkovin a lepku, což ji předurčuje
  pro výrobu potravinářské mouky s dobrými pekárenskými vlastnostmi.
vysevek: 350–500 klíčivých zrn/m²
hnojeni: N 80–130 kg/ha; důraz na kvalitativní dávku dusíku ve fázi sloupkování až stéblovění
vynos_t_ha: 4–6
sklizen: červenec
vyuziti: potravinářská mouka (chléb, pečivo), krmné zrno
choroby:
  - braničnatka pšeničná (septorióza)
  - padlí travní
  - rezi
  - fuzariózy klasu
osevni_postup:
  - name: Předplodina
    text: Jarní pšenice není tak náročná na předplodinu jako ozimá; vhodné jsou luskoviny, řepka nebo okopaniny.
  - name: Příprava půdy
    text: Podzimní orba nebo jarní zpracování co nejdříve po uschnutí půdy; jemné seťové lůžko pro rovnoměrné vzcházení.
  - name: Setí
    text: Výsev co nejdříve na jaře (únor–březen), hloubka 3–4 cm, výsevek 350–500 klíčivých zrn/m².
  - name: Hnojení
    text: Dusík 80–130 kg/ha; kvalitativní dávka ve fázi sloupkování podpoří obsah bílkovin v zrnu.
  - name: Ochrana rostlin
    text: Moření osiva, fungicidní ošetření při výskytu chorob (padlí, septorióza, fuzariózy klasu) dle prahu škodlivosti.
  - name: Sklizeň
    text: Sklizeň v červenci při vlhkosti zrna 13–15 %; pro potravinářské odrůdy sledovat i parametry jakosti (Zelenyho test, číslo poklesu).
wikipedia: https://cs.wikipedia.org/wiki/P%C5%A1enice_set%C3%A1
faq:
  - q: Čím se liší jarní pšenice od ozimé?
    a: Jarní pšenice se vysévá na jaře a nepotřebuje vernalizaci. Dosahuje nižšího výnosu zrna, ale zpravidla vyššího obsahu bílkovin a lepku vhodného pro pekárenství.
  - q: Jaký výsevek volíme u jarní pšenice?
    a: Doporučuje se 350–500 klíčivých zrn/m². Vyšší výsevek kompenzuje kratší vegetační dobu a nižší odnožování při jarním setí.
  - q: Kdy pšenici jarní sít?
    a: Výsev by měl proběhnout co nejdříve po uschnutí půdy, ideálně únor–březen. Pozdní setí snižuje výnos a kvalitu zrna.
