slug: jetel
name: Jetel luční
name_plural: Jetel luční
skupina: picniny
description: >-
  Jetel luční (Trifolium pratense) je nejdůležitější pícní luskovinou v ČR, pěstovaná pro zelené
  krmivo, seno, senáž a siláž s vysokým obsahem bílkovin (18–22 % v sušině). Biologicky fixuje
  vzdušný dusík a je klíčovým prvkem osevního postupu pro zlepšení půdní úrodnosti.
vysevek: 8–14 kg/ha (v čistém porostu); 4–8 kg/ha v jetelotravních směsích
hnojeni: N minimální (fixace biologická); P 40–60 kg P₂O₅/ha; K 80–130 kg K₂O/ha; vápnění při pH pod 6,0
vynos_t_ha: 8–14 (sušina za celou sklizňovou sezónu, 2–3 seče)
sklizen: 2–3 seče ročně; první seč na začátku kvetení (červen), druhá seč srpen
vyuziti: zelené krmivo, seno, senáž, siláž, zelené hnojení, medonosná plodina
choroby:
  - sklerotiniová hniloba (Sclerotinia trifoliorum) — přezimovací hniloba
  - antraknóza jetele (Colletotrichum trifolii)
  - virová mozaika jetele (CMV, TYMV)
  - fytoftorová hniloba kořenů (Phytophthora cactorum)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Jetel luční je výbornou předplodinou pro ozimé obilniny. Sám se nesmí pěstovat opakovaně — minimální přestávka 4–5 let (riziko půdních chorob a únava půdy pro jetel).
  - name: Příprava půdy
    text: Jemné seťové lůžko s dobrou záhřevností. Jetel prospívá na středně těžkých, neutrálních půdách s pH 6,0–7,0. Citlivý na kyselost a zamokření.
  - name: Setí (pod krycí plodinu)
    text: Nejčastěji podsev pod jarní obilninu (oves, ječmen jarní) na jaře. Výsevek 8–14 kg/ha, hloubka setí 1–2 cm (velmi mělce — malé semeno).
  - name: Hnojení
    text: Fosfor a draslík dle rozborů půdy, vápnění při kyselé půdní reakci. Dusík se nedopňuje (biologická fixace), draslík je nejdůležitější živinou.
  - name: Sklizeň
    text: První seč na začátku kvetení (maximální kombinace výnosu a kvality), druhá seč v srpnu. Ponechat po poslední seči dostatečný porost pro bezpečné přezimování.
  - name: Péče a přezimování
    text: Sledovat výskyt sklerotiniové hniloby po zimě. Jetel luční je dvouletá nebo krátkodobě vytrvalá plodina — většinou se pěstuje 1–2 roky.
wikipedia: https://cs.wikipedia.org/wiki/Jetel_lu%C4%8Dn%C3%AD
faq:
  - q: Kolik dusíku jetel luční fixuje?
    a: Jetel luční může vázat 150–250 kg N/ha za rok prostřednictvím symbiotických bakterií Rhizobium. Tato hodnota závisí na kondici porostu, půdních podmínkách a počasí.
  - q: Proč se jetel vysévá pod krycí plodinu?
    a: Podsev pod krycí obilninu chrání drobné jetelové klíčky před plevelnou konkurencí a slunečním žárem v prvním roce. Obilnina funguje jako „deštník" a jetel se etabluje v jejím stínu.
  - q: Jak dlouho vydrží porost jetele lučního?
    a: Jetel luční je krátkodobě vytrvalá luskoviny — porost je produktivní 1–2 roky, výjimečně 3 roky. Pak výrazně klesá hustota a výnos.
  - q: Jaký výnos sušiny jetel poskytuje?
    a: Při 2–3 sečích dosahuje jetel luční 8–14 t sušiny/ha ročně. Na dobrých stanovištích s příznivými srážkami může výnos překročit 14 t/ha.
