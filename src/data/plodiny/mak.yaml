slug: mak
name: Mák setý
name_plural: Mák
skupina: olejniny
description: >-
  Mák setý (Papaver somniferum) je tradiční česká olejnina a kořenina, jejíž zrno obsahuje 40–50 %
  tuku a je typickou součástí české kuchyně (koláče, vánočka, rohlíky). ČR patří mezi největší
  producenty a exportéry makového semene na světě. Pěstování makovic je přísně legislativně regulováno.
vysevek: 0,4–0,8 kg/ha (velmi malé semeno, cílová hustota 50–80 rostlin/m²)
hnojeni: N 60–100 kg/ha; citlivý na chloridová hnojiva (používat sírany); P a K dle rozborů
vynos_t_ha: 0,8–1,5
sklizen: červenec–srpen (tobolky zralé, semena suchá)
vyuziti: potravinářské makové semeno (pečivo, cukrářství), makový olej, farmaceutické alkaloidy (morfin)
choroby:
  - plíseň maková (Peronospora arborescens)
  - bakteriální skvrnitost (Xanthomonas campestris)
  - fuzarióza kořenů a stonku
  - virová mozaika máku (TuMV)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Mák se nesmí vrátit na stejné pole dříve než za 5–6 let. Nejlepší předplodiny jsou obilniny; vyloučit luskoviny a brukvovité (přenosné choroby).
  - name: Příprava půdy
    text: Velmi jemné a rovné seťové lůžko — mák má drobné semeno a citlivé klíčky. Orba 20–22 cm, jemná jarní příprava.
  - name: Setí
    text: Setí co nejdříve na jaře (únor–březen), hloubka pouhých 0,5–1,5 cm (!), výsevek 0,4–0,8 kg/ha. Mák klíčí jen při teplotě nad 2 °C.
  - name: Hnojení
    text: N 60–100 kg/ha, P a K dle rozborů; chloridová hnojiva jsou nevhodná. Dusík aplikovat před setím nebo ve fázi růžice.
  - name: Ochrana rostlin
    text: Herbicidy (preemergentně i postemergentně), fungicidy při výskytu plísně makové, insekticidy při výskytu kyjatky makové nebo bejlomorky.
  - name: Sklizeň
    text: Sklizeň v červenci–srpnu při úplném uzrání tobolek — v momentě, kdy jsou suché a semena při zatřesení chrastí. Přezrálé tobolky se otevírají a dochází ke ztrátám.
wikipedia: https://cs.wikipedia.org/wiki/M%C3%A1k_set%C3%BD
faq:
  - q: Proč je hloubka setí máku tak malá?
    a: Mák má velmi drobné semeno — semena jsou tak malá, že hluboce zasetá nemohou vyklíčit a dostat se na povrch. Optimální hloubka setí je 0,5–1,5 cm.
  - q: Jaká jsou legislativní omezení při pěstování máku v ČR?
    a: Pěstovatelé máku jsou povinni každoročně ohlásit pěstování Celní správě ČR a dodržovat minimální vzdálenost porostů od obydlí. Obsah morfinu v rostlinách je sledován.
  - q: Jaký výnos makového semene lze očekávat?
    a: Průměrný výnos je 0,8–1,3 t/ha, v příznivém roce na dobrém stanovišti až 1,5 t/ha. Mák je výnosově nestabilní plodina citlivá na srážkový deficit.
