slug: slunecnice
name: Slunečnice roční
name_plural: Slunečnice
skupina: olejniny
hero_image: /images/plodiny/slunecnice.jpg
hero_author: ""
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:A_sunflower.jpg"
description: >-
  Slunečnice roční (Helianthus annuus) je teplomilná olejnina pěstovaná pro semena s vysokým obsahem
  oleje (45–55 %). Je zajímavá jako přerušovač obilních ssledů, medonosná plodina a v posledních
  letech také jako bioenergetická plodina. Vyžaduje teplé a slunné klima.
vysevek: 5–8 rostlin/m² (50–80 tis. rostlin/ha)
hnojeni: N 80–120 kg/ha; P a K dle rozborů; slunečnice je náročná na draslík a bor
vynos_t_ha: 2,5–4
sklizen: září–říjen (při vlhkosti semen <12 %)
vyuziti: jedlý slunečnicový olej, krmné šroty, medonosná plodina, ptačí krmivo
choroby:
  - sklerotiniová hniloba (Sclerotinia sclerotiorum) — nejnebezpečnější
  - plíseň slunečnicová (Plasmopara halstedii)
  - alternariová skvrnitost
  - fomópsiová hniloba stonku (Diaporthe helianthi)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Slunečnice je výbornou předplodinou pro obilniny. Sama vyžaduje 4–5letý odstup od slunečnice a dalších hostitelů sklerotiniové hniloby (řepka, hrách).
  - name: Příprava půdy
    text: Hluboká podzimní orba (25–30 cm), jarní příprava seťového lůžka. Slunečnice prospívá na hlubokých, dobře provzdušněných půdách.
  - name: Setí
    text: Setí od konce dubna do poloviny května, kdy teplota půdy dosáhne 8–10 °C. Hloubka 4–6 cm, výsevek 5–8 rostlin/m².
  - name: Hnojení
    text: N 80–120 kg/ha, aplikovaný před setím nebo při přípravě půdy. Slunečnice je náročná na K a B — sledovat zásobenost těmito živinami.
  - name: Ochrana rostlin
    text: Herbicidy (preemergentní nebo postemergentní). Sklerotinioza — fungicidy při kvetení; plíseň slunečnicová — odrůdová odolnost + moření osiva.
  - name: Sklizeň
    text: Sklizeň v září–říjnu, při vlhkosti semen pod 12 %. Při vyšší vlhkosti nutno dosušit. Slunečnicové hlavy se sklízejí speciálním adaptérem.
wikipedia: https://cs.wikipedia.org/wiki/Slune%C4%8Dnice_ro%C4%8Dn%C3%AD
faq:
  - q: Jaký výnos slunečnicových semen lze očekávat?
    a: Průměrný výnos semen v ČR je 2,5–3,5 t/ha. V příznivých podmínkách s dobrou agrotechnikou lze dosáhnout 4 t/ha.
  - q: Proč je sklerotiniová hniloba tak nebezpečná pro slunečnici?
    a: Sclerotinia sclerotiorum napadá stonek i hlavu slunečnice a může způsobit úplné zničení porostu. Sklerotia přežívají v půdě desítky let, proto je klíčový dlouhý osevní postup (4–5 let bez náchylných plodin).
  - q: Je slunečnice dobrou předplodinou?
    a: Ano, slunečnice je výbornou přerušovací plodinou pro obilniny. Zanechává hluboce prokořeněnou půdu a přispívá k rozrušení obilního sledu.
