slug: hrach
name: Hrách polní
name_plural: Hrách
skupina: luskoviny
hero_image: /images/plodiny/hrach.jpg
hero_author: ""
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:Illustration_Pisum_sativum0.jpg"
description: >-
  Hrách polní (Pisum sativum) je nejrozšířenější luskovinou v ČR, ceněná zejména jako předplodina
  pro ozimé cereálie. Vázáním vzdušného dusíku symbioticky s bakteriemi Rhizobium zlepšuje půdní úrodnost
  a snižuje nároky na dusíkaté hnojení následné plodiny. Zrno je bohatým zdrojem bílkovin (22–28 %).
vysevek: 80–110 klíčivých zrn/m²
hnojeni: N 0–30 kg/ha (startovací pouze — símě fixuje N atmosférický); P a K dle rozborů; molybden pro lepší funkci hlízkových bakterií
vynos_t_ha: 3–5
sklizen: červenec (při vlhkosti zrna <14 %)
vyuziti: krmné zrno (bílkovinné krmivo), potravinářství (loupaný hrách, konzervovaný), zelené hnojení
choroby:
  - askochytóza hrachu (Ascochyta pisi)
  - fuzarióza kořenů a stonku (Fusarium spp.)
  - plíseň hrachová (Peronospora viciae)
  - virová mozaika hrachu (PSbMV, přenáší mšice)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Hrách nesmí následovat po jiné luskovině — minimální přestávka 4–5 let. Nejlepší předplodiny jsou ozimé obilniny. Hrách sám je vynikající předplodinou pro ozimou pšenici.
  - name: Příprava půdy
    text: Orba 20–22 cm nebo minimalizace; hrách prospívá na středně těžkých, dobře odvodněných půdách s pH 6,0–7,5. Citlivý na kyselost a zamokření.
  - name: Setí
    text: Jarní setí co nejdříve (únor–březen), hloubka 4–6 cm, výsevek 80–110 klíčivých zrn/m². Hrách snáší mírný mráz — raný výsev je výhodný.
  - name: Inokulace a hnojení
    text: Inokulace osiva hlízkovými bakteriemi Rhizobium leguminosarum je výhodná na pozemcích bez historického pěstování luskovin. N hnojení minimální (startovací 0–30 kg/ha), P a K dle rozborů.
  - name: Ochrana rostlin
    text: Herbicidy (preemergentní + postemergentní), fungicidy při výskytu askochytózy a plísně, insekticidy při výskytu mšic a hrachové zrnokazky.
  - name: Sklizeň
    text: Sklizeň v červenci při vlhkosti zrna pod 14 %. Hrách je náchylný k poléhání a časné sklizni — vhodné jsou polotyčkové nebo tyčkové odrůdy nebo podpěrné plodiny (oves).
wikipedia: https://cs.wikipedia.org/wiki/Hr%C3%A1ch_set%C3%BD
faq:
  - q: Proč je hrách tak dobrou předplodinou?
    a: Hrách vázáním vzdušného dusíku (přes symbiotické bakterie Rhizobium) obohacuje půdu o dusík. Zanechává také dobrou strukturu půdy a přerušuje obilní sled, čímž snižuje tlak chorob a plevelů.
  - q: Potřebuje hrách dusíkaté hnojivo?
    a: Hrách si většinu dusíku opatřuje biologickou fixací. Startovací dávka N (0–30 kg/ha) může podpořit vzcházení, než se rozvinou hlízkové bakterie. Vyšší dávky N jsou plýtvání a inhibují fixaci.
  - q: Jaký výnos hrachu polního lze očekávat?
    a: Průměrný výnos je 3–4,5 t/ha. Na kvalitních stanovištích s příznivým počasím lze dosáhnout 5 t/ha. Hrách je výnosově nestabilní — sucho v době kvetení výrazně snižuje výnos.
