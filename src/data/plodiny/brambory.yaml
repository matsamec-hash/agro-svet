slug: brambory
name: Brambor
name_plural: Brambory
skupina: okopaniny
description: >-
  Brambor (Solanum tuberosum) je jednou z nejdůležitějších potravinářských plodin světa
  a historicky klíčová okopanina v ČR. Pěstuje se pro konzumní hlízy, výrobu škrobu a krmné účely.
  Vyžaduje kvalitní, dobře odvodněné půdy a náchylnost na choroby klade vysoké nároky na ochranu.
vysevek: 35 000–45 000 sadby/ha (vzdálenost v řádku 30–35 cm, meziřádková vzdálenost 70–75 cm)
hnojeni: N 100–160 kg/ha dle směru (konzumní vs. škrobové); K 150–250 kg K₂O/ha; P dle rozborů; organická hnojiva výhodná
vynos_t_ha: 25–40 (konzumní a průmyslové odrůdy)
sklizen: srpen–říjen (dle ranosti odrůdy)
vyuziti: konzumní hlízy, výroba škrobu, krmivo, výroba lihu a lupínků
choroby:
  - plíseň bramborová (Phytophthora infestans) — nejnebezpečnější
  - Alternaria solani (hnědá skvrnitost listů)
  - virové choroby (mozaiky, svinutka, Y-virus)
  - Rhizoctonia solani (vředovitost hlíz a stonků)
  - strupovitost hlíz (Streptomyces scabies)
osevni_postup:
  - name: Předplodina
    text: Brambor vyžaduje dlouhý osevní postup (minimálně 3–4 roky bez lilkovitých). Nejlepší předplodiny jsou obilniny, kukuřice a luskoviny.
  - name: Příprava půdy a hnojení
    text: Hluboká podzimní orba (28–30 cm), aplikace organiky (chlévský hnůj 20–30 t/ha). Jarní příprava hřbetů nebo rovné seťové lůžko.
  - name: Příprava sadby a výsadba
    text: Certifikovaná, virologicky prověřená sadba (min. E nebo A třída). Výsadba od dubna, hloubka 8–12 cm, výsevek 35 000–45 000 ks/ha.
  - name: Hnojení
    text: N dle směru využití (konzumní 100–130 kg N/ha, škrobové 120–160 kg N/ha), vysoká dávka K zlepšuje tvorbu a kvalitu hlíz.
  - name: Ochrana rostlin
    text: Plíseň bramborová — fungicidy preventivně dle signalizace, každých 7–14 dní. Herbicidy preemergentně. Insekticidy při výskytu mandelinky bramborové.
  - name: Sklizeň
    text: Desikace natě a sklizeň při vytvrzené slupce (tlak palcem slupku nepoškodí). Dle ranosti odrůdy červenec–říjen; šetrná manipulace minimalizuje tlakové škvrny.
wikipedia: https://cs.wikipedia.org/wiki/Brambor
faq:
  - q: Proč je plíseň bramborová tak závažná?
    a: Phytophthora infestans může během několika dní zničit celý porost za vlhkého a teplého počasí. Je to stejný patogen, který způsobil irský hladomor v 19. století. Preventivní fungicidní ošetření je při příznivých podmínkách nezbytné.
  - q: Jak poznat, že jsou brambory připraveny ke sklizni?
    a: Brambory jsou zralé, když nať přirozeně žloutne a odumírá a slupka hlíz je vytvrzená — palcem ji nelze snadno sloupnout. U ranných odrůd lze sklízet i dříve (baby brambory).
  - q: Jaká je důležitost certifikované sadby?
    a: Certifikovaná sadba zaručuje nízkou hladinu virových chorob (Y-virus, svinutka, mozaiky), které se šíří sadebním materiálem a dramaticky snižují výnos a kvalitu.
  - q: Jaký je typický výnos brambor?
    a: Konzumní a průmyslové brambory dosahují 25–40 t/ha hlíz. Raná odrůdy sklízené dříve dosahují nižšího výnosu (15–25 t/ha).
