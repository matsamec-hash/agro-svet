slug: vojteska
name: Vojtěška setá
name_plural: Vojtěška
skupina: picniny
description: >-
  Vojtěška setá (Medicago sativa) je vytrvalá pícní luskoviny s hlubokým kořenovým systémem (3–5 m),
  odolná vůči suchu a schopná vázat 200–300 kg N/ha ročně. Poskytuje vysoce kvalitní krmivo
  (seno, senáž, granule) s obsahem bílkovin 18–24 % v sušině a sklízí se 3–5x ročně.
vysevek: 15–20 kg/ha (v čistém porostu); 8–12 kg/ha v travní směsi
hnojeni: N minimální (fixace biologická); P 50–70 kg P₂O₅/ha; K 120–200 kg K₂O/ha; Ca (vápnění) klíčové při pH pod 6,5; bor 1 kg/ha
vynos_t_ha: 10–18 (sušina za celou sezónu, 3–5 sečí)
sklizen: 3–5 sečí ročně; seče v počátku kvetení (10 % rostlin v květ.); v ČR zpravidla 3–4 seče
vyuziti: seno, senáž, dehydratované granule (nejkvalitnější krmná bílkovina), zelené krmivo, medonosná plodina
choroby:
  - verticillium (Verticillium albo-atrum) — verticilliové vadnutí
  - fuzarióza kořenů a stonku (Fusarium spp.)
  - plíseň vojtěškové (Peronospora aestivalis)
  - bakteriální vadnutí (Clavibacter michiganensis subsp. insidiosus)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Vojtěška nesmí být pěstována na témže pozemku dříve než za 6–8 let (únavnost půdy, verticillium, fusarium). Nejlepší předplodiny jsou obilniny.
  - name: Příprava půdy a vápnění
    text: Hluboká orba (28–30 cm) pro rozvoj kořenů. Vápnění na pH 6,5–7,5 je klíčové — vojtěška je velmi citlivá na kyselost. Jemné seťové lůžko.
  - name: Setí
    text: Setí časně na jaře (únor–duben) nebo v létě po sklizni obilniny (červenec). Hloubka 1–2 cm, výsevek 15–20 kg/ha. Lze podsévat pod jarní obilninu.
  - name: Hnojení
    text: Draslík a fosfor dle rozborů půdy jsou klíčové živiny; K 120–200 kg K₂O/ha se aplikuje po sečích. Bor 1 kg/ha podporuje tvorbu hlízek.
  - name: Sklizeň
    text: Seče provádět na začátku kvetení (10–20 % rostlin v květu) pro optimální kombinaci výnosu a kvality. Ponechat porost minimálně 15 cm nad zemí.
  - name: Péče o porost
    text: Vojtěška vydrží 4–6 let; po přezimování sledovat hustotu porostu. Při výpadcích dosít nebo přejít na jiné využití plochy.
wikipedia: https://cs.wikipedia.org/wiki/Vojt%C4%9B%C5%A1ka_set%C3%A1
faq:
  - q: Jak hluboko sahají kořeny vojtěšky?
    a: Vojtěška tvoří kůlový kořen sahající až 3–5 m do hloubky. Díky tomu čerpá vodu z hlubokých vrstev půdy a je výrazně odolnější vůči suchu než mělce kořenující plodiny.
  - q: Kolikrát ročně se vojtěška sklízí?
    a: V ČR se vojtěška sklízí zpravidla 3–4x ročně, v teplejších oblastech může být až 5 sečí. Každá seč se provádí na začátku kvetení pro optimální kvalitu krmiva.
  - q: Proč je vápnění pro vojtěšku tak důležité?
    a: Vojtěška je velmi citlivá na kyselou půdní reakci. Při pH pod 6,0 jsou porosty řídké, hlízkové bakterie špatně fungují a fixace dusíku klesá. Optimální pH je 6,5–7,5.
  - q: Jak dlouho vojtěška vydrží na stanovišti?
    a: Dobře vedené porosty vojtěšky jsou produktivní 4–6 let. Poté se hustota porostu snižuje, narůstá podíl plevelů a výnos klesá — pozemek je třeba obnovit jinou plodinou.
