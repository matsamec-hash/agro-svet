slug: oves
name: Oves setý
name_plural: Oves
skupina: obiloviny
description: >-
  Oves setý (Avena sativa) je jarní obilnina pěstovaná pro zrno i pícninu.
  Snáší chladnější a vlhčí oblasti a má nízké nároky na předplodinu.
  Využívá se ve výživě lidí (vločky, kaše), v krmivářství i jako zelená biomasa (GPS).
vysevek: 350–450 klíčivých zrn/m²
hnojeni: N 60–90 kg/ha dle předplodiny a stanoviště
vynos_t_ha: 4–6
sklizen: konec července až srpen
vyuziti: krmné zrno, ovesné vločky, pícnina, GPS
choroby:
  - padlí travní
  - rzi (korunková, stéblová)
  - prašná sněť ovesná
  - krauróza ovesná
osevni_postup:
  - name: Volba pozemku
    text: Oves snáší horší předplodinu, vhodný po okopaninách i po obilnině. Dobře prospívá v chladnějších a vlhčích polohách.
  - name: Příprava půdy
    text: Středně hluboká orba nebo minimalizační zpracování, urovnání seťového lůžka před jarním výsevem.
  - name: Setí
    text: Jarní výsev co nejdříve po uschnutí půdy, hloubka 3–4 cm, výsevek 350–450 zrn/m².
  - name: Hnojení
    text: Dusík 60–90 kg/ha dle výnosového potenciálu stanoviště a předplodiny; fosfor a draslík dle rozborů půdy.
  - name: Ochrana rostlin
    text: Ochrana proti padlí a rzím dle prahu škodlivosti; moření osiva chrání proti sněti ovesné.
  - name: Sklizeň
    text: Sklizeň při plné zralosti zrna, vlhkost pod 15 %, předejít ztrátám vykláním při přezrálosti.
wikipedia: https://cs.wikipedia.org/wiki/Oves_set%C3%BD
faq:
  - q: Jaký je výsevek ovsa?
    a: Doporučený výsevek ovsa je 350–450 klíčivých zrn na m², podle stanoviště a termínu setí.
  - q: Po jaké předplodině pěstovat oves?
    a: Oves má nízké nároky na předplodinu, dobře snáší pěstování po okopaninách i po jiné obilnině.
  - q: V jakých oblastech se oves pěstuje nejlépe?
    a: Oves prospívá v chladnějších a vlhčích polohách, kde jsou jiné obilniny méně výnosné. Nevhodné jsou suché a teplé nížiny.
  - q: Jaký výnos zrna lze od ovsa očekávat?
    a: Při dobrém agrotechnickém vedení dosahuje oves výnosu 4–6 t/ha zrna. Na příznivých stanovištích lze dosáhnout i vyšších výnosů.
