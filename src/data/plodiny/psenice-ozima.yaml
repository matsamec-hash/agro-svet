slug: psenice-ozima
name: Pšenice ozimá
name_plural: Pšenice ozimá
skupina: obiloviny
hero_image: /images/plodiny/psenice-ozima.jpg
hero_author: ""
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:Illustration_Triticum_aestivum1.jpg"
description: >-
  Pšenice ozimá (Triticum aestivum) je nejrozšířenější obilnina v České republice,
  pěstovaná zejména pro potravinářské a krmné zrno.
  Ozimá forma se vysévá na podzim a sklízí v létě, dosahuje vyšších výnosů než forma jarní.
vysevek: 300–450 klíčivých zrn/m² (podzimní výsev); nižší hodnoty pro ranné výsevy
hnojeni: N 120–180 kg/ha v dělených dávkách (start vegetace, sloupkování, stéblovění); P a K dle rozborů
vynos_t_ha: 6–9
sklizen: červenec
seti_mesice: [9, 10]
sklizen_mesice: [7]
vyuziti: potravinářská mouka, krmné zrno, škrob, bioethanol
choroby:
  - braničnatka pšeničná (septorióza)
  - fuzariózy klasu a kořenů
  - padlí travní
  - rezi (pšeničná, žlutá)
  - SNS (sněť zakrslá)
osevni_postup:
  - name: Předplodina
    text: Nejlepší předplodiny jsou řepka, hrách a luskoviny. Opakovaná pšenice po pšenici zvyšuje riziko fuzariózy a braničnatky.
  - name: Příprava půdy
    text: Orba na 20–25 cm po sklizni předplodiny, urovnání seťového lůžka; při minimalizaci důkladné zapravení posklizňových zbytků.
  - name: Setí
    text: "Optimální termín setí v ČR: 1.–20. října. Hloubka setí 3–5 cm, výsevek 300–450 klíčivých zrn/m²."
  - name: Hnojení dusíkem
    text: Dusík aplikovat v dělených dávkách — na startu vegetace, ve fázi sloupkování a při stéblování dle výnosového cíle.
  - name: Ochrana rostlin
    text: Moření osiva, jarní fungicidní ošetření (braničnatka, padlí, rzi) a ochrana klasu (fuzariózy). Regulátory růstu při riziku poléhání.
  - name: Sklizeň
    text: Sklizeň při vlhkosti zrna 13–15 % (červenec); správné seřízení mlátičky minimalizuje ztráty.
wikipedia: https://cs.wikipedia.org/wiki/P%C5%A1enice_set%C3%A1
faq:
  - q: Kdy se vysévá ozimá pšenice?
    a: Optimální termín výsevu ozimé pšenice v ČR je 1.–20. října. Příliš raný výsev zvyšuje riziko houbových chorob a přemnožení škůdců.
  - q: Jaká je spotřeba dusíku u pšenice ozimé?
    a: Pšenice ozimá potřebuje 120–180 kg N/ha, aplikovaných ve 2–3 dávkách od startu vegetace po fázi stéblovění.
  - q: Jaký je typický výnos pšenice ozimé v ČR?
    a: Průměrný výnos v ČR se pohybuje kolem 6–7 t/ha, ve výhodných podmínkách a s dobrou agrotechnikou lze dosáhnout 8–9 t/ha.
  - q: Jaké jsou nejnebezpečnější choroby pšenice ozimé?
    a: Klíčové jsou braničnatka pšeničná (septorióza), fuzariózy klasu a padlí travní. Ochrana fungicidy ve správnou fázi je ekonomicky oprávněná.
