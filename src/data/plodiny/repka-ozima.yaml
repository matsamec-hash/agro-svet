slug: repka-ozima
name: Řepka ozimá
name_plural: Řepka ozimá
skupina: olejniny
hero_image: /images/plodiny/repka-ozima.jpg
hero_author: "Walther Otto Müller"
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:Brassica_napus_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-169.jpg"
description: >-
  Řepka ozimá (Brassica napus) je nejvýznamnější olejnina v ČR, pěstovaná pro olej s nízkým obsahem
  erukové kyseliny (potravinářský a technický olej, bionafta) a bílkovinné šroty. Vysévá se na konci
  léta a po přezimování tvoří husté porosty sklízené v červnu–červenci.
vysevek: 40–60 klíčivých semen/m² (cílová hustota 30–50 rostlin/m² po přezimování)
hnojeni: N 150–200 kg/ha celkem — podzimní startovací dávka síry a části N, jarní dělené dávky N + síra 30–40 kg/ha
vynos_t_ha: 3–5
sklizen: červen–červenec (při vlhkosti semen <9 %)
vyuziti: rostlinný olej (potravinářský, bionafta), bílkovinný šrot (krmivo), med (medonosná plodina)
choroby:
  - fomová hniloba stonku (Leptosphaeria maculans)
  - sklerotiniová hniloba (Sclerotinia sclerotiorum)
  - alternariová skvrnitost
  - plíseň šedá (Botrytis cinerea)
  - čerň řepkových pletiv (Alternaria brassicae)
osevni_postup:
  - name: Předplodina
    text: Řepka ozimá se nesmí vrátit na stejný pozemek dříve než za 4 roky. Nejlepší předplodiny jsou ozimé obilniny. Vyloučit předplodiny z čeledi brukvovitých.
  - name: Příprava půdy a setí
    text: Brzká sklizeň předplodiny a rychlá příprava kvalitního seťového lůžka do hloubky 2–3 cm. Setí 15. srpna – 5. září, výsevek 40–60 klíčivých zrn/m².
  - name: Podzimní hnojení
    text: Před setím nebo při setí aplikovat P, K a síru; startovací N dávka (30–40 kg/ha) podpoří vývoj do přezimování. Porosty vstupují do zimy v růžicovém stádiu.
  - name: Jarní hnojení
    text: Hlavní N výživa na jaře ve 2–3 dávkách (celkem 120–160 kg N/ha). Síra 30–40 kg/ha podporuje výnos a obsah oleje.
  - name: Ochrana rostlin
    text: Fungicidy (fomová hniloba, sklerotinioza), insekticidy (bejlomorka, stonkové krytonoscové, blýskáček řepkový), herbicidy podzim + jaro.
  - name: Sklizeň
    text: Sklizeň přímá nebo s přísuškem. Při přímé sklizni čekat na vlhkost semen pod 9 %. Ztráty ze šešulí minimalizovat správným seřízením mlátičky.
wikipedia: https://cs.wikipedia.org/wiki/%C5%98epka_olejka
faq:
  - q: Kdy se vysévá ozimá řepka?
    a: Optimální termín výsevu je 15. srpna – 5. září. Pozdní setí oslabuje rostliny před zimou a snižuje přezimování i výnos.
  - q: Proč je síra důležitá pro řepku?
    a: Síra je nezbytná pro syntézu aminokyselin a glukosinolátů. Nedostatek síry snižuje výnos i obsah oleje. Doporučuje se 30–40 kg S/ha, nejlépe jako síran.
  - q: Jak dlouhý musí být osevní postup u řepky?
    a: Řepka a ostatní brukvovité plodiny nesmí na stejný pozemek dříve než za 4 roky, ideálně za 5–6 let, kvůli hromadění patogenů (fomová hniloba, sklerotinioza) a škůdců.
  - q: Jaký výnos semene řepka ozimá dosahuje?
    a: Průměrný výnos v ČR je 3–4 t/ha, v příznivých podmínkách a s dobrou agrotechnikou lze dosáhnout 4–5 t/ha.
