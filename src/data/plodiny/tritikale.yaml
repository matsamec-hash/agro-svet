description: >-
  Tritikale je umělý hybrid pšenice (Triticum) a žita (Secale), kombinující výnosový potenciál
  pšenice s odolností a přizpůsobivostí žita. Pěstuje se zejména jako krmná obilnina a v posledních
  letech i jako energetická plodina (GPS, bioplyn), výhodná na méně úrodných stanovištích.
vysevek: 280–380 klíčivých zrn/m²
hnojeni: N 100–140 kg/ha v dělených dávkách; nároky nižší než pšenice, vyšší než žito
vynos_t_ha: 5–8
sklizen: přelom června a července
vyuziti: krmné zrno (drůbež, prasata, skot), GPS (bioplyn), potravinářské experimenty
choroby:
  - padlí travní
  - rezi (žlutá, stéblová)
  - fuzariózy klasu
  - braničnatka (septorióza)
osevni_postup:
  - name: Předplodina
    text: Tritikale není náročné na předplodinu — snese i horší postavení v osevním postupu, avšak předplodina luskoviny nebo okopaniny je výhodná.
  - name: Příprava půdy
    text: Orba 20–22 cm, urovnání seťového lůžka. Tritikale prospívá na lehčích a středně těžkých půdách při pH 5,5–7,0.
  - name: Setí
    text: Výsev říjen (ozimá forma), hloubka 3–5 cm, výsevek 280–380 klíčivých zrn/m².
  - name: Hnojení
    text: Dusík 100–140 kg/ha v dělených dávkách (start vegetace, sloupkování). Vyšší N podpoří výnos, ale zvýší riziko poléhání.
  - name: Ochrana rostlin
    text: Regulátory růstu při riziku poléhání (tritikale je vysoké), fungicidy dle výskytu chorob (padlí, rzi, fusarium klasu).
  - name: Sklizeň
    text: Sklizeň přelomem června a července, při vlhkosti 14–16 %. Tritikale dozrává rychle a má sklon k vypadávání.
wikipedia: https://cs.wikipedia.org/wiki/Tritikale
faq:
  - q: Jaké jsou výhody tritikale oproti pšenici a žitu?
    a: Tritikale kombinuje dobrý výnos pšenice s odolností žita vůči nepříznivým podmínkám (chlad, kyselá půda, sucho). Je vhodné na méně úrodná stanoviště, kde pšenice nedosahuje plného potenciálu.
  - q: K čemu se tritikale využívá?
    a: Převážně jako krmné zrno pro drůbež, prasata a skot. Stále více se pěstuje i na celý porost (GPS) pro výrobu bioplynu. Potravinářské využití je minoritní.
  - q: Je tritikale odolné vůči mrazům?
    a: Ozimá tritikale je odolnější než ozimý ječmen, ale méně odolná než žito. Snáší přibližně −18 až −22 °C v zóně odnožování při sněhové pokrývce.
