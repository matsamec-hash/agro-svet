slug: cukrovka
name: Řepa cukrová
name_plural: Cukrovka
skupina: okopaniny
hero_image: /images/plodiny/cukrovka.jpg
hero_author: "Amédée Masclef"
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:276_Beta_vulgaris_L.jpg"
description: >-
  Řepa cukrová (Beta vulgaris var. saccharifera) je nejvýznamnější cukronosná plodina mírného pásma,
  pěstovaná pro kořen s obsahem cukru 16–20 %. Zpracovává se výhradně v cukrovarech na cukr (sacharózu),
  vedlejší produkty (melasa, řepné řízky) se využívají v krmivářství a bioplynu.
vysevek: 1–1,2 polního vzcházivost na 9–10 rostlin/m² (přesné setí monosemennými odrůdami)
hnojeni: N 120–160 kg/ha dle zásobenosti půdy; K 180–250 kg K₂O/ha; Na 50–100 kg/ha (sodík zlepšuje výnos cukru); bor 0,5–1 kg/ha
vynos_t_ha: 60–80 (kořeny); cukernatost 16–20 %
sklizen: září–listopad (kampaňový příjem do cukrovaru)
seti_mesice: [3, 4]
sklizen_mesice: [9, 10, 11]
vyuziti: výroba cukru (sacharóza), melasa (krmivo, kvasné suroviny), řepné řízky (krmivo, bioplyn)
choroby:
  - cerkosporioza řepy (Cercospora beticola) — nejrozšířenější
  - plíseň šedá (Botrytis cinerea)
  - rizoktoniová hniloba kořenů (Rhizoctonia solani)
  - virózy (ŘZV — Beet yellows virus, přenáší mšice)
  - práškova skvrnitost (Erysiphe betae)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Cukrovka se nesmí pěstovat opakovaně — minimální přestávka 3 roky (nejlépe 4). Nejlepší předplodiny jsou obilniny (zejména pšenice po luskovinách nebo řepce).
  - name: Příprava půdy
    text: Hluboká podzimní orba 28–30 cm, případné vápnění pro udržení pH 6,5–7,5. Jarní příprava jemného seťového lůžka bez hrud.
  - name: Setí
    text: Přesné setí monosemennými semeny od března do dubna, hloubka 2–3 cm, vzdálenost v řádku 18–22 cm, meziřádková vzdálenost 45–50 cm.
  - name: Hnojení
    text: Organická hnojiva výhodná; minerální N v dávce 120–160 kg/ha, vysoká dávka K a Na. Bor 0,5–1 kg/ha listovým hnojivem.
  - name: Ochrana rostlin
    text: Herbicidy (preemergentní + postemergentní BBCH 12–18), fungicidy při výskytu cerkosporiózy, insekticidy při výskytu mšic a dřepčíků.
  - name: Sklizeň
    text: Kampaňová sklizeň dle smluvního termínu dodávky do cukrovaru (září–listopad). Šetrná manipulace minimalizuje mechanické ztráty cukru.
wikipedia: https://cs.wikipedia.org/wiki/%C5%98epa_cukrov%C3%A1
faq:
  - q: Jak vysoký je výnos cukrovky?
    a: Cukrovka dosahuje výnosu kořenů 60–80 t/ha s cukernatostí 16–20 %. Výnos cukru tak činí přibližně 10–14 t/ha.
  - q: Proč je sodík důležitý pro cukrovku?
    a: Sodík (Na) částečně nahrazuje draslík v metabolismu cukrovky a podporuje akumulaci cukru v kořeni. Aplikace 50–100 kg Na/ha bývá výhodná, zejména na lehčích půdách.
  - q: Co je cerkosporioza a jak ji poznat?
    a: Cerkosporioza (Cercospora beticola) je houbová choroba způsobující kulaté skvrny s červenohnědým okrajem na listech. Silný výskyt způsobuje předčasné odumírání listů a snižuje výnos i cukernatost.
  - q: Jak se zpracovávají vedlejší produkty z cukrovky?
    a: Melasa (zbytek po extrakci cukru) se využívá jako krmivo nebo substrát pro fermentaci (droždí, alkohol). Řepné řízky (vylisovaná dřeň) slouží jako krmivo pro skot nebo jako substrát pro bioplyn.
