slug: zito
name: Žito ozimé
name_plural: Žito
skupina: obiloviny
hero_image: /images/plodiny/zito.jpg
hero_author: Letrek
hero_license: CC BY-SA 3.0
hero_source: "https://commons.wikimedia.org/wiki/File:Secale_cereale.jpg"
description: >-
  Žito ozimé (Secale cereale) je velmi odolná ozimá obilnina, snáší nejchladnější a nejméně úrodné
  podmínky ze všech obilnin. V ČR se pěstuje na lehkých, písčitých a kyselých půdách nevhodných
  pro pšenici, a to jak pro potravinářské zrno (žitný chléb), tak jako energetická plodina (GPS, biogas).
vysevek: 200–300 klíčivých zrn/m²
hnojeni: N 80–120 kg/ha v dělených dávkách; toleruje nižší zásobenost živinami
vynos_t_ha: 5–8
sklizen: přelom června a července
seti_mesice: [9, 10]
sklizen_mesice: [6, 7]
vyuziti: žitná mouka (chléb, chleba), krmné zrno, GPS (bioplyn), žitná whisky
choroby:
  - námel žitný (Claviceps purpurea) — toxický, sledovat obsah v zrnu
  - padlí travní
  - rezi
  - prašná sněť žitná
osevni_postup:
  - name: Předplodina a osevní postup
    text: Žito je nejméně náročné na předplodinu ze všech obilnin. Snáší i opakované pěstování, ale předplodina luskoviny nebo okopaniny je výhodná.
  - name: Příprava půdy
    text: Mělká orba nebo minimalizace; žito dobře vychází i na lehkých kyselých půdách (pH 5,5–6,5), kde jiné obilniny selhávají.
  - name: Setí
    text: Výsev září–říjen, hloubka 2–4 cm, výsevek 200–300 klíčivých zrn/m². Žito rychle odnožuje a tvoří husté porosty.
  - name: Hnojení
    text: Nároky na živiny jsou nižší než u pšenice. N 80–120 kg/ha, aplikovaný na jaře v 1–2 dávkách.
  - name: Ochrana rostlin
    text: Regulátory růstu jsou nutné (žito je vysoké a náchylné k poléhání), fungicidy dle výskytu chorob. Námel sledovat a při výskytu ošetřit porost.
  - name: Sklizeň
    text: Žito dozrává v přelomu června a července. Sledovat obsah námele v zrnu — při překročení limitu nelze zrno použít pro potraviny.
wikipedia: https://cs.wikipedia.org/wiki/%C5%BDito_set%C3%A9
faq:
  - q: Na jakých půdách se žito pěstuje?
    a: Žito snáší nejlehčí, kyselé a méně úrodné půdy nevhodné pro pšenici. Daří se mu při pH 5,5–6,5, dokáže využít živiny z méně dostupných forem.
  - q: Co je námel a proč je nebezpečný?
    a: Námel (Claviceps purpurea) je houbový patogen tvořící jedovaté sklerocije v klasech žita. Obsahuje alkaloidy, které jsou toxické pro lidi i zvířata. Obsah námele v potravinářském zrnu je legislativně omezen.
  - q: Jaký výnos dává žito ozimé?
    a: Žito dosahuje výnosů 5–8 t/ha; na bohatých půdách přibližuje se pšenici, na chudých je výraznějším výběrem.
