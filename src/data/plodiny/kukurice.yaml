slug: kukurice
name: Kukuřice setá
name_plural: Kukuřice
skupina: obiloviny
hero_image: /images/plodiny/kukurice.jpg
hero_author: "Franz Eugen Köhler, Köhler's Medizinal-Pflanzen"
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:Zea_mays_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-283.jpg"
description: >-
  Kukuřice setá (Zea mays) je teplomilná jednoletá plodina s největším výnosovým potenciálem
  ze všech polních plodin v ČR. Pěstuje se na zrno, siláž (celý porost) i jako energetická plodina
  pro bioplyn. Vyžaduje teplé podmínky a adekvátní zásobení vodou a živinami.
vysevek: 7–10 rostlin/m² (65–95 tis. rostlin/ha), dle ranosti odrůdy a stanoviště
hnojeni: N 120–200 kg/ha celkem (startovací dávka při setí + hlavní hnojení); P, K a Mg dle rozborů; kukuřice je náročná na zinek
vynos_t_ha: 8–14 (zrno); 40–60 t/ha čerstvé hmoty siláže
sklizen: září–říjen (zrno při vlhkosti <30 %; siláž při 30–35 % sušiny)
seti_mesice: [4, 5]
sklizen_mesice: [9, 10]
vyuziti: silážní kukuřice (krmivo pro skot), kukuřice na zrno (krmivo, škrob, bioethanol, potraviny)
choroby:
  - fuzarióza stonku a palic (Fusarium spp.)
  - helmintosporioza kukuřice
  - zakrslost kukuřice (WDV a MDV, přenáší hmyz)
  - baktérióza kukuřice
osevni_postup:
  - name: Předplodina a osevní postup
    text: Nejlepší předplodinou jsou luskoviny, obilniny a řepka. Kukuřice snáší opakované pěstování na témže poli, ale při monokultuře narůstá tlak fuzarióz a půdních škůdců.
  - name: Příprava půdy
    text: Hluboká podzimní orba (25–30 cm) pro provzdušnění, jarní příprava seťového lůžka. Kukuřice vyžaduje dobře zahřátou půdu (minimálně 8–10 °C v hloubce setí).
  - name: Setí
    text: Setí od konce dubna do poloviny května. Hloubka 4–6 cm, výsevek 7–10 rostlin/m² (dle ranosti). Meziřádková vzdálenost 70–75 cm (konvenční) nebo 45–50 cm (husté řádky).
  - name: Hnojení
    text: Startovací dávka P+K+N při setí, hlavní aplikace N (digestát, kejda nebo minerální hnojiva) před nebo při přípravě půdy. Sledovat zásobenost Zn.
  - name: Ochrana rostlin
    text: Herbicidy (preemergentně nebo postemergentně) jsou nezbytné. Insekticidní moření osiva chrání před drátovci a mšicemi; monitoring zavíječe kukuřičného.
  - name: Sklizeň
    text: Siláž při obsahu sušiny 30–35 % (přibližně srpen–září), zrno při vlhkosti pod 30 % (říjen). Při vlhkosti nad 14–15 % nutno zrno dosušit.
wikipedia: https://cs.wikipedia.org/wiki/Kukuřice_set%C3%A1
faq:
  - q: Kdy je nejlepší sít kukuřici?
    a: Kukuřice se vysévá od konce dubna do poloviny května, když teplota půdy v hloubce setí dosáhne alespoň 8–10 °C. Příliš raný výsev do studené půdy zpomaluje vzcházení a zvyšuje riziko chorob.
  - q: Jaký je rozdíl mezi silážní a zrnovou kukuřicí?
    a: Silážní kukuřice se sklízí celý porost (stonek + klas) při 30–35 % sušiny jako krmivo pro skot. Zrnová kukuřice se sklízí pouze zrno při vlhkosti pod 30 %, určena ke krmení nebo průmyslovému zpracování.
  - q: Jak velká je potřeba dusíku u kukuřice?
    a: Kukuřice je náročná plodina — potřebuje 120–200 kg N/ha celkem. Část N se běžně dodává organickými hnojivy (digestát, kejda), zbytek minerálními hnojivy.
  - q: Jaké škůdce sledovat u kukuřice?
    a: Klíčové jsou drátovci (larvy v půdě), zavíječ kukuřičný (Ostrinia nubilalis) a mšice. Zavíječ lze monitorovat feromonovými lapači a bekovat biologicky (Trichogramma).
