slug: jecmen-ozimy
name: Ječmen ozimý
name_plural: Ječmen ozimý
skupina: obiloviny
description: >-
  Ječmen ozimý (Hordeum vulgare) je ozimá obilnina s nejkratší vegetační dobou mezi ozimými cereáliemi —
  sklízí se o 1–2 týdny dříve než pšenice. Je méně odolný zimním mrazům, ale dosahuje vysokých výnosů
  a využívá se zejména jako krmivo a sladovnická surovina.
vysevek: 280–380 klíčivých zrn/m²
hnojeni: N 100–150 kg/ha v dělených dávkách; fosfor a draslík dle rozborů půdy
vynos_t_ha: 6–9
sklizen: konec června až začátek července
vyuziti: krmné zrno, sladovnický ječmen (výroba sladu a piva), GPS
choroby:
  - hnědá skvrnitost ječmene (rynchosporioza)
  - pruhovitost ječmene (pyrenofóra)
  - padlí travní
  - rezi
  - žlutá mozaika ječmene (BaYMV/BaMMV, přenašeč půdní houba)
osevni_postup:
  - name: Předplodina
    text: Nejlepší předplodiny jsou řepka, luskoviny a okopaniny. Po obilnině narůstá riziko chorob a virů přenášených půdními houbami.
  - name: Příprava půdy
    text: Mělčí orba 18–22 cm, urovnání seťového lůžka; ječmen ozimý je citlivý na utužení a špatné pH (optimum 6,0–7,0).
  - name: Setí
    text: Termín setí 20. září – 10. října. Hloubka 3–4 cm, výsevek 280–380 klíčivých zrn/m².
  - name: Hnojení dusíkem
    text: Dusík v dělených dávkách; startovací dávka na jaře a druhá dávka ve fázi sloupkování. Přehnojení N zvyšuje riziko poléhání.
  - name: Ochrana rostlin
    text: Moření osiva (pruhovitost, hnědá skvrnitost), regulátory růstu při riziku poléhání, fungicidy dle výskytu chorob.
  - name: Sklizeň
    text: Ječmen dozrává rychle a je náchylný k vypadávání zrna — sklizeň provést včas, při vlhkosti 13–15 %.
wikipedia: https://cs.wikipedia.org/wiki/Je%C4%8Dmen_obecn%C3%BD
faq:
  - q: Proč se ječmen ozimý sklízí dříve než ozimá pšenice?
    a: Ječmen ozimý má kratší vegetační dobu a dozrává přibližně o 1–2 týdny dříve než pšenice. To umožňuje dřívější nástup sklizně a snižuje riziko ztrát.
  - q: Jaká je minimální mrazuvzdornost ječmene ozimého?
    a: Ječmen ozimý patří k méně mrazuodolným ozimým cereáliím — snáší přibližně −12 až −15 °C v zóně odnožování (bez sněhové pokrývky).
  - q: Lze ječmen ozimý pěstovat pro sladovnické využití?
    a: Ano, existují sladovnické odrůdy ječmene ozimého. Pro splnění sladovnických parametrů (obsah bílkovin, klíčivost) je třeba dodržet specifická agrotechnická opatření, zejména omezit N výživu.
