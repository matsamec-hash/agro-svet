slug: soja
name: Sója luštinatá
name_plural: Sója
skupina: luskoviny
description: >-
  Sója luštinatá (Glycine max) je teplomilná luskovinou s nejvyšším obsahem bílkovin (35–45 %)
  a oleje (18–22 %) ze všech polních plodin. V ČR se pěstování sóji rozšiřuje díky šlechtění
  kratkodenních odrůd a oteplování klimatu; je výbornou předplodinou a zdrojem dusíku pro půdu.
vysevek: 60–80 klíčivých zrn/m² (550 000–700 000 rostlin/ha)
hnojeni: N minimální (fixace biologická); P 40–60 kg P₂O₅/ha; K 80–120 kg K₂O/ha; molybden a kobalt pro funkci hlízkových bakterií
vynos_t_ha: 2–4
sklizen: září–říjen (při vlhkosti zrna <14 %)
vyuziti: krmný šrot (bílkovinné krmivo), potravinářský sójový olej, tofú, sójové mléko, technické využití
choroby:
  - fuzarióza stonku a kořenů (Fusarium spp.)
  - sklerotiniová hniloba (Sclerotinia sclerotiorum)
  - plíseň sójová (Peronospora manshurica)
  - bakteriální pustulóza (Pseudomonas savastanoi pv. glycinea)
osevni_postup:
  - name: Předplodina a osevní postup
    text: Sója je vynikající předplodinou pro obilniny. Sama nesmí navazovat na jinou lukovinu — minimální přestávka 4 roky.
  - name: Příprava půdy
    text: Hluboká podzimní orba nebo jarní příprava. Sója prospívá na středně těžkých, dobře odvodněných a záhřevných půdách s pH 6,0–7,0.
  - name: Inokulace osiva
    text: Inokulace osiva specifickými kulturami Bradyrhizobium japonicum je nezbytná — bez účinné fixace nelze dosáhnout dobrého výnosu bez N hnojení.
  - name: Setí
    text: Setí od konce dubna do poloviny května, kdy teplota půdy dosáhne alespoň 10 °C. Hloubka 3–5 cm, výsevek 60–80 klíčivých zrn/m².
  - name: Ochrana rostlin
    text: Herbicidy jsou klíčové — sója špatně snáší plevelnou konkurenci v mládí. Fungicidy a insekticidy dle výskytu chorob a škůdců.
  - name: Sklizeň
    text: Sklizeň v září–říjnu při vlhkosti zrna pod 14 %. Sója má nízko nasazené lusky — nutné správné nastavení výšky žacího ústrojí.
wikipedia: https://cs.wikipedia.org/wiki/S%C3%B3ja_lu%C5%A1tinat%C3%A1
faq:
  - q: Proč je inokulace sóji tak důležitá?
    a: Sója váže vzdušný dusík za pomoci specifických bakterií Bradyrhizobium japonicum. Tyto bakterie nejsou přirozeně přítomné v českých půdách (sója je zde nová plodina), proto je inokulace osiva nezbytná pro tvorbu účinných hlízek a biologickou fixaci N.
  - q: Jaký výnos sóji lze v ČR dosáhnout?
    a: Průměrný výnos v ČR je 2,5–3,5 t/ha. Na záhřevných a úrodných stanovištích s příznivým průběhem počasí lze dosáhnout 4 t/ha. Sója je citlivá na sucho v době kvetení a tvorby lusků.
  - q: Lze sóju pěstovat v celé ČR?
    a: Sója potřebuje teplé klima — vhodná jsou teplejší nížinná stanoviště jižní Moravy a středních Čech. V chladnějších oblastech (nad 350–400 m n. m.) je pěstování rizikové kvůli kratší vegetační době.
