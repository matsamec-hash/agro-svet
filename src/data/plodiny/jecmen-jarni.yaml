slug: jecmen-jarni
name: Ječmen jarní
name_plural: Ječmen jarní
skupina: obiloviny
hero_image: /images/plodiny/jecmen-jarni.jpg
hero_author: "Cliff from Arlington, Virginia, USA"
hero_license: CC BY 2.0
hero_source: "https://commons.wikimedia.org/wiki/File:Barley_(Hordeum_vulgare)_-_United_States_National_Arboretum_-_24_May_2009.jpg"
description: >-
  Ječmen jarní (Hordeum vulgare) je nejvýznamnější jarní obilovinou v ČR, pěstovaná zejména pro výrobu
  sladovnického sladu (pivo), krmivo a potraviny. Vyžaduje kvalitní předplodinu a raný výsev,
  protože pozdní termín setí výrazně snižuje výnos a zhoršuje sladovnické parametry.
vysevek: 300–400 klíčivých zrn/m²
hnojeni: N 60–90 kg/ha (sladovnický ječmen max. 80 kg/ha, aby nebyl překročen limit bílkovin v zrnu)
vynos_t_ha: 4–7
sklizen: červenec až začátek srpna
vyuziti: sladovnický slad (výroba piva), krmné zrno, potravinářství (kroupy, mouka)
choroby:
  - hnědá skvrnitost ječmene (rynchosporioza)
  - pruhovitost ječmene (pyrenofóra)
  - padlí travní
  - prašná sněť ječná
  - BYDV (virová žloutnutí ječmene, přenáší mšice)
osevni_postup:
  - name: Předplodina
    text: Sladovnický ječmen vyžaduje kvalitní předplodinu — ideálně okopaniny nebo luskoviny. Po pšenici narůstá riziko chorob a zhoršení sladovnické jakosti.
  - name: Příprava půdy
    text: Podzimní orba a kvalitní příprava seťového lůžka na jaře; ječmen jarní je citlivý na utužení a kyselou reakci půdy (optimum pH 6,0–7,0).
  - name: Setí
    text: Co nejdříve po uschnutí půdy (únor–březen). Hloubka 3–4 cm, výsevek 300–400 klíčivých zrn/m². Pozdní výsev snižuje výnos i sladovnickou jakost.
  - name: Hnojení
    text: U sladovnického ječmene omezit N na max. 80 kg/ha (vyšší přísun zvyšuje bílkoviny nad limit sladu). Fosfor a draslík dle rozborů.
  - name: Ochrana rostlin
    text: Moření osiva (pruhovitost, sněť), insekticidní moření nebo postřik při výskytu mšic (přenašeči BYDV), fungicidy dle prahu škodlivosti.
  - name: Sklizeň
    text: Sklizeň při vlhkosti 13–15 % (červenec–srpen). Pro sladovnický ječmen sledovat parametry jakosti (klíčivost, obsah bílkovin, objemová hmotnost).
wikipedia: https://cs.wikipedia.org/wiki/Je%C4%8Dmen_obecn%C3%BD
faq:
  - q: Proč je důležitý raný výsev jarního ječmene?
    a: Raný výsev (únor–březen) využívá jarní vláhu, prodlužuje vegetaci a zlepšuje výnos i sladovnickou jakost. Každý týden zpoždění výsevu může snížit výnos o 0,2–0,3 t/ha.
  - q: Jaký je limit dusíku pro sladovnický ječmen?
    a: Pro sladovnický ječmen se doporučuje max. 80 kg N/ha. Vyšší dávky zvyšují obsah bílkovin v zrnu nad přijatelnou mez pro sladování (zpravidla >12 %).
  - q: Jaký výnos lze od jarního ječmene čekat?
    a: Na kvalitních stanovištích s dobrou agrotechnikou dosahuje jarní ječmen 5–7 t/ha, v sušších podmínkách nebo při pozdním výsevu 4–5 t/ha.
  - q: Jak moření osiva chrání jarní ječmen?
    a: Moření chrání před pruhovitostí ječmene a sněti ječné, které se přenášejí infikovaným osivem. Insekticidní moření navíc omezuje časné napadení mšicemi přenášejícími virus BYDV.
