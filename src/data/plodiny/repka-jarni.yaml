slug: repka-jarni
name: Řepka jarní
name_plural: Řepka jarní
skupina: olejniny
hero_image: /images/plodiny/repka-jarni.jpg
hero_author: "Walther Otto Müller"
hero_license: Public domain
hero_source: "https://commons.wikimedia.org/wiki/File:Brassica_napus_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-169.jpg"
description: >-
  Řepka jarní (Brassica napus var. annua) se vysévá na jaře a nepotřebuje vernalizaci.
  Dosahuje nižšího výnosu než ozimá forma, ale slouží jako alternativa při špatném přezimování
  ozimé řepky nebo jako způsob zkrácení osevního sledu. Vegetační doba je výrazně kratší.
vysevek: 60–100 klíčivých semen/m² (vyšší výsevek kompenzuje kratší vegetaci)
hnojeni: N 80–120 kg/ha celkem; síra 20–30 kg/ha
vynos_t_ha: 2–3,5
sklizen: srpen
vyuziti: rostlinný olej, bílkovinný šrot (krmivo)
choroby:
  - alternariová skvrnitost (Alternaria spp.)
  - sklerotiniová hniloba (Sclerotinia sclerotiorum)
  - padlí brukvovitých
osevni_postup:
  - name: Předplodina
    text: Stejně jako u ozimé řepky platí 4–5letý osevní postup bez brukvovitých. Vhodné předplodiny jsou obilniny a luskoviny.
  - name: Příprava půdy
    text: Jarní příprava seťového lůžka co nejdříve po uschnutí půdy; jemné, dobře utuhlé seťové lůžko pro malé semeno.
  - name: Setí
    text: Co nejdříve na jaře (únor–březen), hloubka 1–2 cm, výsevek 60–100 klíčivých zrn/m². Pozdní setí výrazně snižuje výnos.
  - name: Hnojení
    text: N 80–120 kg/ha; síra 20–30 kg/ha. Celková výživa je méně rozčleněná než u ozimé formy.
  - name: Ochrana rostlin
    text: Herbicidy, fungicidy při výskytu alternariové skvrnitosti a sklerotiniové hniloby; insekticidy při výskytu blýskáčka a krytonosců.
  - name: Sklizeň
    text: Sklizeň v srpnu; řepka jarní dozrává rychle a je náchylná k vypadávání ze šešulí — sledovat termín.
wikipedia: https://cs.wikipedia.org/wiki/%C5%98epka_olejka
faq:
  - q: Kdy se jarní řepka pěstuje místo ozimé?
    a: Jarní řepka se nasazuje při vypadnutí nebo silném poškození ozimé řepky mrazem v zimě, nebo jako meziplodina v krátším osevním sledu. Výnos je výrazně nižší než u ozimé formy.
  - q: Jaký výnos semene dosahuje jarní řepka?
    a: Výnos se pohybuje v rozmezí 2–3,5 t/ha, tedy výrazně méně než ozimá forma (3–5 t/ha). Raný výsev a dostatečná výživa jsou klíčem k maximalizaci výnosu.
