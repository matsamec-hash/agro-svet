slug: ovce
name: Ovce
name_plural: Plemená oviec
description: |
  Plemená oviec chované v Českej republike — mäsové, vlnárske, mliečne a kombinované. Okrem komerčných plemien zahŕňa aj české regionálne a krajové rasy.
