slug: prasata
name: Prasa domáce
name_plural: Plemená prasiat
description: |
  Prehľad plemien prasiat chovaných v Českej republike a Európe. Materské plemená (Biele ušľachtilé, Česká landrasa) tvoria základ chovov, otcovské línie (Pietrain, Duroc, Hampshire) zabezpečujú svalnatosť a kvalitu mäsa. Dataset zahŕňa pôvod, hmotnosť, plodnosť a hlavné chovné znaky vrátane českého pôvodného Přeštického čiernostrakaného.
