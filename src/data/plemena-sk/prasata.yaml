  body: |
    <h2>České biele ušľachtilé prasa — najrozšírenejšie materské plemeno</h2>
    <p><strong>České biele ušľachtilé prasa</strong> (skratka ČBU, medzinárodne Large White alebo Yorkshire) je domáca šľachtená populácia celosvetovo najrozšírenejšieho bieleho plemena a tvorí základ takmer všetkých komerčných hybridných línií v SR. Plemeno bolo vyšľachtené od polovice 19. storočia v anglickom Yorkshiru a do českých chovov zaradené ako <strong>materská línia</strong>.</p>

    <h3>Vlastnosti a využitie</h3>
    <p>Charakteristická je biela srsť, ružová koža a polostojačky uši; kanci dosahujú okolo 350 kg, prasnice zhruba 270 kg. Plemeno vyniká <strong>vysokou plodnosťou</strong> (12–14 prasiat vo vrhu), výbornými materskými vlastnosťami a dobrou rastovosťou. V hybridných programoch tvorí prarodičovskú líniu, najčastejšie v kombinácii s <a href="/sk/plemena/prasata/landrasa/">landrasou</a>.</p>

    <h3>Biele ušľachtilé vs. biele otcovské</h3>
    <p>České biele ušľachtilé prasa je <strong>materské</strong> plemeno (plodnosť, mliečnosť). Nezamieňajte ho s odvodeným <a href="/sk/plemena/prasata/bile-otcovske/">bielym otcovským plemenom</a>, ktoré je naopak otcovskou líniou zameranou na zmasilosť a denný prírastok. Ďalšie plemená nájdete v <a href="/sk/plemena/prasata/">katalógu prasiat</a>.</p>
  faq:
  - q: Čo je české biele ušľachtilé prasa?
    a: |
      Je to domáca šľachtená populácia plemena Large White (Yorkshire) — najrozšírenejšieho bieleho materského plemena na svete. V SR tvorí základ komerčných hybridných línií vďaka vysokej plodnosti a dobrým materským vlastnostiam.
  - q: Aký je rozdiel medzi bielym ušľachtilým a bielym otcovským prasaťom?
    a: |
      <strong>Biele ušľachtilé</strong> je materské plemeno (plodnosť, mliečnosť), zatiaľ čo <a href="/sk/plemena/prasata/bile-otcovske/">biele otcovské</a> je z neho odvodená otcovská línia zameraná na zmasilosť a denný prírastok.
  - q: Koľko prasiat má prasnica bieleho ušľachtilého prasaťa?
    a: |
      Typicky 12–14 prasiat vo vrhu. Vysoká plodnosť je hlavný dôvod, prečo plemeno tvorí materskú (prarodičovskú) líniu hybridných chovov.
