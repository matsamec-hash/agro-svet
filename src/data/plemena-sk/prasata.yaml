  body: |
    <h2>Prasa divé (diviak) — pôvodný predok domácich prasiat</h2>
    <p><strong>Prasa divé</strong> (<em>Sus scrofa</em>), ľudovo <strong>diviak</strong> alebo „divé prasa", je voľne žijúci druh, z ktorého bola domestikáciou odvodená všetky <a href="/sk/plemena/prasata/">domáce plemená prasiat</a>. V poľovníckej reči sa označuje ako <strong>čierna zver</strong>. V Slovenskej republike patrí medzi najrozšírenejšiu raticovú zver a početne stále rastie.</p>

    <h3>Ako spoznať divé prasa</h3>
    <p>Diviak má tmavohnedú až čiernu štetinovú srsť, charakteristický hrebeňovitý chrbát a pretiahnutý rypák. Kanci dorastajú okolo 200 kg, bachyne zhruba 130 kg. Od domáceho prasaťa sa líši mohutnejšou prednou časťou tela, kratšími nohami a výraznými klami u dospelých kancov.</p>

    <h3>Chov a produkcia zveriny</h3>
    <p>Okrem voľne žijúcej populácie sa prasa divé chová v oborách a na farmách pre produkciu <strong>zveriny</strong> — tmavého, chudého mäsa s výraznou chuťou, ceneného v gastronómii a poľovníckych údeninách. Krížením s domácim prasaťom (tzv. „kanec diviak") vznikajú špecializované produkty. Ak hľadáte chovné zvieratá alebo zverinu, <a href="/bazar/?category=zvirata&amp;q=divok%C3%A9%20prase">pozrite si ponuku v Agro bazári</a>.</p>
  faq:
  - q: Ako sa odborne nazýva divé prasa?
    a: |
      Odborný (atlasový) názov je <strong>prasa divé</strong>, latinsky <em>Sus scrofa</em>. V bežnej reči sa používa tvar „divé prasa" aj označenie <strong>diviak</strong>, v poľovníctve potom „čierna zver". Ide o ten istý druh — divého predka domácich prasiat.
  - q: Koľko váži divé prasa?
    a: |
      Dospelý kanec diviaka dorastá zhruba 200 kg, bachyne približne 130 kg. Hmotnosť kolíše podľa veku, lokality a dostupnosti potravy.
  - q: Dá sa divé prasa chovať na farme?
    a: |
      Áno. Prasa divé sa chová v oborách a na farmách pre produkciu zveriny. Chov podlieha poľovníckym a veterinárnym predpisom; mäso (zverina) je tmavé, chudé a vyhľadávané reštauráciami aj výrobcami poľovníckych údenín.
