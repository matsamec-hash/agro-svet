  body: |
    <h2>Přeštické čiernostrakaté prasa — jediné pôvodné české plemeno</h2>
    <p><strong>Přeštické čiernostrakaté prasa</strong> (chovateľská skratka PC, ľudovo „přeštičky") je jediné pôvodné české plemeno prasaťa a od roku 1992 vedené ako <strong>národný genetický zdroj ČR</strong>. Vzniklo na konci 19. storočia v okolí Přeštic na Plzeňsku krížením domácich svíň s plemenami <a href="/sk/plemena/prasata/berkshire/">berkshire</a> a cornwall.</p>

    <h3>Vzhľad a vlastnosti</h3>
    <p>Plemeno poznáte podľa bielej srsti s nepravidelnými čiernymi škvrnami a poloprevislých uší. Kanci dosahujú okolo 300 kg, prasnice zhruba 220 kg. Oproti komerčným líniám rastie pomalšie, zato dáva <strong>mäso výnimočnej kvality</strong> — s mramorovaním a tukovou pokrývkou, cenené mäsiarmi aj gastronómiou (preslávená <strong>přeštická šunka</strong>).</p>

    <h3>Chov a konzervačný program</h3>
    <p>Přeštické čiernostrakaté prasa sa dnes chová v rámci konzervačného programu — populácia číta len približne 200–300 prasníc. Chovatelia tak chránia genetickú rozmanitosť a udržiavajú tradičné české plemeno. Porovnajte si ho s ďalšími <a href="/sk/plemena/prasata/">plemenami prasiat v katalógu</a> alebo <a href="/bazar/?category=zvirata&amp;q=p%C5%99e%C5%A1tick%C3%A9%20%C4%8Dernostrakat%C3%A9%20prase">hľadajte chovné zvieratá v bazári</a>.</p>
  faq:
  - q: Prečo je přeštické čiernostrakaté prasa tak vzácne?
    a: |
      Rastie pomalšie než komerčné hybridné línie, a preto bolo z veľkochovov vytlačené. Dochovalo sa vďaka <strong>konzervačnému programu</strong> ako národný genetický zdroj ČR — dnes ho chová len okolo 200–300 prasníc.
  - q: Aké má přeštické čiernostrakaté prasa mäso?
    a: |
      Mäso je mramorované, s tukovou pokrývkou a výraznou chuťou — vyhľadávaná delikatesa. Najznámejším výrobkom je <strong>přeštická šunka</strong>.
  - q: Kde sa přeštické čiernostrakaté prasa vyšľachtilo?
    a: |
      V okolí <strong>Přeštic na Plzeňsku</strong> na konci 19. storočia, krížením domácich svíň s plemenami berkshire a cornwall. Ako plemeno bolo uznané v roku 1962.
