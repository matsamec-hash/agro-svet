  body: |
    <h2>Biele otcovské plemeno — česká otcovská línia</h2>
    <p><strong>Biele otcovské plemeno</strong> (skratka BO) je česká otcovská línia vyšľachtená z <a href="/sk/plemena/prasata/bile-uslechtile/">bieleho ušľachtilého prasaťa</a> s dôrazom na zmasilosť a denný prírastok. Je zaradené v plemennej knihe SCHP SR a slúži ako alternatíva k <a href="/sk/plemena/prasata/pietrain/">pietrainu</a> pre chovateľov, ktorí preferujú biele sele a vyhýbajú sa halotanovej genetike.</p>

    <h3>Nie je to to isté čo biele ušľachtilé</h3>
    <p>Pozor na zámenu: hľadáte-li materské <strong>české biele ušľachtilé prasa</strong> (Large White, plodnosť a mliečnosť), patrí na samostatnú stránku <a href="/sk/plemena/prasata/bile-uslechtile/">Biele ušľachtilé prasa</a>. Biele otcovské plemeno je z neho naopak <strong>odvodená otcovská línia</strong> zameraná na masnú úžitkovosť.</p>
  faq:
  - q: Z akého plemena vzniklo biele otcovské?
    a: |
      Bolo vyšľachtené z <a href="/sk/plemena/prasata/bile-uslechtile/">bieleho ušľachtilého prasaťa</a> ako špecializovaná otcovská línia s dôrazom na zmasilosť a denný prírastok.
  - q: Na čo sa biele otcovské plemeno používa?
    a: |
      Ako otcovská (terminálna) línia v hybridných chovoch — dodáva potomstvu zmasilosť. Je to česká alternatíva k pietrainu s výhodou bieleho selete a bez halotanovej genetiky.
