slug: hovezi
name: Hovädzí dobytok
name_plural: Hovädzie plemená
description: |
  Prehľad hovädzích plemien chovaných v Českej republike a Európe. Mliečne, mäsové, kombinované a menšinové regionálne plemená. Dáta zahŕňajú pôvod, hmotnosť, mliečnu úžitkovosť a hlavné chovné znaky.
