slug: kone
name: Kone
name_plural: Plemená koní
description: |
  Plemená koní v Českej republike — teplokrvné športové, chladnokrvné ťažné, pony, ušľachtilé a regionálne rasy. Zahŕňa domáce aj importované plemená.
