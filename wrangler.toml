# Pre-launch site gate. Set to empty string ("") and redeploy to remove the passcode wall.
SITE_GATE_PASSCODE = ""

[assets]
directory = "./dist/client/"
# Gate is off (SITE_GATE_PASSCODE = ""), so prerendered HTML is served directly
# from the Assets binding — Worker only runs on SSR routes (homepage, /novinky/[slug],
# /bazar/*, /admin/*, /api/*). Saves Worker invocations + ~5-15ms TTFB on 1 210
# prerendered pages. If you re-enable the gate, set `run_worker_first = true` here
# AND set SITE_GATE_PASSCODE, redeploy.
#
# SK launch (Fáze 1c-obsah): /sk a /uk jsou plně SSR (middleware locale-rewrite).
# Žádné /sk statické assety neexistují, takže Worker chytí /sk i /uk i bez explicitního
# run_worker_first (viz historie — před SK launchem tu tento klíč vůbec nebyl).
#
# run_worker_first ODSTRANĚNO 2026-07-19: wrangler 4.112.0 (auto-instalovaný v CI přes
# `npx wrangler deploy`) nově vyžaduje Worker `main` script, když je run_worker_first
# nastavené. Tento projekt používá @astrojs/node adapter (Cloudflare→Traefik→Node),
# žádný CF Worker `main` neexistuje → deploy padal na
# "Cannot set run_worker_first without a Worker script". Odstranění je bezpečné
# (žádné /sk /uk statické assety k shadowingu).

[observability]
enabled = true

# Daily cron pro notify-me digest je triggered externě (UptimeRobot /
# cron-job.org / lokální cron) přes GET /api/cron/saved-search-digest
# s Authorization: Bearer ${CRON_SECRET}. Astro adapter @astrojs/cloudflare
# nemá nativní scheduled handler — orphaned wrangler trigger by nic nedělal.
