# Pre-launch site gate. Set to empty string ("") and redeploy to remove the passcode wall.
SITE_GATE_PASSCODE = ""

[assets]
directory = "./dist/client/"
# Gate is off (SITE_GATE_PASSCODE = ""), so prerendered HTML is served directly
# from the Assets binding — Worker only runs on SSR routes (homepage, /novinky/[slug],
# /bazar/*, /admin/*, /api/*). Saves Worker invocations + ~5-15ms TTFB on 1 210
# prerendered pages. If you re-enable the gate, set `run_worker_first = true` here
# AND set SITE_GATE_PASSCODE, redeploy.

[observability]
enabled = true

# Daily cron pro notify-me digest je triggered externě (UptimeRobot /
# cron-job.org / lokální cron) přes GET /api/cron/saved-search-digest
# s Authorization: Bearer ${CRON_SECRET}. Astro adapter @astrojs/cloudflare
# nemá nativní scheduled handler — orphaned wrangler trigger by nic nedělal.
